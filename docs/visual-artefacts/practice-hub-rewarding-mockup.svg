<svg xmlns="http://www.w3.org/2000/svg" width="430" height="960" viewBox="0 0 430 960" role="img" aria-labelledby="title desc">
  <title id="title">Practice hub rewarding mockup</title>
  <desc id="desc">A mobile Practice hub concept with Today's review, a compact Prove I know this challenge row, a large Quiz card containing Capitals and Who's who options, Recite, Dictation, and a separate Quiz history progress row.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff5e9"/>
      <stop offset="1" stop-color="#e4efff"/>
    </linearGradient>
    <linearGradient id="review" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fffb"/>
      <stop offset="1" stop-color="#dff5e9"/>
    </linearGradient>
    <linearGradient id="quiz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4efff"/>
    </linearGradient>
    <linearGradient id="recite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7ff"/>
    </linearGradient>
    <linearGradient id="dictation" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe8b8"/>
    </linearGradient>
    <linearGradient id="history" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe3e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1a251f" flood-opacity="0.16"/>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h1 { font-size: 29px; font-weight: 800; fill: #16201b; }
      .h2 { font-size: 19px; font-weight: 800; fill: #16201b; }
      .h3 { font-size: 16px; font-weight: 800; fill: #16201b; }
      .body { font-size: 13px; fill: #637067; }
      .tiny { font-size: 12px; font-weight: 760; fill: #16201b; }
      .label { font-size: 12px; font-weight: 800; letter-spacing: 1.3px; fill: #637067; }
      .white { fill: #ffffff; }
      .mutedWhite { fill: rgba(255,255,255,0.76); }
    </style>
  </defs>

  <rect width="430" height="960" fill="url(#bg)"/>
  <rect x="20" y="20" width="390" height="920" rx="36" fill="#f7faf6" stroke="#dbe5dc" filter="url(#shadow)"/>

  <g class="font">
    <circle cx="62" cy="64" r="21" fill="#ffffff" stroke="#dbe5dc"/>
    <text x="62" y="71" text-anchor="middle" font-size="24" fill="#16201b">&lt;</text>
    <text x="95" y="61" class="h1">Test yourself</text>
    <text x="95" y="84" class="body">Pick a quick win. Every round helps memory stick.</text>
    <rect x="315" y="44" width="60" height="44" rx="18" fill="#12352a"/>
    <text x="345" y="63" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">420</text>
    <text x="345" y="78" text-anchor="middle" font-size="10" font-weight="800" fill="#c8d6d0">XP</text>

    <text x="40" y="128" class="label">BEST NEXT STEP</text>
    <rect x="38" y="144" width="354" height="184" rx="24" fill="url(#review)" stroke="#b9ddc8"/>
    <text x="56" y="180" class="h2">Today's review</text>
    <text x="56" y="204" class="body">2 topics are ready: Fractions and World Capitals.</text>
    <rect x="307" y="162" width="66" height="30" rx="15" fill="#2f9c6a"/>
    <text x="340" y="182" text-anchor="middle" font-size="12" font-weight="800" fill="#ffffff">+30 XP</text>
    <rect x="56" y="230" width="51" height="28" rx="14" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="81.5" y="249" text-anchor="middle" class="tiny">4 min</text>
    <rect x="115" y="230" width="67" height="28" rx="14" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="148.5" y="249" text-anchor="middle" class="tiny">2 topics</text>
    <rect x="190" y="230" width="105" height="28" rx="14" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="242.5" y="249" text-anchor="middle" class="tiny">Memory boost</text>
    <rect x="56" y="274" width="318" height="48" rx="18" fill="#16201b"/>
    <text x="215" y="305" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">Start review</text>

    <rect x="38" y="342" width="354" height="58" rx="20" fill="#ffffff" opacity="0.68" stroke="#b9ddc8"/>
    <circle cx="72" cy="371" r="18" fill="#2f9c6a"/>
    <text x="72" y="378" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">✓</text>
    <text x="102" y="365" font-size="15" font-weight="800" fill="#16201b">Prove I know this</text>
    <text x="102" y="385" font-size="12" fill="#637067">6 topics ready · 5 min · +40 XP</text>
    <text x="370" y="380" text-anchor="middle" font-size="22" font-weight="700" fill="#637067">&gt;</text>

    <text x="40" y="438" class="label">QUIZ</text>

    <rect x="38" y="456" width="354" height="184" rx="24" fill="url(#quiz)" stroke="#b8ccec"/>
    <text x="56" y="492" class="h2">Quick quiz</text>
    <text x="56" y="516" class="body">Pick a quiz style and do a short scored round.</text>
    <rect x="307" y="474" width="66" height="30" rx="15" fill="#2f9c6a"/>
    <text x="340" y="494" text-anchor="middle" font-size="12" font-weight="800" fill="#ffffff">+20 XP</text>

    <rect x="56" y="544" width="151" height="78" rx="18" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <circle cx="82" cy="570" r="16" fill="#386dbe"/>
    <text x="82" y="576" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">?</text>
    <rect x="153" y="557" width="39" height="22" rx="11" fill="#ffffff" opacity="0.85" stroke="#dbe5dc"/>
    <text x="172.5" y="572" text-anchor="middle" font-size="10" font-weight="800" fill="#16201b">2m</text>
    <text x="72" y="600" font-size="15" font-weight="800" fill="#16201b">Capitals</text>
    <text x="72" y="616" font-size="11" fill="#637067">Best 8/10</text>

    <rect x="223" y="544" width="151" height="78" rx="18" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <circle cx="249" cy="570" r="16" fill="#386dbe"/>
    <text x="249" y="576" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">W</text>
    <rect x="320" y="557" width="39" height="22" rx="11" fill="#ffffff" opacity="0.85" stroke="#dbe5dc"/>
    <text x="339.5" y="572" text-anchor="middle" font-size="10" font-weight="800" fill="#16201b">3m</text>
    <text x="239" y="600" font-size="15" font-weight="800" fill="#16201b">Who's who</text>
    <text x="239" y="616" font-size="11" fill="#637067">Clue challenge</text>

    <text x="40" y="678" class="label">OTHER PRACTICE</text>

    <rect x="38" y="694" width="172" height="120" rx="20" fill="url(#dictation)" stroke="#e6c883"/>
    <circle cx="72" cy="728" r="18" fill="#b46f00"/>
    <text x="72" y="735" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">D</text>
    <rect x="133" y="712" width="59" height="24" rx="12" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="162.5" y="728" text-anchor="middle" font-size="11" font-weight="800" fill="#16201b">+25 XP</text>
    <text x="56" y="768" class="h3">Dictation</text>
    <text x="56" y="789" font-size="12" fill="#637067">Listen, write, check.</text>
    <rect x="56" y="796" width="47" height="24" rx="12" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="79.5" y="812" text-anchor="middle" font-size="11" font-weight="800" fill="#16201b">5 min</text>

    <rect x="220" y="694" width="172" height="120" rx="20" fill="url(#recite)" stroke="#c7bdf1"/>
    <circle cx="254" cy="728" r="18" fill="#7058c8"/>
    <text x="254" y="735" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">R</text>
    <rect x="333" y="712" width="41" height="24" rx="12" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="353.5" y="728" text-anchor="middle" font-size="11" font-weight="800" fill="#16201b">Beta</text>
    <text x="238" y="768" class="h3">Recite</text>
    <text x="238" y="789" font-size="12" fill="#637067">Say it from memory.</text>
    <rect x="238" y="796" width="47" height="24" rx="12" fill="#ffffff" opacity="0.72" stroke="#dbe5dc"/>
    <text x="261.5" y="812" text-anchor="middle" font-size="11" font-weight="800" fill="#16201b">3 min</text>

    <text x="40" y="848" class="label">RECENT PROGRESS</text>
    <rect x="38" y="864" width="354" height="58" rx="20" fill="#ffffff" opacity="0.68" stroke="#edbdc7"/>
    <circle cx="72" cy="893" r="18" fill="#b64a62"/>
    <text x="72" y="900" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">H</text>
    <text x="102" y="887" font-size="15" font-weight="800" fill="#16201b">Quiz history</text>
    <text x="102" y="907" font-size="12" fill="#637067">12 rounds played · Last score 9/10 · 180 XP</text>
    <text x="370" y="902" text-anchor="middle" font-size="22" font-weight="700" fill="#637067">&gt;</text>
  </g>
</svg>
