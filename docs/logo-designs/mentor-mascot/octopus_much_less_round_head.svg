<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 941 741" width="941" height="741" role="img" aria-labelledby="title desc">
  <title id="title">Teal octopus with a much less round head</title>
  <desc id="desc">Vector illustration of the original teal octopus, redrawn with a visibly taller, flatter-sided head shape inspired by the reference image.</desc>
  <defs>
    <radialGradient id="headGrad" cx="40%" cy="28%" r="75%">
      <stop offset="0" stop-color="#21cdbd"/>
      <stop offset="0.55" stop-color="#0ba595"/>
      <stop offset="1" stop-color="#08786f"/>
    </radialGradient>
    <linearGradient id="headShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0fc9ba" stop-opacity="0"/>
      <stop offset="1" stop-color="#00685f" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="tentacleLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19c9bc"/>
      <stop offset="1" stop-color="#079486"/>
    </linearGradient>
    <linearGradient id="tentacleDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b8d82"/>
      <stop offset="1" stop-color="#056b63"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9f73ff"/>
      <stop offset="1" stop-color="#7442df"/>
    </linearGradient>
    <linearGradient id="capBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a77cff"/>
      <stop offset="1" stop-color="#8b57ef"/>
    </linearGradient>
    <radialGradient id="spotGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#c1fff2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#8ff0e3" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#004c48" flood-opacity="0.17"/>
    </filter>
    <filter id="eyeShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#004c48" flood-opacity="0.18"/>
    </filter>
    <clipPath id="headClip">
      <path d="M462.5 30C560 30 620 78 636 151C644 188 646 276 641 328C633 416 563 466 463 466C362 466 293 416 285 328C280 276 282 188 289 151C305 78 365 30 462.5 30Z"/>
    </clipPath>
  </defs>

  <!-- tentacles behind the head -->
  <g id="tentacles" filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M322 312C229 314 104 347 29 221C21 292 77 360 160 381C238 401 323 390 386 352C367 334 349 321 322 312Z" fill="url(#tentacleLight)"/>
    <path d="M62 262C111 309 185 325 258 317" fill="none" stroke="#76efe4" stroke-width="13" opacity="0.25"/>

    <path d="M604 304C704 302 804 348 941 211C938 277 899 328 832 360C752 397 650 392 572 358C580 336 592 318 604 304Z" fill="url(#tentacleDark)"/>
    <path d="M629 363C711 368 800 342 887 276" fill="none" stroke="#7cf0e4" stroke-width="13" opacity="0.18"/>

    <path d="M345 382C263 424 179 506 119 596" fill="none" stroke="url(#tentacleDark)" stroke-width="39"/>
    <path d="M275 470C221 506 171 552 139 598" fill="none" stroke="#55d6cb" stroke-width="10" opacity="0.35"/>

    <path d="M407 394C377 497 329 598 285 683" fill="none" stroke="url(#tentacleLight)" stroke-width="40"/>
    <path d="M402 441C374 541 333 626 299 679" fill="none" stroke="#71eadc" stroke-width="12" opacity="0.28"/>

    <path d="M461 405C451 508 439 612 462 697" fill="none" stroke="#077a70" stroke-width="38"/>

    <path d="M506 395C556 501 602 574 637 666" fill="none" stroke="url(#tentacleLight)" stroke-width="38"/>
    <path d="M521 438C558 523 600 596 625 658" fill="none" stroke="#79eee2" stroke-width="12" opacity="0.24"/>

    <path d="M565 382C665 425 752 492 803 553" fill="none" stroke="#087a70" stroke-width="39"/>
  </g>

  <!-- suction cups -->
  <g id="suction-cups" opacity="0.92">
    <ellipse cx="63" cy="262" rx="9" ry="6" fill="url(#spotGrad)" opacity="0.7"/>
    <ellipse cx="132" cy="305" rx="11" ry="8" fill="url(#spotGrad)" opacity="0.65"/>
    <ellipse cx="216" cy="323" rx="15" ry="10" fill="url(#spotGrad)" opacity="0.72"/>
    <ellipse cx="846" cy="288" rx="11" ry="8" fill="url(#spotGrad)" opacity="0.55"/>
    <ellipse cx="726" cy="322" rx="15" ry="10" fill="url(#spotGrad)" opacity="0.7"/>
    <ellipse cx="242" cy="458" rx="13" ry="9" fill="url(#spotGrad)" opacity="0.65"/>
    <ellipse cx="166" cy="534" rx="10" ry="7" fill="url(#spotGrad)" opacity="0.63"/>
    <ellipse cx="292" cy="637" rx="9" ry="7" fill="url(#spotGrad)" opacity="0.62"/>
    <ellipse cx="335" cy="543" rx="14" ry="9" fill="url(#spotGrad)" opacity="0.68"/>
    <ellipse cx="446" cy="551" rx="13" ry="9" fill="url(#spotGrad)" opacity="0.74"/>
    <ellipse cx="446" cy="645" rx="9" ry="7" fill="url(#spotGrad)" opacity="0.55"/>
    <ellipse cx="574" cy="551" rx="13" ry="9" fill="url(#spotGrad)" opacity="0.70"/>
    <ellipse cx="617" cy="636" rx="9" ry="7" fill="url(#spotGrad)" opacity="0.55"/>
    <ellipse cx="684" cy="467" rx="13" ry="9" fill="url(#spotGrad)" opacity="0.65"/>
    <ellipse cx="761" cy="525" rx="10" ry="7" fill="url(#spotGrad)" opacity="0.6"/>
  </g>

  <!-- much less round, taller head -->
  <g id="head" filter="url(#softShadow)">
    <path d="M462.5 30C560 30 620 78 636 151C644 188 646 276 641 328C633 416 563 466 463 466C362 466 293 416 285 328C280 276 282 188 289 151C305 78 365 30 462.5 30Z" fill="url(#headGrad)"/>
    <g clip-path="url(#headClip)">
      <path d="M263 70C331 1 495 38 492 142C490 210 417 227 333 212C276 202 242 152 263 70Z" fill="#7ce9df" opacity="0.23"/>
      <path d="M286 377C374 437 556 443 641 378C613 436 551 466 463 466C375 466 314 436 286 377Z" fill="url(#headShadow)" opacity="0.75"/>
      <path d="M603 73C648 158 655 278 619 366" fill="none" stroke="#005f58" stroke-width="22" opacity="0.07"/>
    </g>
  </g>

  <!-- purple cap -->
  <g id="cap">
    <path d="M312 102C339 57 393 31 463 31C532 31 587 57 614 102Z" fill="url(#capGrad)"/>
    <path d="M327 102C356 82 398 76 463 76C528 76 570 82 598 102" fill="none" stroke="#b690ff" stroke-width="9" opacity="0.55"/>
    <path d="M322 100H604C616 100 625 109 625 120C625 131 616 140 604 140H322C310 140 301 131 301 120C301 109 310 100 322 100Z" fill="url(#capBand)"/>
    <path d="M331 114H595" fill="none" stroke="#c5a6ff" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- face -->
  <g id="face" filter="url(#eyeShadow)">
    <g id="left-eye">
      <ellipse cx="395" cy="204" rx="36" ry="41" fill="#f7fff7"/>
      <circle cx="395" cy="214" r="15" fill="#1c1b4a"/>
      <ellipse cx="384" cy="193" rx="7" ry="8" fill="#99dad5" opacity="0.75"/>
      <path d="M359 195H429" fill="none" stroke="#073c3a" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g id="right-eye">
      <ellipse cx="531" cy="204" rx="36" ry="41" fill="#f7fff7"/>
      <circle cx="531" cy="214" r="15" fill="#1c1b4a"/>
      <ellipse cx="520" cy="193" rx="7" ry="8" fill="#99dad5" opacity="0.75"/>
      <path d="M496 195H566" fill="none" stroke="#073c3a" stroke-width="9" stroke-linecap="round"/>
    </g>
  </g>
  <path id="smile" d="M419 278C448 294 481 294 506 274" fill="none" stroke="#1c1b4a" stroke-width="10" stroke-linecap="round"/>
</svg>
