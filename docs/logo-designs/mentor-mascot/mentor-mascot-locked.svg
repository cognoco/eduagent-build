<svg viewBox="0 0 230 185" xmlns="http://www.w3.org/2000/svg">
  <!-- The Mentor — LOCKED character design (brainstorm v13, 2026-06-10).
       Spec: docs/specs/2026-06-10-mentor-mascot-and-birth-animation.md
       Code mirror: apps/mobile/src/components/common/mentor-mascot-geometry.ts (MASCOT_HERO)
       Brand-fixed colors by design: body gradient #14b8a6→#0d9488, arms #0d9488/#0f766e,
       suckers #99f6e4, beanie #8b5cf6/#a78bfa, pupils/smirk #1a1a3e, lid crease #0a5d55. -->
  <defs>
    <linearGradient id="body" x1="0" y1="8" x2="0" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- arms: tapered closed shapes, tucked under the body, alternating depths -->
  <path d="M74,76 C48,66 38,92 8,52 C2,68 22,98 76,92 Z" fill="#0d9488"/>
  <path d="M80,88 C54,100 44,116 26,136 C22,142 28,150 34,144 C50,126 64,112 86,100 Z" fill="#0f766e"/>
