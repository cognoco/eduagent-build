<svg viewBox="0 0 230 185" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MentoMate mentor mascot">
  <!-- The Mentor - character design polish pass, 2026-06-10.
       Spec: docs/specs/2026-06-10-mentor-mascot-and-birth-animation.md
       Code mirror: apps/mobile/src/components/common/mentor-mascot-geometry.ts (MASCOT_HERO)
       This render keeps the locked geometry but adds SVG-native depth: layered gradients,
       soft contact shadows, rim light, and abstracted face/bead treatment. -->
  <defs>
    <linearGradient id="body" x1="70" y1="6" x2="146" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3c5"/>
      <stop offset="46%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d8f84"/>
    </linearGradient>

    <radialGradient id="bodyLight" cx="36%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#7ef7e8" stop-opacity=".45"/>
      <stop offset="45%" stop-color="#5eead4" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bodyShade" cx="64%" cy="76%" r="74%">
      <stop offset="0%" stop-color="#063f3a" stop-opacity="0"/>
      <stop offset="62%" stop-color="#063f3a" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#052f2d" stop-opacity=".25"/>
    </radialGradient>

    <linearGradient id="armBright" x1="35" y1="55" x2="190" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="48%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <linearGradient id="armDeep" x1="50" y1="75" x2="176" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="58%" stop-color="#0b6f66"/>
      <stop offset="100%" stop-color="#084f49"/>
    </linearGradient>

    <linearGradient id="beanie" x1="82" y1="10" x2="136" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d40d9"/>
    </linearGradient>

    <linearGradient id="beanieBand" x1="72" y1="24" x2="148" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <radialGradient id="mintBead" cx="34%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#ecfffb"/>
      <stop offset="58%" stop-color="#99f6e4"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </radialGradient>

    <path id="mantleShape" d="M110,9 C80,9 58,31 58,60 C58,78 68,91 84,96 C91,99 96,96 100,88 C105,97 117,99 123,89 C128,97 138,98 147,91 C158,82 162,70 162,58 C162,30 140,9 110,9 Z"/>

    <clipPath id="mantleClip">
      <use href="#mantleShape"/>
    </clipPath>

    <filter id="softShadow" x="-18%" y="-24%" width="136%" height="154%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="5.5" flood-color="#071728" flood-opacity=".24"/>
    </filter>

    <filter id="shortShadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#071728" flood-opacity=".22"/>
    </filter>

    <filter id="groundBlur" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- soft ambient grounding; keeps the transparent asset from feeling pasted on -->
  <ellipse cx="112" cy="166" rx="78" ry="10" fill="#071728" opacity=".12" filter="url(#groundBlur)"/>

  <!-- back arms: long side curls and supports; front arms later interrupt the lower body edge -->
  <g filter="url(#softShadow)">
    <path d="M78,77 C56,72 40,91 19,75 C7,66 2,51 8,47 C21,54 29,67 45,70 C60,73 72,66 85,75 C93,81 88,83 78,77 Z" fill="url(#armBright)"/>
    <path d="M82,91 C63,101 50,125 38,153 C33,165 18,158 26,143 C41,113 60,95 84,87 C94,84 94,88 82,91 Z" fill="url(#armDeep)"/>
    <path d="M134,89 C158,91 188,108 207,132 C215,142 224,130 213,119 C189,95 160,86 134,85 C125,85 125,88 134,89 Z" fill="url(#armDeep)"/>
    <path d="M142,77 C164,72 188,84 222,48 C230,62 209,94 166,99 C147,101 130,85 142,77 Z" fill="url(#armBright)"/>

    <path d="M58,82 C42,83 30,77 17,62" fill="none" stroke="#8ff7ea" stroke-width="2.2" stroke-linecap="round" opacity=".1"/>
    <path d="M154,87 C172,87 190,80 211,61" fill="none" stroke="#8ff7ea" stroke-width="2.2" stroke-linecap="round" opacity=".1"/>
  </g>

  <!-- body: round dome with a scalloped lower edge; no complete egg outline -->
  <g filter="url(#shortShadow)">
    <use href="#mantleShape" fill="url(#body)"/>
  </g>
  <g clip-path="url(#mantleClip)">
    <use href="#mantleShape" fill="url(#bodyLight)"/>
    <use href="#mantleShape" fill="url(#bodyShade)"/>
    <ellipse cx="91" cy="31" rx="26" ry="17" fill="#ccfbf1" opacity=".13"/>
    <path d="M74,87 C90,98 130,98 146,87 C139,96 125,101 110,101 C95,101 81,96 74,87 Z" fill="#063f3a" opacity=".08"/>
  </g>

  <!-- front arms: they climb into the body height, hiding the lower mantle contour -->
  <g filter="url(#softShadow)">
    <path d="M84,86 C64,98 52,122 38,153 C32,166 18,158 27,143 C43,111 63,92 86,82 C96,78 94,82 84,86 Z" fill="url(#armDeep)"/>
    <path d="M98,88 C86,109 80,132 66,159 C60,171 47,164 56,151 C69,128 80,103 95,86 C102,79 105,82 98,88 Z" fill="url(#armBright)"/>
    <path d="M114,91 C111,112 119,132 135,151 C145,163 133,174 122,161 C109,145 108,116 121,92 C119,85 115,86 114,91 Z" fill="url(#armDeep)"/>
    <path d="M130,88 C146,108 159,126 181,142 C191,149 198,136 187,130 C166,118 151,101 132,86 C124,80 122,83 130,88 Z" fill="url(#armBright)"/>
    <path d="M143,85 C161,91 177,102 196,116 C207,124 215,111 203,104 C183,91 161,82 142,80 C132,79 133,82 143,85 Z" fill="url(#armDeep)"/>

    <path d="M91,96 C80,112 73,136 61,154" fill="none" stroke="#8ff7ea" stroke-width="2.4" stroke-linecap="round" opacity=".13"/>
    <path d="M132,96 C149,116 163,132 184,143" fill="none" stroke="#8ff7ea" stroke-width="2.2" stroke-linecap="round" opacity=".1"/>
  </g>

  <!-- beanie: permanent violet identity tell, now with volume -->
  <path d="M76,32 a34,24 0 0 1 68,0 z" fill="url(#beanie)"/>
  <path d="M83,27 C95,16 126,16 138,27" fill="none" stroke="#c4b5fd" stroke-width="2.4" stroke-linecap="round" opacity=".45"/>
  <path d="M78,32 H142" stroke="#5b35bd" stroke-width="2" stroke-linecap="round" opacity=".3"/>
  <rect x="72" y="24" width="76" height="9" rx="4.5" fill="url(#beanieBand)" filter="url(#shortShadow)"/>
  <path d="M79,27 H141" stroke="#ede9fe" stroke-width="1.5" stroke-linecap="round" opacity=".34"/>

  <!-- toned-down beads: still octopus/sucker adjacent, but now read as brand-memory dots -->
  <g opacity=".72">
    <ellipse cx="52" cy="76" rx="3.5" ry="2.4" fill="url(#mintBead)"/>
    <ellipse cx="32" cy="72" rx="2.8" ry="2" fill="url(#mintBead)" opacity=".82"/>
    <ellipse cx="16" cy="62" rx="2" ry="1.4" fill="url(#mintBead)" opacity=".72"/>
    <ellipse cx="58" cy="108" rx="3" ry="2.2" fill="url(#mintBead)" opacity=".78"/>
    <ellipse cx="40" cy="126" rx="2.2" ry="1.6" fill="url(#mintBead)" opacity=".68"/>
    <ellipse cx="80" cy="128" rx="3" ry="2.2" fill="url(#mintBead)" opacity=".78"/>
    <ellipse cx="70" cy="150" rx="2" ry="1.5" fill="url(#mintBead)" opacity=".66"/>
    <ellipse cx="106" cy="130" rx="3" ry="2.2" fill="url(#mintBead)" opacity=".78"/>
    <ellipse cx="106" cy="152" rx="2" ry="1.5" fill="url(#mintBead)" opacity=".66"/>
    <ellipse cx="136" cy="130" rx="3" ry="2.2" fill="url(#mintBead)" opacity=".78"/>
    <ellipse cx="146" cy="150" rx="2" ry="1.5" fill="url(#mintBead)" opacity=".66"/>
    <ellipse cx="162" cy="110" rx="3" ry="2.2" fill="url(#mintBead)" opacity=".78"/>
    <ellipse cx="180" cy="124" rx="2.2" ry="1.6" fill="url(#mintBead)" opacity=".68"/>
    <ellipse cx="172" cy="76" rx="3.5" ry="2.4" fill="url(#mintBead)"/>
    <ellipse cx="200" cy="68" rx="2.5" ry="1.8" fill="url(#mintBead)" opacity=".78"/>
  </g>

  <g id="mentor-face">
    <!-- expression: embedded in the mantle, avoiding the pale "continent" patch -->
    <ellipse cx="94" cy="64" rx="8.2" ry="9" fill="#f6fffd" opacity=".96" filter="url(#shortShadow)"/>
    <ellipse cx="126" cy="64" rx="8.2" ry="9" fill="#f6fffd" opacity=".96" filter="url(#shortShadow)"/>
    <circle cx="94" cy="66.3" r="3.4" fill="#1a1a3e"/>
    <circle cx="126" cy="66.3" r="3.4" fill="#1a1a3e"/>
    <path d="M86,61.8 C87.8,55.8 100.2,55.8 102,61.8 Z" fill="url(#body)"/>
    <path d="M118,61.8 C119.8,55.8 132.2,55.8 134,61.8 Z" fill="url(#body)"/>
    <path d="M86,61.8 H102" fill="none" stroke="#0a5d55" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M118,61.8 H134" fill="none" stroke="#0a5d55" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100,83 q10,4.5 20,-1" fill="none" stroke="#1a1a3e" stroke-width="2.9" stroke-linecap="round"/>
    <circle cx="91.5" cy="61.7" r="1.6" fill="#ffffff" opacity=".58"/>
    <circle cx="123.5" cy="61.7" r="1.6" fill="#ffffff" opacity=".58"/>
  </g>
</svg>
