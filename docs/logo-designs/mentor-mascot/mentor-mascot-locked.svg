  <ellipse cx="106" cy="152" rx="2" ry="1.5" fill="#99f6e4" opacity=".9"/>
  <ellipse cx="136" cy="130" rx="3" ry="2.2" fill="#99f6e4" opacity=".9"/>
  <ellipse cx="146" cy="150" rx="2" ry="1.5" fill="#99f6e4" opacity=".9"/>
