    <path d="M40 58 C45 32 60 20 80 20 C100 20 115 32 120 58 C95 67 65 67 40 58Z" fill="url(#hat)"/>
    <path d="M38 55 C63 64 97 64 122 55 C127 54 131 58 130 63 L129 70 C128 76 121 77 117 74 C92 80 68 80 43 74 C38 77 32 76 31 70 L30 63 C29 58 33 54 38 55Z" fill="url(#hatBand)"/>
