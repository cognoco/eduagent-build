    <rect x="88" y="72" width="28" height="18" rx="8" fill="#fbfaf3"/>
    <circle cx="67" cy="80" r="7" fill="#29305e"/>
    <circle cx="102" cy="80" r="7" fill="#29305e"/>
    <rect x="51" y="69" width="31" height="9" rx="4.5" fill="#0aa89d"/>
    <rect x="86" y="69" width="31" height="9" rx="4.5" fill="#0aa89d"/>
