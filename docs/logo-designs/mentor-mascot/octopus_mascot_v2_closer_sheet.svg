  <g transform="translate(8 6) scale(.90)">
    <path d="M80 35 C111 35 132 58 128 94 C126 111 120 127 125 142 C130 155 111 158 106 145 C101 131 105 115 114 101" stroke="url(#tealFlat)" stroke-width="17" stroke-linecap="round"/>
