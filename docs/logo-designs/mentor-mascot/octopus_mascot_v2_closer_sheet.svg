    <path d="M105 101 C125 113 135 130 138 149" stroke="url(#tealFlat)" stroke-width="15" stroke-linecap="round"/>
    <ellipse cx="80" cy="70" rx="48" ry="55" fill="url(#tealFlat)"/>
