<svg viewBox="0 0 340 70" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal lockup — icon + mentomate wordmark, for dark backgrounds -->
  <defs>
    <linearGradient id="a" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
  </defs>
  <!-- Compact icon -->
  <g transform="translate(4,6)">
    <path d="M10,50 C10,27 50,27 50,4" fill="none" stroke="url(#a)" stroke-width="2.8" stroke-linecap="round"/>
    <circle cx="16" cy="36" r="2.5" fill="#f9a8d4" opacity=".6"/>
    <circle cx="30" cy="27" r="3" fill="#c4b5fd" opacity=".65"/>
    <circle cx="44" cy="18" r="3.5" fill="#99f6e4" opacity=".7"/>
    <circle cx="10" cy="50" r="8.5" fill="#8b5cf6"/>
    <circle cx="10" cy="50" r="3.5" fill="#f3e8ff"/>
    <circle cx="50" cy="4" r="10" fill="#14b8a6"/>
    <circle cx="50" cy="4" r="4" fill="#ccfbf1"/>
  </g>
  <!-- Wordmark -->
  <text x="178" y="44" text-anchor="end" font-family="'Inter',system-ui,sans-serif" font-size="34" font-weight="600" letter-spacing="-.5" fill="#f1f5f9">ment</text>
  <circle cx="190" cy="35.5" r="8.5" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="190" cy="35.5" r="3" fill="#a78bfa"/>
  <text x="202" y="44" font-family="'Inter',system-ui,sans-serif" font-size="34" font-weight="600" letter-spacing="-.5" fill="#5eead4">mate</text>
</svg>
