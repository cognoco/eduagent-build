<svg viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="arc-lt" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
  </defs>
  <style>
    .lbl{fill:#888;font:500 10px/1 system-ui,sans-serif;text-anchor:middle;letter-spacing:1.5px;text-transform:uppercase}
    .sep{stroke:#EAEAE6;stroke-width:.5}
    .wm{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;letter-spacing:-.5px}
  </style>

  <!-- White background -->
  <rect width="680" height="860" fill="#fff"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  1. STANDALONE ICON                           -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="20" class="lbl">Standalone Icon</text>
  <g transform="translate(280,36)">
    <path d="M20,100 C20,55 100,55 100,10" fill="none" stroke="url(#arc)" stroke-width="4" stroke-linecap="round"/>
    <!-- Graduating dots: pink → light violet → mint -->
    <circle cx="33" cy="73" r="4" fill="#f472b6" opacity=".55"/>
    <circle cx="60" cy="55" r="5" fill="#a78bfa" opacity=".6"/>
    <circle cx="88" cy="37" r="6" fill="#5eead4" opacity=".7"/>
    <!-- Student node (violet) -->
    <circle cx="20" cy="100" r="15" fill="#8b5cf6"/>
    <circle cx="20" cy="100" r="6.5" fill="#f3e8ff"/>
    <!-- Achievement ring -->
    <circle cx="100" cy="10" r="22" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity=".18"/>
    <!-- Mentor node (teal) -->
    <circle cx="100" cy="10" r="17" fill="#0d9488"/>
    <circle cx="100" cy="10" r="7" fill="#ccfbf1"/>
  </g>

  <line x1="40" y1="162" x2="640" y2="162" class="sep"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  2. HORIZONTAL LOCKUP (light)                 -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="182" class="lbl">Horizontal Lockup</text>
  <g transform="translate(90,196)">
    <!-- Compact icon -->
    <g transform="translate(0,3)">
      <path d="M10,50 C10,27 50,27 50,4" fill="none" stroke="url(#arc)" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="16" cy="36" r="2.5" fill="#f472b6" opacity=".5"/>
      <circle cx="30" cy="27" r="3" fill="#a78bfa" opacity=".55"/>
      <circle cx="44" cy="18" r="3.5" fill="#5eead4" opacity=".65"/>
      <circle cx="10" cy="50" r="8.5" fill="#8b5cf6"/>
      <circle cx="10" cy="50" r="3.5" fill="#f3e8ff"/>
      <circle cx="50" cy="4" r="10" fill="#0d9488"/>
      <circle cx="50" cy="4" r="4" fill="#ccfbf1"/>
    </g>
    <!-- Wordmark: text-anchor="end" on "ment" ensures no overlap with circle -->
    <text x="178" y="40" text-anchor="end" class="wm" font-size="34" fill="#1a1a3e">ment</text>
    <!-- Circle-o node -->
    <circle cx="190" cy="31.5" r="8.5" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="190" cy="31.5" r="3" fill="#8b5cf6"/>
    <text x="202" y="40" class="wm" font-size="34" fill="#0d9488">mate</text>
  </g>

  <line x1="40" y1="274" x2="640" y2="274" class="sep"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  3. STACKED LOCKUP (light)                    -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="294" class="lbl">Stacked Lockup</text>
  <g transform="translate(281,310)">
    <!-- Icon -->
    <g transform="translate(22,0)">
      <path d="M12,62 C12,34 62,34 62,6" fill="none" stroke="url(#arc)" stroke-width="3.2" stroke-linecap="round"/>
      <circle cx="20" cy="45" r="3" fill="#f472b6" opacity=".5"/>
      <circle cx="37" cy="34" r="3.5" fill="#a78bfa" opacity=".55"/>
      <circle cx="54" cy="23" r="4" fill="#5eead4" opacity=".65"/>
      <circle cx="12" cy="62" r="10.5" fill="#8b5cf6"/>
      <circle cx="12" cy="62" r="4.5" fill="#f3e8ff"/>
      <circle cx="62" cy="6" r="13" fill="#0d9488"/>
      <circle cx="62" cy="6" r="5.5" fill="#ccfbf1"/>
    </g>
    <!-- Wordmark with circle-o node (same design as horizontal lockup) -->
    <text x="52" y="100" text-anchor="end" class="wm" font-size="22" fill="#1a1a3e">ment</text>
    <circle cx="60" cy="94" r="5.5" fill="none" stroke="#8b5cf6" stroke-width="1.8"/>
    <circle cx="60" cy="94" r="2" fill="#8b5cf6"/>
    <text x="68" y="100" class="wm" font-size="22" fill="#0d9488">mate</text>
  </g>

  <line x1="40" y1="432" x2="640" y2="432" class="sep"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  4. DARK MODE                                 -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="452" class="lbl">Dark Mode</text>
  <rect x="20" y="462" width="640" height="178" rx="12" fill="#1e1b4b"/>

  <!-- Dark — horizontal lockup -->
  <text x="340" y="480" style="fill:#6366f1;font:500 9px/1 system-ui,sans-serif;text-anchor:middle;letter-spacing:1px;text-transform:uppercase">Horizontal</text>
  <g transform="translate(90,488)">
    <g transform="translate(0,3)">
      <path d="M10,50 C10,27 50,27 50,4" fill="none" stroke="url(#arc-lt)" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="16" cy="36" r="2.5" fill="#f9a8d4" opacity=".6"/>
      <circle cx="30" cy="27" r="3" fill="#c4b5fd" opacity=".65"/>
      <circle cx="44" cy="18" r="3.5" fill="#99f6e4" opacity=".7"/>
      <circle cx="10" cy="50" r="8.5" fill="#8b5cf6"/>
      <circle cx="10" cy="50" r="3.5" fill="#f3e8ff"/>
      <circle cx="50" cy="4" r="10" fill="#14b8a6"/>
      <circle cx="50" cy="4" r="4" fill="#ccfbf1"/>
    </g>
    <text x="178" y="40" text-anchor="end" class="wm" font-size="34" fill="#faf5ee">ment</text>
    <circle cx="190" cy="31.5" r="8.5" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="190" cy="31.5" r="3" fill="#a78bfa"/>
    <text x="202" y="40" class="wm" font-size="34" fill="#5eead4">mate</text>
  </g>

  <!-- Dark — stacked lockup -->
  <text x="540" y="480" style="fill:#6366f1;font:500 9px/1 system-ui,sans-serif;text-anchor:middle;letter-spacing:1px;text-transform:uppercase">Stacked</text>
  <g transform="translate(500,488)">
    <g transform="translate(22,0)">
      <path d="M8,44 C8,24 44,24 44,4" fill="none" stroke="url(#arc-lt)" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="14" cy="32" r="2" fill="#f9a8d4" opacity=".55"/>
      <circle cx="26" cy="24" r="2.5" fill="#c4b5fd" opacity=".6"/>
      <circle cx="38" cy="16" r="3" fill="#99f6e4" opacity=".65"/>
      <circle cx="8" cy="44" r="7.5" fill="#8b5cf6"/>
      <circle cx="8" cy="44" r="3" fill="#f3e8ff"/>
      <circle cx="44" cy="4" r="9" fill="#14b8a6"/>
      <circle cx="44" cy="4" r="4" fill="#ccfbf1"/>
    </g>
    <text x="36" y="76" text-anchor="end" class="wm" font-size="16" fill="#faf5ee">ment</text>
    <circle cx="42" cy="70.5" r="4" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="42" cy="70.5" r="1.5" fill="#a78bfa"/>
    <text x="48" y="76" class="wm" font-size="16" fill="#5eead4">mate</text>
  </g>

  <line x1="40" y1="660" x2="640" y2="660" class="sep"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  5. APP ICON                                  -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="680" class="lbl">App Icon</text>
  <g transform="translate(295,694)">
    <rect width="90" height="90" rx="20" fill="#1e1b4b"/>
    <g transform="translate(14,12)">
      <path d="M10,58 C10,32 54,32 54,6" fill="none" stroke="url(#arc-lt)" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="17" cy="43" r="2.5" fill="#f9a8d4" opacity=".6"/>
      <circle cx="32" cy="32" r="3" fill="#c4b5fd" opacity=".65"/>
      <circle cx="47" cy="21" r="3.5" fill="#99f6e4" opacity=".7"/>
      <circle cx="10" cy="58" r="9" fill="#8b5cf6"/>
      <circle cx="10" cy="58" r="4" fill="#f3e8ff"/>
      <circle cx="54" cy="6" r="10.5" fill="#14b8a6"/>
      <circle cx="54" cy="6" r="4.5" fill="#ccfbf1"/>
    </g>
  </g>

  <line x1="40" y1="806" x2="640" y2="806" class="sep"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  6. SMALL SIZES                               -->
  <!-- ══════════════════════════════════════════════ -->
  <text x="340" y="826" class="lbl">Small Sizes</text>
  <g transform="translate(115,840)">
    <!-- 48px — deep indigo -->
    <rect width="48" height="48" rx="12" fill="#1e1b4b"/>
    <g transform="translate(7,6)">
      <path d="M5,32 C5,17 29,17 29,2" fill="none" stroke="url(#arc-lt)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="11" cy="21" r="1.5" fill="#f9a8d4" opacity=".6"/>
      <circle cx="23" cy="13" r="2" fill="#99f6e4" opacity=".65"/>
      <circle cx="5" cy="32" r="6" fill="#8b5cf6"/>
      <circle cx="5" cy="32" r="2.5" fill="#f3e8ff"/>
      <circle cx="29" cy="2" r="7" fill="#14b8a6"/>
      <circle cx="29" cy="2" r="3" fill="#ccfbf1"/>
    </g>

    <!-- 48px — lavender -->
    <rect x="64" width="48" height="48" rx="12" fill="#f3e8ff"/>
    <g transform="translate(71,6)">
      <path d="M5,32 C5,17 29,17 29,2" fill="none" stroke="url(#arc)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="11" cy="21" r="1.5" fill="#f472b6" opacity=".55"/>
      <circle cx="23" cy="13" r="2" fill="#5eead4" opacity=".6"/>
      <circle cx="5" cy="32" r="6" fill="#8b5cf6"/>
      <circle cx="5" cy="32" r="2.5" fill="#f3e8ff"/>
      <circle cx="29" cy="2" r="7" fill="#0d9488"/>
      <circle cx="29" cy="2" r="3" fill="#ccfbf1"/>
    </g>

    <!-- 48px — white -->
    <rect x="128" width="48" height="48" rx="12" fill="#fff" stroke="#E0E0DC" stroke-width=".5"/>
    <g transform="translate(135,6)">
      <path d="M5,32 C5,17 29,17 29,2" fill="none" stroke="url(#arc)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="11" cy="21" r="1.5" fill="#f472b6" opacity=".55"/>
      <circle cx="23" cy="13" r="2" fill="#5eead4" opacity=".6"/>
      <circle cx="5" cy="32" r="6" fill="#8b5cf6"/>
      <circle cx="5" cy="32" r="2.5" fill="#f3e8ff"/>
      <circle cx="29" cy="2" r="7" fill="#0d9488"/>
      <circle cx="29" cy="2" r="3" fill="#ccfbf1"/>
    </g>

    <!-- 48px — mint -->
    <rect x="192" width="48" height="48" rx="12" fill="#ccfbf1"/>
    <g transform="translate(199,6)">
      <path d="M5,32 C5,17 29,17 29,2" fill="none" stroke="url(#arc)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="11" cy="21" r="1.5" fill="#f472b6" opacity=".55"/>
      <circle cx="23" cy="13" r="2" fill="#a78bfa" opacity=".6"/>
      <circle cx="5" cy="32" r="6" fill="#8b5cf6"/>
      <circle cx="5" cy="32" r="2.5" fill="#f3e8ff"/>
      <circle cx="29" cy="2" r="7" fill="#0d9488"/>
      <circle cx="29" cy="2" r="3" fill="#ccfbf1"/>
    </g>

    <!-- 32px — deep indigo -->
    <g transform="translate(264,8)">
      <rect width="32" height="32" rx="8" fill="#1e1b4b"/>
      <g transform="translate(5,4)">
        <path d="M3,21 C3,11 19,11 19,1" fill="none" stroke="url(#arc-lt)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="1.5" fill="#c4b5fd" opacity=".6"/>
        <circle cx="3" cy="21" r="4" fill="#8b5cf6"/>
        <circle cx="3" cy="21" r="1.5" fill="#f3e8ff"/>
        <circle cx="19" cy="1" r="5" fill="#14b8a6"/>
        <circle cx="19" cy="1" r="2" fill="#ccfbf1"/>
      </g>
    </g>

    <!-- 32px — white -->
    <g transform="translate(310,8)">
      <rect width="32" height="32" rx="8" fill="#fff" stroke="#E0E0DC" stroke-width=".5"/>
      <g transform="translate(5,4)">
        <path d="M3,21 C3,11 19,11 19,1" fill="none" stroke="url(#arc)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="1.5" fill="#a78bfa" opacity=".6"/>
        <circle cx="3" cy="21" r="4" fill="#8b5cf6"/>
        <circle cx="3" cy="21" r="1.5" fill="#f3e8ff"/>
        <circle cx="19" cy="1" r="5" fill="#0d9488"/>
        <circle cx="19" cy="1" r="2" fill="#ccfbf1"/>
      </g>
    </g>

    <!-- 16px — favicon -->
    <g transform="translate(362,16)">
      <rect width="16" height="16" rx="4" fill="#1e1b4b"/>
      <g transform="translate(2,2)">
        <path d="M2,10 C2,5 10,5 10,1" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-linecap="round"/>
        <circle cx="2" cy="10" r="2.5" fill="#8b5cf6"/>
        <circle cx="10" cy="1" r="3" fill="#14b8a6"/>
      </g>
    </g>
  </g>
</svg>
