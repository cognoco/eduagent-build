<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="900" fill="#0B1020"/>
  <text x="750" y="54" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Pre-auth welcome cards concept</text>
  <text x="750" y="88" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Two onboarding cards designed as glimpses of the app experience</text>

  <g transform="translate(180 105)">
    <rect x="0" y="0" width="500" height="735" rx="54" fill="#101827" stroke="#263449" stroke-width="2"/>
    <rect x="23" y="24" width="454" height="687" rx="38" fill="#0F172A"/>
    <rect x="215" y="42" width="70" height="5" rx="2.5" fill="#334155"/>
    <text x="58" y="88" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">MentoMate</text>
    <circle cx="415" cy="82" r="4" fill="#2DD4BF"/>
    <circle cx="432" cy="82" r="4" fill="#475569"/>
    <circle cx="449" cy="82" r="4" fill="#475569"/>
    <circle cx="466" cy="82" r="4" fill="#475569"/>

    <rect x="58" y="122" width="384" height="250" rx="24" fill="#151F32" stroke="#263449"/>
    <circle cx="102" cy="170" r="24" fill="#2DD4BF" fill-opacity=".18"/>
    <path d="M94 170c0-7 5-12 12-12h26c7 0 12 5 12 12v18c0 7-5 12-12 12h-15l-15 13v-13h-8c-7 0-12-5-12-12v-18z" fill="#2DD4BF"/>
    <rect x="184" y="153" width="205" height="58" rx="19" fill="#6D5DF6"/>
    <text x="209" y="178" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">I do not get</text>
    <text x="209" y="199" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">this yet.</text>
    <rect x="88" y="235" width="285" height="84" rx="21" fill="#1E293B"/>
    <text x="113" y="264" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Let's slow it down.</text>
    <text x="113" y="286" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">What part feels confusing?</text>
    <rect x="113" y="303" width="98" height="7" rx="3.5" fill="#2DD4BF"/>
    <rect x="218" y="303" width="56" height="7" rx="3.5" fill="#64748B"/>

    <text x="250" y="449" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">A mentor you can</text>
    <text x="250" y="489" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">talk to</text>
    <text x="250" y="536" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Ask when you are stuck, explain</text>
    <text x="250" y="563" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">what you do not get, and get help</text>
    <text x="250" y="590" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">that adapts to how you learn.</text>

    <rect x="58" y="634" width="384" height="54" rx="18" fill="#2DD4BF"/>
    <text x="250" y="668" text-anchor="middle" fill="#06121F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Next</text>
  </g>

  <g transform="translate(820 105)">
    <rect x="0" y="0" width="500" height="735" rx="54" fill="#101827" stroke="#263449" stroke-width="2"/>
    <rect x="23" y="24" width="454" height="687" rx="38" fill="#0F172A"/>
    <rect x="215" y="42" width="70" height="5" rx="2.5" fill="#334155"/>
    <text x="58" y="88" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">MentoMate</text>
    <circle cx="415" cy="82" r="4" fill="#475569"/>
    <circle cx="432" cy="82" r="4" fill="#2DD4BF"/>
    <circle cx="449" cy="82" r="4" fill="#475569"/>
    <circle cx="466" cy="82" r="4" fill="#475569"/>

    <rect x="58" y="122" width="384" height="250" rx="24" fill="#151F32" stroke="#263449"/>
    <text x="86" y="163" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Your study space</text>
    <rect x="86" y="186" width="138" height="62" rx="18" fill="#172C36" stroke="#2DD4BF" stroke-opacity=".45"/>
    <text x="108" y="224" fill="#DFFCF7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Math</text>
    <rect x="238" y="186" width="138" height="62" rx="18" fill="#241F3F" stroke="#A78BFA" stroke-opacity=".45"/>
    <text x="260" y="224" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Biology</text>
    <rect x="86" y="260" width="138" height="62" rx="18" fill="#20283A" stroke="#64748B" stroke-opacity=".5"/>
    <text x="108" y="298" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">English</text>
    <rect x="238" y="260" width="138" height="62" rx="18" fill="#20283A" stroke="#64748B" stroke-opacity=".5"/>
    <text x="260" y="298" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">History</text>
    <rect x="86" y="338" width="94" height="26" rx="13" fill="#334155"/>
    <text x="133" y="356" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Notes</text>
    <rect x="190" y="338" width="116" height="26" rx="13" fill="#334155"/>
    <text x="248" y="356" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Bookmarks</text>
    <rect x="316" y="338" width="60" height="26" rx="13" fill="#334155"/>
    <text x="346" y="356" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Quiz</text>

    <text x="250" y="449" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">All your study</text>
    <text x="250" y="489" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">in one place</text>
    <text x="250" y="536" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Study as many subjects as you need,</text>
    <text x="250" y="563" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">get help with assignments, save notes,</text>
    <text x="250" y="590" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">and bookmark what matters.</text>

    <rect x="58" y="634" width="384" height="54" rx="18" fill="#2DD4BF"/>
    <text x="250" y="668" text-anchor="middle" fill="#06121F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Next</text>
  </g>
</svg>
