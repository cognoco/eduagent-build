  <text x="750" y="88" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Cards 3 and 4: continuity and learning method as app-like scenes</text>

  <g transform="translate(180 105)">
    <rect x="0" y="0" width="500" height="735" rx="54" fill="#101827" stroke="#263449" stroke-width="2"/>
