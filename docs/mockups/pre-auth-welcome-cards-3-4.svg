    <text x="108" y="293" fill="#DFFCF7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Practice mixed numbers</text>
    <rect x="86" y="318" width="143" height="28" rx="14" fill="#241F3F"/>
    <text x="157" y="337" text-anchor="middle" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Short bursts</text>
    <rect x="239" y="318" width="147" height="28" rx="14" fill="#20283A"/>
    <text x="312" y="337" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Steady routine</text>

    <text x="250" y="449" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Picks up where</text>
    <text x="250" y="489" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">you left off</text>
    <text x="250" y="536" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Your mentor remembers your progress,</text>
    <text x="250" y="563" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">adapts to your pace, and helps with</text>
    <text x="250" y="590" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">quick bursts or steady routines.</text>

    <rect x="58" y="634" width="384" height="54" rx="18" fill="#2DD4BF"/>
    <text x="250" y="668" text-anchor="middle" fill="#06121F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Next</text>
  </g>

  <g transform="translate(820 105)">
    <rect x="0" y="0" width="500" height="735" rx="54" fill="#101827" stroke="#263449" stroke-width="2"/>
    <rect x="23" y="24" width="454" height="687" rx="38" fill="#0F172A"/>
    <rect x="215" y="42" width="70" height="5" rx="2.5" fill="#334155"/>
