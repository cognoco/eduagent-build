    <rect x="251" y="190" width="135" height="42" rx="16" fill="#241F3F" stroke="#A78BFA" stroke-opacity=".45"/>
    <text x="319" y="216" text-anchor="middle" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Think it through</text>
    <rect x="86" y="246" width="147" height="42" rx="16" fill="#20283A" stroke="#64748B" stroke-opacity=".5"/>
    <text x="160" y="272" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Practice in context</text>
    <rect x="243" y="246" width="143" height="42" rx="16" fill="#20283A" stroke="#64748B" stroke-opacity=".5"/>
    <text x="315" y="272" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Remember it later</text>
    <rect x="86" y="316" width="300" height="10" rx="5" fill="#334155"/>
    <rect x="86" y="316" width="204" height="10" rx="5" fill="#2DD4BF"/>
    <text x="86" y="352" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Explain -> practice -> remember</text>

    <text x="250" y="449" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Built for real</text>
    <text x="250" y="489" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">learning</text>
    <text x="250" y="536" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Clear explanations, guided questions,</text>
    <text x="250" y="563" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">and practice that sticks help you think,</text>
    <text x="250" y="590" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">practice, and remember.</text>

    <rect x="58" y="634" width="384" height="54" rx="18" fill="#2DD4BF"/>
    <text x="250" y="668" text-anchor="middle" fill="#06121F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Let's start</text>
