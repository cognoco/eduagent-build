<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="820" viewBox="0 0 860 820" fill="none" xmlns="http://www.w3.org/2000/svg">
<title>Octopus 3D Animation Rig - Guide Construction Variant</title>
<desc>Reusable vector rig derived from docs/logo-designs/octopus 3D.png and octopus_mascot_v2_main.svg, with six guide-style arms fanning from the body instead of clustering at the bottom. Separate design handoff asset; not wired into app code.</desc>
<defs>
  <radialGradient id="bg" cx="45%" cy="40%" r="66%">
    <stop offset="0%" stop-color="#12383c"/>
    <stop offset="52%" stop-color="#0b1f26"/>
    <stop offset="100%" stop-color="#070b12"/>
  </radialGradient>
  <radialGradient id="tealBody" cx="42%" cy="25%" r="72%">
    <stop offset="0%" stop-color="#47fff0"/>
    <stop offset="38%" stop-color="#10b7ad"/>
    <stop offset="74%" stop-color="#067d80"/>
    <stop offset="100%" stop-color="#035263"/>
  </radialGradient>
  <linearGradient id="tentacle" x1="250" y1="160" x2="640" y2="700" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#24e4d4"/>
    <stop offset="42%" stop-color="#0ca99d"/>
    <stop offset="100%" stop-color="#034f62"/>
  </linearGradient>
  <linearGradient id="tentacleAlt" x1="170" y1="180" x2="580" y2="720" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#16cfc2"/>
    <stop offset="48%" stop-color="#078a86"/>
    <stop offset="100%" stop-color="#033b4c"/>
  </linearGradient>
  <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a675ff"/>
    <stop offset="100%" stop-color="#5a2fb0"/>
  </linearGradient>
  <linearGradient id="hatBand" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9a61f5"/>
    <stop offset="55%" stop-color="#c099ff"/>
    <stop offset="100%" stop-color="#8d55e8"/>
  </linearGradient>
  <radialGradient id="cup" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#f2fffb"/>
    <stop offset="55%" stop-color="#9af4e7"/>
    <stop offset="100%" stop-color="#42bdb4"/>
  </radialGradient>
  <radialGradient id="ballPink" cx="35%" cy="28%" r="72%">
    <stop offset="0%" stop-color="#ffe4f3"/>
    <stop offset="62%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#be185d"/>
  </radialGradient>
  <radialGradient id="ballViolet" cx="35%" cy="28%" r="72%">
    <stop offset="0%" stop-color="#f3e8ff"/>
    <stop offset="62%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#6d28d9"/>
  </radialGradient>
  <radialGradient id="ballMint" cx="35%" cy="28%" r="72%">
    <stop offset="0%" stop-color="#e8fff9"/>
    <stop offset="62%" stop-color="#5eead4"/>
    <stop offset="100%" stop-color="#0f766e"/>
  </radialGradient>
  <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
    <feDropShadow dx="0" dy="25" stdDeviation="25" flood-color="#000" flood-opacity=".42"/>
  </filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
  <style>
    .eyeLine{stroke:#07121a;stroke-width:9;stroke-linecap:round}
    .smile{stroke:#06121b;stroke-width:9;stroke-linecap:round;fill:none}
    .arm{stroke-linecap:round;stroke-linejoin:round}
    .tip-anchor{fill:none;opacity:0}
  </style>
</defs>
<rect width="860" height="820" fill="url(#bg)"/>
<ellipse cx="430" cy="390" rx="350" ry="315" fill="#1af8df" opacity=".12" filter="url(#soft)"/>

<g id="main" transform="translate(60 42)" filter="url(#shadow)">
  <!--
    Guide-construction arm rig:
    - body first, arms fanning around it as separate curved forms
    - six visual arms for UI clarity
    - hidden tip anchors remain for juggling / dance animation targets
  -->
  <g id="arms-back">
    <path id="arm-1-side-left" class="arm" d="M326 344 C246 330 180 296 126 236 C92 199 120 159 158 184 C214 220 258 253 324 279" stroke="url(#tentacle)" stroke-width="52"/>
    <circle id="tip-1-side-left" class="tip-anchor" cx="145" cy="206" r="10"/>

    <path id="arm-6-side-right" class="arm" d="M484 344 C565 330 631 296 685 236 C719 199 691 159 653 184 C597 220 553 253 487 279" stroke="url(#tentacle)" stroke-width="52"/>
    <circle id="tip-6-side-right" class="tip-anchor" cx="666" cy="206" r="10"/>

    <path id="arm-2-mid-left" class="arm" d="M338 399 C259 437 198 498 156 586 C135 630 181 660 213 626 C258 578 284 518 346 471" stroke="url(#tentacleAlt)" stroke-width="50"/>
    <circle id="tip-2-mid-left" class="tip-anchor" cx="181" cy="613" r="10"/>

    <path id="arm-5-mid-right" class="arm" d="M472 399 C551 437 612 498 654 586 C675 630 629 660 597 626 C552 578 526 518 464 471" stroke="url(#tentacleAlt)" stroke-width="50"/>
    <circle id="tip-5-mid-right" class="tip-anchor" cx="629" cy="613" r="10"/>
  </g>

  <!-- central elongated head/body -->
  <path id="body" d="M405 72
           C502 72 566 143 556 247
           C550 322 531 381 500 448
           C475 504 476 562 505 633
           C526 684 492 730 449 704
           C414 682 405 617 402 557
           C399 520 392 498 381 498
           C368 498 357 522 349 564
           C337 625 324 693 280 711
           C235 729 212 675 235 626
           C264 564 268 507 239 445
           C209 382 196 321 195 250
           C193 144 264 72 405 72Z"
        fill="url(#tealBody)"/>

  <g id="arms-front">
    <path id="arm-3-lower-left" class="arm" d="M380 426 C336 500 306 586 292 690 C286 738 342 748 356 702 C374 640 384 573 420 506" stroke="url(#tentacle)" stroke-width="48"/>
    <circle id="tip-3-lower-left" class="tip-anchor" cx="324" cy="706" r="10"/>

    <path id="arm-4-lower-right" class="arm" d="M430 426 C474 500 504 586 518 690 C524 738 468 748 454 702 C436 640 426 573 390 506" stroke="url(#tentacle)" stroke-width="48"/>
    <circle id="tip-4-lower-right" class="tip-anchor" cx="486" cy="706" r="10"/>
  </g>

  <!-- internal shadows/highlights -->
  <path d="M268 139 C245 185 244 244 254 300" stroke="#6ffff1" stroke-width="18" stroke-linecap="round" opacity=".30"/>
  <path d="M168 596 C203 531 253 485 323 455" stroke="#70ffee" stroke-width="14" stroke-linecap="round" opacity=".25"/>
  <path d="M640 603 C606 536 557 489 487 455" stroke="#70ffee" stroke-width="14" stroke-linecap="round" opacity=".22"/>
  <path d="M402 116 C493 123 522 193 510 279" stroke="#07121a" stroke-width="18" stroke-linecap="round" opacity=".10"/>

  <!-- suction cups: sparse markers following the guide-style fan, not a dense bottom row. -->
  <g id="suction-cups" fill="url(#cup)" opacity=".92">
    <circle cx="156" cy="214" r="10"/><circle cx="226" cy="255" r="11"/><circle cx="654" cy="214" r="10"/><circle cx="584" cy="255" r="11"/>
    <circle cx="190" cy="594" r="11"/><circle cx="252" cy="531" r="10"/><circle cx="620" cy="594" r="11"/><circle cx="558" cy="531" r="10"/>
    <circle cx="324" cy="662" r="10"/><circle cx="357" cy="578" r="9"/><circle cx="486" cy="662" r="10"/><circle cx="453" cy="578" r="9"/>
  </g>

  <!-- hidden juggling anchors; enable opacity locally when planning ball paths. -->
  <g id="juggle-ball-guides" opacity="0">
    <circle id="ball-guide-left" cx="144" cy="170" r="18" fill="url(#ballPink)"/>
    <circle id="ball-guide-top" cx="406" cy="18" r="20" fill="url(#ballViolet)"/>
    <circle id="ball-guide-right" cx="708" cy="172" r="18" fill="url(#ballMint)"/>
  </g>

  <!-- purple beanie / hat -->
  <path d="M221 168 C235 93 300 43 406 43 C507 43 568 96 581 168 C494 196 311 196 221 168Z" fill="url(#hat)"/>
  <path d="M217 156 C307 181 496 183 585 156 C602 151 614 165 611 184 L606 212 C603 231 581 237 566 227 C473 244 335 244 243 227 C228 238 207 232 203 213 L198 185 C195 166 202 152 217 156Z" fill="url(#hatBand)"/>
  <path d="M240 199 C330 218 480 219 570 199" stroke="#d6b9ff" stroke-width="8" stroke-linecap="round" opacity=".45"/>

  <!-- eyes: relaxed but not alien -->
  <rect x="314" y="276" width="82" height="54" rx="22" fill="#fbfaf3"/>
  <rect x="423" y="276" width="82" height="54" rx="22" fill="#fbfaf3"/>
  <circle cx="356" cy="303" r="18" fill="#29305e"/>
  <circle cx="463" cy="303" r="18" fill="#29305e"/>
  <path d="M310 271 H397" class="eyeLine"/>
  <path d="M419 271 H506" class="eyeLine"/>
  <path d="M314 276 H396 V296 C368 290 340 290 314 296Z" fill="#0aa89d"/>
  <path d="M423 276 H505 V296 C477 290 449 290 423 296Z" fill="#0aa89d"/>

  <!-- friendly smile -->
  <path d="M357 368 C382 393 430 393 455 368" class="smile"/>
</g>
</svg>
