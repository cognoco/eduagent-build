# Regression: BUG-236 — Subject creation from chat must return to chat
# When the classifier can't place a topic and the user creates a new subject
# from the chat's subject resolution UI, the app must return to the chat
# session with the new subject — not dump the user on the Library screen.
appId: com.mentomate.app
tags:
  - regression
  - chat
  - navigation
---
# Sign in
- runFlow: ../_setup/seed-and-sign-in.yaml

# Navigate to freeform chat via "Ask Anything" home action card.
# The 2026-05-27 refactor removed the "Learn Something New" intermediate screen
# (intent-learn-new / learn-new-screen / intent-freeform no longer exist).
# home-ask-anything navigates directly to /(app)/session?mode=freeform.
# Source: apps/mobile/src/components/home/LearnerScreen.tsx:80,84
- scrollUntilVisible:
    element:
      id: "home-ask-anything"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "home-ask-anything"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 20000

- takeScreenshot: bug236-01-chat-opened

# Type a topic the classifier may not place
# chat-input testID: apps/mobile/src/components/session/ChatShell.tsx:1044
- tapOn:
    id: "chat-input"
- inputText: "Tell me about Easter traditions"
- hideKeyboard

# Send the message — this triggers classification
# send-button testID: apps/mobile/src/components/session/ChatShell.tsx:1091
- tapOn:
    id: "send-button"

# Wait for subject resolution to appear (classifier couldn't auto-match)
- extendedWaitUntil:
    visible:
      id: "session-subject-resolution"
    timeout: 30000

- takeScreenshot: bug236-02-subject-resolution-shown

# Tap "New subject" to create a subject from within chat
- tapOn:
    id: "subject-resolution-new"

# Wait for create-subject screen
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 15000

- takeScreenshot: bug236-03-create-subject-screen

# Type a subject name and submit
- tapOn:
    id: "create-subject-name"
- inputText: "Photosynthesis"
- hideKeyboard
- tapOn:
    id: "create-subject-submit"

# After subject creation, we should land back in the chat session —
# NOT on the Library screen.
# chat-input testID: apps/mobile/src/components/session/ChatShell.tsx:1044
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- takeScreenshot: bug236-04-back-in-chat

# Verify we are back in the chat session (not on Library).
# The positive assertion of chat-input above already covers this.
# Assert the Library heading text is not visible — more robust than testID.
- assertNotVisible:
    text: "Library"
