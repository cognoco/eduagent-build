# Regression: BUG-237 - Subject creation with specific topic must create focused book
# Validates: When user types a specific topic (e.g. "Easter"), picks a broad angle
# (e.g. "World History"), the system creates ONE focused book scoped to the topic,
# NOT 8 generic books for the broad subject.
appId: com.mentomate.app
tags:
  - regression
  - library
  - subject-creation
---
# 1. Sign in (seed-and-run.sh has already launched the app and navigated
#    to the sign-in screen before Maestro starts).
- runFlow: ../_setup/seed-and-sign-in.yaml

# 2. Navigate to create subject via Library tab → empty state add button.
#    library-tab → tab-library (tabBarButtonTestID in _layout.tsx).
#    library-screen → removed; use Library heading text.
#    library-add-subject (from curriculum-complete banner) → not available for
#    fresh sessions; use intent-learn on home screen which navigates to create-subject.
- tapOn:
    id: "tab-library"
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000
# Tap "Add subject" from Library empty state (fresh session has no subjects)
- tapOn:
    id: "library-add-subject-empty"
    optional: true  # justified: library-add-subject-empty only renders in empty-state; if subjects exist this button is absent
# Fallback: if user already has subjects, return home and use intent-learn
- tapOn:
    id: "tab-home"
    optional: true  # justified: tab-home tap only needed when library had subjects (empty-state button absent); Maestro has no if-else
- tapOn:
    id: "home-action-study-new"
    optional: true  # justified: home-action-study-new only tapped when subjects-present fallback path is taken

# 3. Type a specific topic
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 5000
- inputText:
    id: "create-subject-name"
    text: "Easter"
- takeScreenshot: bug237-step1-typed-easter

# 4. Submit and wait for ambiguous suggestions
- tapOn:
    id: "create-subject-submit"
- extendedWaitUntil:
    visible:
      id: "subject-suggestion-option-0"
    timeout: 15000
- takeScreenshot: bug237-step2-ambiguous-suggestions

# 5. Pick an angle (first suggestion, e.g. World History)
- tapOn:
    id: "subject-suggestion-option-0"

# 6. Should navigate to the first curriculum session (focused book path), NOT library shelf
# If it navigates to library with 8 books, the bug has regressed.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000
- takeScreenshot: bug237-step3-session-focused-book

# 7. Verify we did NOT end up at library shelf with many books.
#    shelf-book-list is removed; assert shelf-screen is NOT visible at this point
#    (the first session for the focused book should be active, not a shelf).
- assertNotVisible:
    id: "shelf-screen"
