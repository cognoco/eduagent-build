# Regression: BUG-233 — Chat classifier must not reject valid cultural topics
# The chat classifier previously showed "I couldn't place that yet" for topics
# like Easter, even though the subject-creation classifier handled them fine.
#
# This test verifies that asking about Easter in a freeform chat session either:
# (a) matches an enrolled subject, or
# (b) shows subject resolution with an actionable new-subject route.
# It must NEVER show only "I couldn't place that" with no actionable escape.
#
# Prerequisite: learning-active scenario (provides World History subject)
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/session/index.tsx
#     (chat-input, chat-messages, session-subject-resolution,
#      subject-resolution-new, subject-resolution-create-new)
appId: com.mentomate.app
tags:
  - nightly
  - regression
  - chat
  - classifier
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Start a freeform session via home-ask-anything card (replaced coaching-card-primary)
- tapOn:
    id: "home-ask-anything"

# 4. Wait for session chat input
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 5. Type a cultural topic that previously triggered the bug
- tapOn:
    id: "chat-input"
- inputText: "please teach me about Easter"
- pressKey: Enter

# 6. Wait for either valid classifier outcome (LLM call, generous timeout).
#    Auto-match restores chat-input; fallback mounts subject resolution and
#    intentionally hides the composer until the learner picks a subject. The
#    zero-candidate fallback renders its create action without the chip tray.
- extendedWaitUntil:
    visible:
      id: "subject-resolution-.*|chat-input"
    timeout: 60000

# 7. The AI must NOT respond with the dead-end "I couldn't place that" message
#    without offering an actionable escape. Either:
#    - It matched an enrolled subject and proceeded, OR
#    - It shows the subject resolution bar with a "+ New Subject" chip
#
# Assert that the dead-end message is NOT the only thing shown.
# If subject resolution appeared, the create-new chip must be visible.
- assertVisible:
    id: "chat-messages"

# 8. In the chips branch, scroll the horizontal tray to its guaranteed generic
#    new-subject escape hatch before requiring it to be fully visible.
- runFlow:
    when:
      visible:
        id: "session-subject-resolution"
    commands:
      - scrollUntilVisible:
          element:
            id: "subject-resolution-new"
          direction: RIGHT
          timeout: 15000
          visibilityPercentage: 100
          centerElement: true

# 9. In the zero-candidate branch, require the full-width create action.
- runFlow:
    when:
      visible:
        id: "subject-resolution-create-new"
    commands:
      - assertVisible:
          id: "subject-resolution-create-new"

# 10. If the classifier auto-matched, require the restored composer.
- runFlow:
    when:
      visible:
        id: "chat-input"
    commands:
      - assertVisible:
          id: "chat-input"

# 11. Screenshot for visual verification
- takeScreenshot: bug-233-easter-classifier-response
