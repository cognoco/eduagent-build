# Regression: BUG-234 --- Classifier fallback must show actionable subject picker
#
# When the AI classifier cannot place a topic (e.g. "Easter"), the chat
# previously showed a text prompt ("pick the closest subject") but no
# interactive controls --- a dead-end. After the fix, subject suggestion
# chips appear inline above the input area, letting the user pick a subject
# or create a new one without leaving the screen.
#
# Prerequisite: learning-active scenario (provides at least one subject).
# The test types a topic the classifier may struggle with, then asserts
# that subject resolution chips appear (testID: session-subject-resolution
# or subject-resolution-create-new).
#
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/session/index.tsx
#   - apps/mobile/src/components/session/ChatShell.tsx
appId: com.mentomate.app
tags:
  - nightly
  - regression
  - chat
  - ux-dead-end
---
# 1. Seed & sign in with a user that has at least one subject
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to freeform session via home-ask-anything (replaced coaching-card-primary)
- tapOn:
    id: "home-ask-anything"

# 4. Wait for the chat input to be visible
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 5. Type a topic the classifier may not match to an existing subject
- tapOn:
    id: "chat-input"
- inputText: "Easter traditions around the world"
- pressKey: Enter

# 6. Wait for every valid classifier terminal state. Auto-match restores the
#    composer; populated and zero-candidate fallbacks mount resolution actions.
- extendedWaitUntil:
    visible:
      id: "subject-resolution-.*|chat-input"
    timeout: 60000

# 7. The submitted message remains visible regardless of classifier outcome.
- assertVisible:
    id: "chat-messages"

# 8. The populated-chip fallback keeps its generic escape at the right edge of
#    a compact bottom tray. Swipe from that tray, then require the escape.
- runFlow:
    when:
      visible:
        id: "session-subject-resolution"
    commands:
      - repeat:
          times: 4
          commands:
            - swipe:
                from:
                  id: "session-subject-resolution"
                direction: LEFT
                duration: 400
      - extendedWaitUntil:
          visible:
            id: "subject-resolution-new"
          timeout: 5000
      - takeScreenshot: bug-234-01-subject-chips-visible

# 9. The zero-candidate fallback exposes its full-width create action.
- runFlow:
    when:
      visible:
        id: "subject-resolution-create-new"
    commands:
      - assertVisible:
          id: "subject-resolution-create-new"
      - takeScreenshot: bug-234-02-zero-candidate

# 10. Auto-match restores the composer, proving the turn is not dead-ended.
- runFlow:
    when:
      visible:
        id: "chat-input"
    commands:
      - assertVisible:
          id: "chat-input"
      - takeScreenshot: bug-234-03-auto-classified

# 11. Final screenshot regardless of path
- takeScreenshot: bug-234-04-final-state
