# [WI-2239] V2 Journal no-recap recovery case.
#
# onboarding-complete owns a subject but no learning session/recap. The hard
# assertion proves that this exact no-artifact case exposes a CTA and that the
# CTA reaches the V2 Mentor rather than an adjacent legacy destination.
appId: com.mentomate.app
tags:
  - v2
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'onboarding-complete'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'mentor-screen'
    timeout: 30000
- tapOn:
    id: 'tab-journal'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'journal-recaps-empty'
    timeout: 15000
- assertVisible:
    id: 'journal-recaps-empty-start-session'
- tapOn:
    id: 'journal-recaps-empty-start-session'
- extendedWaitUntil:
    visible:
      id: 'mentor-screen'
    timeout: 15000
- assertVisible:
    id: 'tab-mentor'
