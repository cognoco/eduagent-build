# [WI-2241] V2 native supporter scope journey.
#
# Runs only in the explicit `v2` workflow-dispatch suite (same posture as
# v2-shell-navigation.yaml — the V2 shell flag is baked into the release
# bundle, so this is not part of the ordinary PR/nightly APK posture).
#
# Support hub -> person scope -> Mentor -> Subjects -> Journal -> Support hub,
# preserving the SAME person/edge across bottom tabs (asserted by IDs baked
# into the seeded testIDs, e.g. person-scope-subject-${SUBJECT_ID}, not just
# copy), plus the STRUCTURAL WALL (no study/note input on the read-only
# Subjects surface), the revoked supportee's absence of any UI affordance,
# and the empty-record supportee's honest empty state.
#
# [WI-2176] Orion native geometry contract:
# - Force the Android window to 360x760 physical pixels at 160 dpi and reset
#   font_scale to 1.0 before this flow, use an en-US V2 build, and leave the app
#   at the final named screenshot. Maestro proves the journey and endpoint only.
# - Then run apps/mobile/e2e/scripts/capture-wi2176-orion-header.sh. Its two
#   structured UIAutomator snapshots, not the relative Maestro selectors,
#   prove the numeric edge, clearance, safe-area, and 44x44 target conditions.
# - OUTSTANDING AC4: longest-localized-label and loading-to-loaded-transition
#   coverage still requires later claimed source work; this English seed does
#   not simulate either condition.
# - OUTSTANDING AC6: persisted Me still requires later claimed seed/source work.
#   This seed gives learning state only to supportees, so the server truthfully
#   omits the supporter's Me option. Person persistence below is not a substitute.
#
# [Phase-4 review, WI-2241] The actual NEGATIVE WALL FAIL-CLOSED property (a
# revoked/unrelated caller is denied outright, not served foreign data) is
# proven at its source in test-seed-v2-supporter.integration.test.ts (real
# ForbiddenError assertions against the API). The 'PRIVATE' text-absence
# check below is a forward-regression CANARY, not that proof — it cannot
# fail for an authorization bug, since the underlying read models never
# select the private-artifact tables in the first place.
#
# SEED_SCENARIO: 'v2-supporter-accepted'
appId: com.mentomate.app
tags:
  - v2
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'v2-supporter-accepted'
      API_URL: ${API_URL}

# Native small-phone header: wait for the populated English Support hub and
# exercise each available scope target. Numeric geometry is checked externally
# from the final UIAutomator hierarchy, after the complete journey.
- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 15000
- assertVisible:
    id: 'scope-chip-shell'
- assertVisible:
    id: 'account-avatar-shell'
- assertVisible:
    id: 'account-avatar-button'
    enabled: true
- assertVisible:
    id: 'scope-chip-option-supporter-hub'
    enabled: true
    selected: true
- swipe:
    from:
      id: 'scope-chip'
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    timeout: 5000
- assertVisible:
    id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    enabled: true
- swipe:
    from:
      id: 'scope-chip'
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-person-${EMPTY_SUPPORTEE_PERSON_ID}'
    timeout: 5000
- assertVisible:
    id: 'scope-chip-option-person-${EMPTY_SUPPORTEE_PERSON_ID}'
    enabled: true
- swipe:
    from:
      id: 'scope-chip'
    direction: RIGHT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-supporter-hub'
    timeout: 5000

# The Account target must remain actionable without disturbing the selected
# Support-hub scope. Round-trip through the real native route and Back control.
- tapOn:
    id: 'account-avatar-button'
    point: '50%,50%'
- extendedWaitUntil:
    visible:
      id: 'account-screen'
    timeout: 15000
- tapOn:
    id: 'account-back'
- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 15000
- assertVisible:
    id: 'scope-chip-option-supporter-hub'
    selected: true

- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 30000

# Support hub: locate the exact rich supportee through its person-specific
# action before asserting the card. The empty-record card can be first in the
# vertical viewport, so an assertion before this scroll proves only layout.
- scrollUntilVisible:
    element:
      id: 'support-hub-mentor-open-${SUPPORTEE_PERSON_ID}'
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: 'support-hub-mentor-person-${SUPPORTEE_PERSON_ID}'
- assertNotVisible:
    id: 'scope-chip-option-person-${REVOKED_SUPPORTEE_PERSON_ID}'

# Mentor: open the rich person scope.
- tapOn:
    id: 'support-hub-mentor-open-${SUPPORTEE_PERSON_ID}'
- extendedWaitUntil:
    visible:
      id: 'person-scope-mentor-tab'
    timeout: 15000

# Subjects (same person/edge via the bottom tab).
- tapOn:
    id: 'tab-subjects'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'person-scope-structural-subjects'
    timeout: 15000
- assertVisible:
    id: 'person-scope-subject-${SUBJECT_ID}'

# STRUCTURAL WALL: drilling into the subject renders the read-only hub — no
# study/note-input affordance (SubjectHubSurface mode=supporter-readonly
# forces canStudy=false and notes=[], so SubjectHubNotesSection never mounts —
# apps/mobile/src/components/subject-hub/SubjectHub.tsx `showNotes`).
- tapOn:
    id: 'person-scope-subject-${SUBJECT_ID}'
- extendedWaitUntil:
    visible:
      id: 'person-scope-subject-hub'
    timeout: 15000
- assertVisible:
    id: 'subject-hub'
- assertNotVisible:
    id: 'subject-hub-notes-section'
- assertNotVisible:
    id: 'subject-hub-notes-input'
- tapOn:
    id: 'person-scope-subject-hub-back'
- extendedWaitUntil:
    visible:
      id: 'person-scope-structural-subjects'
    timeout: 15000
- assertVisible:
    id: 'person-scope-subject-${SUBJECT_ID}'

# Journal (same person/edge, still the rich supportee).
- tapOn:
    id: 'tab-journal'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'person-scope-journal-placeholder'
    timeout: 15000
- assertVisible:
    id: 'visibility-shared-record'

# Forward-regression canary (NOT the negative-wall proof — see file header):
# none of the seeded private-artifact content (topic note, bookmark, raw
# transcript, Mentor-memory) ever reaches the screen today.
- assertNotVisible:
    text: 'PRIVATE'

# Relaunch: kill and restart the app. SecureStore scope persistence is
# fire-and-forget, so the cold launch may hydrate the hub, the rich person, or
# the empty-record person. Wait for the shared scope chrome, then deliberately
# enter the Support hub before re-acquiring the exact rich supportee through
# its person-specific card. The rich shared-record assertion below cannot pass
# on Empty-Record.
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: 'scope-chip'
    timeout: 30000
- tapOn:
    id: 'scope-chip-option-supporter-hub'
- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: 'support-hub-mentor-open-${SUPPORTEE_PERSON_ID}'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'support-hub-mentor-open-${SUPPORTEE_PERSON_ID}'
- extendedWaitUntil:
    visible:
      id: 'person-scope-mentor-tab'
    timeout: 15000
- assertVisible:
    id: 'support-hub-mentor-person-${SUPPORTEE_PERSON_ID}'
- tapOn:
    id: 'tab-journal'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'person-scope-journal-placeholder'
    timeout: 15000
- assertVisible:
    id: 'visibility-shared-record'

# EMPTY SHARED RECORD: switching to the empty-record supportee renders an
# honest empty state, not an error and no leaked private content.
- tapOn:
    id: 'scope-chip-option-person-${EMPTY_SUPPORTEE_PERSON_ID}'
- extendedWaitUntil:
    visible:
      id: 'person-scope-journal-placeholder'
    timeout: 15000
- assertNotVisible:
    id: 'visibility-shared-record'
- assertVisible:
    id: 'person-scope-journal-empty-lamp'

# Back to Support hub via the scope chip, preserving the active Journal tab.
- tapOn:
    id: 'scope-chip-option-supporter-hub'
- extendedWaitUntil:
    visible:
      id: 'support-hub-journal-tab'
    timeout: 15000

# PERSISTED PERSON: exercise the real person scope option, cold-relaunch without
# clearing app state, and require its accessibility selected state after
# scope-list hydration. This is a hard assertion, not a screenshot.
- tapOn:
    id: 'tab-mentor'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 15000
- swipe:
    from:
      id: 'scope-chip'
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    timeout: 5000
- tapOn:
    id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
- extendedWaitUntil:
    visible:
      id: 'person-scope-mentor-tab'
    timeout: 15000
- assertVisible:
    id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    selected: true
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: 'person-scope-mentor-tab'
    timeout: 30000
- swipe:
    from:
      id: 'scope-chip'
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    timeout: 5000
- assertVisible:
    id: 'scope-chip-option-person-${SUPPORTEE_PERSON_ID}'
    selected: true

# Finish at the English Support-hub geometry state consumed by the external
# UIAutomator capture/checker. A targeted reverse swipe exposes the hub option
# without sending a gesture through the page body.
- swipe:
    from:
      id: 'scope-chip'
    direction: RIGHT
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'scope-chip-option-supporter-hub'
    timeout: 5000
- tapOn:
    id: 'scope-chip-option-supporter-hub'
- extendedWaitUntil:
    visible:
      id: 'support-hub-mentor-tab'
    timeout: 15000
- assertVisible:
    id: 'scope-chip-option-supporter-hub'
    selected: true
- assertVisible:
    text: 'Shared signals and next steps for the learners you support.'
- takeScreenshot: wi2176-orion-360x760-english-support-hub-header
