# WI-2234: returning learner release journey.
# The composite seed guarantees one unfinished session and one due review.
appId: com.mentomate.app
tags:
  - v2
  - learning
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'v2-returning-learner'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'mentor-screen'
    timeout: 30000

# Both exact seeded obligations must reach Mentor; neither assertion is optional.
- assertVisible:
    id: 'now-card-unfinished_session'
- assertVisible:
    id: 'now-card-retention_due'

# The unfinished session outranks the due review, so its primary action is first.
- tapOn:
    id: 'now-card-continue'
    childOf:
      id: 'now-card-unfinished_session'

- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 30000

# The exact pre-existing assistant transcript binds Continue to the seeded
# unfinished session before this flow submits a new learner turn.
- assertVisible:
    text: '^They connected cities, trade, armies, and new ideas\.$'
    childOf:
      id: 'message-bubble-assistant-.*'

- tapOn:
    id: 'chat-input'
- inputText: 'How did Roman roads help people exchange ideas?'
- hideKeyboard
- tapOn:
    id: 'send-button'

# The completed assistant reply below the exact new learner message proves this
# resumed session received a non-empty reply; the seeded assistant reply is
# above that message and cannot satisfy this relational assertion.
- extendedWaitUntil:
    visible:
      id: 'assistant-response-complete-.*'
      below:
        id: 'message-bubble-user-.*'
        text: '^How did Roman roads help people exchange ideas\?$'
    timeout: 60000

- tapOn:
    id: 'chat-shell-back'

- extendedWaitUntil:
    visible:
      id: 'mentor-screen'
    timeout: 30000
- assertVisible:
    id: 'now-card-unfinished_session'
- assertVisible:
    id: 'now-card-retention_due'
