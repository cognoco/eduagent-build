# Flow: Empty First User — Brand-new user with 0 subjects
# Validates: user with completed onboarding but no subjects is redirected to
# the create-subject screen, can enter a subject name, and is navigated to the
# onboarding interview where the AI greeting appears.
# Tags: nightly, edge, onboarding
#
# Journey: UX Journey 1 (First-time User Onboarding)
# Epics: Epic 1
# Prerequisite: Seeded user with completed onboarding but no subjects
#               (scenario: onboarding-no-subject — creates learner profile,
#                consent granted, but 0 subjects)
#
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/home.tsx (redirects to /create-subject when 0 subjects)
#   - apps/mobile/src/app/create-subject.tsx (create-subject-name, create-subject-submit,
#     create-subject-cancel)
#   - apps/mobile/src/app/(learner)/onboarding/interview.tsx (chat-input, ChatShell)
#
# NOTE: The seed-and-sign-in setup flow waits for id: "learner-screen" as its
# final step. With 0 subjects, the home screen immediately redirects to
# /create-subject. The setup flow's last wait may timeout — that's expected.
# Auth is still completed by that point. We add our own extended wait for
# the create-subject screen.
#
# BUG-34: onboarding-complete now includes a subject (to keep learner-screen
# visible for other flows). Use onboarding-no-subject for the empty-state test.
appId: com.mentomate.app
tags:
  - nightly
  - edge
  - onboarding
---
# 1. Sign in only — no post-auth recovery (home redirects to create-subject
#    with 0 subjects, which breaks seed-and-sign-in's return-to-home logic).
- runFlow:
    file: ../_setup/sign-in-only.yaml
    env:
      SEED_SCENARIO: "onboarding-no-subject"
      API_URL: ${API_URL}

# 1b. BUG-38: PostApprovalLanding appears after pm clear wipes SecureStore.
#     Wait for it explicitly, then dismiss. The conditional `when:` check
#     fires too early (before auth completes), so we wait with timeout.
# PostApprovalLanding is genuinely optional — only appears when SecureStore
# was wiped (pm clear) and profile has CONSENTED status
- extendedWaitUntil:
    visible:
      text: "You're approved!"
    timeout: 15000
    # PostApprovalLanding only appears after SecureStore wipe — genuinely optional
    optional: true

# Dismiss PostApprovalLanding if it appeared
- tapOn:
    text: "Let's Go"
    # Only present if PostApprovalLanding appeared (see step above)
    optional: true

# 2. Wait for create-subject screen — home.tsx redirects here when subjects=0.
#    After sign-in → PostApproval → home → redirect to create-subject.
#    Increased from 20s to 30s: auth + PostApproval dismiss + home redirect
#    chain takes ~15-20s on WHPX emulator.
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 30000

# 3. Verify "New subject" heading is visible
# Keyboard autoFocus may push heading above fold on small screens (BUG-60)
- assertVisible:
    text: "New subject"
    # autoFocus keyboard pushes heading off-screen on small emulator viewports
    optional: true

# 4. Dismiss keyboard so cancel/submit buttons are visible
- pressKey: back

# 5. Verify cancel button is present (mandatory — core UI element)
- assertVisible:
    id: "create-subject-cancel"

# 6. Verify submit button is present (mandatory — core UI element)
- assertVisible:
    id: "create-subject-submit"

# 6b. Screenshot: create-subject screen (empty state)
- takeScreenshot: empty-first-user-01-create-subject

# 7. Type a subject name
- tapOn:
    id: "create-subject-name"
- inputText: "Biology"
- hideKeyboard

# 8. Tap "Start Learning" submit button
- tapOn:
    id: "create-subject-submit"

# 9. Wait for interview screen — the create-subject mutation navigates to
#    /(learner)/onboarding/interview after creating the subject.
#    The interview ChatShell always has a chat-input.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 20000

# 10. Verify the interview title contains the subject name
- assertVisible:
    text: "Biology"
    # Header title may show generic "Onboarding" before subject name loads via query
    optional: true

# 11. Verify interview screen is showing coach context.
#     NOTE: "learning coach" text is inside a chat bubble FlatList — Maestro
#     can't find text inside React Native chat bubbles on Android.
#     Use the header subtitle "Your mate is here" instead.
- assertVisible:
    text: "Your mate is here"

# 12. Screenshot: interview screen with AI greeting
- takeScreenshot: empty-first-user-02-interview
