# Flow 1: App Launch & Auth Gate
# Validates: app starts, root layout renders, unauthenticated user
# sees the sign-in screen (Clerk auth redirect).
# Tags: smoke
#
# This is the most basic sanity check -- does the app boot and
# show the expected entry point for a logged-out user?
appId: com.mentomate.app
tags:
  - pr-blocking
  - smoke
---
# A cleared release APK opens the audience chooser before auth. Walk that
# first-run path when present; returning installs may already be at sign-in.
- runFlow:
    when:
      visible:
        id: "welcome-chooser"
    file: _setup/nav-welcome-to-sign-in.yaml

# The CI runner has already launched the embedded APK; the conditional
# first-run walk above leaves both clean and returning installs at sign-in.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000

# Verify key sign-in elements are present
- assertVisible: "Sign in to start learning"
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"
- assertVisible:
    id: "sign-in-button"

# Verify navigation to sign-up is available
- assertVisible: "Sign up"

- takeScreenshot: app-launch-auth-gate
