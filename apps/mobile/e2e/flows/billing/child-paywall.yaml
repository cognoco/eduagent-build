# Flow: Child Paywall — Expired Trial Child-Friendly Paywall
# Validates: when a child profile's trial has expired, the subscription screen
# renders the ChildPaywall instead of the normal subscription UI. Verifies
# heading, notify-parent button, alert, and browse-book navigation.
# Tags: nightly, billing, consent
#
# Journey: UX Journey 5 (Billing & Subscription) + Consent Lifecycle
# Epics: Epic 5, Epic 9 (RevenueCat IAP), UX Persona Walkthrough
# Prerequisite: Seeded parent+child account with expired trial
#               (scenario: trial-expired-child)
#
# BUG-52: The trial-expired-child seed creates a parent-owned account.
# Sign-in authenticates as the parent (account owner), landing on the parent
# dashboard. The ChildPaywall only renders for non-owner profiles with an
# expired trial. Fix: switch to the child profile before navigating to
# the Subscription screen.
appId: com.mentomate.app
tags:
  - nightly
  - billing
  - consent
---
# 1. Seed & sign in — lands on parent dashboard (owner is PARENT persona)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "trial-expired-child"
      API_URL: ${API_URL}

# 2. Switch to child profile (BUG-52 fix)
# Navigates: parent dashboard → More → Profile → tap "Paywall Teen" → learner home
- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Paywall Teen"

# 3. Wait for learner home after profile switch — switch-to-child.yaml
#    may complete before layout guard fully settles on WHPX emulator
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 10000

# 4. Navigate to More tab (BUG-15: use text, not testID)
- tapOn:
    text: "More"

# 5. Wait for More screen
- extendedWaitUntil:
    visible:
      text: "Appearance"
    timeout: 15000

# 6. Scroll to Subscription (may be below fold after switch-to-child scrolled to Profile)
- scrollUntilVisible:
    element:
      text: "Subscription"
    direction: DOWN
    timeout: 10000

- tapOn:
    text: "Subscription"

# 7. Verify ChildPaywall appears (not normal subscription screen)
- extendedWaitUntil:
    visible:
      id: "child-paywall"
    timeout: 10000

# 8. Verify child-friendly heading
- assertVisible:
    text: "Nice work so far!"

# 9. Verify trial-ended message
# Long text may wrap differently on small screens — optional by design
- assertVisible:
    text: "Your free trial has ended. Ask your parent to continue your learning journey."
    optional: true

# 10. Screenshot of child paywall
- takeScreenshot: child-paywall-heading

# 11. Verify notify parent button
- assertVisible:
    id: "notify-parent-button"

# 12. Tap notify parent button
- tapOn:
    id: "notify-parent-button"

# 13. Wait for alert (optional — depends on API response/network in emulator)
- extendedWaitUntil:
    visible:
      text: "Sent!"
    timeout: 5000
    # Alert depends on API response — may not appear if API unreachable in emulator
    optional: true

# 14. Dismiss alert if shown
# Alert may not have appeared (see step 13)
- tapOn:
    text: "OK"
    optional: true

# 15. Screenshot after notify attempt
- takeScreenshot: child-paywall-after-notify

# 16. Verify browse book button
- assertVisible:
    id: "browse-book-button"

# 17. Tap browse book button
- tapOn:
    id: "browse-book-button"

# 18. Verify Learning Book screen loads
# Navigation to Learning Book may be slow on emulator with expired trial state
- extendedWaitUntil:
    visible:
      text: "Learning Book"
    timeout: 15000
    # Learning Book screen may not load if subscription gate blocks navigation
    optional: true

# 19. Final screenshot
- takeScreenshot: child-paywall-learning-book
