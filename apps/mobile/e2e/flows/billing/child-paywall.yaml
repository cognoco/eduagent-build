# Flow: Child Paywall — Expired Trial Child-Friendly Paywall
# Validates: when a child profile's trial has expired, the subscription screen
# renders the ChildPaywall instead of the normal subscription UI. Verifies
# heading, notify-parent button, alert, and browse-library navigation.
# Tags: nightly, billing, consent
#
# Journey: UX Journey 5 (Billing & Subscription) + Consent Lifecycle
# Epics: Epic 5, Epic 9 (RevenueCat IAP), UX Persona Walkthrough
# Prerequisite: Seeded parent+child account with expired trial
#               (scenario: trial-expired-child)
#
# BUG-52: The trial-expired-child seed creates a parent-owned account.
# Sign-in authenticates as the parent (account owner), landing on the parent
# dashboard. The ChildPaywall only renders for non-owner profiles with an
# expired trial. Fix: switch to the child profile before navigating to
# the Subscription screen.
appId: com.mentomate.app
tags:
  - nightly
  - billing
  - consent
---
# 1. Sign in only — no post-auth recovery (BUG-52 fix).
# The trial-expired-child seed creates a parent-owned account. Sign-in lands
# on the learner screen, NOT learner home. Using sign-in-only avoids the
# 40s+ of optional learner-screen waits in seed-and-sign-in that are wasted
# for parent scenarios and risk flow timeout.
- runFlow:
    file: ../_setup/sign-in-only.yaml
    env:
      SEED_SCENARIO: "trial-expired-child"
      API_URL: ${API_URL}

# 1b. BUG-38 safety: PostApprovalLanding may appear after pm clear wipes
# SecureStore. Dismiss if present BEFORE waiting for the learner screen.
- tapOn:
    text: "Let's Go"
    optional: true  # justified: PostApprovalLanding only appears after SecureStore wipe (BUG-38 safety gate)

# 1c. Wait for learner screen — confirms sign-in succeeded and we're
# on the expected landing screen before proceeding to profile switch.
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 30000

# 2. Switch to child profile (BUG-52 fix)
# Navigates: parent dashboard → More → Profile → tap "Paywall Teen" → learner home
- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Paywall Teen"

# 3. Wait for learner home after profile switch — switch-to-child.yaml
#    may complete before layout guard fully settles on WHPX emulator
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 4. Navigate to More tab
- tapOn: "More"

# 5. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 5a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 6. Scroll to Subscription on Account screen (may be below fold)
- scrollUntilVisible:
    element:
      text: "Subscription"
    direction: DOWN
    timeout: 10000

- tapOn:
    text: "Subscription"

# 7. Verify ChildPaywall appears (not normal subscription screen)
- extendedWaitUntil:
    visible:
      id: "child-paywall"
    timeout: 10000

# 8. Verify child-friendly heading
- assertVisible:
    text: "Nice work so far!"

# 9. Verify trial-ended message
- assertVisible:
    text: "Your free trial has ended. Ask your parent to continue your learning journey."

# 10. Screenshot of child paywall
- takeScreenshot: child-paywall-heading

# 11. Verify notify parent button
- assertVisible:
    id: "notify-parent-button"

# 12. Tap notify parent button
- tapOn:
    id: "notify-parent-button"

# 13. Wait for alert (optional — depends on API response/network in emulator)
- extendedWaitUntil:
    visible:
      text: "Sent!"
    timeout: 5000
    optional: true  # justified: alert depends on API response reaching device; may not appear if emulator network is slow

# 14. Dismiss alert if shown
- tapOn:
    text: "OK"
    optional: true  # justified: dismiss alert only if it appeared (paired with optional alert wait above)

# 15. Screenshot after notify attempt
- takeScreenshot: child-paywall-after-notify

# 16. Verify browse library button
- assertVisible:
    id: "browse-library-button"

# 17. Tap browse library button
- tapOn:
    id: "browse-library-button"

# 18. Verify Library screen loads
# Navigation to Library may be slow on emulator with expired trial state
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 15000

# 19. Final screenshot
- takeScreenshot: child-paywall-library
