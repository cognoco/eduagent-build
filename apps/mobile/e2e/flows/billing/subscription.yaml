# Flow N6: Subscription Flow — View Trial Status and Billing
# Validates: user on active trial can navigate to billing/subscription
# settings and see trial status information.
# Tags: nightly, billing
#
# Journey: UX Journey 5 (Billing & Subscription)
# Epics: Epic 5 (FR95-FR100)
# Prerequisite: Seeded user on active trial (scenario: trial-active)
appId: com.mentomate.app
tags:
  - nightly
  - billing
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "trial-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab (BUG-15: use text, not testID)
- tapOn:
    text: "More"

# 4. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 4a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 5. Look for subscription/billing option on Account screen
- extendedWaitUntil:
    visible:
      text: "Subscription"
    timeout: 10000

# 6. Tap on subscription/billing
- tapOn:
    text: "Subscription"

# 7. Fallback: look for billing text
- tapOn:
    text: "Billing"
    optional: true  # justified: "Billing" label is a fallback for when "Subscription" tap in step 6 did not navigate; text varies by platform

# 8. Wait for subscription detail screen
- extendedWaitUntil:
    visible:
      text: "Trial"
    timeout: 10000

# 9. Verify trial status is displayed
- assertVisible:
    text: "trial"

# 10. Look for upgrade/subscribe option
- assertVisible:
    text: "Upgrade"

# 11. Screenshot
- takeScreenshot: subscription-flow-complete
