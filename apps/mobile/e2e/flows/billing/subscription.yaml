# Flow N6: Subscription Flow — View Trial Status and Billing
# Validates: user on active trial can navigate to billing/subscription
# settings and see trial status information.
# Tags: nightly, billing
#
# Journey: UX Journey 5 (Billing & Subscription)
# Epics: Epic 5 (FR95-FR100)
# Prerequisite: Seeded user on active trial (scenario: trial-active)
appId: com.mentomate.app
tags:
  - nightly
  - billing
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'trial-active'
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# 3. Navigate to More tab (BUG-15: use text, not testID)
- tapOn:
    text: 'More'

# 4. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: 'more-row-learning-preferences'
    timeout: 15000

# 4a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: 'more-row-account'

- extendedWaitUntil:
    visible:
      id: 'more-account-scroll'
    timeout: 10000

# 5. Scroll to the owner-only Subscription row below the small-phone fold.
- scrollUntilVisible:
    element:
      id: 'more-row-subscription'
    direction: DOWN
    timeout: 15000

# 6. Open subscription settings through the stable row contract.
- tapOn:
    id: 'more-row-subscription'

# 8. Wait for subscription detail screen
- extendedWaitUntil:
    visible:
      id: 'subscription-screen'
    timeout: 10000

# 9. Verify trial-active banner is displayed (trial-active seed: tier=plus, status=trial)
# subscription.tsx:751-776 renders testID="trial-banner" when status === 'trial'
- assertVisible:
    id: 'trial-banner'

# 10. Verify current-plan card is present (trial-active is Plus tier, so no free-upgrade-button)
# subscription.tsx:783-787 — current-plan renders for all logged-in owners
- assertVisible:
    id: 'current-plan'

# 11. Screenshot
- takeScreenshot: subscription-flow-complete
