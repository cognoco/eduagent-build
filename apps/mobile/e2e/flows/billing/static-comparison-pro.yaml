# Flow: Static Tier Comparison — Pro Subscriber [BILLING-12, BUG-917]
# Validates: a Pro-tier user sees the static comparison cards including
# their own Pro card (read-only), and does NOT see a Family card.
# The static card section renders when RevenueCat offerings are unavailable
# (always the case in E2E emulator) and the user's tier is 'pro'.
#
# Tags: nightly, billing
#
# Journey: UX Journey 5 (Billing & Subscription)
# Epics: Epic 5 (FR95-FR100), Epic 9 (RevenueCat IAP) [BUG-917]
# Prerequisite: Seeded user on active Pro subscription (scenario: subscription-pro-active)
appId: com.mentomate.app
tags:
  - nightly
  - billing
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "subscription-pro-active"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 4a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 5. Scroll to the Subscription row on Account screen and tap it
- scrollUntilVisible:
    element:
      id: "more-row-subscription"
    direction: DOWN
    timeout: 15000

- tapOn:
    id: "more-row-subscription"

# 6. Verify subscription screen loaded
- extendedWaitUntil:
    visible:
      id: "subscription-screen"
    timeout: 15000

- takeScreenshot: subscription-screen-pro

# 7. Scroll to the static tier comparison section
#    (visible when RevenueCat returns no packages — always true in emulator)
- scrollUntilVisible:
    element:
      id: "static-tier-pro"
    direction: DOWN
    timeout: 20000

# 8. Pro card must be visible (current plan card for pro users)
- assertVisible:
    id: "static-tier-pro"

- takeScreenshot: static-tier-pro-visible

# 9. Family card must NOT be present — only shown for family-tier users
- assertNotVisible:
    id: "static-tier-family"

- takeScreenshot: static-comparison-pro-complete
