# Flow: Subscription Details — Verify Trial-Active UI Elements
# Validates: subscription screen renders correctly for a trial-active user,
# including trial banner, current plan, usage meter, restore purchases,
# BYOK section, and RevenueCat offerings (optional in emulator).
# Tags: nightly, billing
#
# Journey: UX Journey 5 (Billing & Subscription)
# Epics: Epic 5 (FR95-FR100), Epic 9 (RevenueCat IAP)
# Prerequisite: Seeded user on active trial (scenario: trial-active)
appId: com.mentomate.app
tags:
  - nightly
  - billing
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "trial-active"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab (use accessibility label for reliable targeting)
- tapOn: "More Tab"

# 4. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 4a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 5. Scroll to & tap Subscription menu item on Account screen
- scrollUntilVisible:
    element:
      text: "Subscription"
    direction: DOWN
    timeout: 30000

- tapOn:
    text: "Subscription"

# 6. Verify subscription screen loaded
- extendedWaitUntil:
    visible:
      id: "subscription-screen"
    timeout: 30000

# 7. Verify trial banner by testID
- assertVisible:
    id: "trial-banner"

# 7a. Verify trial end-date text when present (only when trialEndsAt is set)
- assertVisible:
    id: "trial-banner-ends-at"
    optional: true  # justified: trial-banner-ends-at only renders when subscription.trialEndsAt is set in seed data

# 8. Screenshot of trial banner
- takeScreenshot: subscription-details-trial-banner

# 9. Verify current plan section
- assertVisible:
    id: "current-plan"

# 10. Verify usage section heading
- assertVisible:
    text: "Usage this month"

# 11. Screenshot of plan and usage
- takeScreenshot: subscription-details-plan-usage

# 12. Scroll down to reveal restore purchases and BYOK
- scrollUntilVisible:
    element:
      id: "restore-purchases-button"
    direction: DOWN
    timeout: 30000

# 13. Verify restore purchases button
- assertVisible:
    id: "restore-purchases-button"

# 14. Verify BYOK section text. NOTE: escaped parentheses — Maestro text:
#     is a regex, so literal parens must be backslash-escaped.
# BYOK section commented out in app code (Epic 10) — feature not yet ready
# Tracking: re-enable when BYOK feature is implemented
- scrollUntilVisible:
    element:
      text: "Bring your own key \\(coming soon\\)"
    direction: DOWN
    timeout: 15000
    speed: 30
    # BYOK UI commented out in subscription.tsx (Epic 10) — element not rendered
    optional: true  # justified: BYOK UI is commented out in subscription.tsx (Epic 10) — element not rendered yet

# BYOK UI commented out in subscription.tsx (Epic 10) — element not rendered
- assertVisible:
    text: "Bring your own key \\(coming soon\\)"
    optional: true  # justified: BYOK UI is commented out in subscription.tsx (Epic 10) — element not rendered yet

# 15. Screenshot of restore + BYOK section
- takeScreenshot: subscription-details-restore-byok

# 16. Verify RevenueCat offerings section (optional — emulator has no store)
- assertVisible:
    id: "offerings-section"
    optional: true  # justified: RevenueCat offerings unavailable in emulator environment (no Google Play store)

# 17. If no offerings, verify fallback message
- assertVisible:
    id: "no-offerings"
    optional: true  # justified: no-offerings fallback is the alternate of offerings-section; one or the other renders

# 18. Final screenshot
- takeScreenshot: subscription-details-complete
