# Flow: Family Pool Section + Member Removal [BILLING-08]
# Validates: the family pool section (shared quota, member list) is visible
# on the subscription screen for a Family-tier user, and the owner can remove
# a same-account non-owner child from the family plan.
#
# Tags: nightly, billing
#
# Journey: UX Journey 5 (Billing & Subscription)
# Epics: Epic 5 (FR95-FR100), Epic 9 (RevenueCat IAP)
# Prerequisite: Seeded user on active Family subscription with removable children
# (scenario: mentor-audit-family-pool-members)
appId: com.mentomate.app
tags:
  - nightly
  - billing
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-family-pool-members'
      API_URL: ${API_URL}

# 2. Verify family home screen loaded
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: 'More'

# 4. Wait for More tab index — First settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: 'more-row-learning-preferences'
    timeout: 15000

# 4a. Navigate into Account sub-screen (Subscription has moved from More index to Account)
- tapOn:
    id: 'more-row-account'

- extendedWaitUntil:
    visible:
      id: 'more-account-scroll'
    timeout: 10000

# 5. Scroll to the Subscription row on Account screen and tap it
- scrollUntilVisible:
    element:
      id: 'more-row-subscription'
    direction: DOWN
    timeout: 15000

- tapOn:
    id: 'more-row-subscription'

# 6. Verify subscription screen loaded
- extendedWaitUntil:
    visible:
      id: 'subscription-screen'
    timeout: 15000

- takeScreenshot: subscription-screen-family-pool

# 7. Wait for the family pool section — rendered only after a secondary
#    useFamilySubscription() query resolves (cascade: subscription query →
#    enabled family query → data populated → section renders). On a cold
#    emulator the cascade can take well beyond a scroll timeout alone.
- extendedWaitUntil:
    visible:
      id: 'family-pool-section'
    timeout: 30000

# 7b. Now scroll to it (it may be below the fold)
- scrollUntilVisible:
    element:
      id: 'family-pool-section'
    direction: DOWN
    timeout: 20000

# 8. Family pool section must be visible for Family-tier users
- assertVisible:
    id: 'family-pool-section'

- takeScreenshot: family-pool-section-visible

# 9. A non-owner child from the seed should be removable.
- scrollUntilVisible:
    element:
      id: 'remove-family-member-${CHILD_PROFILE_ID1}'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 100
    centerElement: true

- tapOn:
    id: 'remove-family-member-${CHILD_PROFILE_ID1}'

# 10. Confirm the native destructive alert.
- tapOn:
    text: 'Remove'

# 11. Dismiss the success alert before inspecting the refreshed list. Some
#     drivers auto-dismiss it, so the tap itself is optional; the count below
#     is the required mutation receipt.
- tapOn:
    text: 'OK'
    optional: true

- extendedWaitUntil:
    visible: '2 of 4 profiles connected'
    timeout: 15000

- scrollUntilVisible:
    element:
      id: 'family-member-${CHILD_PROFILE_ID2}'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 100
    centerElement: true

- assertNotVisible:
    id: 'family-member-${CHILD_PROFILE_ID1}'

- assertVisible:
    id: 'family-member-${CHILD_PROFILE_ID2}'

- takeScreenshot: family-pool-member-removed
