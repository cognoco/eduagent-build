# Flow: Daily Quota Exceeded — Verify 402 Error on Daily Cap
# Validates: when a free-tier user has hit the daily question limit (10/10),
# sending a message in an active session triggers the quota exceeded error
# with the daily limit message.
# Tags: nightly, billing, quota
#
# Journey: UX Journey 5 (Billing & Subscription) — Dual-Cap Enforcement
# Epics: Epic 5 (Quota Metering)
# Prerequisite: Seeded free-tier user with daily limit fully used
#               (scenario: daily-limit-reached)
#
# NOTE: The daily-limit-reached seed creates:
#   - Free-tier subscription (active, 100 monthly / 10 daily)
#   - Quota pool with usedToday=10, usedThisMonth=10
#   - An active learning session with 3 exchanges
#   - A subject (Mathematics) so home screen renders
# The metering middleware blocks at 402 before the LLM is called,
# so no LLM configuration is needed for this flow to work.
appId: com.mentomate.app
tags:
  - nightly
  - billing
  - quota
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "daily-limit-reached"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 30000

# 3. Navigate to the active session via intent card (replaced coaching-card-primary)
- tapOn:
    id: "home-coach-band-continue"
    # Intent card may not render if no active subject
    optional: true  # justified: coach-band-continue only renders when an active session exists; falls back to subject tap below

# 3b. Fallback: if no coaching card, try to navigate via subject
- tapOn:
    text: "Mathematics"
    optional: true  # justified: Mathematics tap is only needed when coach-band-continue did not render; Maestro has no if-else

# 4. Wait for the session/chat screen
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 5. Type a message
- tapOn:
    id: "chat-input"
- inputText: "Can you explain quadratic equations?"

# 6. Send message (keyboard Enter, per BUG-35)
- pressKey: Enter

# 7. Wait for the QuotaExceededCard to appear (rendered via SessionMessageActions
# when the stream returns a 402 quota-exceeded response).
# QuotaExceededCard.tsx:40 — testID="quota-exceeded-card"
# QuotaExceededCard.tsx:43-46 — heading is t('session.quota.dailyLimitReached')
#   = "Daily limit reached" (en.json:465)
# The old plain-text "daily question limit" copy was replaced by the structured
# QuotaExceededCard component in the session streaming refactor.
- extendedWaitUntil:
    visible:
      id: "quota-exceeded-card"
    timeout: 15000

# 7b. Verify the daily-limit heading text is present inside the card
- assertVisible:
    text: "Daily limit reached"

# 8. Screenshot of quota exceeded state
- takeScreenshot: daily-quota-exceeded-chat

# 9. Verify the chat input is still present (session screen didn't crash)
- assertVisible:
    id: "chat-input"
