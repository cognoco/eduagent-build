# Flow T7: Topic Detail — Review CTA for Overdue Verified Topic
# Validates: a verified + overdue topic shows "Review this topic" on the
# topic-detail sticky CTA; tapping it launches a mode=review session.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention — spaced repetition re-entry)
# Epics: Epic 3 (FR43 StudyCTA derivation); overdue retention branch
# Prerequisite: Seeded learner with a verified+overdue topic (scenario: topic-overdue-review)
#
# Seed note: topic-overdue-review creates an "Astronomy" subject + book + topics.
# The first topic has a retention card with xpStatus='verified' + nextReviewAt in
# the past (pastDate(1)). Since xpStatus='verified', the topic is in topicStudiedIds
# → row state = 'done' on the book screen. On topic-detail, completionStatus =
# 'verified' and retentionStatus is NOT 'strong' (it is overdue/weak) →
# deriveStudyCTA returns "Review this topic" (primary).
# handleStudyPress pushes a mode=review session.
#
# testID mapping:
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> tappable shelf header (push to shelf screen)
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> book card on shelf screen
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root
#     - done-row-${TOPIC_ID}                -> verified topic row (state='done' because
#                                             xpStatus='verified' adds to topicStudiedIds;
#                                             book/[bookId].tsx:612, 794-795)
#   apps/mobile/src/app/(app)/topic/[topicId].tsx:
#     - topic-detail-scroll                 -> ScrollView root on topic detail
#     - study-cta                           -> sticky CTA button
#   apps/mobile/src/app/(app)/session/ (via session route):
#     - chat-input                          -> confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "topic-overdue-review"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: topic-overdue-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Open the Astronomy subject shelf ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

- takeScreenshot: topic-overdue-02-shelf-screen

# ── Tap the book card → book-screen ────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: topic-overdue-03-book-screen

# ── Tap the done topic row → topic-detail ───────────────────────────────
# The overdue topic has xpStatus='verified' → topicStudiedIds contains it
# → state = 'done' (book/[bookId].tsx:794-795).
# testID: done-row-${TOPIC_ID}
- scrollUntilVisible:
    element:
      id: "done-row-${TOPIC_ID}"
    direction: DOWN
    timeout: 10000
    speed: 50
    visibilityPercentage: 100
    centerElement: true

- tapOn:
    id: "done-row-${TOPIC_ID}"

- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 15000

- takeScreenshot: topic-overdue-04-topic-detail

# ── Assert "Review this topic" CTA ──────────────────────────────────────
# deriveStudyCTA(completionStatus='verified', retentionStatus≠'strong')
# → label "Review this topic" (topic/[topicId].tsx:262).
- assertVisible:
    id: "study-cta"

- assertVisible:
    text: "Review this topic"

# Negative: not_started and strong-retention labels must NOT appear.
- assertNotVisible:
    text: "Start studying"

- assertNotVisible:
    text: "Practice again"

- takeScreenshot: topic-overdue-05-cta-visible

# ── Tap "Review this topic" → session ───────────────────────────────────
# handleStudyPress pushes a mode=review session for the overdue branch.
- tapOn:
    id: "study-cta"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

- assertVisible:
    id: "chat-input"

- takeScreenshot: topic-overdue-06-session-launched
