# Flow N10: Relearn Method Selection — Failed Recall Triggers Relearn
# Validates: user with 3+ failed recalls can find the seeded topic by stable ID,
# see its remediation signal and study action, enter the explicit relearn route,
# choose a teaching method, and start a relearn session.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall failure path — remediation)
# Epics: Epic 3 (FR52-FR58)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x)
#
# testID mapping (library.tsx + LibrarySearchResults.tsx):
#   - tab-library                 -> Library tab bar button
#   - shelves-list                -> shelves list (ShelvesTab)
#   - library-search-input        -> server-backed search input
#   - topic-row-${TOPIC_ID}       -> exact seeded topic result
#
# testID mapping (topic/[topicId].tsx):
#   - topic-detail-scroll         -> scrollable content container
#   - study-cta                   -> sticky study CTA button
#
# testID mapping (topic/relearn.tsx):
#   - relearn-loading             -> submitting state
#   - relearn-method-phase        -> method selection phase (ScrollView)
#   - relearn-method-visual_diagrams    -> method picker option
#   - relearn-method-step_by_step      -> method picker option
#   - relearn-method-real_world_examples -> method picker option
#   - relearn-method-practice_problems  -> method picker option
#
# The failed-recall seed exports SUBJECT_ID and TOPIC_ID, but not BOOK_ID. Search
# keeps the topic-detail assertion while avoiding title- and book-id assumptions.
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with failed-recall scenario (3+ failures)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'failed-recall-3x'
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# 3. Navigate to Library tab
- tapOn:
    id: 'tab-library'

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 10000

# 5. Search for the seeded subject/topic and open the exact topic result.
- tapOn:
    id: 'library-search-input'

- inputText: 'Chemistry'

- hideKeyboard

- extendedWaitUntil:
    visible:
      id: 'topic-row-${TOPIC_ID}'
    timeout: 10000

- tapOn:
    id: 'topic-row-${TOPIC_ID}'

# 6. Verify the exact failed-recall topic and its current study action.
- extendedWaitUntil:
    visible:
      id: 'topic-detail-scroll'
    timeout: 10000

- takeScreenshot: relearn-01-topic-detail

- assertVisible:
    id: 'topic-practiced-often-hint'

- assertVisible:
    id: 'study-cta'

# 7. Enter relearn with both seeded IDs, which requires method phase directly.
- openLink: 'mentomate:///topic/relearn?topicId=${TOPIC_ID}&subjectId=${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'relearn-method-phase'
    timeout: 10000

- takeScreenshot: relearn-method-picker

# 8. Verify all four methods and select Visual Diagrams.
- assertVisible:
    id: 'relearn-method-visual_diagrams'
- assertVisible:
    id: 'relearn-method-step_by_step'
- assertVisible:
    id: 'relearn-method-real_world_examples'
- assertVisible:
    id: 'relearn-method-practice_problems'

- takeScreenshot: relearn-method-picker-full

- tapOn:
    id: 'relearn-method-visual_diagrams'

# The loading state is ephemeral; the session input is the mandatory receipt.
- extendedWaitUntil:
    visible:
      id: 'relearn-loading'
    timeout: 5000
    optional: true # justified: the API can complete before Maestro polls

- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: relearn-session-started
