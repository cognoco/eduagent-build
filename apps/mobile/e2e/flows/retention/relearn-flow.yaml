# Flow N10: Relearn Method Selection — Failed Recall Triggers Relearn
# Validates: user with 3+ failed recalls can navigate to topic detail,
# see the smart primary relearn action, choose a teaching method, and start
# a relearn session.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall failure path — remediation)
# Epics: Epic 3 (FR52-FR58)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x)
#
# testID mapping (library.tsx + components):
#   - tab-library                 -> Library tab bar button
#   - shelves-list                -> shelves list (ShelvesTab)
#   - shelf-row-header-${id}      -> per-subject shelf row header
#   - shelf-screen                -> shelf screen container
#   - library-loading             -> loading spinner
#
# testID mapping (topic/[topicId].tsx):
#   - topic-detail-scroll         -> scrollable content container
#   - study-cta                   -> sticky study CTA button
#
# testID mapping (topic/relearn.tsx):
#   - relearn-back                -> back button
#   - relearn-loading             -> submitting state
#   - relearn-topics-phase        -> topic selection phase (ScrollView)
#   - relearn-method-phase        -> method selection phase (ScrollView)
#   - relearn-method-visual_diagrams    -> method picker option
#   - relearn-method-step_by_step      -> method picker option
#   - relearn-method-real_world_examples -> method picker option
#   - relearn-method-practice_problems  -> method picker option
#
# NOTE: relearn-different-method, relearn-same-method removed from relearn screen.
# The new design goes directly to topics phase → method phase (no choice screen).
# NOTE: The Library no longer has a top-level Topics tab (library-tab-topics removed).
# Topics are accessed by drilling into a subject shelf → book → topic detail.
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with failed-recall scenario (3+ failures)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "failed-recall-3x"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 4. Wait for Library to load (Shelves tab is the default)
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 5. Wait for shelves list loading to finish
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true  # justified: loading spinner is ephemeral — may already be gone by the time Maestro polls

# 6. Tap the Chemistry subject shelf row header.
#    The failed-recall-3x seed creates a "Chemistry" subject.
#    SUBJECT_ID is injected by the seed helper; fallback to text match.
#    ShelfRow uses testID="shelf-row-header-${subjectId}".
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"
    optional: true  # justified: SUBJECT_ID env var may be absent if seed injection failed; text fallback covers it

- tapOn:
    text: "Chemistry"
    optional: true  # justified: text fallback when SUBJECT_ID env var is absent (paired with step above)

# 7. Wait for shelf screen (books for Chemistry)
- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

# 8. Screenshot: shelf screen
- takeScreenshot: relearn-01-shelf

# 9. Tap the first book in the Chemistry shelf
- tapOn:
    text: "Chemistry"

# 10. Wait for book detail screen
- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 10000

# 11. Tap the first topic visible — look for "Chemistry Topic 1"
#     The failed-recall-3x seed creates topics named "Chemistry Topic 1/2/3".
#     "Chemistry Topic 1" has failureCount=3 → shows "Needs attention".
- tapOn:
    text: "Chemistry Topic 1"

# 12. Wait for topic detail screen
- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 10000

# 13. Look for "Needs attention" indicator (3+ failures marker)
- assertVisible:
    text: "Needs attention"
    optional: true  # justified: "Needs attention" only renders when failureCount >= threshold; seed data may vary

# 14. Verify the study CTA is present
- assertVisible:
    id: "study-cta"

# 15. Tap the study CTA (routes to relearn session for needs-deepening topic)
- tapOn:
    id: "study-cta"

# 16. Verify relearn screen loads with "Relearn Topic" heading
- extendedWaitUntil:
    visible:
      text: "Relearn Topic"
    timeout: 10000

# 17. Wait for topics phase or method phase to render.
#     When entering from topic detail with a specific topicId/subjectId,
#     relearn opens at method phase (directEntry=true).
#     When entering without params, topics phase loads first.
- extendedWaitUntil:
    visible:
      id: "relearn-method-phase"
    timeout: 10000
    optional: true  # justified: routing bifurcation — directEntry=true skips topics phase; either may appear first

- extendedWaitUntil:
    visible:
      id: "relearn-topics-phase"
    timeout: 5000
    optional: true  # justified: alternative phase — appears when directEntry=false or topicId absent

# 18. If in topics phase, select the first topic to advance to method phase
- tapOn:
    text: "Chemistry Topic 1"
    optional: true  # justified: conditional tap — only needed when relearn-topics-phase loaded (not method phase)

# 19. Wait for method phase
- extendedWaitUntil:
    visible:
      id: "relearn-method-phase"
    timeout: 10000

# 20. Screenshot of method picker
- takeScreenshot: relearn-method-picker

# 21. Verify all 4 method options are present
- assertVisible:
    id: "relearn-method-visual_diagrams"
- assertVisible:
    id: "relearn-method-step_by_step"
- assertVisible:
    id: "relearn-method-real_world_examples"
- assertVisible:
    id: "relearn-method-practice_problems"

# 22. Screenshot of method picker with all options
- takeScreenshot: relearn-method-picker-full

# 23. Select "Visual Diagrams" method
- tapOn:
    id: "relearn-method-visual_diagrams"

# 24. Wait for relearn session to start (navigates to session screen)
# The relearn mutation calls the API and navigates on success.
# Either loading state or session screen should appear.
- extendedWaitUntil:
    visible:
      id: "relearn-loading"
    timeout: 5000
    optional: true  # justified: loading state is ephemeral — API may respond faster than Maestro's poll interval

# 25. Screenshot after method selection (loading or session)
- takeScreenshot: relearn-session-starting
