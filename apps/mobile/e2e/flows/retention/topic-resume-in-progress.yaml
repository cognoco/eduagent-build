# Flow T8: Topic Detail — Resume In-Progress Topic
# Validates: an in-progress topic shows "Review this topic" on the topic-detail
# sticky CTA; tapping it resumes/continues the active session (chat-input visible).
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention — session resumption)
# Epics: Epic 3 (FR43 StudyCTA derivation); session resume path
# Prerequisite: Seeded learner with an active in-progress session (scenario: learning-active)
#
# Seed note: learning-active creates a "World History" subject + book + topics.
# Topic[0] has a learning session with exchangeCount=3 (below
# MIN_EXCHANGES_FOR_TOPIC_COMPLETION=5 → not in topicStudiedIds, IS in
# inProgressTopicIds). continueNowTopicId = topic[0].id →
# primaryContinueTopicId = topic[0].id → row state = 'continue-now'.
# On topic-detail, completionStatus = 'in_progress' (sessions > 0, no passed
# assessment) → deriveStudyCTA falls through to "Review this topic" (primary).
# handleStudyPress resumes the session.
#
# testID mapping:
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> tappable shelf header
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> book card on shelf screen
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root
#     - continue-now-row-${TOPIC_ID}        -> in-progress topic row (state='continue-now'
#                                             because session is active + in inProgressTopicIds
#                                             + is continueNowTopicId; book/[bookId].tsx:789-791)
#   apps/mobile/src/app/(app)/topic/[topicId].tsx:
#     - topic-detail-scroll                 -> ScrollView root on topic detail
#     - study-cta                           -> sticky CTA button
#   apps/mobile/src/app/(app)/session/ (via session route):
#     - chat-input                          -> confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: topic-resume-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Open the World History subject shelf ────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

- takeScreenshot: topic-resume-02-shelf-screen

# ── Tap the book card → book-screen ────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: topic-resume-03-book-screen

# ── Tap the continue-now topic row → topic-detail ───────────────────────
# learning-active topic[0] has an active session → state = 'continue-now'
# (book/[bookId].tsx:789-791, continueNowTopicId logic).
# testID: continue-now-row-${TOPIC_ID}
- tapOn:
    id: "continue-now-row-${TOPIC_ID}"

- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 15000

- takeScreenshot: topic-resume-04-topic-detail

# ── Assert study CTA is visible ──────────────────────────────────────────
# deriveStudyCTA(completionStatus='in_progress', _) → "Review this topic" (primary).
# (in_progress falls through the completed/verified branch and hits the default.)
- assertVisible:
    id: "study-cta"

- takeScreenshot: topic-resume-05-cta-visible

# ── Tap CTA → session ───────────────────────────────────────────────────
# handleStudyPress resumes or creates a session for the in-progress topic.
- tapOn:
    id: "study-cta"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

- assertVisible:
    id: "chat-input"

- takeScreenshot: topic-resume-06-session-launched
