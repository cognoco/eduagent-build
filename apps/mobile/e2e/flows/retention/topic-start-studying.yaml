# Flow T6: Topic Detail — Start Studying CTA for Not-Started Topic
# Validates: a not_started topic shows "Start studying" on the topic-detail
# sticky CTA; tapping it launches a mode=learning session (chat-input visible).
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention — fresh topic entry)
# Epics: Epic 3 (FR43 StudyCTA derivation); topic-detail session launch
# Prerequisite: Seeded learner with a not_started topic (scenario: topic-not-started)
#
# Seed note: topic-not-started creates a "Geography" subject + book + topics
# (no sessions, no retention card, no assessment). computeCompletionStatus
# returns 'not_started', so deriveStudyCTA returns "Start studying" (primary).
# handleStudyPress pushes a mode=learning session.
#
# testID mapping:
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> pushed shelf screen root
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> tappable shelf row (pushes shelf screen)
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> book card on shelf screen
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail screen root
#     - continue-now-row-${TOPIC_ID}             -> first unstarted topic row (state=continue-now)
#       (state logic: no sessions, so the resume-target endpoint's next_topic
#        fallback points at the first unstarted topic → primaryContinueTopicId =
#        topicIds[0] → that row groups as 'continue-now')
#   apps/mobile/src/app/(app)/topic/[topicId].tsx:
#     - topic-detail-scroll                 -> ScrollView root on topic detail
#     - study-cta                           -> sticky CTA button (label varies by state)
#   apps/mobile/src/app/(app)/session/index.tsx (via session route):
#     - chat-input                          -> message input; confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "topic-not-started"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: topic-start-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
# Use testID — survives i18n and copy edits.
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Open the Geography subject shelf ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

- takeScreenshot: topic-start-02-shelf-screen

# ── Tap the book card → book-screen ────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: topic-start-03-book-screen

# ── Tap the continue-now topic row → topic-detail ───────────────────────
# The not_started topic-not-started seed has no sessions and no retention cards,
# so the resume-target endpoint's next_topic fallback points at the first
# unstarted topic → that row groups as state='continue-now' on the book screen.
# (The topic-detail study-cta below is still "Start studying" because the topic
#  itself is genuinely not_started — the continue-now grouping is book-screen
#  presentation only, driven by the resume-target pointer.)
# testID: continue-now-row-${TOPIC_ID}  (book/[bookId].tsx:1832 — `${state}-row-${topic.id}`)
# Topic rows render below the book header + sticky CTA, so scroll down to the
# row first — tapOn does not auto-scroll.
- scrollUntilVisible:
    element:
      id: "continue-now-row-${TOPIC_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "continue-now-row-${TOPIC_ID}"

- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 15000

- takeScreenshot: topic-start-04-topic-detail

# ── Assert "Start studying" CTA ─────────────────────────────────────────
# deriveStudyCTA(completionStatus='not_started', _) → label "Start studying"
# (topic/[topicId].tsx:251). Asserting the exact label pins the derivation —
# a regression returning "Review this topic" would fail this step.
- assertVisible:
    id: "study-cta"

- assertVisible:
    text: "Start studying"

# Negative: neither in_progress nor completed labels must appear.
- assertNotVisible:
    text: "Review this topic"

- assertNotVisible:
    text: "Practice again"

- takeScreenshot: topic-start-05-cta-visible

# ── Tap "Start studying" → session ──────────────────────────────────────
# handleStudyPress → pushes mode=learning session.
# 45s to accommodate first-session LLM cold-start latency.
- tapOn:
    id: "study-cta"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

- assertVisible:
    id: "chat-input"

- takeScreenshot: topic-start-06-session-launched
