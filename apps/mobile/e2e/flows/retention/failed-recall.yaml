# Flow N2: Failed Recall Remediation — 3x Failures Trigger Relearn
# Validates: user with 3 failed recalls sees remediation card after submitting
# another incorrect answer in recall test, then can navigate to relearn screen.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall phase — failure path)
# Epics: Epic 3 (FR52-FR58)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x)
#
# testID mapping:
#   - recall-test-screen    -> screen wrapper
#   - chat-input            -> text input (from ChatShell)
#   - remediation-card      -> shown after 3+ failures
#   - review-retest-button  -> "Review and Re-test" on remediation card
#   - relearn-topic-button  -> "Relearn Topic" on remediation card
#   - relearn-topics-phase  -> topic selection phase on relearn screen
#   - relearn-method-phase  -> method selection phase on relearn screen
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with failed-recall scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "failed-recall-3x"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Intent card stack should be visible (replaced coaching card)
- assertVisible:
    id: "home-subject-carousel"

# 4. Tap intent-continue to start recall (handles review-due topics)
- tapOn:
    id: "home-coach-band-continue"
    optional: true  # justified: home-coach-band-continue only renders when recall-due topics exist in seed data

# 5. If coaching card didn't navigate, try direct recall prompt
- tapOn:
    text: "Review"
    optional: true  # justified: fallback path when coach band is absent or didn't navigate to recall

# 6. Wait for session screen (ChatShell)
# BUG-40 fix: The app uses ChatShell for retention/recall reviews, not a dedicated
# recall-test-screen. Wait for chat-input which is always present in ChatShell.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 7. Enter an answer in recall test
- tapOn:
    id: "chat-input"
- inputText: "I think it has something to do with the main idea"

# 8. Submit answer
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 9. Wait for AI to evaluate and return feedback
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 10. Verify remediation/relearn card appears (after 3+ failures)
- extendedWaitUntil:
    visible:
      id: "remediation-card"
    timeout: 10000

# 11. Screenshot of remediation card
- takeScreenshot: failed-recall-remediation

# 12. Verify "Review and Re-test" button on remediation card
- assertVisible:
    id: "review-retest-button"

# 13. Verify "Relearn Topic" button on remediation card
- assertVisible:
    id: "relearn-topic-button"

# 14. Tap "Relearn Topic" to navigate to relearn screen
- tapOn:
    id: "relearn-topic-button"

# 15. Verify relearn screen loads with "Relearn Topic" heading
- extendedWaitUntil:
    visible:
      text: "Relearn Topic"
    timeout: 10000

# 16. Verify the topics phase or method phase is present.
#     When entering from remediation card with a specific topic, relearn opens
#     directly at method phase (directEntry=true). Otherwise topics phase.
- extendedWaitUntil:
    visible:
      id: "relearn-method-phase"
    timeout: 10000
    optional: true  # justified: routing bifurcation — directEntry=true skips topics phase; either screen may appear

- extendedWaitUntil:
    visible:
      id: "relearn-topics-phase"
    timeout: 5000
    optional: true  # justified: alternative phase — appears when relearn entered without directEntry params

# 17. Screenshot of relearn screen reached from remediation card
- takeScreenshot: failed-recall-to-relearn
