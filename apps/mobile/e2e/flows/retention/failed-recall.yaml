# Flow N2: Failed Recall Remediation — Fourth Failure Triggers Relearn
# Validates: a learner with 3 failed recalls submits one more deterministic
# failed attempt, sees the server-authoritative remediation card, and starts
# relearning the exact seeded topic.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall phase — failure path)
# Epics: Epic 3 (FR52-FR58)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x)
#
# testID mapping:
#   - recall-test-screen             -> recall ChatShell wrapper
#   - recall-dont-remember-button    -> deterministic failed attempt
#   - remediation-card              -> server-authoritative parked-topic UI
#   - review-retest-button           -> remediation review action
#   - relearn-topic-button           -> remediation relearn action
#   - relearn-method-phase           -> direct-entry method picker
#   - relearn-method-step_by_step    -> stable teaching-method action
#   - chat-input                     -> started relearn session receipt
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with exactly three prior failed recall assessments.
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'failed-recall-3x'
      API_URL: ${API_URL}

# 2. Wait for authenticated app bootstrap before firing the leaf-route link.
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# 3. Enter the exact seeded recall route. The coach band now opens the generic
# overdue-topic picker, so it cannot prove the fourth-failure off-ramp.
- openLink: 'mentomate:///topic/recall-test?topicId=${TOPIC_ID}&subjectId=${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'recall-test-screen'
    timeout: 15000

- assertVisible:
    id: 'recall-dont-remember-button'

# 4. failureCount=3 + one deterministic dont_remember submission reaches the
# server-owned topic_parked branch without depending on LLM grading.
- tapOn:
    id: 'recall-dont-remember-button'

- extendedWaitUntil:
    visible:
      id: 'remediation-card'
    timeout: 15000

- scrollUntilVisible:
    element:
      id: 'review-retest-button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 100
    centerElement: true
    optional: false

- assertVisible:
    id: 'review-retest-button'

- assertVisible:
    id: 'relearn-topic-button'

- takeScreenshot: failed-recall-remediation

# 5. Follow the remediation action into direct-entry relearn and start a
# stable method, proving the card is actionable rather than decorative.
- tapOn:
    id: 'relearn-topic-button'

- extendedWaitUntil:
    visible:
      id: 'relearn-method-phase'
    timeout: 15000

- assertVisible:
    id: 'relearn-method-step_by_step'

- tapOn:
    id: 'relearn-method-step_by_step'

- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 15000

- takeScreenshot: failed-recall-relearn-started
