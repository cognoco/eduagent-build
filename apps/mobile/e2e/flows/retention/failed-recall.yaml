# Flow N2: Failed Recall Remediation — 3x Failures Trigger Relearn
# Validates: user with 3 failed recalls sees remediation card after submitting
# another incorrect answer in recall test.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall phase — failure path)
# Epics: Epic 3 (FR52-FR58)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x)
#
# testID mapping:
#   - recall-test-screen    -> screen wrapper
#   - chat-input            -> text input (from ChatShell)
#   - send-button           -> send button (from ChatShell)
#   - remediation-card      -> shown after 3+ failures
#   - review-retest-button  -> "Review and Re-test" on remediation card
#   - relearn-topic-button  -> "Relearn Topic" on remediation card
#   - relearn-different-method -> choice: try different method (relearn screen)
#   - relearn-same-method   -> choice: continue same method (relearn screen)
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with failed-recall scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "failed-recall-3x"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      text: "Ready to learn"
    timeout: 15000

# 3. Look for recall/review prompt on home (coaching card)
- assertVisible:
    id: "coaching-card"

# 4. Tap coaching card to start recall
- tapOn:
    id: "coaching-card-primary"
    optional: true

# 5. If coaching card didn't navigate, try direct recall prompt
- tapOn:
    text: "Review"
    optional: true

# 6. Wait for recall test screen
- extendedWaitUntil:
    visible:
      id: "recall-test-screen"
    timeout: 10000

# 7. Enter an answer in recall test
- tapOn:
    id: "chat-input"
- inputText: "I think it has something to do with the main idea"

# 8. Submit answer
- tapOn:
    id: "send-button"

# 9. Wait for AI to evaluate and return feedback
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 10. Verify remediation/relearn card appears (after 3+ failures)
- extendedWaitUntil:
    visible:
      id: "remediation-card"
    timeout: 10000
    optional: true

# 11. Screenshot of remediation card
- takeScreenshot: failed-recall-remediation

# 12. Verify "Review and Re-test" button on remediation card
- assertVisible:
    id: "review-retest-button"
    optional: true

# 13. Verify "Relearn Topic" button on remediation card
- assertVisible:
    id: "relearn-topic-button"
    optional: true

# 14. Tap "Relearn Topic" to navigate to relearn method selection
- tapOn:
    id: "relearn-topic-button"
    optional: true

# 15. Verify relearn screen loads with choice phase
- extendedWaitUntil:
    visible:
      text: "Relearn Topic"
    timeout: 10000
    optional: true

# 16. Verify both method choice options are present
- assertVisible:
    id: "relearn-different-method"
    optional: true
- assertVisible:
    id: "relearn-same-method"
    optional: true

# 17. Screenshot of relearn screen reached from remediation card
- takeScreenshot: failed-recall-to-relearn
