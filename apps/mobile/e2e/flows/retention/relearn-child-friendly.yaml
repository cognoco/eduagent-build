# Flow N10b: Relearn Child-Friendly Copy — Learner Persona Labels
# Validates: when signed in as a learner persona (child), the relearn screen
# shows child-friendly method labels ("Show Me Pictures", "Walk Me Through It", etc.)
# instead of the default labels ("Visual Diagrams", "Step-by-Step", etc.).
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Recall failure path — remediation)
# Epics: Epic 10 (Story 10.6 — child-friendly relearn descriptions)
# Prerequisite: Seeded user with 3 failed recalls + needs-deepening topic
#               (scenario: failed-recall-3x). The learner persona is the default
#               persona for a child profile.
#
# testID mapping (topic/[topicId].tsx):
#   - topic-detail-scroll         -> scrollable content container
#   - study-cta                   -> sticky study CTA button
#
# testID mapping (topic/relearn.tsx):
#   - relearn-back                -> back button
#   - relearn-topics-phase        -> topic selection phase (ScrollView)
#   - relearn-method-phase        -> method selection phase (ScrollView)
#   - relearn-method-visual_diagrams    -> method picker option (child label: "Show Me Pictures")
#   - relearn-method-step_by_step      -> method picker option (child label: "Walk Me Through It")
#   - relearn-method-real_world_examples -> method picker option (child label: "Show Me How It Works")
#   - relearn-method-practice_problems  -> method picker option (child label: "Let Me Try It")
#
# NOTE: relearn-different-method, relearn-same-method, relearn-back-to-choice removed.
# The new design goes directly to topics phase → method phase (no choice screen).
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with failed-recall scenario (3+ failures)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "failed-recall-3x"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab
- tapOn: "Library Tab"

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 5. Wait for topics to load
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    # Spinner may already be gone by the time we check
    optional: true  # justified: library-loading spinner may already be dismissed by the time this step runs

# 6. Tap the first topic row (seeded with 3 failed recalls)
- tapOn:
    text: "Chemistry Topic 1"

# 7. Wait for topic detail screen
- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 10000

# 8. Verify the study CTA is present
- assertVisible:
    id: "study-cta"

# 9. Tap the study CTA (routes to relearn session for needs-deepening topic)
- tapOn:
    id: "study-cta"

# 10. Verify relearn screen loads
- extendedWaitUntil:
    visible:
      text: "Relearn Topic"
    timeout: 10000

# 11. Wait for topics phase or method phase to render.
#     When entering from topic detail with a specific topicId/subjectId,
#     relearn opens at method phase (directEntry=true).
- extendedWaitUntil:
    visible:
      id: "relearn-method-phase"
    timeout: 10000
    optional: true  # justified: relearn may start at method-phase (directEntry=true) or topics-phase; exactly one renders; Maestro has no OR construct

- extendedWaitUntil:
    visible:
      id: "relearn-topics-phase"
    timeout: 5000
    optional: true  # justified: alternative phase — topics-phase renders when directEntry=false; complementary to relearn-method-phase above

# 12. If in topics phase, tap first topic to advance to method phase
- tapOn:
    text: "Chemistry Topic 1"
    optional: true  # justified: topic tap only needed when relearn-topics-phase appeared above; no-op when already at method phase

# 13. Wait for method phase
- extendedWaitUntil:
    visible:
      id: "relearn-method-phase"
    timeout: 10000

# 14. Screenshot of method picker (child-friendly phase)
- takeScreenshot: relearn-child-friendly-choice

# 15. Verify child-friendly method labels are visible (learner persona).
#     Learner persona uses TEACHING_METHODS_LEARNER copy.
- assertVisible:
    id: "relearn-method-visual_diagrams"
- assertVisible:
    text: "Show Me Pictures"
- assertVisible:
    text: "Walk Me Through It"
- assertVisible:
    text: "Show Me How It Works"
- assertVisible:
    text: "Let Me Try It"

# 16. Screenshot of child-friendly method picker
- takeScreenshot: relearn-child-friendly-methods
