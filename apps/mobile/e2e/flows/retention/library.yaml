# Flow N11: Library — Navigation and Retention Indicators
# Validates: user can view the Library with subject filter tabs,
# topic rows with retention indicators, and navigate via the retention
# strip on the home screen.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention overview)
# Epics: Epic 3 (FR43, FR48)
# Prerequisite: Seeded user with completed sessions + due retention cards
#               (scenario: retention-due)
#
# testID mapping (home.tsx / LearnerScreen.tsx):
#   - learner-screen              -> home screen container
#   - learner-intent-stack        -> intent card stack (replaces coaching cards)
#
# testID mapping (library.tsx + components):
#   - library-tab-shelves         -> Shelves tab button (default)
#   - library-tab-books           -> Books tab button
#   - library-loading             -> loading spinner
#   - shelves-list                -> subject shelf list (Shelves tab)
#   - topic-row-{topicId}         -> individual topic row (from TopicsTab component)
#
# NOTE: subject-filter-tabs, filter-all, library-empty removed in Library restructure.
# Library is now a 2-tab layout (Shelves / Books). There is no top-level Topics tab.
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Verify intent card stack is visible on home screen (replaces coaching cards and retention strip)
- assertVisible:
    id: "home-subject-carousel"
    optional: true

# 4. Screenshot of home screen
- takeScreenshot: home-intent-stack

# 5. Navigate to Library via tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library screen header
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 7. Wait for subjects/loading to finish
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true

# 8. Verify Shelves tab is visible (default active tab in the 2-tab Library)
- assertVisible:
    id: "library-tab-shelves"
    optional: true

# 9. Verify Books tab is also present
- assertVisible:
    id: "library-tab-books"
    optional: true

# 10. Wait for shelves list to render (subject cards)
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000
    optional: true

# 11. Screenshot of Library with shelves
- takeScreenshot: library-shelves

# 12. Tap Books tab to verify it renders
- tapOn:
    id: "library-tab-books"
    optional: true

# 13. Screenshot after switching tabs
- takeScreenshot: library-books-tab

# 14. Return to home screen (use accessibility label to avoid matching heading)
- tapOn: "Home Tab"

# 15. Verify home screen is visible again
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 16. Final screenshot
- takeScreenshot: library-from-home-return
