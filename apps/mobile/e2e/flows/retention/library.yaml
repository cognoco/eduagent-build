# Flow N11: Library — Navigation and Retention Indicators
# Validates: user can view the Library with subject shelves and navigate
# back to home screen.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention overview)
# Epics: Epic 3 (FR43, FR48)
# Prerequisite: Seeded user with completed sessions + due retention cards
#               (scenario: retention-due)
#
# testID mapping (home.tsx / LearnerScreen.tsx):
#   - learner-screen              -> home screen container
#   - home-subject-carousel       -> subject carousel (replaces coaching cards)
#
# testID mapping (library.tsx + components):
#   - library-loading             -> loading spinner
#   - shelves-list                -> subject shelf list
#
# NOTE: library-tab-shelves and library-tab-books removed in Library restructure.
# Library is a single view showing shelves-list directly. No tab strip.
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Verify subject carousel is visible on home screen
- assertVisible:
    id: "home-subject-carousel"
    optional: true  # justified: home-subject-carousel only renders when subjects are loaded; React Query revalidation may delay mount on fresh sign-in

# 4. Screenshot of home screen
- takeScreenshot: home-intent-stack

# 5. Navigate to Library via tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library screen header
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 7. Wait for subjects/loading to finish
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true  # justified: library-loading spinner is transient and may already be dismissed by the time this step runs

# 8. Wait for shelves list to render (subject cards)
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 9. Screenshot of Library with shelves
- takeScreenshot: library-shelves

# 10. Return to home screen (use accessibility label to avoid matching heading)
- tapOn: "Home Tab"

# 11. Verify home screen is visible again
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 12. Final screenshot
- takeScreenshot: library-from-home-return
