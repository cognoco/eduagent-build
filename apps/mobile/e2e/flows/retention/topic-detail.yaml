# Flow N9: Topic Detail — Retention Metrics and Study CTA
# Validates: user can navigate to topic detail screen from Library,
# view retention metrics, and see the StudyCTA whose label is derived from
# completionStatus + retentionStatus (deriveStudyCTA in topic/[topicId].tsx).
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention management)
# Epics: Epic 3 (FR43, FR48); StudyCTA derivation (PR #144)
# Prerequisite: Seeded user with due retention cards (scenario: retention-due)
#
# Seed note: retention-due creates topics with retention cards but no sessions
# or assessments, so computeCompletionStatus returns "not_started".
# deriveStudyCTA('not_started', _) -> { label: "Start studying", variant: 'primary' }.
#
# testID mapping (topic/[topicId].tsx):
#   - topic-detail-scroll       -> scroll container
#   - topic-detail-loading      -> loading state
#   - topic-detail-empty        -> empty/not-found state
#   - study-cta                 -> sticky study CTA button (single, label varies by state)
#
# testID mapping (library/index.tsx):
#   - subject-filter-tabs     -> subject filter strip
#   - library-loading         -> loading spinner
#   - library-empty           -> empty state
#   - topic-row-{topicId}     -> individual topic row
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab
# BUG-10/BUG-30: Dev-client shows extra tabs, breaking point-tap positions.
# Use accessibility label (tabBarAccessibilityLabel) for reliable matching.
- tapOn: "Library Tab"

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 5. Wait for topic list to finish loading (loading spinner disappears)
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true  # justified: library-loading spinner may already be dismissed before this step runs

# 6. Verify shelves are loaded (not empty state).
#    library-empty is removed from Library; check shelves-list is visible.
- assertVisible:
    id: "shelves-list"

# 7. Tap the first visible topic row. Topic rows in book.tsx show:
#    - topic.name (e.g., "Biology Topic 1")
#    - subjectName + "{N} sessions" (separate <Text> nodes)
#    The retention-due seed creates 3 topics under "Biology" subject.
#    Tap the first topic by name — "Biology Topic 1" is always present.
#    NOTE: tapOn text: "sessions" fails — Maestro can't find text inside
#    nested <Text> children of a <Pressable> with testID.
- tapOn:
    text: "Biology Topic 1"

# 8. Wait for topic detail screen to load (navigation from book to topic/[topicId])
- extendedWaitUntil:
    visible:
      id: "topic-retention-card"
    timeout: 15000

# 9. Verify retention card shows memory strength label
- assertVisible:
    text: "Memory strength"

# 10. Verify retention card shows interval info
- assertVisible:
    text: "Interval"
    optional: true  # justified: Interval field only renders when retention card has interval data; retention-due seed may not populate this field

# 11. Verify retention card shows review count
- assertVisible:
    text: "Reviews"
    optional: true  # justified: Reviews field only renders when session history exists; retention-due seed may not include reviews

# 12. Verify progress section shows mastery or status
- assertVisible:
    text: "Progress"

# 13. Verify the study CTA renders the not_started label.
# retention-due seed has no sessions/assessments -> completionStatus = not_started,
# so deriveStudyCTA returns label "Start studying". Asserting the exact label
# pins the derivation: a regression that returns "Review this topic" or any
# other label for not_started would fail this step.
- assertVisible:
    id: "study-cta"
- assertVisible:
    text: "Start studying"

# 14. Negative assertion: the in_progress / completed labels must NOT appear
# for a not_started topic. If deriveStudyCTA accidentally falls through to
# the default branch ("Review this topic"), this catches it.
- assertNotVisible:
    text: "Review this topic"
- assertNotVisible:
    text: "Practice again"

# 15. Screenshot of topic detail with study CTA
- takeScreenshot: topic-detail-study-cta-not-started

# 16. Screenshot of full topic detail with retention metrics
- takeScreenshot: topic-detail-retention

# 17. Tap back to return to Library
- tapOn:
    id: "topic-detail-back"

# 18. Verify we're back on Library
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 5000
