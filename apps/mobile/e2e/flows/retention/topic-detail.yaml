# Flow N9: Topic Detail — Retention Metrics and Adaptive Actions
# Validates: user can navigate to topic detail screen from Library,
# view retention metrics (mastery, memory strength, interval), and see
# adaptive action buttons based on completionStatus (Story 4.14).
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention management)
# Epics: Epic 3 (FR43, FR48), Story 4.14 (adaptive buttons)
# Prerequisite: Seeded user with due retention cards (scenario: retention-due)
#
# Seed note: retention-due creates topics with retention cards but no sessions
# or assessments, so computeCompletionStatus returns "not_started".
# This means the adaptive buttons show: primary "Start Learning" only.
#
# testID mapping (topic/[topicId].tsx — Story 4.14 adaptive buttons):
#   - topic-detail-back         -> back button
#   - topic-detail-loading      -> loading state
#   - topic-detail-empty        -> empty/not-found state
#   - retention-card            -> retention metrics card
#   - start-learning-button     -> primary action for not_started topics
#   - continue-learning-button  -> primary for in_progress, secondary for completed/verified/stable
#   - start-review-button       -> secondary for in_progress, primary for completed/verified/stable
#   - request-retest-button     -> recall check / review-and-retest (always visible)
#   - relearn-button            -> relearn (only after 3+ failures or needs_deepening)
#
# testID mapping (library/index.tsx):
#   - subject-filter-tabs     -> subject filter strip
#   - library-loading         -> loading spinner
#   - library-empty           -> empty state
#   - topic-row-{topicId}     -> individual topic row
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

# 3. Navigate to Library tab
# BUG-10/BUG-30: Dev-client shows extra tabs, breaking point-tap positions.
# Use accessibility label (tabBarAccessibilityLabel) for reliable matching.
- tapOn: "Library Tab"

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 5. Wait for topic list to finish loading (loading spinner disappears)
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true

# 6. Verify topic rows are present (not empty state)
- assertNotVisible:
    id: "library-empty"
    optional: true

# 7. Tap the first visible topic row. Topic rows in book.tsx show:
#    - topic.name (e.g., "Biology Topic 1")
#    - subjectName + "{N} sessions" (separate <Text> nodes)
#    The retention-due seed creates 3 topics under "Biology" subject.
#    Tap the first topic by name — "Biology Topic 1" is always present.
#    NOTE: tapOn text: "sessions" fails — Maestro can't find text inside
#    nested <Text> children of a <Pressable> with testID.
- tapOn:
    text: "Biology Topic 1"

# 8. Wait for topic detail screen to load (navigation from book to topic/[topicId])
- extendedWaitUntil:
    visible:
      id: "retention-card"
    timeout: 15000

# 9. Verify retention card shows memory strength label
- assertVisible:
    text: "Memory strength"

# 10. Verify retention card shows interval info
- assertVisible:
    text: "Interval"
    optional: true

# 11. Verify retention card shows review count
- assertVisible:
    text: "Reviews"
    optional: true

# 12. Verify progress section shows mastery or status
- assertVisible:
    text: "Progress"

# 13. Story 4.14: Verify adaptive action buttons for not_started topic
# retention-due seed has no sessions/assessments → completionStatus = not_started
# not_started shows only "Start Learning" as primary button
- assertVisible:
    id: "start-learning-button"

# 14. Verify in_progress/completed buttons are NOT shown for not_started topic
- assertNotVisible:
    id: "continue-learning-button"
- assertNotVisible:
    id: "start-review-button"

# 15. Verify request-retest-button is present (always visible bottom row)
- assertVisible:
    id: "request-retest-button"

# 16. Screenshot of topic detail with adaptive buttons
- takeScreenshot: topic-detail-adaptive-buttons

# 17. Screenshot of full topic detail with retention metrics
- takeScreenshot: topic-detail-retention

# 18. Tap back to return to Library
- tapOn:
    id: "topic-detail-back"

# 19. Verify we're back on Library
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 5000
