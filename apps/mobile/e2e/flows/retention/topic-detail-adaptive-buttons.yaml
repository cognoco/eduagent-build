# Flow N9b: Topic Detail — Study CTA label for In-Progress Topic
# Validates: deriveStudyCTA returns the in_progress label (not the not_started
# or completed-strong labels) when the topic has sessions but no passed
# assessment. Complements N9 which pins the not_started label.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention management)
# Epics: StudyCTA derivation (PR #144)
# Prerequisite: Seeded user with active session (scenario: learning-active)
#
# Seed note: learning-active creates a topic with 1 session (3 exchanges),
# so computeCompletionStatus returns "in_progress" (sessionCount > 0, no
# passed assessment). deriveStudyCTA falls through both conditional branches
# and returns { label: "Review this topic", variant: 'primary' }.
#
# testID mapping (topic/[topicId].tsx):
#   - retention-card    -> retention metrics card (optional for this seed)
#   - study-cta         -> sticky study CTA button (single, label varies by state)
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with learning-active scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab
# BUG-10/BUG-30: Dev-client shows extra tabs, breaking point-tap positions.
# Use accessibility label (tabBarAccessibilityLabel) for reliable matching.
- tapOn: "Library Tab"

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 5. Wait for topic list to finish loading
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true

# 6. Tap the first topic. learning-active seeds "World History" with 3 topics.
#    Topic 1 has the session, so it will be in_progress.
- tapOn:
    text: "World History Topic 1"

# 7. Wait for topic detail screen to load
- extendedWaitUntil:
    visible:
      id: "retention-card"
    timeout: 15000
    # learning-active may not seed retention cards; wait for Progress section instead
    optional: true

- extendedWaitUntil:
    visible:
      text: "Progress"
    timeout: 10000

# 8. Verify the study CTA renders the in_progress label.
# learning-active seed -> sessions > 0, no passed assessment -> in_progress,
# so deriveStudyCTA returns "Review this topic". Asserting the exact label
# pins the derivation: a regression that returns "Start studying" (which
# would re-treat in_progress as not_started) would fail this step.
- assertVisible:
    id: "study-cta"
- assertVisible:
    text: "Review this topic"

# 9. Negative assertion: the not_started label and the strong-retention
# completed label must NOT appear. Catches regressions that fall back to
# "Start studying" or that misclassify in_progress as completed+strong.
- assertNotVisible:
    text: "Start studying"
- assertNotVisible:
    text: "Practice again"

# 10. Screenshot of in_progress study CTA
- takeScreenshot: topic-detail-study-cta-in-progress
