# Flow N9b: Topic Detail — Adaptive Buttons for In-Progress Topic (Story 4.14)
# Validates: smart primary + expandable secondary actions show correct layout
# for in_progress topics.
# When completionStatus = in_progress:
#   - Primary: "Continue learning" (primary-action-button)
#   - Secondary section: "More ways to practice" -> "Recall Check"
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention management)
# Epics: Story 4.14 (adaptive buttons)
# Prerequisite: Seeded user with active session (scenario: learning-active)
#
# Seed note: learning-active creates a topic with 1 session (3 exchanges),
# so computeCompletionStatus returns "in_progress" (sessionCount > 0, no
# passed assessment). This triggers the in_progress button layout.
#
# testID mapping (topic/[topicId].tsx — smart primary + expandable secondary):
#   - primary-action-button     -> primary button for in_progress
#   - more-ways-toggle          -> expands secondary actions
#   - secondary-recall-check    -> recall check action
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with learning-active scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab
# BUG-10/BUG-30: Dev-client shows extra tabs, breaking point-tap positions.
# Use accessibility label (tabBarAccessibilityLabel) for reliable matching.
- tapOn: "Library Tab"

# 4. Wait for Library to load
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 5. Wait for topic list to finish loading
- extendedWaitUntil:
    notVisible:
      id: "library-loading"
    timeout: 10000
    optional: true

# 6. Tap the first topic. learning-active seeds "World History" with 3 topics.
#    Topic 1 has the session, so it will be in_progress.
- tapOn:
    text: "World History Topic 1"

# 7. Wait for topic detail screen to load
- extendedWaitUntil:
    visible:
      id: "retention-card"
    timeout: 15000
    # learning-active may not seed retention cards; wait for Progress section instead
    optional: true

- extendedWaitUntil:
    visible:
      text: "Progress"
    timeout: 10000

# 8. Verify in_progress smart primary action
- assertVisible:
    id: "primary-action-button"
- assertVisible:
    text: "Continue learning"

# 9. Verify the secondary section is available and exposes Recall Check
- assertVisible:
    id: "more-ways-toggle"
- tapOn:
    id: "more-ways-toggle"
- assertVisible:
    id: "secondary-recall-check"
- assertVisible:
    text: "Recall Check"

# 10. Verify not_started primary label is not shown
- assertNotVisible:
    text: "Start learning"

# 11. Screenshot of in_progress adaptive buttons
- takeScreenshot: topic-detail-in-progress-adaptive-buttons
