# Flow S4: Retention — Practice Session via Topic Detail
# Validates: user can navigate to a topic detail screen from Library,
# tap the study CTA, and interact with the practice session (ChatShell).
# Tags: smoke, retention
#
# Journey: UX Journey 2 (recall phase)
# Epics: Epic 3 (FR43, FR48, FR49)
# Prerequisite: Seeded user with completed sessions + due retention cards
#               (scenario: retention-due)
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/_layout.tsx (tab-library)
#   - apps/mobile/src/components/library/ShelfRow.tsx (shelves-list, shelf-row-header-*)
#   - apps/mobile/src/app/(app)/topic/[topicId].tsx (study-cta, topic-detail-scroll)
#   - apps/mobile/src/components/session/ChatShell.tsx (chat-input)
#
# NOTE: secondary-recall-check removed from topic detail (KNOWN_DRIFT resolved here).
# Practice mode is now launched via study-cta which routes to session/practice mode.
appId: com.mentomate.app
tags:
  - smoke
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to Library tab
- tapOn:
    id: "tab-library"

# 4. Wait for Library (Shelves tab is the default)
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 5. Screenshot: Library shelves
- takeScreenshot: recall-01-library-shelves

# 6. Tap the first subject shelf row header.
#    SUBJECT_ID is injected by the seed helper for the retention-due scenario.
#    ShelfRow uses testID="shelf-row-header-${subjectId}".
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# 7. Wait for the shelf screen (shows books for the subject)
- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

# 8. Screenshot: shelf with books
- takeScreenshot: recall-02-shelf

# 9. Tap first book by text (seed names the book "World History")
- tapOn:
    text: "World History"
    optional: true

# 10. Wait for book detail screen
- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 10000
    optional: true

# 11. Navigate to a topic — tap first topic in the list
- tapOn:
    text: "Topic"
    optional: true

# 12. Wait for topic detail screen
- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 10000

# 13. Screenshot: topic detail
- takeScreenshot: recall-03-topic-detail

# 14. Tap the study CTA button (routes to practice session for overdue topic)
- tapOn:
    id: "study-cta"

# 15. Wait for session/practice screen (ChatShell-based)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 16. Screenshot: practice session screen
- takeScreenshot: recall-04-practice-session

# 17. Enter an answer via ChatShell input
- tapOn:
    id: "chat-input"

- inputText: "I remember the key concept is about how this works in practice"

# 18. Submit answer — use send-button or Enter key
- tapOn:
    id: "send-button"
    optional: true
- pressKey: Enter

# 19. Wait for response (chat-input re-enables after LLM streams back)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 20. Screenshot: answered and feedback received
- takeScreenshot: recall-05-complete
