# Flow S4: Retention — Recall Prompt to Score
# Validates: seeded user with due retention cards sees recall prompt,
# enters answer, receives score feedback.
# Tags: smoke, retention
#
# Journey: UX Journey 2 (recall phase)
# Epics: Epic 3 (FR43, FR48, FR49)
# Prerequisite: Seeded user with completed sessions + due retention cards
#               (scenario: retention-due)
#
# NOTE: This flow depends on testIDs being added to recall-related screens.
# Missing testIDs (from tech spec Section 3.2):
#   - recall-question, recall-answer-input, recall-submit
# Until those are added, some assertions use text matching as fallback.
appId: com.mentomate.app
tags:
  - smoke
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Intent card stack should be visible (replaced coaching card in adaptive home refactor).
# The intent-continue card handles recall/review when topics are due.
- assertVisible:
    id: "learner-intent-stack"

# 4. Tap intent-continue to start the review session
- tapOn:
    id: "intent-continue"

# 5. Recall screen loads — look for either recall-specific testIDs
# or text indicating a recall prompt
- extendedWaitUntil:
    visible:
      id: "recall-question"
    timeout: 10000
    optional: true

# 5b. Fallback: look for text-based recall prompt
- extendedWaitUntil:
    visible:
      text: "remember"
    timeout: 5000
    optional: true

# 6. Enter recall answer
- tapOn:
    id: "recall-answer-input"
    optional: true
# Fallback: tap on chat-input if recall uses the ChatShell
- tapOn:
    id: "chat-input"
    optional: true
- inputText: "I remember the key concept is about how this works in practice"

# 7. Submit answer
# Two UI paths exist: recall-submit (dedicated button) or ChatShell Enter key.
# recall-submit is optional (may not exist if using ChatShell for recall).
# KNOWN LIMITATION: If recall-submit succeeds, pressKey: Enter also fires
# (Maestro has no conditional execution). This may send an empty follow-up
# message. The LLM handles empty/duplicate messages gracefully in practice.
# BUG-35: pressKey: Enter is the ChatShell path (keyboard covers send-button).
- tapOn:
    id: "recall-submit"
    optional: true
- pressKey: Enter

# 8. Wait for score/feedback
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 9. Screenshot
- takeScreenshot: retention-recall-complete
