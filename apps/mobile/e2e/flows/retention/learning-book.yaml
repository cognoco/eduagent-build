# Flow N11: Learning Book — Navigation and Retention Indicators
# Validates: user can view the Learning Book with subject filter tabs,
# topic rows with retention indicators, and navigate via the retention
# strip on the home screen.
# Tags: nightly, retention
#
# Journey: UX Journey 2 (Retention overview)
# Epics: Epic 3 (FR43, FR48)
# Prerequisite: Seeded user with completed sessions + due retention cards
#               (scenario: retention-due)
#
# testID mapping (home.tsx):
#   - retention-strip             -> horizontal retention strip on home
#   - retention-chip-{subjectId}  -> per-subject retention chip
#
# testID mapping (book/index.tsx):
#   - subject-filter-tabs         -> subject filter tab strip
#   - filter-all                  -> "All" filter tab
#   - filter-{subjectId}          -> per-subject filter tab
#   - learning-book-loading       -> loading spinner
#   - learning-book-empty         -> empty state
#   - topic-row-{topicId}         -> individual topic row with retention signal
appId: com.mentomate.app
tags:
  - nightly
  - retention
---
# 1. Seed & sign in with retention-due scenario
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

# 3. Verify retention strip is visible on home screen
- assertVisible:
    id: "retention-strip"

# 4. Screenshot of home screen with retention strip
- takeScreenshot: home-retention-strip

# 5. Navigate to Learning Book via tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Learning Book Tab"

# 6. Wait for Learning Book screen header
- extendedWaitUntil:
    visible:
      text: "Learning Book"
    timeout: 10000

# 7. Wait for topic data to finish loading
- extendedWaitUntil:
    notVisible:
      id: "learning-book-loading"
    timeout: 10000
    optional: true

# 8. Verify subject filter tabs are visible (only shows with >1 subject)
- assertVisible:
    id: "subject-filter-tabs"
    optional: true

# 9. Verify "All" filter tab is present
- assertVisible:
    id: "filter-all"
    optional: true

# 10. Verify topic summary text (e.g., "X topics across Y subjects")
- assertVisible:
    text: "topics across"
    optional: true

# 11. Verify topic rows are present (not empty)
- assertNotVisible:
    id: "learning-book-empty"
    optional: true

# 12. Screenshot of Learning Book with topic rows
- takeScreenshot: learning-book-topics

# 13. Tap a subject filter tab to test filtering (optional — requires >1 subject)
- tapOn:
    id: "subject-filter-tabs"
    optional: true

# 14. Screenshot after filtering
- takeScreenshot: learning-book-filtered

# 15. Return to home screen (use accessibility label to avoid matching heading)
- tapOn:
    text: "Home Tab"
    optional: true

# 16. Navigate to Learning Book via retention strip chip
- tapOn:
    id: "retention-strip"
    optional: true

# 17. Verify Learning Book loads again (from retention chip navigation)
- extendedWaitUntil:
    visible:
      text: "Learning Book"
    timeout: 10000
    optional: true

# 18. Final screenshot
- takeScreenshot: learning-book-from-retention-strip
