# Flow PRACTICE-03: Recitation session
# Validates: practice hub → recitation session starts (mode=recitation),
#            chat input accepts a message, session does not crash on exit.
# Tags: nightly, practice
#
# Journey: UX Journey 3 (Practice & Reinforcement)
# Prerequisite: Seeded learner with an active subject (scenario: learning-active)
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (home-action-practice)
#   - apps/mobile/src/app/(app)/practice/index.tsx (practice-screen, practice-recitation)
#   - apps/mobile/src/components/session/ChatShell.tsx (chat-input, chat-shell-back)
appId: com.mentomate.app
tags:
  - nightly
  - practice
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'learning-active'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# Navigate to Practice hub
- scrollUntilVisible:
    element:
      id: 'home-action-practice'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'home-action-practice'

- extendedWaitUntil:
    visible:
      id: 'practice-screen'
    timeout: 10000

- takeScreenshot: recitation-01-practice-hub

# Tap Recitation card
# practice-recitation is the SECOND card inside the "Other practice" horizontal
# ScrollView (practice-other-practice-slider, practice/index.tsx:799).
# Step 1: best-effort outer positioning. Maestro can report the heading as
# invisible after scrolling it into view, so the mandatory horizontal card
# lookup in step 2 remains the actual reachability gate.
# Step 2: scroll RIGHT inside the horizontal slider to reach practice-recitation.
- scrollUntilVisible:
    element:
      id: 'practice-other-practice-heading'
    direction: DOWN
    timeout: 5000
    visibilityPercentage: 50
    centerElement: false
    optional: true # justified: best-effort outer positioning; the mandatory horizontal card lookup below fails closed

- scrollUntilVisible:
    element:
      id: 'practice-recitation'
    direction: RIGHT
    timeout: 5000
    visibilityPercentage: 100
    centerElement: true

- tapOn:
    id: 'practice-recitation'

# Wait for session screen (ChatShell renders chat-input always)
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 20000

- takeScreenshot: recitation-02-session-screen

# A title alone must advance directly to readiness.
- tapOn:
    id: 'chat-input'
- inputText: 'Ozymandias'
- hideKeyboard
- tapOn:
    id: 'send-button'

- extendedWaitUntil:
    visible:
      id: 'message-bubble-assistant-2'
      text: '(?i).*(ready|begin|start|go ahead|recite).*'
    timeout: 60000

- assertNotVisible:
    id: 'message-bubble-assistant-2'
    text: '(?i).*(what|which).*(recite|recitation|poem)|.*(title|author|model answer|polished version|start with:|traveller from an antique land|vast and trunkless legs|look on my works|lone and level sands).*'

- takeScreenshot: recitation-03-message-sent

# Synthetic, non-copyrighted body exercises the feedback turn.
- tapOn:
    id: 'chat-input'
- inputText: 'A remembered opening line for this test.'
- hideKeyboard
- tapOn:
    id: 'send-button'

- extendedWaitUntil:
    visible:
      id: 'message-bubble-assistant-4'
    timeout: 60000

- extendedWaitUntil:
    visible:
      id: 'message-feedback-helpful-.*'
    timeout: 30000

# Exit session
- tapOn:
    id: 'end-session-button'

- tapOn:
    text: '(?i)^end session$'

- extendedWaitUntil:
    visible:
      id: 'summary-close-button'
    timeout: 20000

- tapOn:
    id: 'summary-close-button'

- extendedWaitUntil:
    visible:
      id: 'practice-screen'
    timeout: 10000

- takeScreenshot: recitation-04-exited
