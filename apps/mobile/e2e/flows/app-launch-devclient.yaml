# App Launch smoke test — for dev-client APK on emulator
# Assumes seed-and-run.sh has already gotten the app to the sign-in screen
# (per the migration noted in _setup/launch-devclient.yaml's deprecation header).
# DO NOT call this directly via `maestro test`; always invoke via:
#   bash apps/mobile/e2e/scripts/seed-and-run.sh --no-seed apps/mobile/e2e/flows/app-launch-devclient.yaml
appId: com.mentomate.app
tags:
  - smoke
  - devclient
---
# Wait for sign-in screen (seed-and-run.sh already gets us here).
# Use testID, not heading text — heading varies by first-time vs returning user.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000

# Verify key sign-in elements are present
- assertVisible: "Sign in to start learning"
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"
- assertVisible:
    id: "sign-in-button"

# NOTE: "Sign up" assertion removed — UI drift confirmed 2026-04-30.
# See docs/_archive/E2Edocs/e2e-2026-04-30-empirical-state.md for context.
# Restore this assertion when sign-up entry point is reintroduced.

- takeScreenshot: app-launch-devclient
