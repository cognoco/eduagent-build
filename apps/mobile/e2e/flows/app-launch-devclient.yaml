# App Launch smoke test — for dev-client APK on emulator.
#
# seed-and-run.sh runs `pm clear` before every launch, which wipes the
# device-scoped preAuthIntroSeen.v1 flag. Since the 2026-05-27 pre-auth welcome
# refactor (docs/plans/2026-05-27-pre-auth-welcome-flow.md), a freshly cleared
# app therefore lands on the welcome-chooser — NOT directly on the sign-in
# screen. This flow walks that pre-auth path first (shared, verified sub-flow:
# chooser → 3-card deck → bridge → sign-in), then asserts the sign-in screen.
#
# DO NOT call this directly via `maestro test`; always invoke via:
#   bash apps/mobile/e2e/scripts/seed-and-run.sh --no-seed apps/mobile/e2e/flows/app-launch-devclient.yaml
appId: com.mentomate.app
tags:
  - smoke
  - devclient
---
# Navigate the pre-auth welcome flow to the sign-in screen.
- runFlow: _setup/nav-welcome-to-sign-in.yaml

# Wait for sign-in screen.
# Use testID, not heading text — heading varies by first-time vs returning user.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000

# Verify key sign-in elements are present
- assertVisible: "Sign in to start learning"
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"
- assertVisible:
    id: "sign-in-button"

# NOTE: "Sign up" assertion removed — UI drift confirmed 2026-04-30.
# See docs/_archive/E2Edocs/e2e-2026-04-30-empirical-state.md for context.
# Restore this assertion when sign-up entry point is reintroduced.

- takeScreenshot: app-launch-devclient
