# Reusable setup: sign out from the V2 shell while a full-screen link route is
# active. V2 has no More tab, and link routes hide the tab bar/account avatar.
# Route to the owning Mentor tab first, then use the V2 Account affordance.
#
# Postcondition: the returning-user sign-in gate is visible. Every selector is
# hard because this helper controls cross-login identity changes.
appId: com.mentomate.app
---
- openLink: 'mentomate:///mentor'
- extendedWaitUntil:
    visible:
      id: 'account-avatar-button'
    timeout: 15000
- tapOn:
    id: 'account-avatar-button'
- extendedWaitUntil:
    visible:
      id: 'account-screen'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: 'account-admin-sign-out'
    direction: DOWN
    timeout: 15000
# Keep an explicit hard assertion for the helper's sign-out target contract;
# the preceding scroll is synchronization, not the recorded property.
- assertVisible:
    id: 'account-admin-sign-out'
- tapOn:
    id: 'account-admin-sign-out'
- extendedWaitUntil:
    visible:
      id: 'sign-in-button'
    timeout: 15000
