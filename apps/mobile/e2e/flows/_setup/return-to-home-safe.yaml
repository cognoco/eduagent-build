# BUG-48 fix: Return to home, but only if dashboard-scroll is also not visible.
#
# Called conditionally from seed-and-sign-in.yaml when learner-screen
# is NOT visible. This file adds a second guard: if dashboard-scroll IS
# visible, we're on the parent dashboard — don't press Back.
#
# Without this guard, parent scenarios (parent-with-children, parent-solo)
# would incorrectly press Back after the parent redirect replaces
# learner-screen with dashboard-scroll.
appId: com.mentomate.app
---
# If dashboard-scroll is visible, we're on parent dashboard — do nothing.
# Only press Back when we're truly stuck on a session/other screen.
- runFlow:
    when:
      notVisible:
        id: "dashboard-scroll"
    file: return-to-home.yaml
