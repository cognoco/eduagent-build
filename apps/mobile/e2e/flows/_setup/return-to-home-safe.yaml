# BUG-48 fix: Return to home, but only if dashboard-scroll is also not visible.
# BUG-566 fix: Also guard against parent-home-screen (parent-with-children scenario).
#
# Called conditionally from seed-and-sign-in.yaml when learner-screen
# is NOT visible. This file adds guards: if dashboard-scroll or parent-home-screen
# IS visible, we're on a valid home screen — don't press Back.
#
# Without these guards, parent scenarios (parent-with-children, parent-solo)
# would incorrectly press Back after the parent redirect replaces
# learner-screen with dashboard-scroll or parent-home-screen.
appId: com.mentomate.app
---
# If mentor-screen is visible, we're on the V2 Mentor landing — do nothing.
# [WI-2241] Same guard for a supporter persona's Support hub Mentor tab
# (testID support-hub-mentor-tab) — mentor.tsx renders that instead of
# mentor-screen when activeScope.kind is 'supporter-hub'/'person'. Without
# this nested guard a supporter scenario's valid Support hub landing looks
# "stuck" to the legacy fallback chain below and gets navigated away from.
# Otherwise continue through the legacy home/dashboard guards and only press
# Back when we're truly stuck on a session/other screen.
- runFlow:
    when:
      notVisible:
        id: 'mentor-screen'
    commands:
      - runFlow:
          when:
            notVisible:
              id: 'support-hub-mentor-tab'
          commands:
            - runFlow:
                when:
                  notVisible:
                    id: 'dashboard-scroll'
                file: return-to-home-check-parent-home.yaml
