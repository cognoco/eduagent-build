# Reusable setup: Wait for sign-in screen and sign in.
#
# IMPORTANT: seed-and-run.sh handles EVERYTHING before this flow:
#   1. Seeds test data via API
#   2. Clears app state via ADB (pm clear)
#   3. Pre-grants notification permission (BUG-22)
#   4. Launches app via ADB (am start)
#   5. Waits for dev-client launcher, taps Metro server entry (via ADB)
#   6. Waits for bundle to load, taps "Continue" overlay (via ADB)
#   7. Dismisses system dialogs — Bluetooth (BUG-21), dev tools (BUG-14)
#
# By the time Maestro starts this flow, the app should be on the sign-in
# screen (or very close to it). This avoids Maestro's gRPC driver crashing
# during the resource-intensive bundle loading phase on WHPX emulators.
#
# Called by other flows via:
#   - runFlow:
#       file: ../_setup/seed-and-sign-in.yaml
#
# Required Maestro env vars (set by seed-and-run.sh):
#   ${EMAIL}      — Seeded user email
#   ${PASSWORD}   — Seeded user password
#   ${ACCOUNT_ID} — DB account ID
#   ${PROFILE_ID} — DB profile ID
#   (plus scenario-specific IDs like ${SUBJECT_ID}, ${TOPIC_ID}, etc.)
#
# After this flow completes, the app is authenticated and on the home screen.
#
# AUTH VERIFICATION NOTE: All post-auth waits below are optional because
# three mutually exclusive landing screens are possible (learner home,
# parent dashboard, PostApprovalLanding). Maestro YAML has no OR/assertAny
# construct. Auth success is verified by EACH CALLING FLOW, which must
# include a mandatory wait for its expected landing screen (e.g.,
# home-scroll-view or dashboard-scroll). If auth fails silently here,
# the calling flow's mandatory assertion will catch it with a clear error.
appId: com.mentomate.app
---
# ── Step 1: Wait for sign-in screen ──
# seed-and-run.sh should have already navigated past the dev-client launcher
# and "Continue" overlay via ADB. Allow extra time in case bundle loading is
# still finishing or the app needs to settle.
# NOTE: Use sign-in-button testID (not heading text) — the heading changes
# between "Welcome back" (returning) and "Welcome to MentoMate" (first-time)
# depending on SecureStore state. pm clear wipes SecureStore, so after seed
# the user is always first-time. testID is stable across both states.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

# Visual audit: sign-in screen baseline (layout, SSO buttons, form fields)
- takeScreenshot: signin-01-screen-loaded

# ── Step 2: Sign in with seeded credentials ──
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# Visual audit: email field with keyboard open (BUG-24 regression guard)
- takeScreenshot: signin-02-email-keyboard-open

# BUG-3 + BUG-20 + BUG-24: Dismiss keyboard so password field is visible.
# On E2E_Device_2, keyboard covers entire form including heading text.
# pressKey: back safely dismisses keyboard (guaranteed open after inputText).
# Note: BUG-5 warns about back-key exiting app when keyboard is NOT open,
# but here the keyboard IS open (immediately after inputText), so this is safe.
- pressKey: back

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# Visual audit: password field with keyboard open (BUG-24 regression guard)
- takeScreenshot: signin-03-password-keyboard-open

# Dismiss keyboard before tapping sign-in button (same pattern as above)
- pressKey: back

# Wait for keyboard to fully dismiss and sign-in button to be visible
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# ── Step 3: Wait for post-auth screen ──
# After sign-in, the app may land on one of three screens depending on persona/state:
#   a) Learner home (id: home-scroll-view) — most common
#   b) Parent dashboard (id: dashboard-scroll) — parent persona scenarios (BUG-33)
#   c) PostApprovalLanding ("You're approved!") — onboarding-complete scenario (BUG-38)
# We check for home-scroll-view first (30s timeout covers most cases).
# If it's not found, the flow continues — individual flows handle their landing screen.
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 30000
    optional: true

# BUG-33: Parent scenarios route to (parent)/dashboard, not (learner)/home.
# Accept dashboard-scroll as a valid post-auth landing.
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 5000
    optional: true

# BUG-38: PostApprovalLanding intercepts users after pm clear wipes SecureStore.
# Only dismiss when the "You're approved!" screen is actually showing — otherwise
# the "Let's Go" text matches the coaching card's similar button and navigates
# away from home (discovered in Session 13).
- runFlow:
    when:
      visible: "You're approved!"
    file: dismiss-post-approval.yaml

# BUG-549: PermissionSetupGate intercepts users when RECORD_AUDIO or
# POST_NOTIFICATIONS are not granted after pm clear. seed-and-run.sh pre-grants
# both via ADB so this should normally not appear, but tap Skip if it does.
- runFlow:
    when:
      visible:
        id: "permission-setup-gate"
    file: dismiss-permission-gate.yaml

# BUG-43: After PostApproval dismiss, the coaching card may auto-navigate to
# a Practice Session (for scenarios with active sessions like retention-due,
# homework-ready, failed-recall-3x). The session screen hides the tab bar,
# so we can't tap Home. Instead, conditionally press Back to return to home
# only when NEITHER home-scroll-view NOR dashboard-scroll is visible.
# BUG-48: Parent scenarios redirect from home to dashboard-scroll. The brief
# home-scroll-view appearance followed by redirect caused the old notVisible
# check to fire incorrectly, pressing Back and navigating away from dashboard.
# Fix: use return-to-home-safe.yaml which checks for dashboard-scroll first.
- runFlow:
    when:
      notVisible:
        id: "home-scroll-view"
    file: return-to-home-safe.yaml

# After all dismiss/return logic, wait for home screen (optional — parent
# scenarios route to dashboard-scroll which was already handled above).
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 10000
    optional: true

# Visual audit: post-auth screen (home, dashboard, or post-landing)
- takeScreenshot: signin-04-home-reached

# ── Step 4: Dismiss notification permission dialog (BUG-22) ──
# Android 13+ shows POST_NOTIFICATIONS permission dialog after first sign-in.
# seed-and-run.sh pre-grants via ADB, but this is a safety net.
- runFlow:
    when:
      visible: "send you notifications"
    file: dismiss-notifications.yaml
