# Reusable setup: Wait for app to load, dismiss overlays, and sign in.
#
# IMPORTANT: Seeding AND app launch are done BEFORE Maestro starts,
# by seed-and-run.sh. This flow expects the app to be already running
# (launched via ADB after pm clear).
#
# Called by other flows via:
#   - runFlow:
#       file: ../_setup/seed-and-sign-in.yaml
#
# Required Maestro env vars (set by seed-and-run.sh):
#   ${EMAIL}      — Seeded user email
#   ${PASSWORD}   — Seeded user password
#   ${ACCOUNT_ID} — DB account ID
#   ${PROFILE_ID} — DB profile ID
#   (plus scenario-specific IDs like ${SUBJECT_ID}, ${TOPIC_ID}, etc.)
#
# After this flow completes, the app is authenticated and on the home screen.
#
# Architecture (Issue 13 + BUG-19 workaround):
#   seed-and-run.sh calls curl to seed → parses JSON with node →
#   clears app state via ADB → launches app via ADB →
#   passes credentials to Maestro via -e flags → Maestro runs the flow.
#
# After ADB launch with cleared state, the dev-client either:
#   a) Shows the launcher (tap Metro URL to connect), OR
#   b) Auto-discovers Metro and starts loading immediately
# Both paths end at the "Continue" dev menu overlay after bundle load.
appId: com.mentomate.app
---
# ── Step 1: Handle ANR dialog if present ──
# On WHPX emulator, bundle loading is slow. Android may show
# "MentoMate isn't responding" dialog. Tap "Wait" to dismiss it.
- runFlow:
    when:
      visible: "isn't responding"
    file: dismiss-anr.yaml

# ── Step 2: Connect to Metro (if dev-client launcher is showing) ──
# After clearState, the dev-client may show the launcher with server list,
# or it may auto-discover Metro and skip the launcher entirely.
# If the launcher is visible, tap the Metro server entry.
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    file: tap-metro-server.yaml

# ── Step 3: Dismiss dev menu overlay (BUG-2) ──
# The dev menu "Continue" overlay always appears after bundle load.
# On WHPX emulator, bundle loading can take several minutes.
- extendedWaitUntil:
    visible: "Continue"
    timeout: 600000

- tapOn: "Continue"

# A second dev tools sheet may appear (shows "Reload", "Connected to", etc.).
# Only press BACK if it's actually visible — otherwise BACK exits the app
# since the sign-in screen is the navigation root (BUG-14).
- runFlow:
    when:
      visible: "Reload"
    file: dismiss-devtools.yaml

# ── Step 4: Wait for sign-in screen ──
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 30000

# ── Step 5: Sign in with seeded credentials ──
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# BUG-3: Dismiss keyboard so password field is visible (Android keyboard covers it)
- hideKeyboard

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# BUG-3: Dismiss keyboard before tapping sign-in button
- hideKeyboard

- tapOn:
    id: "sign-in-button"

# ── Step 6: Wait for home screen (auth complete) ──
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 30000
