# Reusable setup: Launch dev-client, connect to Metro, and sign in.
#
# IMPORTANT: Seeding is done BEFORE Maestro starts, by seed-and-run.sh.
# This flow only handles app launch + sign-in. It expects credentials
# as Maestro env vars (passed via seed-and-run.sh -e flags).
#
# Called by other flows via:
#   - runFlow:
#       file: ../_setup/seed-and-sign-in.yaml
#
# Required Maestro env vars (set by seed-and-run.sh):
#   ${EMAIL}      — Seeded user email
#   ${PASSWORD}   — Seeded user password
#   ${ACCOUNT_ID} — DB account ID
#   ${PROFILE_ID} — DB profile ID
#   (plus scenario-specific IDs like ${SUBJECT_ID}, ${TOPIC_ID}, etc.)
#
# After this flow completes, the app is authenticated and on the home screen.
#
# Architecture (Issue 13 workaround):
#   seed-and-run.sh calls curl to seed → parses JSON with node → passes
#   credentials to Maestro via -e flags → Maestro runs the top-level flow
#   → top-level flow calls this sub-flow for app launch + sign-in.
appId: com.mentomate.app
---
# ── Step 1: Launch app with clean state ──
# clearState resets auth tokens and AsyncStorage, ensuring we start fresh.
# On dev-client builds, this also resets the Metro connection — the dev-client
# launcher will appear first, requiring us to reconnect to Metro.
- launchApp:
    clearState: true

# ── Step 2: Connect to Metro via dev-client launcher ──
# The dev-client launcher shows available Metro servers.
# Port 8082 = bundle proxy (BUG-7 workaround for OkHttp chunked encoding).
# For direct Metro connection, change to 8081.
- extendedWaitUntil:
    visible: "http://10.0.2.2:8082"
    timeout: 60000

- tapOn: "http://10.0.2.2:8082"

# ── Step 3: Dismiss dev menu overlay (BUG-2) ──
# The dev menu "Continue" overlay always appears after bundle load.
# On WHPX emulator, bundle loading can take several minutes.
- extendedWaitUntil:
    visible: "Continue"
    timeout: 600000

- tapOn: "Continue"

# A second dev tools sheet may appear (shows "Reload", "Connected to", etc.).
# Only press BACK if it's actually visible — otherwise BACK exits the app
# since the sign-in screen is the navigation root (BUG-14).
- runFlow:
    when:
      visible: "Reload"
    file: dismiss-devtools.yaml

# ── Step 4: Wait for sign-in screen ──
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 30000

# ── Step 5: Sign in with seeded credentials ──
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# BUG-3: Dismiss keyboard so password field is visible (Android keyboard covers it)
- hideKeyboard

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# BUG-3: Dismiss keyboard before tapping sign-in button
- hideKeyboard

- tapOn:
    id: "sign-in-button"

# ── Step 6: Wait for home screen (auth complete) ──
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 30000
