# Reusable setup: walk the pre-auth welcome flow to the sign-in screen.
#
# Why this exists: the 2026-05-27 pre-auth welcome refactor
# (docs/plans/2026-05-27-pre-auth-welcome-flow.md) inserted an audience
# chooser → 3-card deck → LightBulb bridge in front of /(auth)/sign-in.
# seed-and-run.sh runs `pm clear` before every flow, which wipes the
# device-scoped preAuthIntroSeen.v1 flag, so a freshly launched app ALWAYS
# lands on welcome-chooser, never directly on the sign-in screen.
#
# The shared sign-in helpers (seed-and-sign-in.yaml, sign-in-only.yaml) and
# the no-seed auth flows used to assume the cleared app opened straight to
# sign-in. This sub-flow bridges the gap: chooser → cards → bridge → sign-in.
#
# Audience pick is storytelling only for existing (seeded) users — per
# welcome.tsx it does NOT fork the account model, and markPreAuthAudienceSync
# only influences first-profile setup AFTER signup, which never runs on a
# sign-in path. So picking "learner" here is safe for every scenario.
#
# Sequence verified against:
#   apps/mobile/src/app/(auth)/welcome.tsx (welcome-chooser,
#     welcome-chooser-learner, pre-auth-bridge, pre-auth-bridge-secondary)
#   apps/mobile/src/components/welcome/WelcomeIntro.tsx (welcome-card-{1..3},
#     welcome-next-button, welcome-start-button)
appId: com.mentomate.app
---
# 1. Audience chooser is the first post-bundle surface. Allow generous time —
#    bundle loading may still be settling when Maestro takes over.
- extendedWaitUntil:
    visible:
      id: "welcome-chooser"
    timeout: 120000

# 2. Pick "I want to learn" → 3-card learner deck mounts on card 1.
- tapOn:
    id: "welcome-chooser-learner"
- extendedWaitUntil:
    visible:
      id: "welcome-card-1"
    timeout: 10000

# 3. Advance through the card deck to the bridge. The deck is a paged
#    carousel; on this emulator a single next-button tap occasionally
#    "completes" without advancing the card. So tap next up to 5x (optional —
#    on the final card the button becomes welcome-start-button, so the
#    next-button tap is simply skipped) until the "Let's start" CTA appears.
#    This absorbs missed taps without weakening the end state: we still
#    require welcome-start-button before proceeding.
- repeat:
    times: 5
    commands:
      - tapOn:
          id: "welcome-next-button"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "welcome-start-button"
          timeout: 2500
          optional: true

# 4. Final card's "Let's start" → LightBulb bridge.
- extendedWaitUntil:
    visible:
      id: "welcome-start-button"
    timeout: 10000
- tapOn:
    id: "welcome-start-button"
- extendedWaitUntil:
    visible:
      id: "pre-auth-bridge"
    timeout: 10000

# 5. "I already have an account" marks the intro seen and replaces to /sign-in.
- tapOn:
    id: "pre-auth-bridge-secondary"
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000
