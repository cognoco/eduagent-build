# Navigate to sign-in from wherever we are.
# Expected entry states: sign-up screen or forgot-password screen.
# Both taps are optional because only one will match the current screen.
# If invoked from an unrelated screen, the extendedWaitUntil below will
# fail with a timeout — that's intentional (fail-fast, not silent).
appId: com.mentomate.app
---
- tapOn:
    id: "sign-in-link"
    optional: true
- tapOn:
    id: "back-to-sign-in"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 10000
