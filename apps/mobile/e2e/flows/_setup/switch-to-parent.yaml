# Switch persona from learner to parent.
# Called after seed-and-sign-in.yaml when the test needs parent dashboard.
#
# How it works: navigates to More → taps "Parent (Light)" theme →
# the routing guard in (learner)/_layout.tsx redirects to (parent)/dashboard.
#
# After this flow, the app is on the Family dashboard (dashboard-scroll).
appId: com.mentomate.app
---
# 1. Navigate to More tab
- tapOn:
    text: "More"

# 2. Wait for More screen — Learning Mode is always above the fold
- extendedWaitUntil:
    visible:
      id: "learning-accommodation-section-header"
    timeout: 10000

# 3. Tap Parent theme — triggers redirect to parent dashboard
- tapOn:
    id: "persona-theme-parent"

# 4. Enter the Family dashboard from the learner screen.
- runFlow:
    file: open-family-dashboard.yaml
