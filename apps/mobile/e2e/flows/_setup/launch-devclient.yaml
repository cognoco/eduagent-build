# Launch dev-client and connect to Metro
# Handles TWO cases:
#   1. First launch: dev-client launcher shows server list → tap to connect
#   2. Cached launch: dev-client auto-connects → bundle loads directly
# Also handles dev menu overlay (auto-appears on load — BUG-2).
# For WHPX emulator: bundle loading takes 2-5 minutes.
appId: com.mentomate.app
---
- launchApp:
    clearState: true

# Try to tap the server entry if the launcher is showing.
# On cached launches this won't be visible — that's OK (optional).
- extendedWaitUntil:
    visible: "http://10.0.2.2:8081"
    timeout: 15000
    optional: true

- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true

# Wait for the sign-in screen. On WHPX this takes 2-5 minutes for
# fresh bundle loads. The dev menu overlay may appear on top — if
# "Welcome back" isn't found after 300s, the dev menu might be blocking.
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 300000

# If we get here, sign-in screen is accessible.
# Dismiss dev menu overlay if it's still showing (it may not block
# the text detection in all cases).
- tapOn:
    text: "Continue"
    optional: true
