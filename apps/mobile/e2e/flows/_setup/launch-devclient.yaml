# DEPRECATED: Use run-without-seed.sh instead for pre-auth flows.
# This flow uses Maestro's launchApp which is unreliable on WHPX (BUG-19).
# run-without-seed.sh handles ADB launch + Metro + bundle + overlays, then
# Maestro starts from the sign-in screen. All flows that previously used
# this file now wait for sign-in-button testID directly.
#
# Kept for non-WHPX environments (real devices, KVM emulators).
#
# Original description:
# Launch dev-client and connect to Metro
# BUG-19: clearState moved to seed-and-run.sh (Maestro clearState unreliable).
# Assumes app state was already cleared via ADB by the caller script.
# Handles dev menu overlay (always appears on bundle load — BUG-2).
# For WHPX emulator: bundle loading takes 2-5 minutes.
appId: com.mentomate.app
---
- launchApp

# With clearState, the dev-client launcher always shows.
# Wait for the server entry and tap it to start bundle loading.
# METRO_URL is set by seed-and-run.sh (default: http://10.0.2.2:8081).
- extendedWaitUntil:
    visible: ${METRO_URL}
    timeout: 60000

- tapOn: ${METRO_URL}

# The dev menu overlay ALWAYS appears after bundle load and BLOCKS
# Maestro from seeing elements behind it. Wait for the "Continue"
# button on the dev menu, then dismiss it.
- extendedWaitUntil:
    visible: "Continue"
    timeout: 600000

- tapOn: "Continue"

# A second dev tools sheet may appear — only dismiss if visible (BUG-14).
# Unconditional BACK exits the app from navigation root.
- runFlow:
    when:
      visible: "Reload"
    file: dismiss-devtools.yaml

# Now the sign-in screen should be fully accessible.
# Use testID, not heading text — heading varies by first-time vs returning user.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000
