# Tap the Metro server entry on the dev-client launcher.
# Assumes the launcher is already showing. Does NOT relaunch.
# Port 8082 = bundle proxy (BUG-7 workaround for OkHttp chunked encoding).
appId: com.mentomate.app
---
- extendedWaitUntil:
    visible: "http://10.0.2.2:8082"
    timeout: 30000

- tapOn: "http://10.0.2.2:8082"

# Wait for bundle load + dev menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 600000

- tapOn: "Continue"

# Dismiss possible second dev tools sheet (BUG-14: only if visible)
- runFlow:
    when:
      visible: "Reload"
    file: dismiss-devtools.yaml

# Verify sign-in screen
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
