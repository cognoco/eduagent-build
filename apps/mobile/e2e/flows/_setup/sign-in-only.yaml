# Minimal sign-in flow — no post-auth navigation recovery.
#
# Use this for edge-case flows where the post-auth screen is NOT the standard
# home-scroll-view or dashboard-scroll (e.g., 0-subjects redirect to
# create-subject, consent-withdrawn gate, etc.).
#
# seed-and-run.sh handles everything before Maestro: seed, app launch,
# dev-client, bundle loading. By the time this flow runs, the app is on
# the sign-in screen.
appId: com.mentomate.app
---
# 1. Wait for sign-in screen (testID stable across first-time / returning user)
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

# 2. Enter email
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# Dismiss keyboard (pressKey: back is reliable when keyboard IS open — see BUG-5 notes)
- pressKey: back

# 3. Enter password
- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# Dismiss keyboard
- pressKey: back

# 4. Wait for sign-in button and tap it
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# 5. Verify auth completed — wait for any post-auth screen.
#    The calling flow handles specific landing logic, but we must confirm
#    sign-in actually succeeded before returning control.
#    Possible post-auth screens: learner home, create-subject (0 subjects),
#    PostApprovalLanding ("You're approved!"), or parent dashboard.
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 20000
    # Post-auth screen varies by scenario — home may not appear if redirected
    # to create-subject, PostApprovalLanding, or consent gate
    optional: true
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 3000
    # Only appears for 0-subject users (onboarding-no-subject scenario)
    optional: true
- extendedWaitUntil:
    visible:
      text: "You're approved!"
    timeout: 3000
    # PostApprovalLanding — appears after pm clear wipes SecureStore (BUG-38)
    optional: true
