# Open the first linked child's detail screen from the parent landing surface.
#
# Parent owners now land on parent Home. Flows that inspect child progress/cards
# enter through the top parent Home intent card.
#
# NOTE: seed-and-sign-in.yaml lands on learner-screen initially while the
# profile + subscription data is loading. Once the family navigation contract
# resolves (hasFamilyLinks=true + defaultAppContext='family') the app transitions
# to parent-home-screen. We must wait for that transition before tapping the
# child card, otherwise the element is not yet in the hierarchy.
appId: com.mentomate.app
---
# Wait for parent-home-screen to be visible before attempting to tap a child
# card. The 20-second timeout covers the profile+subscription data load time
# after sign-in (parent-home-screen is only rendered once familyShape='family'
# resolves in resolveNavigationContract, which requires hasFamilyLinks from the
# profiles API response — typically 3-8 seconds after sign-in on the emulator).
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 20000

- tapOn:
    id: 'parent-home-check-child-${CHILD_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 15000
