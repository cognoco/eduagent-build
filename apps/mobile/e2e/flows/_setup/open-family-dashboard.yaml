# Open the first linked child's detail screen from the parent landing surface.
#
# Parent owners now land on parent Home. Flows that inspect child progress/cards
# enter through the top parent Home intent card.
appId: com.mentomate.app
---
- tapOn:
    id: "parent-home-check-child-${CHILD_PROFILE_ID}"

- extendedWaitUntil:
    visible:
      text: "Sessions"
    timeout: 15000
