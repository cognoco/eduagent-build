# BUG-38 fix: Dismiss PostApprovalLanding screen by tapping the continue button.
# Only called conditionally when "You're approved!" text is visible.
# Anchor: post-approval-continue testID (apps/mobile/src/app/(app)/_layout.tsx:436)
# rather than text — the button copy is t('tabs.postApproval.letsGo') and
# renders differently per locale (en: "Let's go!", de: "Los geht's!", ...).
appId: com.mentomate.app
---
- tapOn:
    id: "post-approval-continue"

# Wait for the dismiss to take effect (setShouldShow(false) → re-render)
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000
    # Parent scenarios may land on LearnerScreen or Family, not learner-screen.
    optional: true
