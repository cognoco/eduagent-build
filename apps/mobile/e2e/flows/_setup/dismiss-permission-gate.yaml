# BUG-549: Dismiss the one-time permission setup gate.
#
# The gate (PermissionSetupGate, testID: permission-setup-gate) appears
# between PostApprovalLanding and the tab navigator when RECORD_AUDIO or
# POST_NOTIFICATIONS are not granted and permissionSetupSeen_<profileId>
# is not set in SecureStore. seed-and-run.sh pre-grants both permissions
# via ADB so the gate auto-skips, but this flow is a safety net if that
# pre-grant fails (e.g., fresh emulator, OS-level revoke).
appId: com.mentomate.app
---
- tapOn:
    id: "permission-skip"
