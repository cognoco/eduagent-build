# Shared helper for trial-preview onboarding flows.
# Starts on sign-up screen after tapping the preview CTA.
appId: com.mentomate.app
---
- extendedWaitUntil:
    visible:
      id: 'sign-up-email'
    timeout: 15000

- tapOn:
    id: 'sign-up-email'
- inputText: 'test-e2e-preview-${Date.now()}+clerk_test@example.com'
- hideKeyboard

- tapOn:
    id: 'sign-up-password'
- inputText: 'E2eTest_2026xK!'
- hideKeyboard

- scrollUntilVisible:
    element:
      id: 'sign-up-button'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'sign-up-button'

- extendedWaitUntil:
    visible:
      id: 'sign-up-code'
    timeout: 20000

- tapOn:
    id: 'sign-up-code'
- inputText: '424242'
- hideKeyboard

- tapOn:
    id: 'sign-up-verify-button'

- extendedWaitUntil:
    visible:
      id: 'save-wizard-gate'
    timeout: 30000
