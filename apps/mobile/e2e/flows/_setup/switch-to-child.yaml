# Switch from parent (or any owner) to a child profile via Profiles screen.
#
# Called after seed-and-sign-in.yaml when the active profile is the parent
# but the test needs to navigate to the child's context.
#
# Works from both parent dashboard and learner home — both layouts have
# a "More" tab with a "Profile" row that pushes to /profiles.
#
# Required env var:
#   ${CHILD_NAME} — Display name of the child profile to switch to
#
# After this flow, the app is on the child detail screen (child-detail-scroll).
#
# NOTE [ACCOUNT-04]: Since the profiles.tsx BUG-774 fix, tapping a child profile
# when the active profile is the parent owner no longer activates proxy mode.
# Instead the app routes to /(app)/child/[profileId]?mode=settings (child-detail-scroll).
# Proxy mode (isParentProxy=true) is no longer accessible from this user-facing
# path — only via switchProfile(id, { proxyMode: true }) from internal/test code.
# Tests that depend on isParentProxy=true need a redesign.
# Source: apps/mobile/src/app/profiles.tsx:185-202
appId: com.mentomate.app
---
# 1. Navigate to More tab (works from both parent dashboard and learner home)
- tapOn:
    text: "More"

# 2. Wait for More tab index — first settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 3. Profile is now inside the Account sub-screen
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

- tapOn:
    id: "more-row-profile"

# 4. Wait for profiles screen
- extendedWaitUntil:
    visible:
      id: "profiles-screen"
    timeout: 10000

# 5. Tap the child profile by name
- tapOn:
    text: ${CHILD_NAME}

# 6. BUG-38 safety: PostApprovalLanding may appear after switching to a
# TEEN profile with CONSENTED status when SecureStore was wiped (pm clear).
- runFlow:
    when:
      visible: "You're approved!"
    file: dismiss-post-approval.yaml

# 7. [ACCOUNT-04] Tapping a child profile from the owner account routes to the
# child detail screen (child-detail-scroll) via:
#   router.dismiss() + router.push(childProfileHref(profile.id, 'settings'))
# Source: apps/mobile/src/app/profiles.tsx:198-201
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 15000
