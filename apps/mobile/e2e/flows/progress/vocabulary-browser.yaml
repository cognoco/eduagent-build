# Vocabulary browser - navigate from progress index into the vocab screen
# Tags: nightly, progress
# Seed: language-subject-active
# Covers: vocab pill on progress index, vocabulary browser, CEFR breakdown
# Usage: ./scripts/seed-and-run.sh language-subject-active flows/progress/vocabulary-browser.yaml
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- tapOn:
    id: "tab-progress"

# progress-screen is the root testID of the progress tab (progress/index.tsx:486).
# journey-subject-${SUBJECT_ID} no longer exists — the progress index for a learner
# shows a stats-chips card, not per-subject journey rows.
# Source: apps/mobile/src/app/(app)/progress/index.tsx:486
- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 15000

# progress-vocab-stat is inside the ProgressStatsChips card; scroll down in case
# the stats card is partially below the fold.
# Source: apps/mobile/src/app/(app)/progress/_components/ProgressStatsChips.tsx:91
- scrollUntilVisible:
    element:
      id: "progress-vocab-stat"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 01-progress-with-vocab

- tapOn:
    id: "progress-vocab-stat"

- extendedWaitUntil:
    visible:
      id: "vocab-browser-back"
    timeout: 10000

- assertNotVisible:
    id: "vocab-browser-error"

- assertNotVisible:
    id: "vocab-browser-empty"

- assertVisible:
    text: "A1"

- assertVisible:
    text: "A2"

- assertVisible:
    text: "B1"

- takeScreenshot: 02-vocabulary-browser

- tapOn:
    id: "vocab-browser-back"

- extendedWaitUntil:
    visible:
      id: "progress-vocab-stat"
    timeout: 10000

- takeScreenshot: 03-back-to-progress
