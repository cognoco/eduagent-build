# Progress analytics - home subject tile → subject detail, then progress index recent-sessions expansion
# Tags: nightly, progress
# Seed: learning-active
# Covers: home-subject-card → progress/[subjectId] drill-down, progress-subject-bar, recent sessions list
# Usage: ./scripts/seed-and-run.sh learning-active flows/progress/progress-analytics.yaml
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# journey-subject-${SUBJECT_ID} was removed in the progress-screen refactor
# (d8b288011). Solo learners no longer have a subject list on the progress
# tab index; the subject detail page is reached via the home-screen subject
# tile (home-subject-card-${SUBJECT_ID} in LearnerScreen.tsx:638 →
# progress/[subjectId]).
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "home-subject-card-${SUBJECT_ID}"
    direction: RIGHT
    timeout: 10000

- takeScreenshot: 01-home-subject-tile

- tapOn:
    id: "home-subject-card-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "progress-subject-back"
    timeout: 10000

- assertVisible:
    id: "progress-subject-bar"

- takeScreenshot: 02-subject-detail

- tapOn:
    id: "progress-subject-back"

# Now on progress index. Verify stats and sessions expansion.
- tapOn:
    id: "tab-progress"

- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "progress-show-all-sessions"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "progress-show-all-sessions"
    timeout: 10000

- tapOn:
    id: "progress-show-all-sessions"

- scrollUntilVisible:
    element:
      id: "recent-sessions-list"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "recent-sessions-list"
    timeout: 10000

- assertVisible:
    id: "recent-sessions-list"

- takeScreenshot: 03-recent-sessions-expanded
