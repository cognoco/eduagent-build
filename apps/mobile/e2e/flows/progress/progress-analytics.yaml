# Progress analytics - index, subject detail, recent sessions expansion
# Tags: nightly, progress
# Seed: learning-active
# Covers: progress index rendering, subject drill-down, recent sessions list
# Usage: ./scripts/seed-and-run.sh learning-active flows/progress/progress-analytics.yaml
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- tapOn:
    id: "tab-progress"

- extendedWaitUntil:
    visible:
      id: "journey-subject-${SUBJECT_ID}"
    timeout: 15000

- takeScreenshot: 01-progress-index

- tapOn:
    id: "journey-subject-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "progress-subject-back"
    timeout: 10000

- assertVisible:
    id: "progress-subject-bar"

- takeScreenshot: 02-subject-detail

- tapOn:
    id: "progress-subject-back"

- scrollUntilVisible:
    element:
      id: "progress-show-all-sessions"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "progress-show-all-sessions"
    timeout: 10000

- tapOn:
    id: "progress-show-all-sessions"

- scrollUntilVisible:
    element:
      id: "recent-sessions-list"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "recent-sessions-list"
    timeout: 10000

- assertVisible:
    id: "recent-sessions-list"

- takeScreenshot: 03-recent-sessions-expanded
