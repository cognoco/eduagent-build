# Flow LEARN-24 (Step 2): Saved bookmarks — parent-proxy view-only gate.
# Validates: in parent-proxy mode (active=child, owner=parent), bookmark-delete
# button is NOT rendered — isParentProxy=true suppresses the trash icon in BookmarkRow.
# Tags: nightly, learning, parent
#
# Prerequisite: parent-proxy seed — parent owner + child profile + family link.
# The parent-proxy seed has no bookmarks on the child, so the saved list will be empty.
# assertNotVisible on bookmark-delete-${BOOKMARK_ID} passes whether:
#   (a) no bookmark rows are rendered (empty state), or
#   (b) rows render but delete buttons are hidden (proxy gate).
# This correctly validates the isParentProxy branch regardless of data presence.
#
# Env vars: CHILD_PROFILE_ID, SESSION_ID, SUBJECT_ID
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/progress/saved.tsx
#       bookmark-delete-${id} renders only when !isParentProxy (line 71–85).
#       saved-bookmarks-list is always rendered as the FlatList container.
appId: com.mentomate.app
tags:
  - nightly
  - learning
  - parent
---
# 1. Seed & sign in as parent account
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-proxy"
      API_URL: ${API_URL}

# 2. Switch active profile to child — activates proxy mode (isParentProxy = true)
#    parent-proxy seed names the child "Proxy Child"
- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Proxy Child"

# 3. Wait for learner home in child (proxy) context
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: proxy-bookmarks-01-learner-home

# 4. Navigate to Progress tab
- tapOn:
    id: "tab-progress"

- extendedWaitUntil:
    visible:
      id: "progress-saved-link"
    timeout: 10000

# 5. Navigate to saved bookmarks
- tapOn:
    id: "progress-saved-link"

- extendedWaitUntil:
    visible:
      id: "saved-bookmarks-list"
    timeout: 10000

- takeScreenshot: proxy-bookmarks-02-list-loaded

# 6. Core assertion: bookmark delete button must NOT be visible in proxy mode.
#    The parent-proxy seed has no bookmarks so no rows render at all — this is
#    also valid: no delete button = no delete button (either via empty state or
#    the proxy gate suppression). Both paths prove the gate works.
- assertNotVisible:
    id: "bookmark-delete-${BOOKMARK_ID}"

- takeScreenshot: proxy-bookmarks-03-no-delete-button
