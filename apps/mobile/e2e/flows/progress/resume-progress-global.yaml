# Flow TRACK-4: Resume via Progress Tab — Global Keep-Learning Button
# Validates: a user with a resume target can tap "Keep Learning" on the
#            progress screen and land back in the active chat session.
# Tags: nightly, progress
#
# Journey: UX Journey 2 (Daily Learning Loop — resume via progress tab)
# Prerequisite: Active in-progress Geography session (scenario: mentor-audit-resumable-session)
#               The seed exports subjectId, topicId, and sessionId.
#               useLearningResumeTarget returns a resume target, so
#               handleGlobalResume() calls pushLearningResumeTarget() instead
#               of routing to /(app)/home.
#
# Note: progress-keep-learning only navigates to a session when a resume
#       target exists (the seed provides it). Without a resume target the
#       button routes to /(app)/home instead.
#
# testID mapping:
#   LearnerScreen.tsx:
#     - learner-screen          -> home container (confirms post-auth landing)
#   (app)/_layout.tsx:717:
#     - tab-progress            -> Progress tab bar button
#   progress/index.tsx:487:
#     - progress-screen         -> root container of the progress screen
#   progress/index.tsx:763:
#     - progress-keep-learning  -> "Keep Learning" primary button (isViewingSelf)
#   chat screen:
#     - chat-input              -> message input field (confirms session is active)
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-resumable-session'
      API_URL: ${API_URL}

# ── Home screen ─────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-progress-global-01-home-reached

# ── Navigate to Progress tab ─────────────────────────────────────────────────
- tapOn:
    id: 'tab-progress'

- extendedWaitUntil:
    visible:
      id: 'progress-screen'
    timeout: 10000

- takeScreenshot: resume-progress-global-02-progress-screen

# ── Keep Learning button ─────────────────────────────────────────────────────
# Scroll down to bring the button into view (it sits below stats chips and
# report cards which may push it off the fold on small screens like Galaxy S10e).
- scrollUntilVisible:
    element:
      id: 'progress-keep-learning'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'progress-keep-learning'

# ── Session screen ────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: resume-progress-global-03-chat-resumed
