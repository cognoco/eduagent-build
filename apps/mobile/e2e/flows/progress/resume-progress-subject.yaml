# Flow TRACK-5: Resume via Subject Detail — Progress-Subject Resume Button
# Validates: a user can navigate into the subject detail screen and tap the
#            per-subject "Resume" button to re-enter the active chat session.
# Tags: nightly, progress
#
# Journey: UX Journey 2 (Daily Learning Loop — resume via subject detail)
# Prerequisite: Active in-progress Geography session (scenario: mentor-audit-resumable-session)
#               The seed exports SUBJECT_ID (the Geography subject). The seed's
#               in-progress session is for that subject so canResumeSubject is
#               true, which renders progress-subject-resume as "Resume" (not
#               "Choose next").
#
# Architecture note (from progress-analytics.yaml):
#   Solo learners no longer have a subject list on the progress tab index.
#   The subject detail page (progress/[subjectId]) is reached via the
#   home-screen subject tile (home-subject-card-${SUBJECT_ID} in
#   LearnerScreen.tsx:638 → router.push progress/[subjectId]).
#   This flow lands on the home screen first, reaches subject detail via the
#   home carousel tile, then exercises the progress-subject-resume button.
#
# testID mapping:
#   LearnerScreen.tsx:638:
#     - home-subject-card-${SUBJECT_ID}   -> subject carousel tile on home screen
#   progress/[subjectId]/index.tsx:306:
#     - progress-subject-back             -> back button (confirms subject-detail screen)
#   progress/[subjectId]/index.tsx:334:
#     - progress-subject-resume           -> "Resume" / "Choose next" button;
#                                           renders "Resume" when canResumeSubject
#   chat screen:
#     - chat-input                        -> message input field (confirms session active)
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-resumable-session'
      API_URL: ${API_URL}

# ── Home screen ─────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-progress-subject-01-home-reached

# ── Navigate to subject detail via home subject carousel ─────────────────────
# The seed's SUBJECT_ID is the only (Geography) subject, so the single tile sits
# at the start of the horizontal carousel — no horizontal scroll is needed. The
# carousel (home-subject-carousel) renders below the coach band / learning
# actions on the vertically-scrolling home page, so scroll DOWN to bring it into
# view, then tap the tile to push progress/[subjectId].
- scrollUntilVisible:
    element:
      id: "home-subject-card-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- takeScreenshot: resume-progress-subject-02-subject-tile-visible

- tapOn:
    id: "home-subject-card-${SUBJECT_ID}"

# ── Subject detail screen ─────────────────────────────────────────────────────
# progress-subject-back is the back chevron at the top of progress/[subjectId]/index.tsx.
# Its presence confirms the subject detail screen has mounted.
- extendedWaitUntil:
    visible:
      id: 'progress-subject-back'
    timeout: 10000

- takeScreenshot: resume-progress-subject-03-subject-detail

# ── Resume button ─────────────────────────────────────────────────────────────
# progress-subject-resume renders as "Resume" (not "Choose next") when
# canResumeSubject is true. The seed's active in-progress session for this
# subject guarantees canResumeSubject === true.
- tapOn:
    id: 'progress-subject-resume'

# ── Session screen ────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: resume-progress-subject-04-chat-resumed
