# Flow TRACK-5: Resume via Subject Progress Deep Link
# Validates: the supported subject-progress route exposes its per-subject
#            "Resume" button and re-enters the active chat session.
# Tags: nightly, progress
#
# Journey: UX Journey 2 (Daily Learning Loop — resume via subject detail)
# Prerequisite: Active in-progress Geography session (scenario: mentor-audit-resumable-session)
#               The seed exports SUBJECT_ID (the Geography subject). The seed's
#               in-progress session is for that subject so canResumeSubject is
#               true, which renders progress-subject-resume as "Resume" (not
#               "Choose next").
#
# Architecture note:
#   Home subject tiles now open shelf/[subjectId]. The retained
#   progress/[subjectId] route supports direct/deep-link entry, so this flow
#   enters it through the app scheme before exercising its Resume action.
#
# testID mapping:
#   progress/[subjectId]/index.tsx:306:
#     - progress-subject-back             -> back button (confirms subject-detail screen)
#   progress/[subjectId]/index.tsx:334:
#     - progress-subject-resume           -> "Resume" / "Choose next" button;
#                                           renders "Resume" when canResumeSubject
#   chat screen:
#     - chat-input                        -> message input field (confirms session active)
appId: com.mentomate.app
tags:
  - nightly
  - progress
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-resumable-session'
      API_URL: ${API_URL}

# ── Home screen ─────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-progress-subject-01-home-reached

# ── Enter the supported subject-progress route ───────────────────────────────
- openLink: 'mentomate:///progress/${SUBJECT_ID}'

# ── Subject detail screen ─────────────────────────────────────────────────────
# progress-subject-back is the back chevron at the top of progress/[subjectId]/index.tsx.
# Its presence confirms the subject detail screen has mounted.
- extendedWaitUntil:
    visible:
      id: 'progress-subject-back'
    timeout: 10000

- takeScreenshot: resume-progress-subject-02-subject-detail

# ── Resume button ─────────────────────────────────────────────────────────────
# progress-subject-resume renders as "Resume" (not "Choose next") when
# canResumeSubject is true. The seed's active in-progress session for this
# subject guarantees canResumeSubject === true, but that query resolves after
# the shell can render. Wait for the state-specific label before tapping the
# shared control so a slow response cannot send the flow to Shelf.
- extendedWaitUntil:
    visible:
      id: 'progress-subject-resume'
      text: 'Resume'
    timeout: 15000

- tapOn:
    id: 'progress-subject-resume'

# ── Session screen ────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: resume-progress-subject-03-chat-resumed
