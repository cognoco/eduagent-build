# Flow DICT-09..10: Dictation Perfect Score — review-celebration screen
# Validates: complete screen → gallery picker (E2E seam) → LLM review with
#   mistakes.length === 0 → review-celebration screen → done → back to practice.
# Tags: nightly, dictation
#
# Journey: UX Journey 3 (Practice & Reinforcement)
# Epics: Epic 12 (Dictation)
# Prerequisite: dictation-perfect-score seed + EXPO_PUBLIC_E2E=1 dev-client build
#
# Run with:
#   IMAGE_TEXT="The sun is warm. Birds can sing." \
#   ./e2e/scripts/seed-and-run-dictation-review.sh \
#     dictation-perfect-score \
#     e2e/flows/dictation/dictation-perfect-score.yaml
#
# IMAGE_TEXT overrides the sentence written into the planted JPEG.
# Using correctly spelled text that exactly matches the dictation input
# maximises the chance the LLM returns mistakes.length === 0.
#
# testIDs verified against source:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (intent-practice)
#   - apps/mobile/src/app/(app)/practice.tsx (practice-screen, practice-dictation)
#   - apps/mobile/src/app/(app)/dictation/index.tsx (dictation-choice-screen, dictation-homework)
#   - apps/mobile/src/app/(app)/dictation/text-preview.tsx (dictation-text-preview-screen, text-preview-input, text-preview-start)
#   - apps/mobile/src/app/(app)/dictation/playback.tsx (dictation-playback-screen, playback-progress)
#   - apps/mobile/src/app/(app)/dictation/complete.tsx:263 (dictation-complete-screen)
#   - apps/mobile/src/app/(app)/dictation/complete.tsx:348 (complete-pick-gallery — E2E seam, EXPO_PUBLIC_E2E=1)
#   - apps/mobile/src/app/(app)/dictation/review.tsx:127 (review-celebration)
#   - apps/mobile/src/app/(app)/dictation/review.tsx:153 (review-done)
appId: com.mentomate.app
tags:
  - nightly
  - dictation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "dictation-perfect-score"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "home-action-practice"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "home-action-practice"

- extendedWaitUntil:
    visible:
      id: "practice-screen"
    timeout: 10000

- tapOn:
    id: "practice-dictation"

- extendedWaitUntil:
    visible:
      id: "dictation-choice-screen"
    timeout: 10000

- takeScreenshot: dict-perfect-01-choice

- tapOn:
    id: "dictation-homework"

- extendedWaitUntil:
    visible:
      id: "dictation-text-preview-screen"
    timeout: 10000

- tapOn:
    id: "text-preview-input"

# Matches the IMAGE_TEXT the wrapper plants in the gallery. Both sentences are
# correctly spelled, so the LLM should return mistakes.length === 0.
- inputText: "The sun is warm. Birds can sing."

- pressKey: back

- tapOn:
    id: "text-preview-start"

- extendedWaitUntil:
    visible:
      id: "dictation-playback-screen"
    timeout: 15000

- assertVisible:
    id: "playback-progress"

- takeScreenshot: dict-perfect-02-playback

# Wait up to 60s for playback to auto-navigate to the complete screen.
- extendedWaitUntil:
    visible:
      id: "dictation-complete-screen"
    timeout: 60000

- takeScreenshot: dict-perfect-03-complete

- assertVisible:
    id: "complete-check-writing"

# E2E seam: gallery picker button (EXPO_PUBLIC_E2E=1 dev-client builds only).
# The wrapper plants a JPEG with correctly spelled text matching the sentences
# above, so the LLM returns mistakes.length === 0.
- assertVisible:
    id: "complete-pick-gallery"

- tapOn:
    id: "complete-pick-gallery"

# System image library picker opens — select the pre-planted test JPEG.
- extendedWaitUntil:
    visible:
      text: "dictation-test-image"
    timeout: 10000
    optional: true

- tapOn:
    index: 0
    text: "Photos"
    optional: true

# Wait for LLM to return and navigate to review-celebration (no mistakes path).
- extendedWaitUntil:
    visible:
      id: "review-celebration"
    timeout: 30000

- takeScreenshot: dict-perfect-04-celebration

- assertVisible:
    id: "review-done"

- tapOn:
    id: "review-done"

- extendedWaitUntil:
    visible:
      id: "practice-screen"
    timeout: 10000

- takeScreenshot: dict-perfect-05-back-at-practice
