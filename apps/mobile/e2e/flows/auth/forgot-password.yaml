# Flow A1: Forgot Password — Email Entry to Code Sent
# Validates: forgot-password screen renders, email entry works,
# send-reset-code button triggers transition to code entry UI.
# Tags: nightly, auth
#
# Journey: Auth recovery
# Screens: sign-in → forgot-password → (reset code entry)
#
# NOTE: Uses the seeded user's `+clerk_test` email — Clerk dev's test-mode
# bucket accepts the fixed reset code 424242 and does NOT consume the dev
# email quota. Keep this address in sync with seed.js EMAIL default.
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# 1. Launch dev-client, connect to Metro, dismiss dev menu.
- runFlow: ../_setup/launch-devclient.yaml

# 3. Navigate to forgot-password screen
- tapOn:
    id: "forgot-password-link"

# 4. Verify forgot-password screen is visible
- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 5000

- assertVisible: "We'll send a reset code to your email"

# 5. Verify form elements are present
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

# 6. Enter the seeded test-mode email (must match seed.js EMAIL default).
- tapOn:
    id: "forgot-password-email"
- inputText: "test-e2e+clerk_test@example.com"

# BUG-3: Keyboard covers the submit button on Android.
# Tap the heading to defocus the input and dismiss the keyboard.
# (hideKeyboard sends BACK which can exit the app if keyboard is
# already gone — BUG-5. Tapping a non-input element is safer.)
- tapOn: "Forgot password?"

# 7. Submit the reset code request (Clerk reset_password_email_code strategy).
# Test-mode address means no real email is sent and 424242 is accepted.
- tapOn:
    id: "send-reset-code-button"

# 8. Code entry screen
- extendedWaitUntil:
    visible:
      text: "Reset password"
    timeout: 10000

# 9. Code entry form elements
- assertVisible:
    id: "reset-code"
- assertVisible:
    id: "reset-new-password"
- assertVisible:
    id: "reset-password-button"
- assertVisible:
    id: "reset-resend-code"
- assertVisible:
    id: "reset-back-from-code"

- takeScreenshot: auth-forgot-password-code-entry

# 10. Enter the fixed Clerk test-mode reset code + a new password
- tapOn:
    id: "reset-code"
- inputText: "424242"

# Dismiss number pad before tapping the password field
- pressKey: Back

- tapOn:
    id: "reset-new-password"
- inputText: "E2eTest_2026xK!"

# Dismiss keyboard so submit button is reachable (BUG-3 pattern)
- tapOn: "Reset password"

# 11. Submit the new password
- tapOn:
    id: "reset-password-button"

- takeScreenshot: auth-forgot-password-submitted
