# Flow A1: Forgot Password — Email Entry to Code Sent
# Validates: forgot-password screen renders, email entry works,
# send-reset-code button triggers transition to code entry UI.
# Tags: nightly, auth
#
# Journey: Auth recovery
# Screens: sign-in → forgot-password → (reset code entry)
#
# NOTE: Since E2E cannot receive real emails, this flow tests up to the
# "code sent" confirmation state. The code entry UI is verified with
# optional steps (it requires a real Clerk reset flow to reach).
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# 1. Launch app with clean state
- launchApp:
    clearState: true

# 2. Wait for auth gate (sign-in screen)
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 15000

# 3. Navigate to forgot-password screen
- tapOn:
    id: "forgot-password-link"

# 4. Verify forgot-password screen is visible
- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 5000

- assertVisible: "We'll send a reset code to your email"

# 5. Verify form elements are present
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

# 6. Enter an email address
- tapOn:
    id: "forgot-password-email"
- inputText: "test-e2e-reset@example.com"

# 7. Submit the reset code request
# NOTE: This will call Clerk's reset_password_email_code strategy.
# In test mode, the transition to the code entry screen may or may not
# succeed depending on Clerk configuration. We use optional steps below.
- tapOn:
    id: "send-reset-code-button"

# 8. Verify transition to code entry screen (optional — depends on Clerk test mode)
- extendedWaitUntil:
    visible:
      text: "Reset password"
    timeout: 10000
    optional: true

# 9. Verify code entry form elements (optional — only visible after successful send)
- assertVisible:
    id: "reset-code"
    optional: true
- assertVisible:
    id: "reset-new-password"
    optional: true
- assertVisible:
    id: "reset-password-button"
    optional: true
- assertVisible:
    id: "reset-resend-code"
    optional: true
- assertVisible:
    id: "reset-back-from-code"
    optional: true

# 10. Screenshot
- takeScreenshot: auth-forgot-password
