# Flow: M02 — Welcome Text: First-Time vs Returning User
# Validates: sign-in screen shows "Welcome to MentoMate" (not "Welcome back")
# for first-time users with clean SecureStore.
# Tags: smoke, auth, regression
#
# Bug: M02 — "Welcome back" was hardcoded for all users. The fix made the heading
# conditional on SecureStore key `hasSignedInBefore`. This test guards the
# first-time path which is what new users see after app install.
#
# After pm clear (which every E2E test does), SecureStore is empty →
# isReturningUser = false → heading = "Welcome to MentoMate".
#
# Source: apps/mobile/src/app/(auth)/sign-in.tsx lines 46-58, 161-167
appId: com.mentomate.app
tags:
  - smoke
  - auth
  - regression
---
# launch-devclient.yaml is DEPRECATED for WHPX/seed-and-run.sh environments
# (see _setup/launch-devclient.yaml header). seed-and-run.sh handles all ADB
# launch + Metro + bundle steps before Maestro starts; calling launchApp here
# causes a re-launch and the Metro-URL assertion ("http://10.0.2.2:8081" visible)
# to fail because the bundle is already loaded. All pre-auth flows now rely on
# the app already being on or near the sign-in screen when Maestro starts.

# Walk the pre-auth welcome flow to the sign-in screen (2026-05-27 refactor:
# a pm-clear'd app lands on the audience chooser, not directly on sign-in).
- runFlow:
    file: ../_setup/nav-welcome-to-sign-in.yaml

# ── M02 regression: First-time user welcome text ─────────────────────
# After clearState, SecureStore has no `hasSignedInBefore` key.
# The sign-in screen MUST show first-time copy, not returning-user copy.

# 2. Verify first-time heading is shown (id-based — copy-stable + i18n-stable)
- assertVisible:
    id: "sign-in-welcome-first-time"

# 3. Verify first-time subtitle is shown
- assertVisible:
    id: "sign-in-subtitle-first-time"

# 4. Negative assertions: returning-user text must NOT appear
- assertNotVisible:
    id: "sign-in-welcome-returning"
- assertNotVisible:
    id: "sign-in-subtitle-returning"

# 5. Verify the rest of the sign-in screen is intact (form fields, SSO, links)
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"

# [BUG-959] Sign in button + Sign up link sit below the fold on 1080x1920.
- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"
- assertVisible: "Sign up"

- takeScreenshot: m02-first-time-welcome-text
