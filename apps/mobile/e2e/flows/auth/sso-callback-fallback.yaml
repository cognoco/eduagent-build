# Flow AUTH-09: SSO Callback Fallback
#
# Validates: when the SSO OAuth callback does not complete within 10 seconds,
# `sso-callback.tsx` reveals the `sso-fallback-back` button. Tapping it
# returns the user to the sign-in screen with no dead-end.
#
# Mechanism (Step 0 decision — AUTH-09, revised):
#   ADB `svc wifi/data disable` via seed-and-run-sso-fallback.sh wrapper.
#   Earlier revisions toggled airplane mode via `am broadcast`, but that
#   intent requires signature-level BROADCAST_AIRPLANE_MODE and emulators
#   reject it with Permission Denial. `svc wifi/data` requires no special
#   permission and actually disables the radios. The wrapper disables
#   network BEFORE Maestro starts, so the in-app Chrome Custom Tab cannot
#   reach Google's OAuth endpoint. sso-callback.tsx has a 10-second timer
#   (SSO_TIMEOUT_MS = 10_000) that fires and shows the fallback button.
#
# testIDs verified against source:
#   google-sso-button    apps/mobile/src/app/(auth)/sign-in.tsx line 1198
#   sso-fallback-back    apps/mobile/src/app/sso-callback.tsx line 48
#   sign-in-button       apps/mobile/src/app/(auth)/sign-in.tsx line 1293
#   sign-in-screen       apps/mobile/src/app/(auth)/sign-in.tsx line 1090
#
# Run command:
#   ./e2e/scripts/seed-and-run-sso-fallback.sh e2e/flows/auth/sso-callback-fallback.yaml
#
# Tags: weekly, auth
appId: com.mentomate.app
tags:
  - weekly
  - auth
---
# ── Step 1: Confirm we are on the sign-in screen ──
# seed-and-run-sso-fallback.sh runs seed-and-run.sh --no-seed which brings
# the app to the sign-in screen before Maestro takes over.
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- takeScreenshot: sso-fallback-01-sign-in-screen

# ── Step 2: Scroll Google SSO button into view and tap it ──
# [BUG-959] sign-in-button can sit below fold on 1080x1920; SSO button is
# always above fold but scroll ensures it is tappable on all screen sizes.
- scrollUntilVisible:
    element:
      id: "google-sso-button"
    direction: UP
    timeout: 5000

- assertVisible:
    id: "google-sso-button"

- takeScreenshot: sso-fallback-02-before-sso-tap

- tapOn:
    id: "google-sso-button"

# ── Step 3: Wait for sso-callback screen (in-app browser opens then fails) ──
# With wifi + mobile data disabled, Chrome Custom Tab cannot reach Google.
# The browser may briefly appear then close, or redirect immediately to the
# sso-callback route. Either way, sso-callback.tsx mounts and starts its
# 10-second timer.
#
# We wait up to 15s for the fallback button — covers the 10s timer plus
# network-error browser dismissal time. The ActivityIndicator has no testID
# so we wait directly for the fallback button.
- takeScreenshot: sso-fallback-03-after-sso-tap

- extendedWaitUntil:
    visible:
      id: "sso-fallback-back"
    timeout: 25000

- takeScreenshot: sso-fallback-04-fallback-button-visible

# ── Step 4: Tap fallback button and confirm return to sign-in ──
- tapOn:
    id: "sso-fallback-back"

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- assertVisible:
    id: "sign-in-button"

- takeScreenshot: sso-fallback-05-back-on-sign-in
