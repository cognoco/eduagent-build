# Flow AUTH-13a: Deep-link Auth Redirect — Signed-out bounce
#
# Validates: when a signed-out user opens mentomate:///library via an external
# deep link, the (app)/_layout.tsx bounce persists the target in
# pendingAuthRedirect, routes to sign-in, and after successful authentication
# the user lands on library-screen (NOT home-screen).
#
# Mechanism (Step 0 decision):
#   Maestro openLink fires an ACTION_VIEW intent for mentomate:///library while
#   the app is on the sign-in screen. The (app)/_layout.tsx intercepts via
#   rememberPendingAuthRedirect and redirects. After sign-in, (auth)/_layout.tsx
#   reads the pending record and replaces to the original target.
#
# testIDs verified against source:
#   sign-in-screen    apps/mobile/src/app/(auth)/sign-in.tsx line 1090
#   sign-in-email     apps/mobile/src/app/(auth)/sign-in.tsx
#   sign-in-password  apps/mobile/src/app/(auth)/sign-in.tsx
#   sign-in-button    apps/mobile/src/app/(auth)/sign-in.tsx line 1293
#   library-screen    apps/mobile/src/app/(app)/library.tsx (root View)
#   home-screen       apps/mobile/src/app/(app)/home.tsx (root View)
#
# Run command:
#   ./e2e/scripts/seed-and-run.sh --no-seed e2e/flows/auth/deep-link-redirect-signed-out.yaml
#
# Tags: nightly, auth
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# ── Step 1: Confirm we are on the sign-in screen ──
# seed-and-run.sh --no-seed brings the app to the sign-in screen.
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- takeScreenshot: deep-link-signed-out-01-sign-in-screen

# ── Step 2: Fire the deep link while signed out ──
# The (app)/_layout.tsx intercepts the navigation attempt, calls
# rememberPendingAuthRedirect("/(app)/library"), and stays on sign-in.
- openLink: "mentomate:///library"

# Brief pause to let the bounce resolve (up to 2 s per spec).
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 5000

- takeScreenshot: deep-link-signed-out-02-after-open-link

# ── Step 3: Sign in with seeded credentials ──
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

- pressKey: back

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

- pressKey: back

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

- takeScreenshot: deep-link-signed-out-03-after-sign-in-tap

# ── Step 4: Assert post-auth landing is library, not home ──
# (auth)/_layout.tsx reads the pending record and router.replace to library.
- extendedWaitUntil:
    visible:
      id: "library-screen"
    timeout: 15000

- assertNotVisible:
    id: "home-screen"

- takeScreenshot: deep-link-signed-out-04-landed-on-library
