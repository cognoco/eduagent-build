# Flow AUTH-13c: Deep-link Auth Redirect — TTL expired fallback
#
# Validates: when a pending-redirect record has expired (savedAt > 5 min ago),
# post-sign-in navigation falls back to home-screen, NOT to the original
# deep-link target (library-screen).
#
# Mechanism:
#   1. seed-and-run.sh seeds an onboarding-complete user; app lands on sign-in.
#   2. Maestro fires openLink to the dev-only seed route, which calls
#      seedPendingAuthRedirectForTesting('/(app)/library', 360000). The
#      savedAt is backdated by 360000ms (6 min), exceeding the 5-min TTL.
#      The seed route then router.replace to bare /(auth)/sign-in (NO
#      redirectTo param — that would overwrite the stale record).
#   3. Maestro signs in via _setup/sign-in-only.yaml.
#   4. (auth)/_layout.tsx calls peekPendingAuthRedirect, which finds the
#      record stale and returns null. The fallback /(app)/home is used.
#
# Pre-req:
#   The APK MUST be built with EXPO_PUBLIC_E2E=true. Without it the seed route
#   renders null and the seedPendingAuthRedirectForTesting call is never made.
#   The flow will fail at the pending-redirect-seeded step if the flag is absent.
#
# testIDs verified against source:
#   sign-in-screen          apps/mobile/src/app/(auth)/sign-in.tsx
#   pending-redirect-seeded apps/mobile/src/app/dev-only/seed-pending-redirect.tsx
#   home-screen             apps/mobile/src/app/(app)/home.tsx:132
#   library-screen          apps/mobile/src/app/(app)/library.tsx (root View)
#
# Run command:
#   ./e2e/scripts/seed-and-run.sh onboarding-complete e2e/flows/auth/deep-link-redirect-ttl-expired.yaml
#
# Tags: nightly, auth
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# ── Step 1: Confirm we are on the sign-in screen ──
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- takeScreenshot: deep-link-ttl-01-sign-in-screen

# ── Step 2: Fire the dev-only seed route ──
# staleMs=360000 (6 min) > PENDING_AUTH_REDIRECT_TTL_MS (5 min = 300000).
- openLink: "mentomate:///dev-only/seed-pending-redirect?path=%2F(app)%2Flibrary&staleMs=360000"

# ── Step 3: Confirm the seed ran ──
- extendedWaitUntil:
    visible:
      id: "pending-redirect-seeded"
    timeout: 8000

- takeScreenshot: deep-link-ttl-02-seed-screen-visible

# ── Step 4: Wait for sign-in screen (seed route auto-redirects) ──
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- takeScreenshot: deep-link-ttl-03-back-on-sign-in

# ── Step 5: Sign in via canonical sign-in flow ──
- runFlow:
    file: ../_setup/sign-in-only.yaml

- takeScreenshot: deep-link-ttl-04-after-sign-in

# ── Step 6: Assert TTL fallback landed on home, not library ──
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

- assertNotVisible:
    id: "library-screen"

- takeScreenshot: deep-link-ttl-05-fallback-to-home
