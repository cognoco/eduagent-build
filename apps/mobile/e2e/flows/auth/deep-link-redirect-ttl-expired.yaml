# Flow AUTH-13c: Deep-link Auth Redirect — TTL expired fallback
#
# Validates: when a pending-redirect record has expired (savedAt > 5 min ago),
# post-sign-in navigation falls back to home-screen, NOT to the original
# deep-link target (library-screen).
#
# Mechanism:
#   1. Sign in, then seed a FRESH library redirect through the authenticated
#      E2E route. Its explicit action performs normal sign-out cleanup, re-seeds
#      afterward, and opens sign-in. Signing in must land on Library. This is the
#      positive control proving the seam and replay path actually work.
#   2. Repeat with savedAt backdated by 360000ms (6 min), exceeding the 5-min
#      TTL. The same sign-in must now land on Home, not Library.
#
# Pre-req:
#   The APK MUST be built with EXPO_PUBLIC_E2E=true. Without it the seed route
#   renders null and the seedPendingAuthRedirectForTesting call is never made.
#   The receipt plus fresh-control Library landing fail if the seam is absent.
#
# testIDs verified against source:
#   pending-redirect-seeded   apps/mobile/src/app/dev-only/seed-pending-redirect.tsx
#   pending-redirect-sign-out apps/mobile/src/app/dev-only/seed-pending-redirect.tsx
#   sign-in-screen            apps/mobile/src/app/(auth)/sign-in.tsx
#   home-screen               apps/mobile/src/app/(app)/home.tsx:132
#   library-screen            apps/mobile/src/app/(app)/library.tsx (root View)
#
# Run command:
#   ./e2e/scripts/seed-and-run.sh onboarding-complete e2e/flows/auth/deep-link-redirect-ttl-expired.yaml
#
# Tags: nightly, auth
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# ── Step 1: Establish the authenticated session required by the seed route ──
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: 'home-screen'
    timeout: 30000

# ── Step 2: Positive control — a fresh redirect must replay to Library ──
- openLink: 'mentomate:///dev-only/seed-pending-redirect?path=%2F(app)%2Flibrary&staleMs=0'

- extendedWaitUntil:
    visible:
      id: 'pending-redirect-seeded'
    timeout: 10000

- tapOn:
    id: 'pending-redirect-sign-out'

- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 15000

- tapOn:
    id: 'sign-in-email'
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    id: 'sign-in-password'
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: 'sign-in-button'

- extendedWaitUntil:
    visible:
      id: 'library-screen'
    timeout: 30000

- takeScreenshot: deep-link-ttl-01-fresh-control-library

# ── Step 3: Expired record — identical replay must fall back to Home ──
- openLink: 'mentomate:///dev-only/seed-pending-redirect?path=%2F(app)%2Flibrary&staleMs=360000'

- extendedWaitUntil:
    visible:
      id: 'pending-redirect-seeded'
    timeout: 10000

- tapOn:
    id: 'pending-redirect-sign-out'

- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 15000

- tapOn:
    id: 'sign-in-email'
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    id: 'sign-in-password'
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: 'sign-in-button'

- extendedWaitUntil:
    visible:
      id: 'home-screen'
    timeout: 30000

- assertNotVisible:
    id: 'library-screen'

- takeScreenshot: deep-link-ttl-02-expired-fallback-home
