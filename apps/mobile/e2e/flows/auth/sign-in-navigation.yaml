# Flow A2: Auth Screen Navigation
# Validates: navigation between all auth screens (sign-in, sign-up,
# forgot-password) and that each screen renders correctly.
# Tags: nightly, auth
#
# Journey: Auth screen discovery
# Screens: sign-in → sign-up → sign-in → forgot-password → sign-in
#
# This flow does NOT perform actual authentication. It verifies that all
# auth screens are reachable and that navigation links work correctly.
appId: com.mentomate.app
tags:
  - nightly
  - auth
---
# 1. seed-and-run.sh has already launched the app and landed it on the
# sign-in screen before Maestro starts. Just wait for it to settle.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000

# ── Sign-in screen ──────────────────────────────────────────────────
# [BUG-959] On 1080x1920 the Sign in button + Sign up link sit below the
# fold once logo + Google SSO + form fields stack up. Wait on the screen
# container (always above-fold), then scroll the CTA + sign-up link into
# view before asserting/tapping.

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

# 3. Verify all sign-in screen elements
- assertVisible: "Sign in to start learning"
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"
- assertVisible:
    id: "forgot-password-link"
- assertVisible:
    id: "sign-up-link"

- takeScreenshot: auth-nav-sign-in

# Visual audit: tap email field to show keyboard state
- tapOn:
    id: "sign-in-email"
- takeScreenshot: auth-nav-sign-in-keyboard

# Bring CTA back into view after keyboard interaction.
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "sign-in-button"

# ── Navigate to sign-up ─────────────────────────────────────────────

# 4. Tap sign-up link
- tapOn:
    id: "sign-up-link"

# 5. Verify sign-up screen is visible
- extendedWaitUntil:
    visible:
      text: "Create account"
    timeout: 5000

- assertVisible: "Start your learning journey"
- assertVisible:
    id: "sign-up-email"
- assertVisible:
    id: "sign-up-password"

- scrollUntilVisible:
    element:
      id: "sign-up-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-up-button"

# The "Already have an account? Sign in" row sits BELOW the primary CTA;
# the previous scroll parks the viewport at the button, so a second scroll
# is needed to bring the link on-screen before asserting/tapping it.
- scrollUntilVisible:
    element:
      id: "sign-in-link"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-link"

- takeScreenshot: auth-nav-sign-up

# ── Navigate back to sign-in ────────────────────────────────────────

# 6. Tap sign-in link on sign-up screen
- tapOn:
    id: "sign-in-link"

# 7. Verify back on sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 5000

- assertVisible:
    id: "sign-in-email"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"

# ── Navigate to forgot-password ─────────────────────────────────────

# 8. Tap forgot-password link
- tapOn:
    id: "forgot-password-link"

# 9. Verify forgot-password screen is visible
- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 5000

- assertVisible: "We'll send a reset code to your email"
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

- takeScreenshot: auth-nav-forgot-password

# ── Navigate back to sign-in ────────────────────────────────────────

# 10. Tap back-to-sign-in link
- tapOn:
    id: "back-to-sign-in"

# 11. Verify back on sign-in screen
# [BUG-963] After back-nav from forgot-password the form re-mounts at the
# top, leaving the Sign in button below the fold. Use the screen container
# as the loaded signal, then scroll the CTA into view.
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 5000

- assertVisible:
    id: "sign-in-email"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"

- takeScreenshot: auth-nav-back-to-sign-in
