# Flow A1: Forgot Password — dev-client variant
# Tests forgot-password screen rendering, email entry, and submit behavior.
# Does NOT relaunch app (assumes app is already on sign-in screen).
appId: com.mentomate.app
tags:
  - devclient
  - auth
---
# ── Navigate to forgot-password ─────────────────────────────────────

- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 10000

- tapOn:
    id: "forgot-password-link"

- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 10000

# ── Verify forgot-password screen ───────────────────────────────────

- assertVisible: "We'll send a reset code to your email"
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

- takeScreenshot: forgot-password-screen

# ── Test email input ────────────────────────────────────────────────

- tapOn:
    id: "forgot-password-email"
- inputText: "test-e2e-reset@example.com"

- takeScreenshot: forgot-password-email-entered

# ── Submit reset code request ───────────────────────────────────────
# NOTE: Without a Clerk backend, this may show an error. That's OK —
# we're testing that the button is tappable and triggers a response.
# BUG-3: Keyboard covers the submit button after email entry.
# Must dismiss keyboard first.

- hideKeyboard

- tapOn:
    id: "send-reset-code-button"

# Wait briefly for any response (error or success)
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 5000
    optional: true

- takeScreenshot: forgot-password-after-submit

# ── Navigate back to sign-in ────────────────────────────────────────

- tapOn:
    id: "back-to-sign-in"

- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 10000

- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-button"

- takeScreenshot: forgot-password-back-to-sign-in
