# Flow A1: Forgot Password — dev-client variant
# Tests forgot-password screen rendering, email entry, and submit behavior.
# Does NOT relaunch app (assumes app is already on sign-in screen).
appId: com.mentomate.app
tags:
  - devclient
  - auth
---
# ── Navigate to forgot-password ─────────────────────────────────────
# [BUG-959] sign-in-button can be below fold on 1080x1920 — wait on the
# screen container instead, which is always above the fold.

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- tapOn:
    id: "forgot-password-link"

- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 10000

# ── Verify forgot-password screen ───────────────────────────────────

- assertVisible: "We'll send a reset code to your email"
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

- takeScreenshot: forgot-password-screen

# ── Test email input ────────────────────────────────────────────────

- tapOn:
    id: "forgot-password-email"
- inputText: "test-e2e-reset@example.com"

- takeScreenshot: forgot-password-email-entered

# ── Submit reset code request ───────────────────────────────────────
# NOTE: Without a Clerk backend, this may show an error. That's OK —
# we're testing that the button is tappable and triggers a response.
# BUG-3: Keyboard covers the submit button after email entry.
# Must dismiss keyboard first.

- hideKeyboard

- tapOn:
    id: "send-reset-code-button"

# Screenshot captures the post-submit state (success or error).
# Maestro uses literal string matching (not regex), so we cannot
# assert dynamic response text. The screenshot is the evidence.
- takeScreenshot: forgot-password-after-submit

# ── Navigate back to sign-in ────────────────────────────────────────
# [BUG-963] After back-nav from forgot-password, the sign-in form re-mounts
# scrolled to top. The Sign in button can sit below the fold on 1080x1920
# until the user scrolls — assert via the screen container, then explicitly
# scroll the CTA back into view.

- tapOn:
    id: "back-to-sign-in"

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- assertVisible:
    id: "sign-in-email"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"

- takeScreenshot: forgot-password-back-to-sign-in
