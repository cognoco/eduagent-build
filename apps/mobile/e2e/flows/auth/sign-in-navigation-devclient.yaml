# Auth Screen Navigation — dev-client variant
# Tests navigation between sign-in, sign-up, and forgot-password screens.
# Does NOT relaunch app (assumes app is already on sign-in screen).
appId: com.mentomate.app
tags:
  - devclient
  - auth
---
# ── Sign-in screen ──────────────────────────────────────────────────
# [BUG-959] On 1080x1920 (~5.8" devices) the Sign in button + Sign up link
# render below the fold once logo + Google SSO + form fields stack up. The
# screen is in a ScrollView with minHeight: SCREEN_HEIGHT, so they're always
# reachable — but the test must scrollUntilVisible before asserting/tapping.

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- assertVisible: "Sign in to start learning"
- assertVisible:
    id: "google-sso-button"
- assertVisible:
    id: "sign-in-email"
- assertVisible:
    id: "sign-in-password"

# Scroll to bottom of the form so primary CTA + sign-up link are in view.
- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"
- assertVisible:
    id: "forgot-password-link"
- assertVisible:
    id: "sign-up-link"

- takeScreenshot: auth-nav-sign-in

# ── Navigate to sign-up ─────────────────────────────────────────────

- tapOn:
    id: "sign-up-link"

- extendedWaitUntil:
    visible:
      text: "Create account"
    timeout: 10000

- assertVisible: "Start your learning journey"
- assertVisible:
    id: "sign-up-email"
- assertVisible:
    id: "sign-up-password"

# [BUG-959] sign-up CTA + sign-in link sit below the fold on smaller
# screens — same root cause as the sign-in form.
- scrollUntilVisible:
    element:
      id: "sign-up-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-up-button"

# The "Already have an account? Sign in" row sits BELOW the primary CTA;
# scrollUntilVisible above parks the viewport at the button, so a second
# scroll is needed to bring the link on-screen before asserting/tapping it.
- scrollUntilVisible:
    element:
      id: "sign-in-link"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-link"

- takeScreenshot: auth-nav-sign-up

# ── Navigate back to sign-in ────────────────────────────────────────

- tapOn:
    id: "sign-in-link"

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- assertVisible:
    id: "sign-in-email"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"

# ── Navigate to forgot-password ─────────────────────────────────────

- tapOn:
    id: "forgot-password-link"

- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 10000

- assertVisible: "We'll send a reset code to your email"
- assertVisible:
    id: "forgot-password-email"
- assertVisible:
    id: "send-reset-code-button"
- assertVisible:
    id: "back-to-sign-in"

- takeScreenshot: auth-nav-forgot-password

# ── Navigate back to sign-in ────────────────────────────────────────

- tapOn:
    id: "back-to-sign-in"

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

- assertVisible:
    id: "sign-in-email"

- scrollUntilVisible:
    element:
      id: "sign-in-button"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "sign-in-button"

- takeScreenshot: auth-nav-back-to-sign-in
