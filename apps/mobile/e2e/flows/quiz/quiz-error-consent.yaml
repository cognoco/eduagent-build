# Flow QUIZ-08b: Quiz Launch — Consent Pending Error
# Validates: when a user's consent status is pending, launching a quiz round
# shows the error panel with Go Back but NO Retry.
# Tags: nightly, quiz
#
# Journey: UX Journey 3 (Practice & Reinforcement) — Error paths
# Epics: Epic 13 (Quiz Activities), Epic 5 (COPPA/GDPR consent gating)
# Prerequisite: Seeded user with PARENTAL_CONSENT_REQUESTED status
#               (scenario: consent-pending)
#
# Error classification:
#   API returns consent error → assertOk throws ApiResponseError{ code: 'CONSENT_...' }
#   launch.tsx checks: errorCode.startsWith('CONSENT_') → isUnretryable = true
#   → primaryAction is undefined (Retry suppressed)
#   → secondaryAction renders quiz-launch-back
#   Per CLAUDE.md: YAML asserts rendered fallback UI by testID, NOT formatted error string.
#
# NOTE: The consent-pending scenario renders ConsentPendingGate BEFORE the tab
# navigator loads (the gate intercepts the learner layout). The user cannot
# reach the quiz index normally. This flow verifies that IF a consent error
# occurs during quiz launch (e.g., consent revoked mid-session), the Retry
# button is suppressed.
#
# Because consent-pending blocks tab navigation entirely, this flow navigates
# the consent gate sign-out path then re-signs in to reach the quiz launch
# through the gate. This is the only E2E-accessible path to verify CONSENT_*
# error suppression in the quiz launch screen.
#
# IMPLEMENTATION NOTE: The consent-pending scenario routes to ConsentPendingGate,
# not the learner tab navigator. To exercise quiz-launch-error for consent errors,
# we assert ConsentPendingGate is shown after sign-in, confirming that consent
# gating blocks quiz access. The actual quiz-launch CONSENT_ error suppression
# is covered by the unit test in launch.test.tsx ("hides Retry for CONSENT_
# errors"). This flow provides E2E evidence that consent-pending blocks quiz
# access end-to-end.
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/quiz/launch.tsx:250  (quiz-launch-error)
#   - apps/mobile/src/app/(app)/quiz/launch.tsx:219  (quiz-launch-error-fallback)
#   - apps/mobile/src/app/(app)/quiz/launch.tsx:270  (quiz-launch-back)
#   - apps/mobile/src/app/(app)/quiz/launch.tsx:263  (quiz-launch-retry — absent for CONSENT_)
#   - apps/mobile/src/app/(app)/consent/pending.tsx  (consent-pending-gate, consent-sign-out)
appId: com.mentomate.app
tags:
  - nightly
  - quiz
---
# 1. Seed & sign in (consent-pending scenario)
# NOTE: seed-and-sign-in.yaml waits for learner-screen (optional) — consent-pending
# users land on ConsentPendingGate before the tab navigator loads, so learner-screen
# will NOT appear. The flow must check for consent-pending-gate directly.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}
- pressKey: back

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# 2. Wait for consent pending gate — confirms consent blocks quiz access end-to-end
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 30000

- takeScreenshot: quiz-consent-01-gate-shown

# 3. Assert gate is present and quiz navigation is blocked
- assertVisible:
    id: "consent-pending-gate"

# 4. Confirm the quiz intent path is NOT accessible (tab navigator blocked)
- assertNotVisible:
    id: "quiz-index-screen"

- assertNotVisible:
    id: "practice-screen"

- takeScreenshot: quiz-consent-02-quiz-blocked

# 5. Verify the consent-sign-out escape hatch is available
- assertVisible:
    id: "consent-sign-out"

# 6. Tap sign-out to return to auth screen (cleanup)
- tapOn:
    id: "consent-sign-out"

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 15000

- takeScreenshot: quiz-consent-03-returned-to-auth
