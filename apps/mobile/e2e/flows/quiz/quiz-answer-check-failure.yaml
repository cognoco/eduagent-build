# Flow QUIZ-13: Answer-Check Failure Warning (IMP-7 / BUG-799)
# Validates: a deterministic 409 from POST /quiz/rounds/:id/check renders the
# inline warning and leaves a non-final round able to continue.
# Tags: nightly, quiz
#
# The seed exports a completed two-question Capitals round. The E2E-only
# roundId launch path loads that exact fixture; submitting question 1 must hit
# the completed-round conflict instead of generating a fresh, successful round.
appId: com.mentomate.app
tags:
  - nightly
  - quiz
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'quiz-answer-check-fails'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 30000

- takeScreenshot: quiz-check-fail-01-home

- openLink: 'mentomate:///quiz/launch?activityType=capitals&subjectId=${SUBJECT_ID}&roundId=${ROUND_ID}'

- extendedWaitUntil:
    visible:
      id: 'quiz-play-screen'
    timeout: 30000

- takeScreenshot: quiz-check-fail-02-seeded-round

- extendedWaitUntil:
    visible:
      id: 'quiz-option-0'
    timeout: 10000

- tapOn:
    id: 'quiz-option-0'

# The completed fixture makes the check fail deterministically. Dismiss the
# native alert before asserting the in-app warning underneath it.
- extendedWaitUntil:
    visible:
      text: "Couldn't check your answer"
    timeout: 10000

- tapOn:
    text: 'OK'

- extendedWaitUntil:
    visible:
      id: 'quiz-answer-check-failed'
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: 'quiz-next-question-footer'
    timeout: 10000

- takeScreenshot: quiz-check-fail-03-warning-and-continuation

- assertVisible:
    id: 'quiz-play-screen'

# Leave through the real quit path while question 1 of 2 is resolved.
- tapOn:
    id: 'quiz-play-quit'

- extendedWaitUntil:
    visible:
      id: 'quiz-quit-modal-backdrop'
    timeout: 5000

- tapOn:
    id: 'quiz-quit-confirm'

- extendedWaitUntil:
    visible:
      id: 'quiz-index-screen'
    timeout: 15000

- takeScreenshot: quiz-check-fail-04-done
