# Flow QUIZ-12: Wrong-Answer Dispute (BUG-927)
# Validates:
#   (a) A wrong answer exposes quiz-dispute-button.
#   (b) Tapping it shows quiz-dispute-noted and hides the button.
#   (c) A correct answer does not expose quiz-dispute-button.
#
# The seed returns an active three-question vocabulary round plus stable answer
# text. The launch route accepts roundId only in EXPO_PUBLIC_E2E builds, so this
# exercises the real API check/dispute UI without generating a random round or
# adding a production deep-link surface.
appId: com.mentomate.app
tags:
  - nightly
  - quiz
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'quiz-deterministic-wrong-answer'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 30000

- openLink: 'mentomate:///quiz/launch?activityType=vocabulary&subjectId=${SUBJECT_ID}&roundId=${ROUND_ID}'

- extendedWaitUntil:
    visible:
      id: 'quiz-play-screen'
    timeout: 30000

- takeScreenshot: quiz-dispute-01-seeded-round

# Question 1: select the seed's known-wrong answer. Option positions are
# intentionally ignored because the API shuffles them on every fetch.
- tapOn:
    text: '${WRONG_ANSWER}'

- extendedWaitUntil:
    visible:
      id: 'quiz-next-question-footer'
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: 'quiz-dispute-button'
    timeout: 10000

- tapOn:
    id: 'quiz-dispute-button'

- extendedWaitUntil:
    visible:
      id: 'quiz-dispute-noted'
    timeout: 5000

- assertNotVisible:
    id: 'quiz-dispute-button'

- takeScreenshot: quiz-dispute-02-dispute-noted

- tapOn:
    id: 'quiz-next-question'

# Question 2: select the seed's known-correct answer and prove the dispute
# affordance remains absent. This is deliberately not the final question,
# avoiding the final-answer auto-submit path as a false suppression receipt.
- extendedWaitUntil:
    visible: '${CORRECT_ANSWER}'
    timeout: 10000

- tapOn:
    text: '${CORRECT_ANSWER}'

- extendedWaitUntil:
    visible:
      id: 'quiz-next-question-footer'
    timeout: 10000

- assertNotVisible:
    id: 'quiz-dispute-button'

- takeScreenshot: quiz-dispute-03-correct-no-dispute

# Leave the still-active three-question round through the real quit path.
- tapOn:
    id: 'quiz-play-quit'

- extendedWaitUntil:
    visible:
      id: 'quiz-quit-modal-backdrop'
    timeout: 5000

- tapOn:
    id: 'quiz-quit-confirm'

- extendedWaitUntil:
    visible:
      id: 'quiz-index-screen'
    timeout: 15000

- takeScreenshot: quiz-dispute-04-done
