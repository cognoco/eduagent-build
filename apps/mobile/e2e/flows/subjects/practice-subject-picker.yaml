# Flow: Practice Subject Picker — Entry via redesigned home action button
# Validates: tapping "home-action-practice" navigates to the Practice screen.
# The old adaptive practice footer action and bottom-sheet
# subject picker (practice-subject-picker) were removed in the home-screen
# redesign. The Practice hub is now a standalone screen at /(app)/practice.
#
# Story: 10.23 (Subject auto-inference — Practice entry)
# Tags: pr-blocking, subjects
#
# Journey: UX Journey 2 (Daily Learning Loop — Practice entry)
# Epics: Epic 10 (FR — Subject Auto-Inference)
# Prerequisite: Seeded user with active subjects (scenario: multi-subject)
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (learner-screen,
#     home-subject-carousel, home-action-practice)
#   - apps/mobile/src/app/(app)/practice.tsx (practice-screen)
appId: com.mentomate.app
tags:
  - pr-blocking
  - subjects
---
# ── 1. Seed & sign in ─────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "multi-subject"
      API_URL: ${API_URL}

# ── 2. Wait for home screen ───────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: practice-picker-01-home

# ── 3. Verify intent card stack is loaded ──────────────────────────────
- assertVisible:
    id: "home-subject-carousel"

- takeScreenshot: practice-picker-02-carousel-visible

# ── 4. Tap the Practice quick-action button ───────────────────────────
# home-action-practice is the redesigned quick-action button in LearnerScreen.
# It navigates to /(app)/practice without a subject-picker modal.
- tapOn:
    id: "home-action-practice"

# ── 5. Verify Practice screen loads ──────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "practice-screen"
    timeout: 10000

- takeScreenshot: practice-picker-03-practice-screen
