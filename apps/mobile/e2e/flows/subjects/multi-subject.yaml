# Flow N5: Multi-Subject Management — View and Navigate Subjects
# Validates: user with multiple subjects (active, paused, archived) can
# view subjects on home screen, navigate between tabs, and see subject detail.
# Tags: nightly, subjects
#
# Journey: UX Journey 1 (Subject Management)
# Epics: Epic 1 (FR10-FR14), Epic 4 (FR70-FR72)
# Prerequisite: Seeded user with Physics (active), Literature (paused),
#               Art History (archived) (scenario: multi-subject)
appId: com.mentomate.app
tags:
  - nightly
  - subjects
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "multi-subject"
      API_URL: ${API_URL}

# 2. Home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# ── Visual integrity: tab bar ──────────────────────────────────────────
# All 3 tabs must render with correct testIDs. Catches missing icons (BUG-53),
# hidden tabs (BUG-10), and tab bar rendering failures.
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-library"
- assertVisible:
    id: "tab-more"

# ── Visual integrity: intent card stack ────────────────────────────────
# With active subjects, the intent cards must render (not loading spinner forever).
- assertVisible:
    id: "home-subject-carousel"

# 3. Screenshot: home screen — captures what's actually rendering
- takeScreenshot: multi-subject-01-home

# 4. Physics (active subject) MUST be visible on home screen
- extendedWaitUntil:
    visible:
      text: "Physics"
    timeout: 10000

# ── Visual integrity: subject list section ─────────────────────────────
# "Your subjects" heading must appear when subjects exist.
# Catches empty-state rendering when data should be present (BUG-31 pattern).
- scrollUntilVisible:
    element:
      text: "Your subjects"
    direction: DOWN
    timeout: 5000

# ── Negative assertions: empty-state must NOT appear with real data ───
# If seeded with subjects, the empty-state placeholder must not render.
# Catches counter mismatch bugs where data loads but empty UI shows.
# Full text match required — Maestro on Android can't reliably match substrings
# inside React Native <Text> nodes (BUG-57 pattern).
- assertNotVisible:
    text: "Start learning — add your first subject"

# 5. Navigate to Library tab
- tapOn: "Library Tab"

# 6. Wait for Library to render
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 7. Screenshot: Library content
- takeScreenshot: multi-subject-02-library

# 8. Navigate back to Home tab
- tapOn: "Home Tab"

# 9. Verify home screen is visible again
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 10. Verify Physics still visible after round-trip
- assertVisible:
    text: "Physics"

# 11. Tap the Physics subject card via testID (more reliable than text: "Physics"
#     which can match multiple elements on screen — coaching card, subject card, etc.)
#     seed-and-run.sh provides ACTIVE_SUBJECT_ID for the Physics subject.
- tapOn:
    id: "home-subject-${ACTIVE_SUBJECT_ID}"

# 12. Wait for curriculum review screen (navigated from home tap).
#     home.tsx navigates to /(learner)/onboarding/curriculum-review.
- extendedWaitUntil:
    visible:
      id: "curriculum-back"
    timeout: 10000

# 14. Navigate back to home screen (Android hardware Back key)
- pressKey: Back

# 15. Verify back on home screen after curriculum round-trip
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 16. Final screenshot
- takeScreenshot: multi-subject-03-back-home
