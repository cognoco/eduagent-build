# Flow N5: Multi-Subject Management — View and Navigate Subjects
# Validates: user with multiple subjects (active, paused, archived) can
# view subjects on home screen, navigate to Library v3 (single-pane shelf list),
# and return to home.
# Tags: pr-blocking, subjects
#
# Journey: UX Journey 1 (Subject Management)
# Epics: Epic 1 (FR10-FR14), Epic 4 (FR70-FR72)
# Prerequisite: Seeded user with Physics (active), Literature (paused),
#               Art History (archived) (scenario: multi-subject)
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (learner-screen,
#     home-subject-carousel, home-subject-card-${id})
#   - apps/mobile/src/app/(app)/library.tsx (shelves-list)
#   - apps/mobile/src/app/(app)/_layout.tsx (tab-library, tab-home)
#
# BLOCKED (WI-2596): quarantined from the pr-blocking gate 2026-07-22.
#   Reason: after tapping the subject card the `assertVisible: id: progress-subject-back`
#     step fails on main — the subject progress screen renders its error state
#     (progress-subject-error / progress-subject-error-back, apps/mobile/src/app/(app)/
#     progress/[subjectId]/index.tsx) instead of the normal back button. Attribution
#     caveat: this flow was a FALSE GREEN before — a shard-runner stdin-drain bug (fixed
#     by WI-2215, 42554029a, 2026-07-19) masked it, so it never actually executed; its
#     first genuine run (run 29705277605, 59fa66f8, 2026-07-19) failed. There is thus no
#     real green baseline to bisect — the underlying cause (the seeded subject's progress
#     not being producible, or a pre-existing issue hidden by the mask) needs device/DB
#     confirmation. The assertion is correct and left intact (WI-2596 AC-5).
#   Owner (fix + device-verify): WI-2600.
#   Expires: 2026-08-19 — re-triage if still quarantined.
#   Unblock: reproduce on an emulator, fix the seed/flow so the subject progress screen
#     renders (not its error state), re-verify green, then restore the `pr-blocking` tag
#     and re-add this flow to apps/mobile/e2e/ci-maestro-manifest.json.
appId: com.mentomate.app
tags:
  - blocked
  - subjects
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "multi-subject"
      API_URL: ${API_URL}

# 2. Home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# ── Visual integrity: tab bar ──────────────────────────────────────────
# All 3 tabs must render with correct testIDs. Catches missing icons (BUG-53),
# hidden tabs (BUG-10), and tab bar rendering failures.
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-library"
- assertVisible:
    id: "tab-more"

# ── Visual integrity: subject carousel ────────────────────────────────
# With active subjects, the carousel must render (not loading spinner forever).
# The carousel sits below the action chips on the current LearnerScreen layout,
# so scroll until it's on-screen before asserting.
- scrollUntilVisible:
    element:
      id: "home-subject-carousel"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "home-subject-carousel"

# 3. Screenshot: home screen — captures what's actually rendering
- takeScreenshot: multi-subject-01-home

# 4. Physics (active subject) card MUST be visible in the now-on-screen carousel.
#    home-subject-card-${id} is the testID in LearnerScreen.tsx (home-subject-carousel).
#    seed-and-run.sh provides ACTIVE_SUBJECT_ID for the Physics subject.
- extendedWaitUntil:
    visible:
      id: "home-subject-card-${ACTIVE_SUBJECT_ID}"
    timeout: 10000

# ── Negative assertions: empty-state must NOT appear with real data ───
# If seeded with subjects, the empty-state placeholder must not render.
- assertNotVisible:
    id: "home-empty-subjects"

# 5. Navigate to Library tab (v3 single-pane shelf list)
- tapOn:
    id: "tab-library"

# 6. Wait for Library v3 shelf list to render
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 7. Verify at least one shelf row is present for the active subject
- assertVisible:
    id: "shelf-row-header-${ACTIVE_SUBJECT_ID}"

# 8. Screenshot: Library v3 content
- takeScreenshot: multi-subject-02-library

# 9. Navigate back to Home tab
- tapOn:
    id: "tab-home"

# 10. Verify home screen is visible again
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 11. Tap the Physics subject card via testID.
#     home-subject-card-${id} is in LearnerScreen's carousel.
- tapOn:
    id: "home-subject-card-${ACTIVE_SUBJECT_ID}"

# 12. Wait for the subject progress screen (navigated from home tap).
- extendedWaitUntil:
    visible:
      id: "progress-subject-back"
    timeout: 10000

# 14. Navigate back to home screen (Android hardware Back key)
- pressKey: Back

# 15. Verify back on home screen after curriculum round-trip
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 16. Final screenshot
- takeScreenshot: multi-subject-03-back-home
