# Flow N3: Homework Submission — Create the Correct Subject and Send Work
# Validates: a learner with one unrelated subject can enter synthetic homework,
# create the correct subject inline, land in the scoped homework session, and
# receive AI feedback.
# Tags: nightly, homework
#
# Journey: UX Journey 2 (Homework phase)
# Epics: Epic 2 (FR30-FR34, Story 2.5)
# Prerequisite: Seeded user with completed learning session + subject
#               (scenario: homework-ready)
appId: com.mentomate.app
tags:
  - nightly
  - homework
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'homework-ready'
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# 3. Navigate to homework via intent card (replaced coaching-card-primary).
#    The homework-ready scenario seeds homework intent.
- tapOn:
    id: 'home-action-homework'

# 4. Camera permission dialog may appear — grant it, then continue to viewfinder.
#    On emulator after pm clear, camera permission is undetermined; the screen
#    shows grant-permission-button. After granting, phase transitions to viewfinder.
- tapOn:
    id: 'grant-permission-button'
    optional: true # justified: system camera permission dialog only appears on first run or after permission reset; not shown every time

# 5. Skip camera viewfinder — use manual text entry instead.
#    manual-entry-button appears on both the permission screen (in case
#    permission is denied) and the viewfinder. Tapping it calls
#    handleStartManualEntry() which transitions to the result/manual phase.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:841,908
- tapOn:
    id: 'manual-entry-button'

# 6. Manual entry phase: type a synthetic Biology problem into the first card.
#    The seed's only subject is Algebra, so it is deliberately unrelated.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1152 (result-text-input)
- tapOn:
    id: 'result-text-input'
- inputText: 'Compare the structures of plant and animal cells'
- hideKeyboard

# 7. Subject classification may open the picker directly or show an automatic
#    suggestion. In the suggestion variant, Change opens the same picker.
- tapOn:
    id: 'change-subject-link'
    optional: true # justified: absent when classification already opened the manual subject picker

# 8. The picker must retain the seeded Algebra choice while exposing inline
#    creation. Type the correct new subject and continue exactly once.
- extendedWaitUntil:
    visible:
      id: 'camera-subject-input'
    timeout: 30000
- assertVisible:
    id: 'subject-pick-${SUBJECT_ID}'
- tapOn:
    id: 'camera-subject-input'
- inputText: 'Synthetic Biology'
- hideKeyboard
- tapOn:
    id: 'camera-continue-button'

# 9. Assert the final route, active learner profile, and new subject. The
#    returning greeting is rendered from activeProfile.displayName plus the
#    subjectName carried into the homework session route.
- extendedWaitUntil:
    visible:
      id: 'session-screen'
    timeout: 30000
- assertVisible:
    id: 'returning-session-greeting'
- assertVisible: '.*Homework Learner.*Synthetic Biology.*'
- assertVisible:
    id: 'chat-input'

# 10. Enter homework text in the session chat
- tapOn:
    id: 'chat-input'
- inputText: 'Plant cells have a cell wall and chloroplasts; animal cells do not'

# 11. Send message
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 12. Wait for AI response
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 15000

# 13. Screenshot
- takeScreenshot: homework-flow-complete
