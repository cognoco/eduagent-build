# Flow N3: Homework Submission — Navigate to Homework and Send Work
# Validates: user with completed learning session can access homework mode,
# enter homework text, and receive AI feedback.
# Tags: nightly, homework
#
# Journey: UX Journey 2 (Homework phase)
# Epics: Epic 2 (FR30-FR34, Story 2.5)
# Prerequisite: Seeded user with completed learning session + subject
#               (scenario: homework-ready)
appId: com.mentomate.app
tags:
  - nightly
  - homework
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "homework-ready"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

# 3. Navigate to homework from home screen
#    The homework button testID is homework-button-{subjectId}.
#    Since the seed subjectId is dynamic, try tapping by the "HW"
#    text label rendered on every homework button.
- tapOn:
    text: "HW"
    optional: true

# 4. Fallback — tap the "Homework help" action on the AdaptiveEntryCard
#    (visible for teen persona) which also navigates to homework.
- tapOn:
    text: "Homework help"
    optional: true

# 5. Camera permission may appear first — grant or skip
- tapOn:
    id: "grant-permission-button"
    optional: true

# 6. If camera screen appears, close it and use manual input instead
#    (camera hardware is unreliable on emulator — the original flow
#    tests the text-input homework path, not camera capture)
- tapOn:
    id: "close-button"
    optional: true

# 10. Wait for chat screen
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 11. Enter homework text
- tapOn:
    id: "chat-input"
- inputText: "Here is my homework answer: The quadratic formula is x = (-b +/- sqrt(b^2-4ac)) / 2a"

# 12. Send message
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 13. Wait for AI response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 14. Screenshot
- takeScreenshot: homework-flow-complete
