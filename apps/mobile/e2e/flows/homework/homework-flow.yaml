# Flow N3: Homework Submission — Navigate to Homework and Send Work
# Validates: user with completed learning session can access homework mode,
# enter homework text, and receive AI feedback.
# Tags: nightly, homework
#
# Journey: UX Journey 2 (Homework phase)
# Epics: Epic 2 (FR30-FR34, Story 2.5)
# Prerequisite: Seeded user with completed learning session + subject
#               (scenario: homework-ready)
appId: com.mentomate.app
tags:
  - nightly
  - homework
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "homework-ready"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to homework via intent card (replaced coaching-card-primary).
#    The homework-ready scenario seeds homework intent.
- tapOn:
    id: "home-action-homework"

# 4. Camera permission dialog may appear — grant it, then continue to viewfinder.
#    On emulator after pm clear, camera permission is undetermined; the screen
#    shows grant-permission-button. After granting, phase transitions to viewfinder.
- tapOn:
    id: "grant-permission-button"
    optional: true  # justified: system camera permission dialog only appears on first run or after permission reset; not shown every time

# 5. Skip camera viewfinder — use manual text entry instead.
#    manual-entry-button appears on both the permission screen (in case
#    permission is denied) and the viewfinder. Tapping it calls
#    handleStartManualEntry() which transitions to the result/manual phase.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:841,908
- tapOn:
    id: "manual-entry-button"

# 6. Manual entry phase: type the homework problem into the first problem card.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1152 (result-text-input)
- tapOn:
    id: "result-text-input"
- inputText: "The quadratic formula is x = (-b +/- sqrt(b^2-4ac)) / 2a"
- hideKeyboard

# 7. Subject auto-classification fires after text input. If the subject picker
#    appears, tap the seeded Algebra subject directly (navigateToSession is
#    called immediately — no confirm-button needed for the picker path).
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1337-1358
- tapOn:
    id: "subject-pick-${SUBJECT_ID}"
    optional: true  # justified: subject picker appears only when auto-classify returns multiple candidates or low confidence; auto-detect success uses confirm-button instead

# 8. If auto-classify resolved a subject without showing the picker,
#    confirm-button appears. Tap it to navigate to the homework session.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1463,1492
- tapOn:
    id: "confirm-button"
    optional: true  # justified: only present on auto-detect success path; subject-picker path already navigated to session in step 7

# 9. Wait for chat screen (landed via either the picker tap or confirm-button)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 10. Enter homework text in the session chat
- tapOn:
    id: "chat-input"
- inputText: "Here is my homework answer: The quadratic formula is x = (-b +/- sqrt(b^2-4ac)) / 2a"

# 11. Send message
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 12. Wait for AI response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 13. Screenshot
- takeScreenshot: homework-flow-complete
