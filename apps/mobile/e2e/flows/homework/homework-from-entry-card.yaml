# Flow: Homework Entry via AdaptiveEntryCard — Navigate from coaching card to homework
# Validates: teen persona taps the homework action, camera screen
# appears (or permission screen), falls back to manual text input, sends problem
# to AI, and receives a real Gemini response.
# Tags: nightly, homework
#
# Journey: UX Journey 2 (Homework phase — entry via coaching card)
# Epics: Epic 2 (FR30-FR34, Story 2.5)
# Prerequisite: Seeded user with completed learning session + subject
#               (scenario: homework-ready — provides "Algebra" subject)
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (learner-screen, home-action-homework)
#   - apps/mobile/src/app/(app)/homework/camera.tsx (grant-permission-button,
#     manual-entry-button, result-text-input, subject-pick-${SUBJECT_ID}, confirm-button)
#   - apps/mobile/src/components/session/ChatShell.tsx (chat-input, chat-messages)
#
# NOTE: The home homework action navigates to the camera screen.
# On emulator, the camera is unreliable — we skip to manual text input.
appId: com.mentomate.app
tags:
  - nightly
  - homework
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "homework-ready"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Tap homework action button
- tapOn:
    id: "home-action-homework"

# 4. Camera permission screen may appear — grant it (optional, may not appear)
- tapOn:
    id: "grant-permission-button"
    optional: true  # justified: system camera permission dialog — only appears on first use or after permission reset

# 5. Skip camera viewfinder — use manual text entry instead.
#    manual-entry-button appears on both the permission screen (denial path)
#    and the viewfinder. Tapping it calls handleStartManualEntry() which
#    transitions to the result/manual phase.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:841,908
- tapOn:
    id: "manual-entry-button"

# 6. Manual entry phase: type a homework problem into the first problem card.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1152 (result-text-input)
- tapOn:
    id: "result-text-input"
- inputText: "Solve 2x + 5 = 15"
- hideKeyboard

# 7. Subject auto-classification fires after text input. If the subject picker
#    appears, tap the seeded Algebra subject directly (navigateToSession is
#    called immediately — no confirm-button needed for the picker path).
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1337-1358
- tapOn:
    id: "subject-pick-${SUBJECT_ID}"
    optional: true  # justified: subject picker appears only when auto-classify returns multiple candidates or low confidence; auto-detect success uses confirm-button instead

# 8. If auto-classify resolved a subject without showing the picker,
#    confirm-button appears. Tap it to navigate to the homework session.
#    Source: apps/mobile/src/app/(app)/homework/camera.tsx:1463,1492
- tapOn:
    id: "confirm-button"
    optional: true  # justified: only present on auto-detect success path; subject-picker path already navigated to session in step 7

# 9. Wait for chat input — landed via picker tap or confirm-button
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 10. Type a homework problem (already typed above for subject classification;
#     the session may pre-populate it via route params — this confirms chat is active)
- tapOn:
    id: "chat-input"
- inputText: "Solve 2x + 5 = 15"
- hideKeyboard

# 11. Send to AI
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 12. Wait for AI response — real Gemini call, 30s timeout
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 13. Verify session is still active (didn't crash)
- assertVisible:
    id: "chat-messages"

# 14. Screenshot
- takeScreenshot: homework-from-entry-card-complete
