# Flow: Homework Entry via AdaptiveEntryCard — Navigate from coaching card to homework
# Validates: teen persona taps "Homework help" on the coaching card, camera screen
# appears (or permission screen), falls back to manual text input, sends problem
# to AI, and receives a real Gemini response.
# Tags: nightly, homework
#
# Journey: UX Journey 2 (Homework phase — entry via coaching card)
# Epics: Epic 2 (FR30-FR34, Story 2.5)
# Prerequisite: Seeded user with completed learning session + subject
#               (scenario: homework-ready — provides "Algebra" subject)
#
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/home.tsx (home-scroll-view)
#   - apps/mobile/src/components/coaching/AdaptiveEntryCard.tsx (coaching-card-primary)
#   - apps/mobile/src/app/(learner)/homework/camera.tsx (grant-permission-button,
#     close-button, manual-input, manual-continue-button)
#   - apps/mobile/src/components/session/ChatShell.tsx (chat-input, send-button)
#
# NOTE: The AdaptiveEntryCard's primary action (coaching-card-primary) is
# "Homework help" for the teen persona. Tapping it navigates to the camera screen.
# On emulator, the camera is unreliable — we skip to manual text input.
appId: com.mentomate.app
tags:
  - nightly
  - homework
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "homework-ready"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

# 3. Tap "Homework help" — primary action on AdaptiveEntryCard (teen persona)
#    The primary button testID is "coaching-card-primary" (from BaseCoachingCard).
- tapOn:
    id: "coaching-card-primary"

# 4. Camera permission screen may appear — grant it (optional, may not appear)
- tapOn:
    id: "grant-permission-button"
    optional: true

# 5. If camera viewfinder appears, close it to fall back to manual input
#    On emulator, camera hardware is unreliable — test the text-input path instead.
- tapOn:
    id: "close-button"
    optional: true

# 6. Fallback: if we ended up back on home, tap the HW button directly
#    The "HW" text label is on every homework button in the subject list.
- tapOn:
    text: "HW"
    optional: true

# 7. Handle camera permission screen again (from HW button path)
- tapOn:
    id: "grant-permission-button"
    optional: true

# 8. Close camera viewfinder again if it appeared
- tapOn:
    id: "close-button"
    optional: true

# 9. Wait for chat input — we may have arrived at the session screen
#    via auto-navigation when problemText is provided, or manual input route
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 10. Type a homework problem
- tapOn:
    id: "chat-input"
- inputText: "Solve 2x + 5 = 15"
- hideKeyboard

# 11. Send to AI
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 12. Wait for AI response — real Gemini call, 30s timeout
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 13. Verify session is still active (didn't crash)
- assertVisible:
    id: "chat-messages"

# 14. Screenshot
- takeScreenshot: homework-from-entry-card-complete
