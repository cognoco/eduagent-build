# DEFERRED:M1-COMPREHENSIVE — Full rewrite required.
# PHASE 3 (More-screen assertions) references stale sub-screen content.
# PHASE 5 (Theme Switching) references completely removed feature:
#   "Teen (Dark)", "Parent (Light)", "Eager Learner (Calm)" — zero matches in source.
#   "switch-to-teen" testID confirmed removed (in e2e-testid-integrity known-removed list).
#   "(parent)" route group no longer exists (dashboard.tsx is a Redirect stub).
# Hard tapOn calls in PHASE 5 (lines 234, 246, 262) will crash — not just optional assertions.
#
# Post-Auth Comprehensive E2E — dev-client variant
# Signs in with seeded test user, then tests all major post-auth screens.
# Prerequisite: API running at localhost:8787 with learning-active seed data.
# Prerequisite: App is on the sign-in screen (dev-client already connected).
# Prerequisite: Seed user must have bypass_client_trust=true in Clerk (CAPTCHA bypass).
#
# Seeded user: test-e2e+clerk_test@example.com / Mentomate2026xK
# Scenario: learning-active (has subject, session, topic)
appId: com.mentomate.app
tags:
  - devclient
  - post-auth
  - comprehensive
---
# ═══════════════════════════════════════════════════════════════════
# PHASE 1: Sign In
# ═══════════════════════════════════════════════════════════════════

# BUG-19: clearState moved to seed-and-run.sh (Maestro clearState unreliable).
# App state already cleared via ADB before Maestro starts.
- launchApp

# Dev-client launcher: wait for server entry and tap it
# METRO_URL is set by seed-and-run.sh (default: http://10.0.2.2:8081).
- extendedWaitUntil:
    visible: ${METRO_URL}
    timeout: 60000

- tapOn: ${METRO_URL}

# Dev menu overlay always appears after bundle load (BUG-2) — dismiss it
- extendedWaitUntil:
    visible: "Continue"
    timeout: 600000

- tapOn: "Continue"

# A second dev tools sheet may appear (MentoMate, Connected to, Reload, etc.)
# Only press BACK if the sheet is visible — otherwise BACK exits the app
# since the sign-in screen is the navigation root (BUG-14).
- runFlow:
    when:
      visible: "Reload"
    file: _setup/dismiss-devtools.yaml

# Now sign-in screen should be visible
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 30000

- tapOn:
    id: "sign-in-email"
- inputText: "test-e2e+clerk_test@example.com"

# Dismiss keyboard so password field becomes visible (BUG-3)
- hideKeyboard

- tapOn:
    id: "sign-in-password"
- inputText: "Mentomate2026xK"

# BUG-3: Must dismiss keyboard before tapping button (keyboard covers it on Android)
- hideKeyboard

- tapOn:
    id: "sign-in-button"

- takeScreenshot: 01-sign-in-tapped

# ═══════════════════════════════════════════════════════════════════
# PHASE 2: Home Screen Verification
# ═══════════════════════════════════════════════════════════════════

# Wait for home screen to load (API calls + rendering)
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 30000

- takeScreenshot: 02-home-screen-loaded

# Verify header text (teen persona default)
- assertVisible:
    text: "Your subjects"

# The coaching card should be visible (AdaptiveEntryCard for teen persona).
# Both prompts render for the teen persona today, but copy is sourced from
# the AdaptiveEntryCard rotation and may vary by persona/state — keep optional
# until the prompt set is locked.
- assertVisible:
    text: "Help with an assignment"
    optional: true  # justified: AdaptiveEntryCard prompt rotation — copy may change per persona/state
- assertVisible:
    text: "Just ask something"
    optional: true  # justified: AdaptiveEntryCard prompt rotation — copy may change per persona/state

# Verify the intent card stack exists (replaced add-subject-button + coaching card)
- assertVisible:
    id: "home-subject-carousel"

# Verify "Learn" intent card is visible (always-present, replaces add-subject-button)
- assertVisible:
    id: "home-action-study-new"

- takeScreenshot: 03-home-subjects-visible

# ═══════════════════════════════════════════════════════════════════
# PHASE 3: More Tab — Full Screen Test
# ═══════════════════════════════════════════════════════════════════

# Tap More tab — "More" is not truncated, reliable selector
- tapOn: "More"

- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

- takeScreenshot: 04-more-screen-top

# ── Legacy theme section: REMOVED (DEFERRED:M1-COMPREHENSIVE) ──
# Theme variants ("Teen (Dark)", "Eager Learner (Calm)", "Parent (Light)") are
# fully removed from the app (zero matches in source). Assertions removed so
# this section can be rebuilt against current settings copy when the flow is
# rewritten.

# ── Notifications section ──
- assertVisible:
    text: "Push notifications"
- assertVisible:
    text: "Weekly progress digest"

# ── Learning Accommodation section (below the fold — scroll first) ──
- swipe:
    start: "50%,70%"
    end: "50%,40%"

- assertVisible:
    id: "more-row-learning-preferences"

- takeScreenshot: 05-more-screen-middle

# ── Scroll to Account section ──
- swipe:
    start: "50%,70%"
    end: "50%,30%"

- extendedWaitUntil:
    visible:
      text: "Account"
    timeout: 10000

- takeScreenshot: 06-more-account-section

# ── Test Account section buttons ──
- assertVisible:
    text: "Profile"
- assertVisible:
    text: "Subscription"
- assertVisible:
    text: "Help & Support"
- assertVisible:
    text: "Privacy Policy"
- assertVisible:
    text: "Terms of Service"
# Export, Delete, Sign out are at the very bottom — scroll more
- swipe:
    start: "50%,70%"
    end: "50%,30%"

- assertVisible:
    text: "Export my data"

- assertVisible:
    text: "Delete account"

- assertVisible:
    id: "sign-out-button"

- takeScreenshot: 07-more-account-bottom

# ═══════════════════════════════════════════════════════════════════
# PHASE 4: Navigate into Account sub-screens
# ═══════════════════════════════════════════════════════════════════

# Scroll back up so Privacy Policy and Terms are visible (not scrolled past)
- swipe:
    start: "50%,30%"
    end: "50%,60%"

# ── Privacy Policy ──
- tapOn: "Privacy Policy"
- takeScreenshot: 08-privacy-policy
- pressKey: back

# Wait for More screen to return
- extendedWaitUntil:
    visible:
      text: "Account"
    timeout: 10000

# ── Terms of Service ──
- tapOn: "Terms of Service"
- takeScreenshot: 09-terms-of-service
- pressKey: back

- extendedWaitUntil:
    visible:
      text: "Account"
    timeout: 10000

# ═══════════════════════════════════════════════════════════════════
# PHASE 5: Theme Switching — REMOVED (DEFERRED:M1-COMPREHENSIVE)
# ═══════════════════════════════════════════════════════════════════
# Theme variants ("Eager Learner (Calm)", "Teen (Dark)", "Parent (Light)")
# are completely removed from the app. The `(parent)` route group no longer
# exists; the `switch-to-teen` testID is on the e2e-testid-integrity
# known-removed list. The previous hard tapOn calls to these labels would
# crash Maestro. This phase will be rewritten against the current settings
# surface when the comprehensive flow is rebuilt.

# ═══════════════════════════════════════════════════════════════════
# PHASE 6: Done — all post-auth screens verified
# ═══════════════════════════════════════════════════════════════════
# NOTE: Tab navigation to "Home" is unreliable because hidden tabs
# (href:null) still render in the tab bar, causing text truncation
# (Ho..., boo...) and making point-based taps imprecise.
# BUG-10: Hidden tab screens still show in dev-client tab bar.

- takeScreenshot: 14-test-complete
