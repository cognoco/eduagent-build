# Flow 3: Home Screen Navigation & Curriculum Review
# Validates: authenticated home screen elements, tab navigation to Library v3,
# and subjects visible on the shelf list after seeding.
# Tags: smoke, onboarding
#
# Prerequisites:
#   - User is signed in
#   - At least one subject exists with a generated curriculum
#   - API is running and reachable
# Seeding handled by seed-and-run.sh. Uses onboarding-complete scenario (needs subjects + curriculum).
# Usage: ./scripts/seed-and-run.sh onboarding-complete flows/onboarding/view-curriculum.yaml
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx (learner-screen, home-subject-carousel)
#   - apps/mobile/src/app/(app)/library.tsx (shelves-list)
#   - apps/mobile/src/components/library/ShelfRow.tsx (shelf-row-header-${subjectId})
appId: com.mentomate.app
tags:
  - smoke
  - onboarding
---
# 1. Seed, launch dev-client, sign in.
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# 2. Verify the home scroll view is present
- assertVisible:
    id: "learner-screen"

# 3. Intent card stack should be present on home screen.
# [BUG-989] Use extendedWaitUntil so a slow first-render of useSubjects (e.g.
# fresh sign-in + cold-start cache) doesn't surface as a flaky test. Kept
# optional because the seed scenario could land on a learner screen that
# doesn't carry the carousel testID.
- extendedWaitUntil:
    visible:
      id: "home-subject-carousel"
    timeout: 10000
    optional: true  # justified: BUG-989 — home-subject-carousel may not mount before this step on cold-start cache; timing-dependent

# REMOVED (Rule 3): "Your coach has a plan" assertion dropped — this heading
# text no longer exists in the home screen implementation. Home screen shows
# coaching card content directly without this static heading.

# REMOVED (Rule 3): Tab bar text assertions ("Home", "Library", "More")
# dropped — BUG-10 causes dev-client to show ~9 tabs with truncated labels
# (e.g. "Ho...", "lib..."). Tab text matching is unreliable in dev-client builds.
# Tab navigation is validated via accessibility labels instead (steps 6, 9).

# 5. Screenshot: home screen with subjects
- takeScreenshot: view-curriculum-01-home

# 6. Navigate to Library tab
- tapOn:
    id: "tab-library"

# 7. Wait for Library v3 shelf list to render (shelves-list is the single-pane view).
#    library-tab-shelves was removed in Library v3 redesign.
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 8. Scroll to find the seeded subject's shelf row.
#    seed-and-run.sh provides SUBJECT_ID for the active subject.
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 5000

# 9. Screenshot: Library content
- takeScreenshot: view-curriculum-02-library

# 10. Navigate back to Home tab
- tapOn:
    id: "tab-home"

# 11. Verify home screen is visible
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 12. Intent card stack still visible after round-trip (replaced "Your subjects" heading).
# [BUG-989] Use extendedWaitUntil because returning to the Home tab can briefly
# render the loading state while React Query revalidates `subjects`, so a bare
# assertVisible races the carousel mount.
- extendedWaitUntil:
    visible:
      id: "home-subject-carousel"
    timeout: 10000

# 13. Screenshot
- takeScreenshot: view-curriculum-03-back-home
