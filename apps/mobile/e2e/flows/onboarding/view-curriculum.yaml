# Flow 3: Home Screen Navigation & Curriculum Review
# Validates: authenticated home screen elements, tab navigation,
# and subjects visible on home screen after seeding.
# Tags: smoke, onboarding
#
# Prerequisites:
#   - User is signed in
#   - At least one subject exists with a generated curriculum
#   - API is running and reachable
# Seeding handled by seed-and-run.sh. Uses learning-active scenario (needs subjects + curriculum).
# Usage: ./scripts/seed-and-run.sh learning-active flows/onboarding/view-curriculum.yaml
appId: com.mentomate.app
tags:
  - smoke
  - onboarding
---
# 1. Seed, launch dev-client, sign in.
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# 2. Home screen must show subjects section
- assertVisible: "Your subjects"

# 3. Verify the home scroll view is present
- assertVisible:
    id: "home-scroll-view"

# 4. Coaching card should be present on home screen
# optional: true — coaching card requires precomputed data which
# may not exist in the learning-active seed scenario
- assertVisible:
    id: "coaching-card"
    optional: true

# REMOVED (Rule 3): "Your coach has a plan" assertion dropped — this heading
# text no longer exists in the home screen implementation. Home screen shows
# coaching card content directly without this static heading.

# REMOVED (Rule 3): Tab bar text assertions ("Home", "Library", "More")
# dropped — BUG-10 causes dev-client to show ~9 tabs with truncated labels
# (e.g. "Ho...", "lib..."). Tab text matching is unreliable in dev-client builds.
# Tab navigation is validated via accessibility labels instead (steps 6, 9).

# 5. Screenshot: home screen with subjects
- takeScreenshot: view-curriculum-01-home

# 6. Navigate to Library tab (BUG-10: use accessibility label)
- tapOn: "Library Tab"

# 7. Wait for Library heading
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 8. Verify filter tabs are present on Library
# optional: true — filter tabs only render when multiple subjects exist;
# learning-active seed may have only one subject
- assertVisible:
    id: "subject-filter-tabs"
    optional: true

# 9. Screenshot: Library content
- takeScreenshot: view-curriculum-02-library

# 10. Navigate back to Home tab (use accessibility label)
- tapOn: "Home Tab"

# 11. Verify home screen is visible
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 10000

# 12. Subjects section still visible after round-trip
- assertVisible: "Your subjects"

# 13. Screenshot
- takeScreenshot: view-curriculum-03-back-home
