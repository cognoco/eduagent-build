# Flow: Onboarding — Curriculum Review Interactions
# Validates: curriculum review screen renders with topic cards, skip/challenge
# actions work, start-learning and go-home buttons are functional.
# Tags: nightly, onboarding
#
# Journey: UX Journey 1 (Onboarding) — Curriculum Review
#
# Prerequisites:
#   - API is running and reachable
#   - Seed endpoint available
#
# Route: seed → sign in → create subject → interview → analogy preference
#        → curriculum review (this screen)
#
# The curriculum review screen is only reachable during the onboarding funnel
# (after interview completion → analogy preference → curriculum review).
# We must traverse the full path to reach it.
appId: com.mentomate.app
tags:
  - nightly
  - onboarding
---
# ── Setup: Seed & sign in ──────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: onboarding-complete
      API_URL: ${API_URL}

# ── Create a new subject to enter the onboarding funnel ────────────────
# BUG-44 fix: add-subject-button is below the fold in home ScrollView
- scrollUntilVisible:
    element:
      id: "add-subject-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "add-subject-button"

- extendedWaitUntil:
    visible:
      text: "New subject"
    timeout: 10000

- tapOn:
    id: "create-subject-name"
- inputText: "World History"

- tapOn:
    id: "create-subject-submit"

# ── Interview screen ───────────────────────────────────────────────────
# NOTE: Maestro can't find text: "Interview" in the ChatShell header on Android
# (text node not exposed to accessibility tree). Use chat-input testID instead.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 20000

# NOTE: Skipped "learning coach" text check — Maestro can't reliably find text
# inside React Native chat bubbles on Android. chat-input presence is sufficient.

# Respond to the interview with a detailed message to help the LLM complete faster.
- tapOn:
    id: "chat-input"
- inputText: "I want to learn about World War I, World War II, and ancient civilizations (Rome, Greece, Egypt) for my history exam in 3 weeks. I'm aiming for a B+ or better. I know WWII basics but need to learn WWI causes, the interwar period, and ancient governance. I prefer timelines and stories."
# BUG-35: keyboard covers send button on Android. Use Enter key instead.
- pressKey: Enter

# Wait for interview completion after first exchange (may need follow-up)
- extendedWaitUntil:
    visible:
      id: "view-curriculum-button"
    timeout: 45000
    optional: true

# If interview didn't complete, send a follow-up with more context
- runFlow:
    when:
      notVisible:
        id: "view-curriculum-button"
    file: ../_setup/interview-followup.yaml
    env:
      FOLLOWUP_MESSAGE: "I have 3 weeks to study, about 1 hour per day. I want to understand causes and effects, not just memorize dates. Please create my study curriculum."

# Wait for interview completion after second exchange (90s for LLM + streaming)
- extendedWaitUntil:
    visible:
      id: "view-curriculum-button"
    timeout: 90000

# ── Navigate through analogy preference (skip it) ─────────────────────
- tapOn:
    id: "view-curriculum-button"

- extendedWaitUntil:
    visible:
      id: "analogy-preference-title"
    timeout: 10000

# Skip analogy preference to get to curriculum review faster
- tapOn:
    id: "analogy-skip-button"

# ── Curriculum review screen — verify layout ──────────────────────────
- extendedWaitUntil:
    visible:
      text: "Your Curriculum"
    timeout: 15000

- takeScreenshot: curriculum-review-screen

# ── Verify curriculum loaded with topics ──────────────────────────────
# Wait for action buttons (only render when curriculum data is loaded).
# NOTE: "Version X — N topics" subtitle text unreliable with Maestro
# (em dash U+2014 causes matching issues). Use button testIDs instead.
- extendedWaitUntil:
    visible:
      id: "start-learning-button"
    timeout: 15000

# ── Verify header elements ────────────────────────────────────────────
- assertVisible:
    id: "curriculum-back"

- assertVisible:
    id: "challenge-button"

# ── Verify action buttons at bottom ───────────────────────────────────
- assertVisible:
    id: "start-learning-button"

- assertVisible:
    id: "go-home-button"

- takeScreenshot: curriculum-review-topics-loaded

# ── Test Challenge modal ──────────────────────────────────────────────
- tapOn:
    id: "challenge-button"

# Challenge modal should appear with title and input
- extendedWaitUntil:
    visible:
      text: "Challenge your curriculum"
    timeout: 5000

- assertVisible:
    id: "challenge-feedback"

- assertVisible:
    id: "challenge-cancel"

- assertVisible:
    id: "challenge-submit"

# Type feedback into the challenge input
- tapOn:
    id: "challenge-feedback"
- inputText: "I already know the basics, skip intro topics"

# Dismiss keyboard before interacting with modal buttons
# pressKey: Back dismisses the Android keyboard (first press = keyboard dismiss,
# not navigation back). This is safer than hideKeyboard (BUG-20) and doesn't
# require a visible tap target (modal title pushed off-screen by keyboard).
- pressKey: Back

- takeScreenshot: curriculum-review-challenge-modal

# Cancel the challenge (don't actually submit to avoid regenerating)
- tapOn:
    id: "challenge-cancel"

# Modal should close, curriculum still visible
- extendedWaitUntil:
    visible:
      text: "Your Curriculum"
    timeout: 5000

# ── Test "Explore first" (go-home) button ─────────────────────────────
# Verify the "Explore first" link is present
- assertVisible:
    text: "Explore first"

- takeScreenshot: curriculum-review-final
