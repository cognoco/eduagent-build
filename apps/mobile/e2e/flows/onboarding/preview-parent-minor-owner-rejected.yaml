# Trial preview onboarding — parent save rejects under-18 owner before confirm.
# Evidence status for WI-1407: verify-at-e2e-run unless this flow is run on a dev client.
appId: com.mentomate.app
tags:
  - manual
  - onboarding
  - preview
---
- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 120000

- scrollUntilVisible:
    element:
      id: 'try-mentomate-cta'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'try-mentomate-cta'

- extendedWaitUntil:
    visible:
      id: 'preview-landing'
    timeout: 10000

- tapOn:
    id: 'preview-landing-continue'

- extendedWaitUntil:
    visible:
      id: 'preview-intent'
    timeout: 10000

- tapOn:
    id: 'intent-child'

- extendedWaitUntil:
    visible:
      id: 'preview-value-prop-parent'
    timeout: 10000

- tapOn:
    id: 'preview-signup-cta'

- runFlow:
    file: ../_setup/sign-up-preview-user.yaml

- extendedWaitUntil:
    visible:
      id: 'save-wizard-step-1'
    timeout: 15000

- tapOn:
    id: 'save-wizard-step-1-continue'

- extendedWaitUntil:
    visible:
      id: 'save-basics-parent-name'
    timeout: 10000

- tapOn:
    id: 'save-basics-parent-name'
- inputText: 'Minor Parent'
- hideKeyboard

- evalScript: ${output.minorOwnerBirthYear = String(new Date().getFullYear() - 16)}

- tapOn:
    id: 'save-basics-parent-birth-year'
- inputText: ${output.minorOwnerBirthYear}
- hideKeyboard

- tapOn:
    id: 'save-basics-child-name'
- inputText: 'Preview Kid'
- hideKeyboard

- tapOn:
    id: 'save-basics-child-birth-year'
- inputText: '2014'
- hideKeyboard

- assertVisible:
    id: 'save-basics-adult-required'

- tapOn:
    id: 'save-basics-continue'

- assertNotVisible:
    id: 'save-confirm-land'

- takeScreenshot: preview-parent-minor-owner-rejected
