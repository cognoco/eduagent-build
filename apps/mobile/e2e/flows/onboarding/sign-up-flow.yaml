# Flow S1: Onboarding — Sign-Up to First Subject
# Validates: sign-up UI through Clerk email-verification handoff.
# Tags: manual, onboarding
#
# Journey: UX Journey 1 (Onboarding)
# Epics: Epic 0 (FR1-FR9), Epic 1 (FR13)
#
# NOTE: Steps 7-11 depend on Clerk test mode configuration. If Clerk
# doesn't allow programmatic sign-up in test builds, use the seed
# endpoint + sign-in instead. This flow tests the full sign-up path.
appId: com.mentomate.app
tags:
  - manual
  - onboarding
---
# 1. Wait for sign-in screen (app launched by run-without-seed.sh via ADB)
# NOTE: This flow must be run via run-without-seed.sh (not seed-and-run.sh)
# because it signs up a NEW user via Clerk — no pre-seeded account needed.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

# 2. Navigate to sign-up
- tapOn: "Sign up"

# 3. Sign-up screen visible
- extendedWaitUntil:
    visible:
      id: "sign-up-email"
    timeout: 5000

- takeScreenshot: onboarding-01-signup-screen

# 4. Enter email (dynamic to avoid Clerk duplicate-email errors on re-run)
- tapOn:
    id: "sign-up-email"
- inputText: "test-e2e-signup-${Date.now()}@example.com"

# Dismiss keyboard so password field becomes visible (BUG-20: hideKeyboard fails)
- tapOn:
    text: "Create account"

# 5. Enter password
- tapOn:
    id: "sign-up-password"
- inputText: "E2eTest_2026xK!"

# Dismiss keyboard before tapping sign-up button
- tapOn:
    text: "Create account"

- takeScreenshot: onboarding-02-signup-credentials-entered

# 6. Submit sign-up
- tapOn:
    id: "sign-up-button"

# 6b. Clerk email verification screen
# Clerk requires email verification after sign-up. In development mode,
# the verification code may auto-populate or use a test code.
# If this step times out, Clerk test mode needs configuration for auto-verify.
- extendedWaitUntil:
    visible:
      id: "sign-up-code"
    timeout: 15000

- takeScreenshot: onboarding-02b-verification-screen

# ════════════════════════════════════════════════════════════════════════
# VERIFICATION BOUNDARY: Steps below require a valid Clerk verification code.
# Clerk dev mode does NOT auto-verify or accept a fixed test code.
# To unblock: add POST /__test/verify-email endpoint (Clerk Backend API)
# or create a "pre-profile" seed scenario that bypasses sign-up entirely.
# Until then, verification and subsequent steps are marked optional.
# ════════════════════════════════════════════════════════════════════════

# 6c. Enter verification code (placeholder — needs Clerk test config)
- tapOn:
    id: "sign-up-code"
    optional: true
- inputText: "424242"
  # optional: true not supported on inputText — harmless if field not focused

# Dismiss number pad so Verify button becomes visible
- pressKey: Back

- tapOn:
    id: "sign-up-verify-button"
    optional: true

# 7. Profile creation screen (only reachable if verification succeeded)
- extendedWaitUntil:
    visible:
      id: "create-profile-name"
    timeout: 15000
    optional: true

- takeScreenshot: onboarding-03-profile-creation

# ── Steps 8-16 only reachable if verification succeeded (optional) ──

# 8. Enter profile name
- tapOn:
    id: "create-profile-name"
    optional: true

# 9. Select learner persona
- tapOn:
    id: "persona-learner"
    optional: true

- takeScreenshot: onboarding-04-profile-filled

# 10. Submit profile
- tapOn:
    id: "create-profile-submit"
    optional: true

# 11. Home screen reached — first-time empty state
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000
    optional: true

- takeScreenshot: onboarding-05-home-empty-state

# 12. Add first subject
- tapOn:
    id: "add-subject-button"
    optional: true

# 13. Subject creation modal visible
- extendedWaitUntil:
    visible:
      text: "What would you like to learn?"
    timeout: 5000
    optional: true

- takeScreenshot: onboarding-06-create-subject-modal

# 14. Enter subject name
- tapOn:
    id: "create-subject-name"
    optional: true

# 15. Submit subject
- tapOn:
    id: "create-subject-submit"
    optional: true

# 16. Interview screen reached (use chat-input testID — "Interview" text
#     is unreliable in Maestro on Android per BUG-49)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000
    optional: true

- takeScreenshot: onboarding-07-interview-started
