# Flow: Onboarding — Analogy Domain Preference Selection
# Validates: analogy preference screen renders after interview completion,
# domain options are visible and selectable, continue and skip paths both
# navigate to curriculum review.
# Tags: nightly, onboarding
#
# Journey: UX Journey 1 (Onboarding) — Analogy Domain Preferences (FR134-FR137)
#
# Prerequisites:
#   - API is running and reachable
#   - Seed endpoint available
#
# Route: create subject → interview → analogy preference → curriculum review
# The analogy preference screen sits between interview completion and
# curriculum review in the onboarding funnel.
appId: com.mentomate.app
tags:
  - nightly
  - onboarding
---
# ── Setup: Seed & sign in ──────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: onboarding-complete
      API_URL: ${API_URL}

# ── Create a new subject to enter the onboarding funnel ────────────────
# intent-learn card navigates directly to /create-subject (replaced add-subject-button
# which was removed from home screen during adaptive home refactor)
- tapOn:
    id: "home-action-study-new"

# autoFocus opens keyboard, pushing "New subject" heading above fold (BUG-60 side effect)
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 10000

- tapOn:
    id: "create-subject-name"
- inputText: "Biology"

- tapOn:
    id: "create-subject-submit"

# ── Interview screen ───────────────────────────────────────────────────
# NOTE: Maestro can't find text: "Interview" in the ChatShell header on Android
# (text node not exposed to accessibility tree). Use chat-input testID instead.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 20000

# Respond to the interview with a detailed message to help the LLM complete faster.
# NOTE: Skipped "learning coach" text check — Maestro can't reliably find text
# inside React Native chat bubbles on Android. chat-input presence is sufficient.
- tapOn:
    id: "chat-input"
- inputText: "I want to learn about cells and genetics for my school biology exam next month. I'm aiming for an A grade. I already know basic cell structure but need to learn DNA replication, gene expression, mitosis, meiosis, and heredity. I prefer visual explanations."
# BUG-35: keyboard covers send button on Android. Use Enter key instead.
- pressKey: Enter

# Wait for interview completion after first exchange (may need follow-up)
- extendedWaitUntil:
    visible:
      id: "view-curriculum-button"
    timeout: 45000
    optional: true

# If interview didn't complete, send a follow-up with more context
- runFlow:
    when:
      notVisible:
        id: "view-curriculum-button"
    file: ../_setup/interview-followup.yaml
    env:
      FOLLOWUP_MESSAGE: "I have about 4 weeks to prepare. My goal is to understand each topic deeply, not just memorize. I learn best with step-by-step breakdowns. Please create my curriculum."

# Wait for interview completion after second exchange (90s for LLM + streaming)
- extendedWaitUntil:
    visible:
      id: "view-curriculum-button"
    timeout: 90000

- takeScreenshot: analogy-pref-interview-complete

# ── Navigate to analogy preference screen ──────────────────────────────
- tapOn:
    id: "view-curriculum-button"

# ── Analogy preference screen — verify layout ─────────────────────────
- extendedWaitUntil:
    visible:
      id: "analogy-preference-title"
    timeout: 10000

- assertVisible:
    text: "How do you like things explained?"

# NOTE: Subtitle "Pick an analogy style (optional)..." removed — BUG-49 pattern #2
# (long wrapping text) + unescaped parentheses in regex. Screen already verified
# via analogy-preference-title testID and heading text above.

- takeScreenshot: analogy-preference-screen

# ── Verify all domain options exist (scroll as needed) ────────────────
# On 360x640dp screens, only ~4 of 7 options fit above the fold.
# BUG-56 fix: container now has ScrollView, so scrollUntilVisible works.
- assertVisible:
    id: "analogy-domain-picker"

# First 4 options are always above the fold
- assertVisible:
    id: "analogy-domain-none"

- assertVisible:
    id: "analogy-domain-cooking"

- assertVisible:
    id: "analogy-domain-sports"

- assertVisible:
    id: "analogy-domain-building"

# Options 5-7 may be below fold — scroll to each
- scrollUntilVisible:
    element:
      id: "analogy-domain-music"
    direction: DOWN
    timeout: 5000

- scrollUntilVisible:
    element:
      id: "analogy-domain-nature"
    direction: DOWN
    timeout: 5000

- scrollUntilVisible:
    element:
      id: "analogy-domain-gaming"
    direction: DOWN
    timeout: 5000

# ── Verify action buttons are visible ──────────────────────────────────
- scrollUntilVisible:
    element:
      id: "analogy-continue-button"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "analogy-skip-button"

# ── Select a domain (cooking) — scroll back up first ─────────────────
- scrollUntilVisible:
    element:
      id: "analogy-domain-cooking"
    direction: UP
    timeout: 5000

- tapOn:
    id: "analogy-domain-cooking"

- takeScreenshot: analogy-preference-cooking-selected

# ── Tap Continue → navigate to curriculum review ───────────────────────
- tapOn:
    id: "analogy-continue-button"

# Curriculum review screen should appear
- extendedWaitUntil:
    visible:
      text: "Your Curriculum"
    timeout: 15000

- takeScreenshot: analogy-pref-to-curriculum-review
