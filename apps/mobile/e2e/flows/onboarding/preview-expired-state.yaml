# Trial preview onboarding — expired preview state returns to intent screen.
#
# Requires an E2E dev-client build with EXPO_PUBLIC_E2E=true so the dev-only
# seed route can write a pre-aged preview-state record.
appId: com.mentomate.app
tags:
  - manual
  - onboarding
  - preview
---
- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 120000

# staleMs=3660000 (61 min) > PREVIEW_TTL_MS (1 hour).
- openLink: 'mentomate:///dev-only/seed-preview-state?intent=self&path=learner_value_prop&topicText=expired%20algebra&staleMs=3660000'

- extendedWaitUntil:
    visible:
      id: 'preview-state-seeded'
    timeout: 8000

- extendedWaitUntil:
    visible:
      id: 'preview-intent'
    timeout: 10000

- assertNotVisible:
    id: 'preview-topic'

- takeScreenshot: preview-expired-state-intent
