# Flow: Subject onboarding fast path
# Validates: create subject -> learning session without legacy preference gates.
appId: com.mentomate.app
tags:
  - onboarding
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "home-subject-carousel"
    timeout: 15000

- tapOn:
    id: "home-action-study-new"

- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 10000

- tapOn:
    id: "create-subject-name"
- inputText: "Photosynthesis fast path"
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "create-subject-submit"
    timeout: 5000

- tapOn:
    id: "create-subject-submit"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: "message-bubble-assistant-0"
    timeout: 30000

- extendedWaitUntil:
    visible:
      text: "~.*\\?"
    timeout: 30000
