# Flow: Subject onboarding fast path
# Validates: create subject -> interview -> learning session without the four
# legacy gating screens when ONBOARDING_FAST_PATH is enabled in the build.
appId: com.mentomate.app
tags:
  - onboarding
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "home-subject-carousel"
    timeout: 15000

- tapOn:
    id: "home-action-study-new"

- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 10000

- tapOn:
    id: "create-subject-name"
- inputText: "Photosynthesis fast path"
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "create-subject-submit"
    timeout: 5000

- tapOn:
    id: "create-subject-submit"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- tapOn:
    id: "chat-input"
- inputText: "I want to learn the basics and I like football."
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- tapOn:
    id: "chat-input"
- inputText: "I know plants need sunlight but not much else."
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- tapOn:
    id: "chat-input"
- inputText: "Short examples are best."
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "view-curriculum-button"
    timeout: 30000

- assertNotVisible:
    id: "interests-context-continue"
- assertNotVisible:
    id: "analogy-preference-title"
- assertNotVisible:
    id: "accommodation-continue"
- assertNotVisible:
    id: "curriculum-loading"
- assertNotVisible:
    id: "continue-advanced-button"

- tapOn:
    id: "view-curriculum-button"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- assertNotVisible:
    id: "interests-context-continue"
- assertNotVisible:
    id: "analogy-preference-title"
- assertNotVisible:
    id: "accommodation-continue"
- assertNotVisible:
    id: "curriculum-loading"
- assertNotVisible:
    id: "continue-advanced-button"
