# Flow: Subject onboarding fast path
# Validates: create subject -> learning session without legacy preference gates.
appId: com.mentomate.app
tags:
  - onboarding
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# scrollUntilVisible UP acts as a combined scroll + wait-for-tree-commit guard —
# the chip sits ABOVE the carousel; scrolling DOWN to the carousel pushes the chip
# off-screen on small devices (Galaxy S10e). Mirror the pattern from
# create-subject-resolve.yaml: scroll UP toward the chip, then tap it.
- scrollUntilVisible:
    element:
      id: "home-action-study-new"
    direction: UP
    timeout: 15000
    speed: 70
    visibilityPercentage: 50

- tapOn:
    id: "home-action-study-new"

- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 10000

- tapOn:
    id: "create-subject-name"
- inputText: "Photosynthesis fast path"
- hideKeyboard

- extendedWaitUntil:
    visible:
      id: "create-subject-submit"
    timeout: 5000

- tapOn:
    id: "create-subject-submit"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: "message-bubble-assistant-0"
    timeout: 30000

- extendedWaitUntil:
    visible:
      text: "~.*\\?"
    timeout: 30000
