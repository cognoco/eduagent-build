# Onboarding extras - language picker, pronouns, and interests-context
# Tags: nightly, onboarding
# Seed: onboarding-complete
# Covers: the registered onboarding routes directly via the app deep-link scheme
# Usage: ./scripts/seed-and-run.sh onboarding-complete flows/onboarding/onboarding-extras-flow.yaml
appId: com.mentomate.app
tags:
  - nightly
  - onboarding
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

- openLink: "mentomate://onboarding/language-picker?subjectId=${SUBJECT_ID}&step=1&totalSteps=4"

- extendedWaitUntil:
    visible:
      id: "language-picker-continue"
    timeout: 10000

- assertNotVisible:
    id: "language-picker-cancel"

- assertVisible:
    id: "language-picker-other-hint"

- takeScreenshot: 01-language-picker

- tapOn:
    id: "language-option-en"

- tapOn:
    id: "language-picker-continue"

- extendedWaitUntil:
    visible:
      id: "pronouns-continue"
    timeout: 10000

- assertVisible:
    id: "pronouns-option-she-her"

- assertVisible:
    id: "pronouns-option-he-him"

- assertVisible:
    id: "pronouns-option-they-them"

- assertVisible:
    id: "pronouns-option-other"

- assertVisible:
    id: "pronouns-skip"

- takeScreenshot: 02-pronouns

- tapOn:
    id: "pronouns-option-they-them"

- tapOn:
    id: "pronouns-continue"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

- takeScreenshot: 03-interview-reached

- openLink: "mentomate://onboarding/interests-context?subjectId=${SUBJECT_ID}&interests=Soccer,History&step=2&totalSteps=4"

- extendedWaitUntil:
    visible:
      id: "interests-context-continue"
    timeout: 10000

- takeScreenshot: 04-interests-context

- tapOn:
    id: "interests-Soccer-free_time"

- tapOn:
    id: "interests-History-school"

- tapOn:
    id: "interests-context-continue"

- extendedWaitUntil:
    visible:
      id: "analogy-preference-title"
    timeout: 10000

- takeScreenshot: 05-analogy-after-interests
