# PARKED (2026-07-21): The self-preview CTA is intentionally unreachable while
# PREVIEW_ENTRY_CTA_ENABLED is hard-disabled in feature-flags.ts. The sign-in
# screen only renders try-mentomate-cta when that flag and the preview engine
# are both enabled, so scheduling this flow would assert an impossible entry
# point. The journey remains here for the product-preview return.
#
# PM INTAKE: WI-2586 — restore the self-preview entry before re-enabling this
# nightly flow (https://www.notion.so/3a48bce91f7c815ca25bdb077de9054c).
# OWNER: MentoMate Program Manager (product decision and routing).
#
# UNBLOCK CONDITION: product enables PREVIEW_ENTRY_CTA_ENABLED and retains a
# user-visible try-mentomate-cta entry on the release build. Remove `blocked`
# only after this exact flow passes on the release APK.
#
# Trial preview onboarding — self learner path.
# Covers chat-entry track 18: save-wizard self-branch → chat-input.
# Promoted from manual to nightly 2026-05-29 — confirmed correct against source.
# Run with run-without-seed.sh or seed-and-run.sh --no-seed so the app starts
# signed out on the sign-in screen.
appId: com.mentomate.app
tags:
  - nightly
  - onboarding
  - preview
  - blocked
---
- runFlow:
    file: ../_setup/nav-welcome-to-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 120000

- scrollUntilVisible:
    element:
      id: 'try-mentomate-cta'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'try-mentomate-cta'

- extendedWaitUntil:
    visible:
      id: 'preview-landing'
    timeout: 10000

- tapOn:
    id: 'preview-landing-continue'

- extendedWaitUntil:
    visible:
      id: 'preview-intent'
    timeout: 10000

- tapOn:
    id: 'intent-self'

- extendedWaitUntil:
    visible:
      id: 'preview-topic'
    timeout: 10000

- tapOn:
    id: 'preview-topic-sample-fractions'

- extendedWaitUntil:
    visible:
      id: 'preview-value-prop-learner'
    timeout: 10000

- assertVisible:
    id: 'preview-sample-marker'
- tapOn:
    id: 'preview-signup-cta'

- runFlow:
    file: ../_setup/sign-up-preview-user.yaml

- extendedWaitUntil:
    visible:
      id: 'save-wizard-step-1'
    timeout: 15000

- tapOn:
    id: 'save-wizard-step-1-continue'

- extendedWaitUntil:
    visible:
      id: 'save-basics-display-name'
    timeout: 10000

- tapOn:
    id: 'save-basics-display-name'
- inputText: 'Preview Learner'
- hideKeyboard

- tapOn:
    id: 'save-basics-birth-year'
- inputText: '2004'
- hideKeyboard

- tapOn:
    id: 'save-basics-continue'

- extendedWaitUntil:
    visible:
      id: 'save-confirm-land'
    timeout: 30000

- tapOn:
    id: 'save-confirm-land'

- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- takeScreenshot: preview-self-complete
