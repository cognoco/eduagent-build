# Trial preview onboarding — parent sets up a child.
appId: com.mentomate.app
tags:
  - manual
  - onboarding
  - preview
---
- extendedWaitUntil:
    visible:
      id: 'sign-in-screen'
    timeout: 120000

- scrollUntilVisible:
    element:
      id: 'try-mentomate-cta'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'try-mentomate-cta'

- extendedWaitUntil:
    visible:
      id: 'preview-landing'
    timeout: 10000

- tapOn:
    id: 'preview-landing-continue'

- extendedWaitUntil:
    visible:
      id: 'preview-intent'
    timeout: 10000

- tapOn:
    id: 'intent-child'

- extendedWaitUntil:
    visible:
      id: 'preview-value-prop-parent'
    timeout: 10000

- assertVisible:
    id: 'preview-sample-marker'
- tapOn:
    id: 'preview-signup-cta'

- runFlow:
    file: ../_setup/sign-up-preview-user.yaml

- extendedWaitUntil:
    visible:
      id: 'save-wizard-step-1'
    timeout: 15000

- tapOn:
    id: 'save-wizard-step-1-continue'

- extendedWaitUntil:
    visible:
      id: 'save-basics-parent-name'
    timeout: 10000

- tapOn:
    id: 'save-basics-parent-name'
- inputText: 'Preview Parent'
- hideKeyboard

- tapOn:
    id: 'save-basics-parent-birth-year'
- inputText: '1985'
- hideKeyboard

- tapOn:
    id: 'save-basics-child-name'
- inputText: 'Preview Kid'
- hideKeyboard

- tapOn:
    id: 'save-basics-child-birth-year'
- inputText: '2014'
- hideKeyboard

- tapOn:
    id: 'save-basics-continue'

- extendedWaitUntil:
    visible:
      id: 'save-confirm-land'
    timeout: 30000

- tapOn:
    id: 'save-confirm-land'

- extendedWaitUntil:
    visible:
      id: 'home-screen'
    timeout: 30000

- takeScreenshot: preview-parent-complete
