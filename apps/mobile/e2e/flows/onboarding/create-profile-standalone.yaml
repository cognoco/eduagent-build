# Flow N12: Create Profile — Standalone Profile Creation from More Tab
# Validates: user can navigate to the profile switcher, open the create
# profile form, fill in name and birth date, select a region, and submit.
# Tags: nightly, onboarding, account
#
# Journey: UX Journey 1 (Onboarding) + UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
appId: com.mentomate.app
tags:
  - nightly
  - onboarding
  - account
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More tab index to load.
# Using text: "More" matched the tab label itself, resolving before ScrollView rendered.
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 5. Navigate to Account sub-screen — more-row-profile has moved there
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 6. Scroll to Profile row inside Account sub-screen
- scrollUntilVisible:
    element:
      id: "more-row-profile"
    direction: DOWN
    timeout: 20000
    speed: 70
    visibilityPercentage: 50

# 6. Tap Profile to open profiles modal
- tapOn:
    id: "more-row-profile"

# 7. Wait for profiles screen
- extendedWaitUntil:
    visible:
      id: "profiles-screen"
    timeout: 10000

- takeScreenshot: profiles-before-create

# 8. Scroll to and tap Add profile button (below profile cards)
- scrollUntilVisible:
    element:
      id: "profiles-add-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "profiles-add-button"

# 9. Wait for "New profile" screen
- extendedWaitUntil:
    visible:
      text: "New profile"
    timeout: 10000

- takeScreenshot: create-profile-empty

# 10. Tap name field and type "Test Child"
- tapOn:
    id: "create-profile-name"
- inputText: "Test Child"
- hideKeyboard

- takeScreenshot: create-profile-name-entered

# 11. Tap birth date to open date picker
- tapOn:
    id: "create-profile-birthdate"

# 12. Accept default date on Android (OK button dismisses picker)
# Default date is Jan 1, 2010 — gives age ~16, LEARNER persona
- tapOn:
    text: "OK"
    optional: true  # justified: Android date picker OK button only appears on Android; no-op on iOS

# 13. On iOS, tap Done to dismiss the spinner picker
- tapOn:
    id: "date-picker-done"
    optional: true  # justified: date-picker-done only appears on iOS spinner-style picker; no-op on Android

- takeScreenshot: create-profile-date-selected

# 14. Persona is auto-detected from birth date (persona-auto-hint removed in persona refactor)
# Region selector also removed — consent is determined solely from birth date now.

- takeScreenshot: create-profile-persona-hint

# 15. Scroll to submit button
- scrollUntilVisible:
    element:
      id: "create-profile-submit"
    direction: DOWN
    timeout: 10000

# 18. Tap Create profile
- tapOn:
    id: "create-profile-submit"

# 19. Wait for navigation back to profiles screen or home screen
- extendedWaitUntil:
    visible:
      id: "profiles-screen"
    timeout: 15000
    optional: true  # justified: after profile creation, app may navigate to profiles-screen or directly to learner-screen depending on consent flow

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000
    optional: true  # justified: alternative destination — one of profiles-screen or learner-screen must appear; Maestro has no OR construct

# 20. Final screenshot — profile created
- takeScreenshot: create-profile-complete
