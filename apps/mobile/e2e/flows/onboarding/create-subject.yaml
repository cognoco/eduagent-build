# Flow 2: Create Subject & Start Onboarding Interview
# Validates: authenticated home screen renders, subject creation modal,
# form input, navigation to interview chat screen.
# Tags: smoke, onboarding
#
# Prerequisites:
#   - User is signed in (either via test account or prior sign-in flow)
#   - API is running and reachable
#
# Seeding handled by seed-and-run.sh. Uses onboarding-complete scenario.
# Usage: ./scripts/seed-and-run.sh onboarding-complete flows/onboarding/create-subject.yaml
appId: com.mentomate.app
tags:
  - smoke
  - onboarding
---
# 1. Seed, launch dev-client, sign in.
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# The home screen should show the intent card stack
- assertVisible:
    id: "home-subject-carousel"

- takeScreenshot: subject-01-home-with-intent-cards

# Tap "Learn" intent card → navigates to /create-subject
# (replaced add-subject-button which was removed from home screen)
- tapOn:
    id: "home-action-study-new"

# The create-subject screen should appear (autoFocus opens keyboard,
# pushing "New subject" heading above fold on small screens — BUG-60 side effect).
# Assert on the input testID instead of the heading text.
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 10000

# Verify the input is visible (autoFocus opens keyboard, may cover instructional text)
- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 5000

- takeScreenshot: subject-02-create-modal-keyboard

# Type a subject name into the input (testID: create-subject-name)
- tapOn:
    id: "create-subject-name"
- inputText: "Photosynthesis"

# Dismiss keyboard so submit button is visible (autoFocus keeps keyboard open).
# hideKeyboard is a no-op when the keyboard is closed, so it cannot fall
# through to Android Back like the prior pressKey: back did.
- hideKeyboard

# Wait for layout to settle after keyboard dismissal
- extendedWaitUntil:
    visible:
      id: "create-subject-submit"
    timeout: 5000

- takeScreenshot: subject-03-name-entered

# Tap the submit button by label text (more reliable after keyboard-induced layout shift)
- tapOn:
    text: "Start Learning"

# The app should navigate to the interview screen.
# The ChatShell title will contain "Interview:" prefix.
# Wait for interview ChatShell to render (API call + navigation on WHPX)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# Verify the interview title contains "Interview"
- assertVisible:
    text: "Interview"
    optional: true  # justified: ChatShell title shows "Interview:" prefix but may show subject name before "Interview" text is visible; timing-dependent

# The opening AI message should be visible in the chat (SSE streaming)
- extendedWaitUntil:
    visible:
      text: "learning coach"
    timeout: 30000
    optional: true  # justified: LLM streaming response "learning coach" text inside FlatList chat bubble; Maestro text matching inside chat bubbles unreliable on Android

# Verify the chat input is available (testID: chat-input)
- assertVisible:
    id: "chat-input"

- takeScreenshot: subject-04-interview-started
