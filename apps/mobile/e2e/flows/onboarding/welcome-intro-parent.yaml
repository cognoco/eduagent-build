# Flow: First-Open Pre-Auth Welcome — PARENT branch (chooser → parent deck → bridge)
# Validates: on a clean install the audience chooser appears, picking
#   "I'm done fighting over homework" mounts the 3-card PARENT deck, advancing
#   through the cards surfaces the LightBulb bridge, and the bridge offers the
#   sign-up / sign-in CTAs.
#
# Scope note: the parent-specific post-signup behaviour (skip the Study/Family
#   picker, land on the add-a-child screen) is covered by create-profile unit
#   tests (create-profile.test.tsx → "audience-driven first-profile setup").
#   This E2E guards the pre-auth chooser→parent-deck→bridge wiring + testIDs.
#
# testIDs verified against:
#   apps/mobile/src/app/(auth)/welcome.tsx (welcome-chooser,
#   welcome-chooser-learner, welcome-chooser-parent, pre-auth-bridge,
#   pre-auth-bridge-primary, pre-auth-bridge-secondary)
#   apps/mobile/src/components/welcome/WelcomeIntro.tsx (welcome-card-{1..3},
#   welcome-next-button, welcome-start-button)
#
# Spec: docs/plans/2026-05-28-parent-audience-add-child-onboarding.md
# Tags: smoke, onboarding, regression
appId: com.mentomate.app
tags:
  - smoke
  - onboarding
  - regression
---
# 1. Clean install → audience chooser is the first surface.
- extendedWaitUntil:
    visible:
      id: 'welcome-chooser'
    timeout: 120000
- assertVisible:
    id: 'welcome-chooser-learner'
- assertVisible:
    id: 'welcome-chooser-parent'

- takeScreenshot: welcome-intro-parent-chooser

# 2. Pick "I'm done fighting over homework" → the 3-card parent deck mounts.
- tapOn:
    id: 'welcome-chooser-parent'
- extendedWaitUntil:
    visible:
      id: 'welcome-card-1'
    timeout: 10000

- takeScreenshot: welcome-intro-parent-card-1

# 3. Advance through cards 2 → 3 via the primary "Next" CTA.
- tapOn:
    id: 'welcome-next-button'
- extendedWaitUntil:
    visible:
      id: 'welcome-card-2'
    timeout: 10000

- tapOn:
    id: 'welcome-next-button'
- extendedWaitUntil:
    visible:
      id: 'welcome-card-3'
    timeout: 10000

# 4. Final card swaps the CTA to "Let's start".
- assertNotVisible:
    id: 'welcome-next-button'
- assertVisible:
    id: 'welcome-start-button'

# 5. Tap "Let's start" → the LightBulb bridge with both auth CTAs.
- tapOn:
    id: 'welcome-start-button'
- extendedWaitUntil:
    visible:
      id: 'pre-auth-bridge'
    timeout: 10000
- assertVisible:
    id: 'pre-auth-bridge-primary'
- assertVisible:
    id: 'pre-auth-bridge-secondary'
- assertVisible:
    text: 'Continue with your account to support your learner.'
- assertVisible:
    text: 'Sign in or sign up to accept the invitation and set up support. Your account does not grant access to learning activity unless the learner authorizes it.'
- assertNotVisible:
    text: 'Create a free account so your mentor can remember your subjects, notes, and progress.'

- takeScreenshot: welcome-intro-parent-bridge
