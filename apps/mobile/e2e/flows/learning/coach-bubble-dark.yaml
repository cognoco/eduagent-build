# PARKED (WI-1864): Scheduled release CI has neither a deterministic LLM
# response fixture nor per-flow UI_MODE application, so this visual flow cannot
# prove dark-mode coach-bubble readability. Owner: WI-2548.
# UNBLOCK: route the nightly worker through a deterministic coaching response,
# apply UI_MODE=dark before launch, and wait on a response-complete oracle.
# Flow: Coach Bubble Visibility (Dark Mode)
# Validates: AI/coach message text is visible in dark mode chat bubbles.
# Regression guard for invisible-ink bug (force-dark + missing inline styles).
# Tags: smoke, learning, visual
#
# Journey: UX Journey 2 (Daily Learning Loop)
# Prerequisite: Seeded user with subject + coaching card (scenario: learning-active)
# System theme: dark (Android default in emulator)
appId: com.mentomate.app
tags:
  - smoke
  - learning
  - visual
  - blocked
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Start session via intent card (replaced coaching-card-primary)
- tapOn:
    id: "home-coach-band-continue"

# 4. Session active — chat input present
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 5. Screenshot BEFORE exchange — capture initial AI greeting if present
- takeScreenshot: coach-bubble-dark-01-session-start

# 6. Send user message
- tapOn:
    id: "chat-input"
- inputText: "Hello, can you help me understand the basics?"
- pressKey: Enter

# 7. Verify chat-input is still active (message was accepted).
# NOTE: scrollUntilVisible + text inside FlatList (removeClippedSubviews=true) is
# unreliable on Android — Maestro cannot see clipped items even mid-scroll.
# Pattern matches create-subject.yaml which avoids text-in-bubble assertions.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 8. Wait for AI response (coach bubble)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 9. Screenshot AFTER AI response — this is the key visual check.
# The coach bubble text MUST be readable (not invisible/same color as background).
- takeScreenshot: coach-bubble-dark-02-ai-response

# 10. Send follow-up to get a second AI response
- tapOn:
    id: "chat-input"
- inputText: "Can you explain that differently?"
- pressKey: Enter

# 11. Wait for second AI response (45 s — second exchange may be slower than first)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

# 12. Final screenshot — multiple coach bubbles visible
- takeScreenshot: coach-bubble-dark-03-multi-exchange
