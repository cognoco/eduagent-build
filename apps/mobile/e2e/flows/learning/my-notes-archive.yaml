# Flow: My Notes Archive
# Validates: learner Home -> My Notes hub -> Sessions, Notes, and Bookmarks lists.
# Tags: nightly, learning, archive
#
# Prerequisite: Seeded user with a completed session, note, and bookmarks
#               (scenario: with-bookmarks).
#
# testIDs verified against:
#   - apps/mobile/src/components/home/LearnerScreen.tsx
#   - apps/mobile/src/app/(app)/my-notes/index.tsx
#   - apps/mobile/src/app/(app)/my-notes/[kind].tsx
appId: com.mentomate.app
tags:
  - nightly
  - learning
  - archive
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'with-bookmarks'
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- assertVisible:
    id: 'home-my-notes'

- tapOn:
    id: 'home-my-notes'

- extendedWaitUntil:
    visible:
      id: 'my-notes-hub'
    timeout: 10000

- assertVisible:
    id: 'my-notes-sessions'
- assertVisible:
    id: 'my-notes-notes'
- assertVisible:
    id: 'my-notes-bookmarks'
- takeScreenshot: my-notes-01-hub

- tapOn:
    id: 'my-notes-sessions'

- extendedWaitUntil:
    visible:
      id: 'my-notes-list-sessions'
    timeout: 10000

- assertVisible:
    text: 'History'
- assertVisible:
    id: 'my-notes-row-sessions-${SESSION_ID}'
- takeScreenshot: my-notes-02-sessions

- tapOn:
    id: 'my-notes-list-back'

- extendedWaitUntil:
    visible:
      id: 'my-notes-hub'
    timeout: 10000

- tapOn:
    id: 'my-notes-notes'

- extendedWaitUntil:
    visible:
      id: 'my-notes-list-notes'
    timeout: 10000

- assertVisible:
    text: 'Rome moved from monarchy to republic before becoming an empire.'
- takeScreenshot: my-notes-03-notes

- tapOn:
    id: 'my-notes-list-back'

- extendedWaitUntil:
    visible:
      id: 'my-notes-hub'
    timeout: 10000

- tapOn:
    id: 'my-notes-bookmarks'

- extendedWaitUntil:
    visible:
      id: 'my-notes-list-bookmarks'
    timeout: 10000

- assertVisible:
    text: 'The Roman Republic was founded in 509 BC after the overthrow of the monarchy.'
- takeScreenshot: my-notes-04-bookmarks
