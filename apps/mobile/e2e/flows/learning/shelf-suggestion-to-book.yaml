# Flow B3: Shelf suggestion filing → book screen
# Validates: library tab → shelf row → shelf-screen suggestion card tap →
#            filing overlay → navigation to the new book-screen.
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library & Content Discovery)
# Epics: Epic 7 (Library — book suggestions on shelf)
# Prerequisite: Seeded user with a Philosophy subject + 3 book_suggestions, no books
#               (scenario: subject-with-book-suggestions).
#               Seed exports subjectId and suggestionId (first suggestion).
#
# testIDs verified against source:
#   tab-library               apps/mobile/src/app/(app)/_layout.tsx
#   learner-screen            apps/mobile/src/app/(app)/(home)/home.tsx (LearnerScreen)
#   shelves-list              apps/mobile/src/app/(app)/library.tsx
#   shelf-row-header-${id}    apps/mobile/src/components/library/ShelfRow.tsx:219
#   shelf-screen              apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:306
#   shelf-suggestion-${id}    apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:390
#   book-screen               apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx
#
# Routing note: tapping shelf-suggestion-${id} calls handlePickBookSuggestion
# which files the suggestion (LLM-backed), then navigates to the new book.
# The LLM filing step can take up to ~30s on WHPX emulators — hence the
# extended 30000ms timeout on book-screen.
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'subject-with-book-suggestions'
      API_URL: ${API_URL}

# ── Home ────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: b3-suggestion-01-home

# ── Library tab ─────────────────────────────────────────────────────────────
- tapOn:
    id: 'tab-library'

- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 10000

- takeScreenshot: b3-suggestion-02-library

# ── Tap shelf row header → shelf-screen ─────────────────────────────────────
- tapOn:
    id: 'shelf-row-header-${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'shelf-screen'
    timeout: 10000

- takeScreenshot: b3-suggestion-03-shelf-screen

# ── Tap the first suggestion card ───────────────────────────────────────────
# shelf-suggestion-${id} renders in the suggestions band (index.tsx:390).
# Tapping it calls handlePickBookSuggestion which files the suggestion and
# navigates to the new book. Expect the filing overlay briefly, then book-screen.
- tapOn:
    id: 'shelf-suggestion-${SUGGESTION_ID}'

- takeScreenshot: b3-suggestion-04-filing-started

# ── Wait for book-screen after LLM filing ───────────────────────────────────
# 30 000ms covers LLM latency on WHPX emulators.
- extendedWaitUntil:
    visible:
      id: 'book-screen'
    timeout: 30000

- assertVisible:
    id: 'book-screen'

- takeScreenshot: b3-suggestion-05-book-reached
