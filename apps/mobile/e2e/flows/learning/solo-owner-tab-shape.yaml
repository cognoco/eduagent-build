# Flow: Solo Owner Tab Shape — V1 Navigation Contract Guard
# Validates that an adult solo owner (isOwner=true, no linked children) always
# sees the LEARNER tab shape — 4 tabs: home, library, progress, more — under
# BOTH V0 and V1 builds.
#
# Why this matters (AGENTS.md, navigation-contract.ts):
#   The V1 guardian redesign replaces own-learning + library with a recaps tab.
#   This tab reassignment ONLY applies to the guardian shape (owner + linked
#   children). A solo owner is classified as "learner" in resolveTabShape() and
#   must never receive guardian tab assignment regardless of MODE_NAV_V1_ENABLED.
#   This flow fails loudly if that invariant breaks in either direction.
#
# Shape invariant for solo owner (both V0 and V1):
#   Visible  : tab-home, tab-library, tab-progress, tab-more
#   Forbidden: tab-recaps (V1 guardian only), tab-my-learning (V0 guardian only)
#   Landing  : learner-screen (NOT parent-home-screen — that is guardian-only)
#
# Tags: nightly, navigation, learning
# Seed: onboarding-complete (adult solo owner + 1 subject, no linked children)
# Usage: ./e2e/scripts/seed-and-run.sh onboarding-complete e2e/flows/learning/solo-owner-tab-shape.yaml
#
# testIDs referenced (verified in source):
#   - apps/mobile/src/app/(app)/_layout.tsx
#       tab-home        (line 663)
#       tab-my-learning (line 684, V0 guardian only)
#       tab-library     (line 695)
#       tab-recaps      (line 706, V1 guardian only)
#       tab-progress    (line 717)
#       tab-more        (line 728)
#   - apps/mobile/src/components/home/LearnerScreen.tsx
#       learner-screen  (line 497)
#   - apps/mobile/src/components/home/ParentHomeScreen.tsx
#       parent-home-screen (line 1021) — asserted NOT visible
#   - apps/mobile/src/app/(app)/library.tsx
#       library-screen  (line 837) — top-level library container
appId: com.mentomate.app
tags:
  - nightly
  - navigation
  - learning
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'onboarding-complete'
      API_URL: ${API_URL}

# Solo owner must land on learner-screen — never parent-home-screen.
# A failure here means either auth failed or the navigation contract routed
# the solo owner into the guardian home branch.
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: solo-owner-tab-shape-01-home

# ── POSITIVE shape assertions: learner tabs (4) ──
# All four learner tabs must be visible immediately on home.
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-library'
- assertVisible:
    id: 'tab-progress'
- assertVisible:
    id: 'tab-more'

# ── NEGATIVE shape assertions: guardian-only tabs and screen ──
# tab-recaps: V1 guardian only — must never appear for a solo owner.
- assertNotVisible:
    id: 'tab-recaps'
# tab-my-learning: V0 guardian only — must never appear for a solo owner.
- assertNotVisible:
    id: 'tab-my-learning'
# parent-home-screen: rendered inside LearnerScreen only when the user has
# linked children. A solo owner must stay on learner-screen content.
- assertNotVisible:
    id: 'parent-home-screen'

- takeScreenshot: solo-owner-tab-shape-02-shape-asserted

# ── Navigate to the Library tab ──
# Confirms tab-library is functional and that the learner shape persists
# across tab transitions (regression: early nav-contract drafts re-evaluated
# the shape on every tab change).
- tapOn:
    id: 'tab-library'

- extendedWaitUntil:
    visible:
      id: 'library-screen'
    timeout: 15000

- takeScreenshot: solo-owner-tab-shape-03-library-open

# Re-assert the negative guards from Library — shape must be stable.
- assertNotVisible:
    id: 'tab-recaps'
- assertNotVisible:
    id: 'tab-my-learning'

- takeScreenshot: solo-owner-tab-shape-04-library-shape-stable

# ── Navigate back home and confirm landing screen ──
- tapOn:
    id: 'tab-home'

- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 10000

# Final shape sanity: solo owner is still on learner-screen, not parent-home-screen.
- assertNotVisible:
    id: 'parent-home-screen'
- assertVisible:
    id: 'tab-library'
- assertNotVisible:
    id: 'tab-recaps'

- takeScreenshot: solo-owner-tab-shape-05-back-on-home
