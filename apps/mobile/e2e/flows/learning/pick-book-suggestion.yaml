# Flow B4: Pick-book screen suggestion → book screen — PARKED (blocked)
#
# PARKED 2026-05-29: this flow exposes a real UX-resilience smell in the
# pick-book screen, not a test-flow bug. On mount the screen calls
# `useBookSuggestions(subjectId, { topup: true })` which always POSTs the topup
# endpoint. When that query errors with `blocksManualEntry: true`, the screen
# early-returns its error block (testID="pick-book-error") with a centered
# "Something went wrong / That page or item no longer exists." + Go Back UI —
# a hard dead end. The expected testID `pick-book-screen` is therefore never
# mounted.
#
# This matches the "UX Resilience Rules" in AGENTS.md: a transient query
# failure should degrade to "no suggestions, type your own" (the manual-entry
# fallback) rather than a fullscreen 404. The fix is in code — make
# `canContinueWithoutSuggestions` true for transient query errors (or stop
# routing the topup error through `blocksManualEntry`). Re-enable this flow
# once that landing path is graceful.
#
# Coverage note: the user-facing shelf-suggestion → book navigation is already
# verified by shelf-suggestion-to-book.yaml (PASS), which does not go through
# the pick-book screen.
#
# Validates (intended): library tab → shelf row → shelf-screen choose-book
#            affordance → pick-book-screen → tap suggestion card → book-screen.
# Tags: blocked, learning
#
# Journey: UX Journey 1 (Library & Content Discovery)
# Epics: Epic 7 (Library — pick-book flow)
# Prerequisite: Seeded user with a Philosophy subject + 3 book_suggestions, no books
#               (scenario: subject-with-book-suggestions).
#               Seed exports subjectId and suggestionId (first suggestion).
#
# testIDs verified against source:
#   tab-library               apps/mobile/src/app/(app)/_layout.tsx
#   learner-screen            apps/mobile/src/app/(app)/(home)/home.tsx (LearnerScreen)
#   shelves-list              apps/mobile/src/app/(app)/library.tsx
#   shelf-row-header-${id}    apps/mobile/src/components/library/ShelfRow.tsx:219
#   shelf-screen              apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:306
#   shelf-choose-book         apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:227
#                               (renderChooseBookButton — renders when showBrowseAllSuggestions
#                               [suggestions.length > 2] OR showAddBookFooter)
#   pick-book-screen          apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:408
#   pick-book-suggestion-${id} apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:479
#   book-screen               apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx
#
# Routing note: with 3 suggestions seeded, showBrowseAllSuggestions=true so the
# "Browse all" button (testID shelf-choose-book) renders at the bottom of the
# suggestions band. On the pick-book screen the flat suggestion grid renders when
# !hasAnyBook. Tapping pick-book-suggestion-${id} calls handlePickSuggestion
# which files the suggestion (LLM-backed) and navigates to the new book.
appId: com.mentomate.app
tags:
  - blocked
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'subject-with-book-suggestions'
      API_URL: ${API_URL}

# ── Home ────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: b4-pick-01-home

# ── Library tab ─────────────────────────────────────────────────────────────
- tapOn:
    id: 'tab-library'

- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 10000

- takeScreenshot: b4-pick-02-library

# ── Tap shelf row header → shelf-screen ─────────────────────────────────────
- tapOn:
    id: 'shelf-row-header-${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'shelf-screen'
    timeout: 10000

- takeScreenshot: b4-pick-03-shelf-screen

# ── Tap the "Browse all" / choose-book button → pick-book-screen ─────────────
# shelf-choose-book renders when suggestions.length > 2 (showBrowseAllSuggestions).
# With 3 suggestions seeded, the button is present.
- tapOn:
    id: 'shelf-choose-book'

- extendedWaitUntil:
    visible:
      id: 'pick-book-screen'
    timeout: 10000

- takeScreenshot: b4-pick-04-pick-book-screen

# ── Tap the first suggestion card ───────────────────────────────────────────
# pick-book-suggestion-${id} renders in the flat grid when !hasAnyBook.
- tapOn:
    id: 'pick-book-suggestion-${SUGGESTION_ID}'

- takeScreenshot: b4-pick-05-filing-started

# ── Wait for book-screen after LLM filing ───────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'book-screen'
    timeout: 30000

- assertVisible:
    id: 'book-screen'

- takeScreenshot: b4-pick-06-book-reached
