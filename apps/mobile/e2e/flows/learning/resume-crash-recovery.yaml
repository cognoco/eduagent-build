# Flow TRACK-2: Resume via Crash-Recovery Marker — PARKED (blocked)
#
# PARKED 2026-05-29: this flow exercises its documented fallback (see the
# EXPERIMENTAL note below). On the WHPX emulator the background→foreground path
# does not reproduce the intended cold-start recovery:
#   - `launchApp stopApp:false` is a WARM resume — the app returns to the chat
#     screen it was backgrounded on, so `learner-screen` never appears after
#     foregrounding (the home/recovery-band model this flow asserts is a
#     COLD-start behavior, where a freshly-booted app reads the SecureStore
#     marker and renders the recovery arm on home).
#   - A `stopApp:true` cold relaunch would exercise the marker read but is
#     unreliable here: the dev-client bundle reload intermittently stalls on
#     this emulator (observed repeatedly 2026-05-29), so a cold relaunch mid-
#     flow is not deterministic.
# The crash-recovery marker logic (30-min freshness, SecureStore key, the
# AppState 'background' write) is covered by unit tests in
# lib/session-recovery.ts / use-session-recovery.ts. The home coach-band
# CONTINUATION PRIORITY — fresh recovery marker wins over a server resume
# target AND overdue review when all three collide — is covered
# deterministically by the [CC-05] tests in
# components/home/LearnerScreen.test.tsx (WI-865), which is the unit-side proof
# for the cold-start path this flow cannot exercise on the emulator.
# Re-enable this E2E flow only once a deterministic cold-start foreground path
# exists on the emulator, or a server-side recovery marker is introduced.
#
# Validates (intended): after entering a session, backgrounding the app (which
#            triggers the AppState 'background' listener writing the recovery
#            marker), then foregrounding, the home coach-band shows the recovery
#            Continue arm and tapping it re-enters the chat session.
#
# EXPERIMENTAL — this flow relies on device-local SecureStore state:
#   The crash-recovery marker is written by the AppState 'background' listener
#   in use-session-recovery.ts whenever the app goes to background while
#   activeSessionId is set. Because the marker is device-local SecureStore
#   (not server state), it cannot be seeded via the API seed endpoint.
#   The flow therefore creates the marker at runtime by:
#     1. Entering a live session (sets activeSessionId in context).
#     2. Pressing the Android Home key (backgrounds the app → AppState fires
#        'background' → marker written with 30-min freshness TTL).
#     3. Re-launching the app (foreground → marker read → coach-band recovery
#        arm renders if marker is fresh).
#   If background/foreground timing proves unreliable on WHPX emulators
#   (gRPC driver can stall during AppState transitions — see BUG-19),
#   this flow will be demoted to the "blocked" tag and parked until a
#   server-side recovery marker or a reliable emulator foreground path exists.
#
# Reference:
#   lib/session-recovery.ts       — 30-min freshness constant, SecureStore key
#   use-session-recovery.ts       — AppState 'background' listener that writes marker
#   CoachBand.tsx                 — reads recovery marker; renders "Continue" arm
#
# Tags: nightly, learning, experimental
#
# Journey: UX Journey 2 (Daily Learning Loop — crash recovery entry)
# Prerequisite: Active in-progress Geography session (scenario: mentor-audit-resumable-session)
#               so there is a valid server-side session to resume; the device-local
#               marker's sessionId must match a live session.
#
# testID mapping:
#   LearnerScreen.tsx:80:
#     - home-ask-anything         -> "Ask anything" action chip (starts a new session)
#   chat screen:
#     - chat-input                -> message input (confirms session is active, so
#                                   activeSessionId is set before backgrounding)
#   LearnerScreen.tsx:
#     - learner-screen            -> home container (after foreground + re-navigation)
#   CoachBand.tsx:37,56:
#     - home-coach-band           -> coach-band strip (renders when recovery/resume target)
#     - home-coach-band-continue  -> "Continue" tap target on the coach-band
appId: com.mentomate.app
tags:
  - blocked
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-resumable-session'
      API_URL: ${API_URL}

# ── Home screen ─────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-crash-recovery-01-home-reached

# ── Enter a session so activeSessionId is set ────────────────────────────────
# Tap "Ask anything" to start a new freeform session. Once chat-input is
# visible the session is active and activeSessionId is set in the app context,
# which is what the AppState 'background' listener checks before writing the
# recovery marker.
- tapOn:
    id: 'home-ask-anything'

- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- takeScreenshot: resume-crash-recovery-02-session-active

# ── Background the app ───────────────────────────────────────────────────────
# Android Home key sends the app to the background. The AppState 'background'
# event fires in use-session-recovery.ts and writes the SecureStore marker
# with a 30-min freshness TTL (lib/session-recovery.ts).
- pressKey: Home

# Brief pause so the AppState 'background' handler has time to complete the
# SecureStore write before the app is re-launched. 2 s is conservative;
# SecureStore writes are synchronous on the JS thread.
- evalScript: ${new Promise(r => setTimeout(r, 2000))}

# ── Foreground the app ───────────────────────────────────────────────────────
# launchApp brings the app back to the foreground without clearing state.
# stopApp: false preserves the JS bundle and the SecureStore marker.
- launchApp:
    stopApp: false

# ── Home screen (after foreground) ───────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-crash-recovery-03-home-after-foreground

# ── Coach-band recovery arm ───────────────────────────────────────────────────
# After foregrounding, the recovery marker is fresh (< 30 min). LearnerScreen
# reads the marker via use-session-recovery and renders the coach-band with
# the "Continue" button.
- extendedWaitUntil:
    visible:
      id: 'home-coach-band'
    timeout: 10000

- takeScreenshot: resume-crash-recovery-04-recovery-band-visible

- tapOn:
    id: 'home-coach-band-continue'

# ── Session screen ────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 30000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: resume-crash-recovery-05-chat-resumed
