# Flow B1: Library Search → Book Screen
# Validates: typing a book title into the library search input returns a
# book-row result; tapping it navigates directly to the book-screen.
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library & Content Discovery — search entry point)
# Epics: Epic 7 (Library search)
# Prerequisite: Seeded learner with a "World History" book (scenario: learning-active)
#
# Seed note: learning-active creates a "World History" subject + book. The search
# endpoint returns matching books as BookRow entries (testID: book-row-${BOOK_ID};
# LibrarySearchResults.tsx:210). Tapping a BookRow calls handleBookPress which
# pushes /shelf/[subjectId] then /shelf/[subjectId]/book/[bookId] — landing on
# the book-screen (library.tsx:357-368).
#
# Important: when isSearching=true, the shelves-list is unmounted and
# LibrarySearchResults renders — individual book results appear as
# book-row-${bookId} NOT shelf-row-header-${subjectId}.
# (Verified: LibrarySearchResults.tsx:210, library.tsx:740)
#
# testID mapping:
#   apps/mobile/src/components/library/LibrarySearchBar.tsx:
#     - library-search-input                -> search TextInput (line 27)
#   apps/mobile/src/components/library/LibrarySearchResults.tsx:
#     - book-row-${BOOK_ID}                 -> tappable book result row (line 210)
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root (line 1508)
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: search-book-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: search-book-02-library

# ── Tap search input and type ───────────────────────────────────────────
# library-search-input: LibrarySearchBar.tsx:27
- tapOn:
    id: "library-search-input"

# "World" matches the seeded "World History" book title.
- inputText: "World"

# Dismiss the keyboard before interacting with results: an open keyboard covers
# the lower-screen book-row (taps land on the keyboard instead of the row) and
# its autocorrect can mutate the committed query (e.g. "World" → "Works"),
# clearing the match. Hiding it lets the debounced query settle and the row tap
# land. (Same pattern as the auth sub-flow after each text input.)
- hideKeyboard

- takeScreenshot: search-book-03-typed

# ── Wait for book result to appear ──────────────────────────────────────
# LibrarySearchResults renders book results as book-row-${bookId}.
# 10s covers debounce (300ms) + server round-trip + render.
- extendedWaitUntil:
    visible:
      id: "book-row-${BOOK_ID}"
    timeout: 10000

- assertVisible:
    id: "book-row-${BOOK_ID}"

- takeScreenshot: search-book-04-results-visible

# ── Tap the book result → book-screen ───────────────────────────────────
# handleBookPress pushes /shelf/[subjectId] then /shelf/[subjectId]/book/[bookId].
# book-screen is the root of the book detail page (book/[bookId].tsx:1508).
- tapOn:
    id: "book-row-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 10000

- assertVisible:
    id: "book-screen"

- takeScreenshot: search-book-05-book-screen-reached
