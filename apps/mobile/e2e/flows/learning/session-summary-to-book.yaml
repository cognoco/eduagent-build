# Flow B6: Session-summary "continue → filed book" deep-link path
# Validates: deep-link to session-summary with filedSubjectId+filedBookId params →
#            summary screen loads → tap continue-button → book-screen reached
#            (finishSummaryNavigation pushes library → shelf → book).
# Tags: nightly, learning
#
# Journey: UX Journey 2 (Daily Learning Loop — post-session navigation)
# Epics: Epic 2 (FR41 — Session Close Summary), Story 4.12 (post-session library nav)
# Prerequisite: Seeded learner with a completed Mathematics session (scenario: session-with-transcript).
#               Seed exports subjectId, bookId, sessionId.
#
# Deep-link mechanism:
#   mentomate:///session-summary/${SESSION_ID}?filedSubjectId=${SUBJECT_ID}&filedBookId=${BOOK_ID}
#   — same scheme used in auth/deep-link-redirect-*.yaml flows (confirmed operational).
#   The query params are read via useLocalSearchParams in [sessionId].tsx:84-99.
#   When filedSubjectId AND filedBookId are present, finishSummaryNavigation()
#   calls router.replace('/(app)/library') then pushes shelf + book via
#   InteractionManager.runAfterInteractions ([sessionId].tsx:360-374).
#
# Button logic:
#   session-with-transcript seeds a sessionSummaries row with status:'accepted'.
#   isAlreadyPersisted=true → showSubmittedView=true → continue-button renders
#   (not skip-summary-button). [sessionId].tsx:1434-1449.
#
# testIDs verified against source:
#   learner-screen            apps/mobile/src/app/(app)/(home)/home.tsx (LearnerScreen)
#   summary-title             apps/mobile/src/app/session-summary/[sessionId].tsx:816
#   continue-button           apps/mobile/src/app/session-summary/[sessionId].tsx:1440
#   skip-summary-button       apps/mobile/src/app/session-summary/[sessionId].tsx:1456
#   book-screen               apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'session-with-transcript'
      API_URL: ${API_URL}

# ── Home ────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: b6-summary-01-home

# ── Deep-link to session-summary with filed params ───────────────────────────
# Expo Router resolves mentomate:///session-summary/${SESSION_ID} to
# apps/mobile/src/app/session-summary/[sessionId].tsx.
# The query params are read via useLocalSearchParams ([sessionId].tsx:84-99).
#
# exchangeCount + wallClockSeconds are REQUIRED here, matching the real in-app
# navigation (use-session-actions.ts:247-268 always passes them). The screen's
# loading guard ([sessionId].tsx:492-526) only renders the summary once
# exchangeCount/wallClockSeconds are present OR the transcript query resolves.
# On a root-level deep link the transcript query can stay pending (the route
# sits outside (app)/ — see the BUG-134 note at [sessionId].tsx:107), so without
# these params the screen hangs on "Loading your session summary..." forever.
# Passing them replicates the real session-close params and bypasses the guard.
# The exact numbers are display-only and don't affect this flow's assertions.
- openLink: "mentomate:///session-summary/${SESSION_ID}?filedSubjectId=${SUBJECT_ID}&filedBookId=${BOOK_ID}&exchangeCount=5&wallClockSeconds=600"

# ── Wait for session-summary screen ──────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'summary-title'
    timeout: 15000

- takeScreenshot: b6-summary-02-summary-screen

# ── Scroll to and tap continue-button ────────────────────────────────────────
# summary-title may appear below the fold once AI feedback is displayed.
# The session-with-transcript seed provides status:'accepted', so the summary
# is already persisted and continue-button (not skip-summary-button) renders.
- scrollUntilVisible:
    element:
      id: 'continue-button'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'continue-button'

- takeScreenshot: b6-summary-03-continue-tapped

# ── Wait for book-screen ──────────────────────────────────────────────────────
# finishSummaryNavigation replaces to library then pushes shelf → book via
# InteractionManager.runAfterInteractions. 15s covers the async pushes.
- extendedWaitUntil:
    visible:
      id: 'book-screen'
    timeout: 15000

- assertVisible:
    id: 'book-screen'

- takeScreenshot: b6-summary-04-book-reached
