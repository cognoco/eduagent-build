# Flow TRACK-3: Resume via Home Coach-Band Banner
# Validates: a user with an in-progress session sees the coach-band resume
#            arm on the home screen and can tap it to re-enter the chat.
# Tags: nightly, learning
#
# Journey: UX Journey 2 (Daily Learning Loop — resume entry)
# Prerequisite: Active in-progress Geography session (scenario: mentor-audit-resumable-session)
#               The seed exports subjectId, topicId, and sessionId.
#               The active session causes LearnerScreen to render the coach-band
#               with a "Continue" button (home-coach-band-continue).
#
# testID mapping:
#   LearnerScreen.tsx:
#     - learner-screen            -> home container (confirms post-auth landing)
#     - home-coach-band           -> coach-band strip (renders when resume target exists)
#     - home-coach-band-continue  -> "Continue" tap target on the coach-band
#                                    (CoachBand.tsx:56)
#   chat screen:
#     - chat-input                -> message input field (confirms session is active)
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'mentor-audit-resumable-session'
      API_URL: ${API_URL}

# ── Home screen ─────────────────────────────────────────────────────────────
# Generous timeout: post-auth navigation includes potential PostApprovalLanding
# intercepts and notification permission dialogs handled by seed-and-sign-in.
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: resume-home-banner-01-home-reached

# ── Coach-band resume arm ────────────────────────────────────────────────────
# The mentor-audit-resumable-session seed creates an active in-progress session,
# so LearnerScreen mounts the coach-band with the "Continue" button visible.
# extendedWaitUntil covers the async coach-band data load (useLearningResumeTarget
# fetches from /progress/resume-target).
- extendedWaitUntil:
    visible:
      id: 'home-coach-band'
    timeout: 10000

- takeScreenshot: resume-home-banner-02-coach-band-visible

- tapOn:
    id: 'home-coach-band-continue'

# ── Session screen ────────────────────────────────────────────────────────────
# 45 s timeout: session navigation involves auth-scope checks, a possible
# network round-trip to /sessions/:id, and React Navigation mount time.
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 45000

- assertVisible:
    id: 'chat-input'

- takeScreenshot: resume-home-banner-03-chat-resumed
