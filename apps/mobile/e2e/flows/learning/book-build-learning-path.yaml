# Flow T11: Book Detail — Empty-State "Build Learning Path" CTA
# Validates: a book with topicsGenerated=true but ZERO topics shows the
# empty-state "topics-empty-build" CTA; tapping it triggers server-side
# topic generation and lands in a session (chat-input visible).
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library — first-time book setup)
# Epics: Epic 7 (Library); book curriculum build
# Prerequisite: Seeded book with no curriculum topics (scenario: book-no-curriculum)
#
# Seed note: book-no-curriculum creates an "Economics" subject + book with
# topicsGenerated=true but no curriculumTopics rows. The book-screen renders
# the empty-state view (topics-empty-state, book/[bookId].tsx:1777) containing
# the "Set up this book" Pressable (testID: topics-empty-build, line 1788).
# handleBuildLearningPath calls startFirstCurriculumSession (sessionCount===0,
# no resume target) → server generates topics → lands in a mode=learning session.
# The 60s timeout is generous to accommodate server-side topic generation latency.
#
# testID mapping:
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> pushes /shelf/[subjectId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> pushes /shelf/[subjectId]/book/[bookId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root (line 1508)
#     - topics-empty-state                  -> empty-state container (line 1777)
#     - topics-empty-build                  -> "Set up this book" Pressable (line 1788)
#   apps/mobile/src/app/(app)/session/ (via session route):
#     - chat-input                          -> confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "book-no-curriculum"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: book-build-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-build-02-library

# ── Open the Economics subject shelf ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

- takeScreenshot: book-build-03-shelf-screen

# ── Tap book card → book-screen ─────────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: book-build-04-book-screen

# ── Assert empty-state build CTA is visible ──────────────────────────────
# books with topicsGenerated=true and no curriculumTopics rows render the
# empty-state block (topics-empty-state) with the topics-empty-build Pressable.
- assertVisible:
    id: "topics-empty-build"

- takeScreenshot: book-build-05-empty-state-cta

# ── Tap topics-empty-build → session ────────────────────────────────────
# handleBuildLearningPath → startFirstCurriculumSession (sessionCount===0) →
# server generates topics → session route.
# 60s timeout: server-side generation can be slow (LLM + DB writes).
- tapOn:
    id: "topics-empty-build"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

- assertVisible:
    id: "chat-input"

- takeScreenshot: book-build-06-session-launched
