# PARKED (audit re-verified 2026-05-29): Asserts the isParentProxy=true gate, but no
# user-facing UI entry currently reaches parent-proxy mode after the [ACCOUNT-04] /
# BUG-774 refactor. `apps/mobile/src/app/profiles.tsx:185-202` now routes
# owner-taps-child to `childProfileHref(...'settings')` (child-detail-scroll), and
# proxy mode is reachable only via `switchProfile(id, { proxyMode: true })` from
# internal/test code (see apps/mobile/src/lib/profile.ts:71,84,373 and
# apps/mobile/src/hooks/use-parent-proxy.ts:15). Proxy logic + transcript-hidden
# gate remain unit-tested (session-summary/[sessionId].test.tsx:1998, 2054).
# This flow stays OUT of the run manifest until the new proxy entry ships —
# then re-point _setup/switch-to-child.yaml at it.
#
# UNBLOCK CONDITION: when a user-facing affordance invokes
# `switchProfile(id, { proxyMode: true })` (currently zero call sites in
# `apps/mobile/src/` outside of tests), update _setup/switch-to-child.yaml to
# drive it (or add a new _setup/enter-proxy.yaml) and re-add this flow to the
# run manifest. ModeSwitcher.tsx's `mode-switcher-study`/`mode-switcher-family`
# testIDs are study↔family toggles, NOT child impersonation.
#
# Flow LEARN-23 (Step 2): Session transcript — parent-proxy privacy gate.
# Validates: [CR-PR129-M5] view-transcript-cta is hidden when isParentProxy=true.
# Parent switches to child profile (proxy mode) and confirms no transcript link on session summary.
# Tags: nightly, learning, parent
#
# Prerequisite: parent-proxy seed — parent account + child profile + completed session.
#   apps/api/src/services/test-seed.ts:5427 → seedParentProxy at line 2766.
#   Child displayName "Proxy Child" (line 2781); returns CHILD_PROFILE_ID,
#   SESSION_ID, SUBJECT_ID, BOOK_ID, TOPIC_ID (lines 2887-2901).
#
# testIDs verified 2026-05-29 against current source:
#   - summary-title ............ apps/mobile/src/app/session-summary/[sessionId].tsx:816
#   - view-transcript-cta ...... apps/mobile/src/app/session-summary/[sessionId].tsx:968
#       Rendered only when `!isProxyMode` (gate at line 933;
#       isProxyMode = !navigationGates.showLearningActions, defined line 152).
#   - shelf-row-header-${SUBJECT_ID} ... apps/mobile/src/components/library/ShelfRow.tsx:219
#   - shelves-list ............. apps/mobile/src/app/(app)/library.tsx:761 (also 975)
#   - tab-library .............. apps/mobile/src/app/(app)/_layout.tsx:695
#   - book-screen .............. apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:1508
#   - book-sessions-section .... shelf/[subjectId]/book/[bookId].tsx:1941
#   - book-sessions-toggle ..... shelf/[subjectId]/book/[bookId].tsx:1945
#   - session-${SESSION_ID} .... shelf/[subjectId]/book/[bookId].tsx:2008 (and 2028)
#   - child-detail-scroll ...... apps/mobile/src/app/(app)/child/[profileId]/index.tsx:868
#
# REMOVED / RENAMED since flow was written:
#   - `book-row-${BOOK_ID}` is NOT in a standalone BookRow.tsx — there is no
#     `apps/mobile/src/components/library/BookRow.tsx` file. The testID exists
#     only inside the BookRow component defined in
#     apps/mobile/src/components/library/LibrarySearchResults.tsx:210, which
#     only renders inside the library SEARCH results path. Tapping the shelf
#     header in step 5 navigates to the pick-book screen (which uses
#     `pick-book-suggestion-${id}`, NOT `book-row-${id}`) — so step 6's
#     `book-row-${BOOK_ID}` will never appear on the post-shelf-tap path.
#     When re-enabling, either (a) rewrite steps 5-7 to navigate via the
#     pick-book → book detail screen, or (b) replace shelf-tap with a
#     library search to trigger the LibrarySearchResults code path.
appId: com.mentomate.app
tags:
  - nightly
  - learning
  - parent
  - blocked
---
# 1. Seed & sign in (seeds as parent owner, lands on parent dashboard or learner home)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-proxy"
      API_URL: ${API_URL}

# 2. Switch active profile to child — activates proxy mode (isParentProxy = true)
#    switch-to-child navigates More → Profiles → taps child by display name.
#    parent-proxy seed names the child "Proxy Child".
- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Proxy Child"

# 3. [ACCOUNT-04] switch-to-child now lands on child-detail-scroll (parent-native
#    child settings view), NOT learner-screen. Proxy mode (isParentProxy=true) is
#    no longer activated by this navigation path — the ACCOUNT-04 refactor removed
#    the proxy entry point from profiles.tsx. The core assertion (view-transcript-cta
#    hidden when isParentProxy=true) cannot be verified via this flow as designed.
#    NEEDS-HUMAN: redesign this flow to either use a different proxy entry point or
#    pivot to testing the transcript-hidden gate from the parent-native child route.
#    Source: apps/mobile/src/app/profiles.tsx:185-202
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 15000

- takeScreenshot: proxy-transcript-01-child-detail

# 4. Navigate to Library tab
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 5. Expand the child's subject shelf (Science)
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# 6. Tap the book row to open book detail
- extendedWaitUntil:
    visible:
      id: "book-row-${BOOK_ID}"
    timeout: 5000

- tapOn:
    id: "book-row-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: proxy-transcript-02-book-detail

# 7. Scroll to sessions section and tap the seeded session
- scrollUntilVisible:
    element:
      id: "book-sessions-section"
    direction: DOWN
    timeout: 8000

- tapOn:
    id: "book-sessions-toggle"

- extendedWaitUntil:
    visible:
      id: "session-${SESSION_ID}"
    timeout: 8000

- tapOn:
    id: "session-${SESSION_ID}"

# 8. Wait for session summary screen
- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 15000

- takeScreenshot: proxy-transcript-03-session-summary

# 9. Core assertion: transcript CTA must NOT be visible in proxy mode.
#    [CR-PR129-M5] view-transcript-cta is conditionally rendered only when
#    !isParentProxy. In proxy mode the element must be absent from the hierarchy.
- assertNotVisible:
    id: "view-transcript-cta"

- takeScreenshot: proxy-transcript-04-no-transcript-link
