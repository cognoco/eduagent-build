# Flow S3: Core Learning — Session to Summary
# Validates: full learning loop with 3 exchanges, session close, and summary.
# Tags: smoke, learning
#
# Journey: UX Journey 2 (Daily Learning Loop)
# Epics: Epic 2 (FR23-FR26, FR41)
# Prerequisite: Seeded user with subject + coaching card (scenario: learning-active)
appId: com.mentomate.app
tags:
  - smoke
  - learning
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# ── M05 regression: tab bar visible AND tappable ──────────────────────
# assertVisible alone can pass even when tabs are rendered behind the system
# navigation bar (the element exists in the tree but taps are intercepted).
# Tap each tab and verify it navigates, then return to Home.
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-library"
- assertVisible:
    id: "tab-more"

# Tap Library tab → verify it navigates
- tapOn:
    id: "tab-library"
- extendedWaitUntil:
    visible:
      id: "library-tab-shelves"
    timeout: 5000
    # library-tab-shelves is the default Shelves tab in the new 3-tab Library
    optional: true

# Tap More tab → verify it navigates
- tapOn:
    id: "tab-more"
# Learning Mode section is always above the fold — reliable "More loaded" landmark
- extendedWaitUntil:
    visible:
      id: "learning-mode-casual"
    timeout: 5000

# Return to Home tab
- tapOn:
    id: "tab-home"
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 5000

# ── M07 regression: home screen has real content (not empty) ──────────
# Verify intent card stack loaded — catches blank home screen.
- assertVisible:
    id: "learner-intent-stack"

# Intent-continue proves the user has an active subject (learning-active seed)
- assertVisible:
    id: "intent-continue"

# ── Negative assertions: empty state must not appear ───────────────────
# Full text match required — Maestro on Android can't reliably match substrings
# inside React Native <Text> nodes (BUG-57 pattern).
- assertNotVisible:
    text: "Start learning — add your first subject"

# 3. Start session via intent-continue card (replaced coaching-card-primary)
- tapOn:
    id: "intent-continue"

# 4. Session active — chat input present
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 5. Exchange 1: user question
- tapOn:
    id: "chat-input"
- inputText: "Explain the concept to me"
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# ── Visual integrity: verify user message rendered in chat ─────────────
# After sending, the user's message must appear in the message list.
# Catches rendering bugs where input is accepted but not displayed.
- scrollUntilVisible:
    element:
      text: "Explain the concept to me"
    direction: DOWN
    timeout: 10000

# 6. Wait for AI response
# M06 regression: if Gemini token is expired or API is down, the response
# will either hang (no timeout on fetch — FIX-01) or show an error.
# 30s timeout catches hangs. Negative assertions catch error states.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# ── M06 guard: verify AI actually responded (not just input re-enabled) ──
# The chat-messages scroll area should have content beyond the user's message.
# If AI failed silently, only the user bubble exists.
- assertVisible:
    id: "chat-messages"
# Error states that indicate broken AI — none of these should appear
- assertNotVisible: "Something went wrong"
- assertNotVisible: "try again"
- assertNotVisible: "offline"

# 7. Exchange 2: follow-up
- tapOn:
    id: "chat-input"
- inputText: "Can you give me an example?"
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 8. Wait for response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 9. Exchange 3: clarification
- tapOn:
    id: "chat-input"
- inputText: "I think I understand, let me try to explain it back"
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 10. Wait for response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# 11. Session close — auto-closes after exchange cap (learning-active seed uses default cap)
# 3 exchanges are enough to trigger the session close on this seed scenario.
- extendedWaitUntil:
    visible:
      id: "summary-score"
    timeout: 20000

# 12. Verify summary content
- assertVisible:
    id: "summary-topics"

# 13. Close summary and return to home
- tapOn:
    id: "summary-close"

# 14. Verify we can reach home
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# ── M05 post-session regression: tabs still tappable after session ────
# After returning from a full session, the tab bar must remain functional.
# BUG M05 found tabs hidden behind system buttons — this catches it.
# optional: regression guard; depends on step 14 (learner-screen) succeeding first.
- tapOn:
    id: "tab-library"
    optional: true
- tapOn:
    id: "tab-home"
    optional: true

# 15. Screenshot
- takeScreenshot: core-learning-complete
