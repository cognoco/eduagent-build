# Flow S3: Core Learning — Session to Summary
# Validates: full learning loop with 3 completed exchanges, manual close, and summary.
# Tags: smoke, learning
#
# Journey: UX Journey 2 (Daily Learning Loop)
# Epics: Epic 2 (FR23-FR26, FR41)
# Prerequisite: Seeded user with subject + coaching card (scenario: learning-active)
appId: com.mentomate.app
tags:
  - smoke
  - learning
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'learning-active'
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

# ── M05 regression: tab bar visible AND tappable ──────────────────────
# assertVisible alone can pass even when tabs are rendered behind the system
# navigation bar (the element exists in the tree but taps are intercepted).
# Tap each tab and verify it navigates, then return to Home.
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-library'
- assertVisible:
    id: 'tab-more'

# Tap Library tab → verify it navigates
- tapOn:
    id: 'tab-library'
- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 5000
    # shelves-list is the Library v3 single-pane shelf list (library-tab-shelves removed in PR #144)

# Tap More tab → verify it navigates
- tapOn:
    id: 'tab-more'
- extendedWaitUntil:
    visible:
      id: 'more-row-learning-preferences'
    timeout: 15000

# Return to Home tab
- tapOn:
    id: 'tab-home'
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 5000

# ── M07 regression: home screen has real content (not empty) ──────────
# Coach band proves the user has an active subject (learning-active seed)
# and is above the fold on small phones — assert it before any scroll.
- assertVisible:
    id: 'home-coach-band-continue'

# Subject carousel sits below the action chips on the current LearnerScreen
# layout (small phones need a scroll to bring it on-screen). Scroll until
# visible, then assert.
- scrollUntilVisible:
    element:
      id: 'home-subject-carousel'
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: 'home-subject-carousel'

# ── Negative assertions: empty state must not appear ───────────────────
# Full text match required — Maestro on Android can't reliably match substrings
# inside React Native <Text> nodes (BUG-57 pattern).
- assertNotVisible:
    text: 'Add your first subject'

# 3. Start session via coach band continue button.
#    After the carousel scroll above, the coach band is off-screen. Scroll
#    back up to bring it into view before tapping.
- scrollUntilVisible:
    element:
      id: 'home-coach-band-continue'
    direction: UP
    timeout: 10000

- tapOn:
    id: 'home-coach-band-continue'

# 4. Session active — chat input present.
#    The coach band tap calls pushLearningResumeTarget (navigation.ts:120-135)
#    which pushes /(app)/home then /(app)/session. The session screen fetches
#    existing events for the active sessionId before rendering ChatShell.
#    10s was too tight on a cold emulator — bumped to 20s (FIXED-timing).
- extendedWaitUntil:
    visible:
      id: 'chat-input'
    timeout: 20000

# 5. Exchange 1: user question
- tapOn:
    id: 'chat-input'
- inputText: 'Explain the concept to me'
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# The learning-active opener occupies assistant index 1. Each user/assistant
# pair advances the ChatShell message index by two, so this ID uniquely proves
# the first assistant turn rendered; text/relative selectors are unreliable in
# the virtualized Android list.
- extendedWaitUntil:
    visible:
      id: 'message-bubble-assistant-3'
    timeout: 30000

# 6. Require the successful turn to finish before sending another.
- extendedWaitUntil:
    visible:
      id: 'chat-input'
      enabled: true
    timeout: 30000

# Error states that indicate broken AI — none of these should appear
- assertNotVisible: 'Something went wrong'
- assertNotVisible: 'try again'
- assertNotVisible: 'offline'

# 7. Exchange 2: follow-up
- tapOn:
    id: 'chat-input'
- inputText: 'Can you give me an example?'
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 8. Wait for response
- extendedWaitUntil:
    visible:
      id: 'message-bubble-assistant-5'
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: 'chat-input'
      enabled: true
    timeout: 30000

# 9. Exchange 3: clarification
- tapOn:
    id: 'chat-input'
- inputText: 'I think I understand, let me try to explain it back'
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 10. Wait for response
- extendedWaitUntil:
    visible:
      id: 'message-bubble-assistant-7'
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: 'chat-input'
      enabled: true
    timeout: 30000

# 11. Close the regular session explicitly after all three responses.
# Regular sessions do not have a three-exchange auto-close contract.
- extendedWaitUntil:
    visible:
      id: 'end-session-button'
    timeout: 10000

- tapOn:
    id: 'end-session-button'

- tapOn:
    text: 'End Session'

- extendedWaitUntil:
    visible:
      id: 'summary-title'
    timeout: 20000

# 12. Verify summary content
- assertVisible:
    id: 'session-takeaways'

# 13. Close summary and return to home
- tapOn:
    id: 'summary-close-button'

# 14. Verify we can reach home
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 10000

# ── M05 post-session regression: tabs still tappable after session ────
# After returning from a full session, the tab bar must remain functional.
# BUG M05 found tabs hidden behind system buttons. The guard must actually
# fail if the tabs are unreachable — optional taps would silently pass even
# when M05 regressed.
- tapOn:
    id: 'tab-library'
- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 10000
- tapOn:
    id: 'tab-home'
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 10000

# 15. Screenshot
- takeScreenshot: core-learning-complete
