# Flow: Start a Learning Session & Send a Message
# Validates: session screen renders, chat input works, AI responds.
# Tags: smoke, learning
#
# Prerequisites:
#   - User is signed in
#   - At least one subject exists (e.g., from the create-subject flow)
#   - API is running with a valid LLM configuration
#
# NOTE: This flow navigates from the coaching card's primary action,
# which typically links to a session for the user's active subject.
# If no coaching card is present, the flow will not proceed past
# the home screen. In CI, seed data should ensure a coaching card.
# Seeding handled by seed-and-run.sh. Uses learning-active scenario (needs subjects + coaching card).
# Usage: ./scripts/seed-and-run.sh learning-active flows/learning/start-session.yaml
appId: com.mentomate.app
tags:
  - smoke
  - learning
# Re-promoted 2026-05-29: already uses hideKeyboard + tapOn send-button
# (BUG-35 fix pattern). Added SEED_SCENARIO + API_URL env vars to runFlow.
---
# 1. Seed, launch dev-client, sign in.
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# The coach band continue button starts a session (replaced intent-continue card
# in home UI redesign). learning-active seed → coach band is shown.
- tapOn:
    id: "home-coach-band-continue"

# The session screen shows one of: "Learning Session", "Homework Help",
# "Practice Session", or "Chat" in the ChatShell header.
# We check for the chat input which is always present.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# Type a message in the chat input
- tapOn:
    id: "chat-input"
- inputText: "Hello, can you help me understand the basics?"

# BUG-267 / BUG-35: pressKey: Enter does not reliably fire onSubmitEditing
# in the WHPX dev-client build. send-button is covered by the keyboard on
# Android — same hideKeyboard + tapOn pattern that seed-and-sign-in.yaml uses.
- hideKeyboard
- tapOn:
    id: "send-button"

# Visual integrity: verify user message rendered in chat
- scrollUntilVisible:
    element:
      text: "Hello, can you help me understand the basics?"
    direction: DOWN
    timeout: 10000

# Wait for the AI response to appear.
# The send button should become re-enabled once streaming is done.
# We verify the chat input is still present (session didn't crash).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

- takeScreenshot: learning-session-message-sent
