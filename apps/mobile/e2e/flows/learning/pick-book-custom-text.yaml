# Flow B5: Pick-book custom text submit → book screen
# Validates: library tab → shelf row → shelf-screen choose-book affordance →
#            pick-book-screen → tap "Something else…" → type custom text →
#            tap submit → book-screen.
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library & Content Discovery)
# Epics: Epic 7 (Library — custom book input)
# Prerequisite: Seeded user with a Philosophy subject + 3 book_suggestions, no books
#               (scenario: subject-with-book-suggestions).
#               Seed exports subjectId and suggestionId (suggestionId not used here).
#
# testIDs verified against source:
#   tab-library               apps/mobile/src/app/(app)/_layout.tsx
#   learner-screen            apps/mobile/src/app/(app)/(home)/home.tsx (LearnerScreen)
#   shelves-list              apps/mobile/src/app/(app)/library.tsx
#   shelf-row-header-${id}    apps/mobile/src/components/library/ShelfRow.tsx:219
#   shelf-screen              apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:306
#   shelf-choose-book         apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:227
#   pick-book-screen          apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:408
#   pick-book-something-else  apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:626
#                               (Pressable, visible when !showCustomInput)
#   pick-book-custom-input    apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:585
#                               (TextInput, visible when showCustomInput=true)
#   pick-book-custom-submit   apps/mobile/src/app/(app)/pick-book/[subjectId].tsx:602
#                               (submit button, enabled when text.trim().length >= MIN_TOPIC_INPUT_LENGTH=3)
#   book-screen               apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx
#
# Routing note: tapping pick-book-something-else calls setShowCustomInput(true),
# which swaps the Pressable for a TextInput + submit button. Tapping
# pick-book-custom-submit calls handleCustomSubmit (LLM-backed filing) and
# navigates to the new book. 30s timeout covers LLM latency.
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'subject-with-book-suggestions'
      API_URL: ${API_URL}

# ── Home ────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: b5-custom-01-home

# ── Library tab ─────────────────────────────────────────────────────────────
- tapOn:
    id: 'tab-library'

- extendedWaitUntil:
    visible:
      id: 'shelves-list'
    timeout: 10000

- takeScreenshot: b5-custom-02-library

# ── Tap shelf row header → shelf-screen ─────────────────────────────────────
- tapOn:
    id: 'shelf-row-header-${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'shelf-screen'
    timeout: 10000

- takeScreenshot: b5-custom-03-shelf-screen

# ── Tap the choose-book button → pick-book-screen ────────────────────────────
- tapOn:
    id: 'shelf-choose-book'

- extendedWaitUntil:
    visible:
      id: 'pick-book-screen'
    timeout: 10000

- takeScreenshot: b5-custom-04-pick-book-screen

# ── Tap "Something else…" → reveals custom input ─────────────────────────────
# pick-book-something-else renders when !showCustomInput (default state).
- tapOn:
    id: 'pick-book-something-else'

# ── Wait for custom input to appear, then type ───────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'pick-book-custom-input'
    timeout: 5000

- tapOn:
    id: 'pick-book-custom-input'

- inputText: 'Stoic Philosophy'

- hideKeyboard

- takeScreenshot: b5-custom-05-custom-text-entered

# ── Tap submit ───────────────────────────────────────────────────────────────
# pick-book-custom-submit is enabled when text.trim().length >= 3.
# "Stoic Philosophy" (16 chars) satisfies the MIN_TOPIC_INPUT_LENGTH guard.
- tapOn:
    id: 'pick-book-custom-submit'

- takeScreenshot: b5-custom-06-filing-started

# ── Wait for book-screen after LLM filing ───────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'book-screen'
    timeout: 30000

- assertVisible:
    id: 'book-screen'

- takeScreenshot: b5-custom-07-book-reached
