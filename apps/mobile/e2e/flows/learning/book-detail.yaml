# Flow L1: Book Detail
# Validates: library tab -> tap shelf row -> shelf screen -> book card tap ->
#            book detail -> back navigation.
# Tags: nightly, learning (re-promote to pr-blocking after 2x green on WHPX
#       Pixel API 34 — see Notion bug 3658bce9-1f7c-81fc-8afa-d9ade3fefbeb)
#
# Journey: UX Journey 1 (Library & Content Discovery)
# Epics: Epic 7 (Library)
# Prerequisite: Seeded learner with an active curriculum book (scenario: learning-active)
#
# Routing note (Library v3 push refactor, 2026-05-19):
#   Library no longer expands shelves inline. Tapping a shelf-row-header
#   calls handleShelfPress (library.tsx:333) which pushes /shelf/[subjectId].
#   On the shelf screen, books render as BookCard (testID `book-card-${bookId}`),
#   NOT inline `book-row-${bookId}`. Tapping a BookCard pushes
#   /shelf/[subjectId]/book/[bookId] (shelf/[subjectId]/index.tsx:388-393).
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/_layout.tsx (tab-library)
#   - apps/mobile/src/app/(app)/library.tsx (shelves-list)
#   - apps/mobile/src/components/library/ShelfRow.tsx (shelf-row-header-${subjectId})
#   - apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx (shelf-screen, shelf-back)
#   - apps/mobile/src/components/library/BookCard.tsx (book-card-${bookId})
#   - apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx (book-screen,
#     book-back, book-notes-section, book-start-learning)
appId: com.mentomate.app
tags:
  - nightly
  - learning
# DEMOTED 2026-05-19: flow re-routed to push-to-shelf model. Awaiting 2x green
# WHPX Pixel API 34 verification before re-tagging to pr-blocking.
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-01-library

# Tap the subject shelf header — pushes /shelf/[subjectId] (no inline expansion).
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# Wait for the pushed shelf screen.
- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 15000

# On the shelf screen, books render as BookCard with testID book-card-${bookId}.
- assertVisible:
    id: "book-card-${BOOK_ID}"

- takeScreenshot: book-02-shelf-screen

# Tap the book card — BookCard onPress pushes /shelf/[subjectId]/book/[bookId].
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: book-03-book-detail

- assertVisible:
    id: "book-back"

- assertVisible:
    id: "book-start-learning"

- scrollUntilVisible:
    element:
      id: "book-notes-section"
    direction: DOWN
    timeout: 5000
    optional: true  # justified: book-notes-section only renders when the book has notes content; may be absent for books with no notes yet

- takeScreenshot: book-04-scrolled

# Navigate back: book-back pops to the shelf screen.
- tapOn:
    id: "book-back"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

# From shelf screen, tap shelf-back to return to the library index.
- tapOn:
    id: "shelf-back"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-05-back-to-library
