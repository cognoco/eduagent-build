# Flow L1: Book Detail
# Validates: library tab -> v3 shelf expansion -> book-row tap -> book detail -> back navigation.
# Tags: pr-blocking, learning
#
# Journey: UX Journey 1 (Library & Content Discovery)
# Epics: Epic 7 (Library)
# Prerequisite: Seeded learner with an active curriculum book (scenario: learning-active)
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/_layout.tsx (tab-library)
#   - apps/mobile/src/app/(app)/library.tsx (shelves-list)
#   - apps/mobile/src/components/library/ShelfRow.tsx (shelf-row-header-${subjectId})
#   - apps/mobile/src/components/library/BookRow.tsx (book-row-${bookId})
#   - apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx (shelf-screen, shelf-back)
#   - apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx (book-screen, book-back,
#     book-notes-section, book-start-learning)
appId: com.mentomate.app
tags:
  - pr-blocking
  - learning
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-01-library

# Expand the subject shelf by tapping the shelf row header.
# In Library v3, shelves are inline expandable rows — there is no separate
# ShelvesTab.tsx. shelf-row-header-${SUBJECT_ID} is the Pressable in ShelfRow.tsx.
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# After expanding, the book row for BOOK_ID must be visible inline.
# book-row-${BOOK_ID} is the Pressable testID in BookRow.tsx.
- assertVisible:
    id: "book-row-${BOOK_ID}"

- takeScreenshot: book-02-shelf-expanded

# Tap the book row — triggers handleBookPress which does a two-push pattern:
# push shelf/[subjectId] then push shelf/[subjectId]/book/[bookId].
# We land on book-screen directly.
- tapOn:
    id: "book-row-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: book-03-book-detail

- assertVisible:
    id: "book-back"

- assertVisible:
    id: "book-start-learning"

- scrollUntilVisible:
    element:
      id: "book-notes-section"
    direction: DOWN
    timeout: 5000
    optional: true  # justified: book-notes-section only renders when the book has notes content; may be absent for books with no notes yet

- takeScreenshot: book-04-scrolled

# Navigate back: book-back goes to shelf-screen (the two-push pattern means
# back lands on shelf first, then another back to library).
- tapOn:
    id: "book-back"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000
    optional: true  # justified: two-push navigation means book-back may land on shelf-screen first; runFlow when: block handles the conditional tap

- runFlow:
    when:
      visible:
        id: "shelf-screen"
    commands:
      - tapOn:
          id: "shelf-back"

# After backing through shelf, the library shelves-list must be visible again.
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-05-back-to-library
