# Flow: Session Summary — Full submission with AI feedback
# Validates: session close → summary screen → write summary → AI feedback → return home.
# Tags: nightly, learning, summary
#
# Journey: UX Journey 2 (Daily Learning Loop)
# Epics: Epic 2 (FR41 — Session Close Summary)
# Prerequisite: Seeded user with subject + coaching card (scenario: learning-active)
#
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/session/index.tsx
#   - apps/mobile/src/app/session-summary/[sessionId].tsx
appId: com.mentomate.app
tags:
  - nightly
  - learning
  - summary
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Start session via intent card (replaced coaching-card-primary)
- tapOn:
    id: "home-coach-band-continue"

# 4. Session active — chat input present
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 5. Exchange 1: opening question
- tapOn:
    id: "chat-input"
- inputText: "Explain the concept to me"
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key.
- pressKey: Enter

# 6. Wait for AI response (60s — LLM can be slow, BUG-47)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# 7. Exchange 2: follow-up
- tapOn:
    id: "chat-input"
- inputText: "Can you give me an example of how this works?"
- pressKey: Enter

# 8. Wait for AI response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# 9. Exchange 3: confirm understanding
- tapOn:
    id: "chat-input"
- inputText: "That makes sense, thank you"
- pressKey: Enter

# 10. Wait for AI response — end-session button appears after exchangeCount > 0
#     BUG-37: exchangeCount is set from LLM streaming result. If LLM fails,
#     the count stays at 0 and end-session-button never renders. Increased
#     timeout to 60s to give LLM time to respond.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# 11. Wait for end-session-button to appear (rendered in header when exchangeCount > 0)
#     BUG-37: The button only appears after a successful LLM streaming response
#     increments exchangeCount. The count updates asynchronously from the SSE stream.
#     On WHPX emulators, the LLM response parsing can be slow — allow 30s.
- extendedWaitUntil:
    visible:
      id: "end-session-button"
    timeout: 30000

# 12. Tap end-session button
- tapOn:
    id: "end-session-button"

# 13. Confirm the end session alert — tap "End Session" button in the Alert dialog
- tapOn:
    text: "End Session"

# 14. Wait for session summary screen to load
- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 20000

# 15. Screenshot: summary screen before writing
- takeScreenshot: session-summary-screen

# 16. Verify session takeaways are visible
- assertVisible:
    id: "session-takeaways"

# 17. Tap summary input and write a summary
- tapOn:
    id: "summary-input"
- inputText: "I learned about the key concepts and how they apply in practice"

# 18. Dismiss keyboard — BUG-35 class: keyboard covers submit button on Android.
#     pressKey: back dismisses keyboard first on Android (only navigates if already dismissed).
- pressKey: back

# 19. Scroll to and tap submit summary button (may be below fold after keyboard dismiss)
- scrollUntilVisible:
    element:
      id: "submit-summary-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "submit-summary-button"

# 20. Wait for AI feedback (the mutation submits and returns feedback)
- extendedWaitUntil:
    visible:
      id: "ai-feedback"
    timeout: 20000

# 21. Verify summary-submitted state is showing
- assertVisible:
    id: "summary-submitted"

# 22. Screenshot: summary with AI feedback
- takeScreenshot: session-summary-feedback

# 23. Scroll to continue button (may be below fold after AI feedback text) and tap
- scrollUntilVisible:
    element:
      id: "continue-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "continue-button"

# 24. Verify we returned to home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# 25. Final screenshot
- takeScreenshot: session-summary-complete
