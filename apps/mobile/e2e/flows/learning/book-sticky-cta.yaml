# Flow T9: Book Detail — Sticky "Start learning" CTA Launches Session
# Validates: arriving at the book-screen shows the sticky book-start-learning
# CTA; tapping it launches a session (chat-input visible).
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library & Content Discovery → Learning entry)
# Epics: Epic 7 (Library); book-level session start
# Prerequisite: Seeded learner with an active curriculum book (scenario: learning-active)
#
# Seed note: learning-active creates a "World History" subject + book + topics
# with an active session. The book-screen sticky CTA (book-start-learning) renders
# when hasCurriculum and the book is not complete (book/[bookId].tsx:2044-2093).
# handleStartLearning picks up the continue-now or upNextTopic and pushes a session.
#
# testID mapping:
#   apps/mobile/src/app/(app)/_layout.tsx:
#     - tab-library                         -> Library tab
#   apps/mobile/src/app/(app)/library.tsx:
#     - shelves-list                        -> shelf container
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> pushes /shelf/[subjectId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> pushes /shelf/[subjectId]/book/[bookId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root (line 1508)
#     - book-start-learning                 -> sticky bottom CTA (line 2069)
#   apps/mobile/src/app/(app)/session/ (via session route):
#     - chat-input                          -> confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: book-sticky-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: book-sticky-02-library

# ── Open the World History subject shelf ────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

- takeScreenshot: book-sticky-03-shelf-screen

# ── Tap book card → book-screen ─────────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: book-sticky-04-book-screen

# ── Assert sticky CTA is visible ────────────────────────────────────────
# book-start-learning renders when hasCurriculum and !isBookComplete.
# learning-active has 3 topics and 1 session with exchangeCount=3 < 5
# (MIN_EXCHANGES_FOR_TOPIC_COMPLETION), so no topic is in topicStudiedIds
# and isBookComplete = false.
- assertVisible:
    id: "book-start-learning"

- takeScreenshot: book-sticky-05-cta-visible

# ── Tap book-start-learning → session ───────────────────────────────────
# handleStartLearning → picks continueNow/upNext target → pushes session route.
- tapOn:
    id: "book-start-learning"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

- assertVisible:
    id: "chat-input"

- takeScreenshot: book-sticky-06-session-launched
