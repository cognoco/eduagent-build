# Flow T10: Book Detail — Topic Row → Topic Detail → Session
# Validates: tapping a topic row on the book-screen pushes to topic-detail
# (NOT directly to a session); the topic-detail CTA then launches a session.
# Documents the canonical book→topic-row→topic-detail→session path.
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library & Content Discovery → deep topic entry)
# Epics: Epic 7 (Library); topic-detail session launch
# Prerequisite: Seeded learner with a not_started topic (scenario: topic-not-started)
#
# Seed note: topic-not-started creates a "Geography" subject + book + topics
# (no sessions, no retention card). The first topic has no activity →
# state = 'continue-now' on the book-screen. With no sessions, the resume-target
# endpoint (next_topic fallback) points at the first unstarted topic, which sets
# primaryContinueTopicId = topicIds[0] → that row groups as 'continue-now'.
# Tapping the row calls handleTopicPress → pushes /topic/[topicId] (NOT a session).
# From topic-detail, tapping study-cta launches a mode=learning session.
#
# testID mapping:
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> pushes /shelf/[subjectId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> pushes /shelf/[subjectId]/book/[bookId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root (line 1508)
#     - continue-now-row-${TOPIC_ID}             -> first unstarted topic row (line 1832,
#                                             `${state}-row-${topic.id}`, state='continue-now')
#   apps/mobile/src/app/(app)/topic/[topicId].tsx:
#     - topic-detail-scroll                 -> ScrollView root on topic detail (line 731)
#     - study-cta                           -> sticky CTA (line 1088)
#   apps/mobile/src/app/(app)/session/ (via session route):
#     - chat-input                          -> confirms session launched
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "topic-not-started"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: book-topic-row-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Open the Geography subject shelf ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

# ── Tap book card → book-screen ─────────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: book-topic-row-02-book-screen

# ── Tap continue-now topic row → topic-detail ───────────────────────────
# Topic rows render below the book header + sticky CTA, so scroll down to the
# row first — tapOn does not auto-scroll.
- scrollUntilVisible:
    element:
      id: "continue-now-row-${TOPIC_ID}"
    direction: DOWN
    timeout: 10000

# handleTopicPress(topic.id) in book/[bookId].tsx pushes
# /topic/[topicId] (not a session). This verifies the intermediate screen.
- tapOn:
    id: "continue-now-row-${TOPIC_ID}"

- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 15000

- takeScreenshot: book-topic-row-03-topic-detail

# ── Assert study CTA and tap it → session ───────────────────────────────
# topic is not_started → study-cta label "Start studying" (primary).
- assertVisible:
    id: "study-cta"

- takeScreenshot: book-topic-row-04-cta-visible

- tapOn:
    id: "study-cta"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000

- assertVisible:
    id: "chat-input"

- takeScreenshot: book-topic-row-05-session-launched
