# Flow: Freeform Learning Session — Start from coaching card, chat with AI
# Validates: coaching card starts a session, user can type a question, AI responds.
# Tags: nightly, learning
#
# Journey: UX Journey 2 (Daily Learning Loop)
# Epics: Epic 2
# Prerequisite: Seeded user with active subject + coaching card
#               (scenario: learning-active — provides "World History" subject)
#
# BUG-36 fix: The learning-active scenario shows a "Continue" coaching card (not the
# teen three-action layout with "Just ask something"). The flow now navigates via
# the primary action which starts a learning session — same ChatShell UI regardless
# of session mode.
#
# testIDs verified against:
#   - apps/mobile/src/app/(learner)/home.tsx (home-scroll-view, coaching-card-primary)
#   - apps/mobile/src/components/session/ChatShell.tsx (chat-input, chat-messages)
#   - apps/mobile/src/app/(learner)/session/index.tsx
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Wait for home screen
- extendedWaitUntil:
    visible:
      id: "home-scroll-view"
    timeout: 15000

# 3. Tap coaching card primary action to start a session
- tapOn:
    id: "coaching-card-primary"

# 4. Wait for session screen — chat input is always present
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

# 5. Type a question
- tapOn:
    id: "chat-input"
- inputText: "What is photosynthesis?"

# 6. Send via Enter key
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key.
- pressKey: Enter

# Visual integrity: verify user message rendered in chat
- scrollUntilVisible:
    element:
      text: "What is photosynthesis?"
    direction: DOWN
    timeout: 10000

# 7. Wait for AI response — real LLM call, 60s timeout
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# 8. Verify the session did not crash — chat messages area is still visible
- assertVisible:
    id: "chat-messages"

# 9. Type a follow-up to verify multi-exchange works
- tapOn:
    id: "chat-input"
- inputText: "Can you explain that in simpler terms?"
- pressKey: Enter

# 10. Wait for second AI response
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# 11. Screenshot after second exchange
- takeScreenshot: freeform-session-ai-response
