# Flow S2: First Session — Interview to Coaching Card
# Validates: seeded user sees coaching card, starts session, sends message,
# receives AI response.
# Tags: smoke, learning
#
# Journey: UX Journey 1 → 2 transition
# Epics: Epic 1 (FR14-FR16)
# Prerequisite: Seeded user with 1 subject (scenario: with-subject)
appId: com.mentomate.app
tags:
  - smoke
  - learning
# Re-promoted 2026-05-29: already uses hideKeyboard + tapOn send-button
# (BUG-35 fix). home-subject-carousel and home-coach-band-continue testIDs
# verified against LearnerScreen.tsx:629 and CoachBand.tsx:56.
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen visible
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Coach band continue visible above the fold (learning-active seed has an active subject)
- assertVisible:
    id: "home-coach-band-continue"

# 4. Subject carousel sits below the action chips on the current LearnerScreen
#    layout — scroll down to bring it on-screen, then assert.
- scrollUntilVisible:
    element:
      id: "home-subject-carousel"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "home-subject-carousel"

# 5. Scroll back up so coach-band-continue is in view, then tap to start session
- scrollUntilVisible:
    element:
      id: "home-coach-band-continue"
    direction: UP
    timeout: 10000

- tapOn:
    id: "home-coach-band-continue"

# 6. Session screen loads (chat input visible)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 7. Send a message
- tapOn:
    id: "chat-input"
- inputText: "I want to learn the basics"

# 8. Dismiss the keyboard, then tap send
# BUG-267 / BUG-35: pressKey: Enter does not reliably fire onSubmitEditing in
# the WHPX dev-client build, and send-button sits below the keyboard on Android.
# We must dismiss the keyboard first, but `hideKeyboard` on this Android client
# is a KEYCODE_BACK press, which in the chat screen races between "dismiss
# keyboard" and "pop the screen" — when it pops, the flow lands back on home and
# send-button is gone (observed 2026-05-29). Tapping the chat-messages list
# instead blurs the TextInput (FlatList default keyboardShouldPersistTaps='never'
# swallows the first outside tap to dismiss the keyboard) with no back-press, so
# the chat screen is never popped. The list is empty on a fresh session, so the
# tap lands on empty space, not a message bubble.
- tapOn:
    id: "chat-messages"
- tapOn:
    id: "send-button"

# 9. AI responds (chat input re-enabled after streaming)
# M06 regression: 15s timeout catches Gemini hangs (FIX-01: no AbortSignal).
# Bumped to 30s to match core-learning — first AI response can be slow
# because the session is freshly created (cold start latency).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# ── M06 guard: verify AI responded, not just input re-enabled ────────
# Verify user message rendered (catches input-accepted-but-not-displayed bugs)
- scrollUntilVisible:
    element:
      text: "I want to learn the basics"
    direction: DOWN
    timeout: 5000

# Verify no error state appeared instead of an AI response
- assertNotVisible: "Something went wrong"
- assertNotVisible: "try again"
- assertNotVisible: "offline"

# Verify chat-messages area has content (AI must have responded)
- assertVisible:
    id: "chat-messages"

# 10. Screenshot
- takeScreenshot: first-session-started
