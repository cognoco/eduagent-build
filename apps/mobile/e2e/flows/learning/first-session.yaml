# Flow S2: First Session — Interview to Coaching Card
# Validates: seeded user sees coaching card, starts session, sends message,
# receives AI response.
# Tags: smoke, learning
#
# Journey: UX Journey 1 → 2 transition
# Epics: Epic 1 (FR14-FR16)
# Prerequisite: Seeded user with 1 subject (scenario: with-subject)
appId: com.mentomate.app
tags:
  - smoke
  - learning
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen visible
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Coaching card present
- assertVisible:
    id: "coaching-card"

# 4. Coaching card has primary action
- assertVisible:
    id: "coaching-card-primary"

# 5. Tap primary action → start session
- tapOn:
    id: "coaching-card-primary"

# 6. Session screen loads (chat input visible)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 7. Send a message
- tapOn:
    id: "chat-input"
- inputText: "I want to learn the basics"

# 8. Tap send
# BUG-35: keyboard covers send button on Android. Use keyboard Enter key
# (returnKeyType="send" triggers onSubmitEditing). send-button tapOn removed
# per E2E integrity rules — optional: true on a mandatory UI element is prohibited.
- pressKey: Enter

# 9. AI responds (chat input re-enabled after streaming)
# M06 regression: 15s timeout catches Gemini hangs (FIX-01: no AbortSignal).
# Bumped to 30s to match core-learning — first AI response can be slow
# because the session is freshly created (cold start latency).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# ── M06 guard: verify AI responded, not just input re-enabled ────────
# Verify user message rendered (catches input-accepted-but-not-displayed bugs)
- scrollUntilVisible:
    element:
      text: "I want to learn the basics"
    direction: DOWN
    timeout: 5000

# Verify no error state appeared instead of an AI response
- assertNotVisible: "Something went wrong"
- assertNotVisible: "try again"
- assertNotVisible: "offline"

# Verify chat-messages area has content (AI must have responded)
- assertVisible:
    id: "chat-messages"

# 10. Screenshot
- takeScreenshot: first-session-started
