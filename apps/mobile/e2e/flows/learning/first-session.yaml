# Flow S2: First Session — Interview to Coaching Card
# Validates: seeded user sees coaching card, starts session, sends message,
# receives AI response.
# Tags: smoke, learning
#
# Journey: UX Journey 1 → 2 transition
# Epics: Epic 1 (FR14-FR16)
# Prerequisite: Seeded user with 1 subject (scenario: with-subject)
appId: com.mentomate.app
tags:
  - smoke
  - learning
# DEMOTED 2026-05-19: BUG-35 flake — `pressKey: Enter` is not reliably
# triggering `onSubmitEditing` in the dev-client build on WHPX; the user
# message bubble does not render after Enter. Re-promote after BUG-35 is
# resolved on the test environment.
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "learning-active"
      API_URL: ${API_URL}

# 2. Home screen visible
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Coach band continue visible above the fold (learning-active seed has an active subject)
- assertVisible:
    id: "home-coach-band-continue"

# 4. Subject carousel sits below the action chips on the current LearnerScreen
#    layout — scroll down to bring it on-screen, then assert.
- scrollUntilVisible:
    element:
      id: "home-subject-carousel"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "home-subject-carousel"

# 5. Scroll back up so coach-band-continue is in view, then tap to start session
- scrollUntilVisible:
    element:
      id: "home-coach-band-continue"
    direction: UP
    timeout: 10000

- tapOn:
    id: "home-coach-band-continue"

# 6. Session screen loads (chat input visible)
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# 7. Send a message
- tapOn:
    id: "chat-input"
- inputText: "I want to learn the basics"

# 8. Tap send
# BUG-267 / BUG-35: pressKey: Enter does not reliably fire onSubmitEditing
# in the WHPX dev-client build. send-button is covered by the keyboard on
# Android — same hideKeyboard + tapOn pattern that seed-and-sign-in.yaml uses.
- hideKeyboard
- tapOn:
    id: "send-button"

# 9. AI responds (chat input re-enabled after streaming)
# M06 regression: 15s timeout catches Gemini hangs (FIX-01: no AbortSignal).
# Bumped to 30s to match core-learning — first AI response can be slow
# because the session is freshly created (cold start latency).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

# ── M06 guard: verify AI responded, not just input re-enabled ────────
# Verify user message rendered (catches input-accepted-but-not-displayed bugs)
- scrollUntilVisible:
    element:
      text: "I want to learn the basics"
    direction: DOWN
    timeout: 5000

# Verify no error state appeared instead of an AI response
- assertNotVisible: "Something went wrong"
- assertNotVisible: "try again"
- assertNotVisible: "offline"

# Verify chat-messages area has content (AI must have responded)
- assertVisible:
    id: "chat-messages"

# 10. Screenshot
- takeScreenshot: first-session-started
