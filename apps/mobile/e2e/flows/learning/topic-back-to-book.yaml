# Flow B7: Topic Detail — Back Button Returns to Book Screen
# Validates: after navigating from book-screen → topic-detail via a topic row,
# tapping topic-detail-back returns to the book-screen.
# Tags: nightly, learning
#
# Journey: UX Journey 1 (Library — drill-down + back navigation)
# Epics: Epic 7 (Library); topic-detail back navigation
# Prerequisite: Seeded learner with a not_started topic (scenario: topic-not-started)
#
# Seed note: topic-not-started creates a "Geography" subject + book + topics.
# Navigating via Library → shelf → book → topic row pushes bookId as a route
# param into /topic/[topicId] (library.tsx:372-376 / book/[bookId].tsx:handleTopicPress).
# handleTopicBack (topic/[topicId].tsx) pops back to the book-screen when
# bookId is present in params. This flow verifies that back navigation lands
# on book-screen rather than the shelf or library index.
#
# testID mapping:
#   apps/mobile/src/components/library/ShelfRow.tsx:
#     - shelf-row-header-${SUBJECT_ID}      -> pushes /shelf/[subjectId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/index.tsx:
#     - shelf-screen                        -> shelf screen root
#   apps/mobile/src/components/library/BookCard.tsx:
#     - book-card-${BOOK_ID}                -> pushes /shelf/[subjectId]/book/[bookId]
#   apps/mobile/src/app/(app)/shelf/[subjectId]/book/[bookId].tsx:
#     - book-screen                         -> book detail root (line 1508)
#     - up-next-row-${TOPIC_ID}             -> first unstarted topic row (line 1832)
#   apps/mobile/src/app/(app)/topic/[topicId].tsx:
#     - topic-detail-scroll                 -> ScrollView root (line 731)
#     - topic-detail-back                   -> back Pressable (line 671)
appId: com.mentomate.app
tags:
  - nightly
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "topic-not-started"
      API_URL: ${API_URL}

# ── Arrive at learner home ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: topic-back-01-home

# ── Navigate to Library tab ─────────────────────────────────────────────
- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Open the Geography subject shelf ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "shelf-row-header-${SUBJECT_ID}"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 10000

# ── Tap book card → book-screen ─────────────────────────────────────────
- tapOn:
    id: "book-card-${BOOK_ID}"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 15000

- takeScreenshot: topic-back-02-book-screen

# ── Tap up-next topic row → topic-detail ────────────────────────────────
# handleTopicPress pushes /topic/[topicId] with bookId in params.
- tapOn:
    id: "up-next-row-${TOPIC_ID}"

- extendedWaitUntil:
    visible:
      id: "topic-detail-scroll"
    timeout: 15000

- takeScreenshot: topic-back-03-topic-detail

# ── Tap topic-detail-back → back to book-screen ─────────────────────────
# topic-detail-back: topic/[topicId].tsx:671.
# handleTopicBack pops to book-screen when bookId is in params.
- tapOn:
    id: "topic-detail-back"

- extendedWaitUntil:
    visible:
      id: "book-screen"
    timeout: 10000

- assertVisible:
    id: "book-screen"

- takeScreenshot: topic-back-04-returned-to-book
