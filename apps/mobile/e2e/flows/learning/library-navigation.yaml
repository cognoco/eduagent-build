# Flow: Library Navigation — v3 single-pane shelf list with expandable shelves
# Validates: Library v3 entry via tab, shelf expansion, book row visibility,
#            and the "See your Library" link from session summary.
# Tags: pr-blocking, learning
#
# Journey: UX Journey 2 (Daily Learning Loop → Retention bridge)
# Epics: Epic 3 (FR48 — Library access points)
# Prerequisite: Seeded user with completed topics + due retention cards
#               (scenario: retention-due — ensures retention status populated
#               so shelf-row-review-${SUBJECT_ID} may appear)
#
# testID mapping:
#   Library (library.tsx):
#     - shelves-list                       -> single-pane shelf container (View)
#     - shelf-row-header-${subjectId}      -> tappable shelf header (toggles expand)
#     - shelf-row-review-${subjectId}      -> review pill (only when weak/forgotten)
#     - book-row-${bookId}                 -> inline book entry (when shelf expanded)
#
#   Session screen (session/index.tsx):
#     - chat-input                    -> message input field
#     - end-session-button            -> rendered in header when exchangeCount > 0
#
#   Session summary ([sessionId].tsx):
#     - summary-title                 -> "Session Complete" heading
#     - session-takeaways             -> takeaway bullet list
#     - go-to-library                 -> "See your Library" link (always present)
appId: com.mentomate.app
tags:
  - pr-blocking
  - learning
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: library-nav-01-home

# ── Part 1: Enter Library via tab and verify v3 shelf list ────────────
# Drop the old coach-band entry. Library is now accessed directly via the tab.

- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: library-nav-02-shelves-list

# Expand the seeded subject's shelf row (toggles expanded state).
# shelf-row-header-${SUBJECT_ID} is the Pressable in ShelfRow.tsx.
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# After expanding, the first book row must be visible.
# book-row-${BOOK_ID} is the Pressable testID in BookRow.tsx.
- assertVisible:
    id: "book-row-${BOOK_ID}"

# Review pill is data-gated: only renders when retention status is weak/forgotten.
# Permitted optional use: UI gated by data presence.
- assertVisible:
    id: "shelf-row-review-${SUBJECT_ID}"
    optional: true

- takeScreenshot: library-nav-03-shelf-expanded

# ── Part 2: Navigate back to Home, start a session, check summary link ──

- tapOn:
    id: "tab-home"

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# Start a freeform session via the coaching band continue button.
- tapOn:
    id: "home-coach-band-continue"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

- takeScreenshot: library-nav-04-session-started

# Exchange 1: establishes exchangeCount > 0 so end-session-button appears.
- tapOn:
    id: "chat-input"
- inputText: "Explain the concept to me"
# BUG-35: keyboard covers send button on Android — use Enter key.
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# Exchange 2: follow-up for richer session content.
- tapOn:
    id: "chat-input"
- inputText: "Can you give me an example?"
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# BUG-37: end-session-button appears after LLM response increments exchangeCount.
- extendedWaitUntil:
    visible:
      id: "end-session-button"
    timeout: 30000

- tapOn:
    id: "end-session-button"

# Confirm the end-session alert.
- tapOn:
    text: "End Session"

- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 20000

- takeScreenshot: library-nav-05-session-summary

- assertVisible:
    id: "session-takeaways"

- scrollUntilVisible:
    element:
      id: "go-to-library"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "go-to-library"

- takeScreenshot: library-nav-06-library-link-on-summary

# ── Part 3: Navigate to Library from summary ────────────────────────────

- tapOn:
    id: "go-to-library"

# handleGoToLibrary navigates to topic detail when topicId + subjectId are
# present, otherwise to the library index. We accept either destination and
# assert shelves-list only when on the library index.
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000
    optional: true

- takeScreenshot: library-nav-07-library-arrived
