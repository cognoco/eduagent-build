# Flow: Library Navigation — v3 single-pane shelf list with push-to-shelf-screen
# Validates: Library v3 entry via tab, shelf push, book card visibility on shelf
#            screen, and the "See your Library" link from session summary.
# Tags: nightly, learning (re-promote to pr-blocking after 2x green on WHPX
#       Pixel API 34 — see Notion bug 3658bce9-1f7c-81fc-8afa-d9ade3fefbeb)
#
# Journey: UX Journey 2 (Daily Learning Loop → Retention bridge)
# Epics: Epic 3 (FR48 — Library access points)
# Prerequisite: Seeded user with completed topics + due retention cards
#               (scenario: retention-due — ensures retention status populated
#               so shelf-row-review-${SUBJECT_ID} may appear)
#
# Routing note (Library v3 push refactor, 2026-05-19):
#   Library no longer expands shelves inline. Tapping a shelf-row-header
#   calls handleShelfPress (library.tsx:333) which pushes /shelf/[subjectId].
#   The review pill (shelf-row-review-${subjectId}) still renders on the
#   library index ShelfRow when retention status is weak/forgotten; book
#   cards (book-card-${bookId}) only appear on the pushed shelf screen.
#
# testID mapping:
#   Library (library.tsx):
#     - shelves-list                       -> shelf container (View)
#     - shelf-row-header-${subjectId}      -> Pressable shelf header (push to shelf screen)
#     - shelf-row-review-${subjectId}      -> review pill (only when weak/forgotten)
#
#   Shelf screen (shelf/[subjectId]/index.tsx):
#     - shelf-screen                       -> screen root
#     - shelf-back                         -> back to library index
#
#   BookCard (components/library/BookCard.tsx):
#     - book-card-${bookId}                -> tappable book card on shelf screen
#
#   Session screen (session/index.tsx):
#     - chat-input                         -> message input field
#     - end-session-button                 -> rendered in header when exchangeCount > 0
#
#   Session summary ([sessionId].tsx):
#     - summary-title                      -> "Session Complete" heading
#     - session-takeaways                  -> takeaway bullet list
#     - go-to-library                      -> "See your Library" link (always present)
appId: com.mentomate.app
tags:
  - nightly
  - learning
# DEMOTED 2026-05-19: flow re-routed to push-to-shelf model. Awaiting 2x green
# WHPX Pixel API 34 verification before re-tagging to pr-blocking.
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: library-nav-01-home

# ── Part 1: Enter Library via tab and verify v3 shelf list ────────────

- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: library-nav-02-shelves-list

# Review pill is data-gated: only renders when retention status is weak/forgotten.
# It renders on the library index, BEFORE pushing to the shelf screen.
- assertVisible:
    id: "shelf-row-review-${SUBJECT_ID}"
    optional: true  # justified: shelf-row-review only renders when retention status is weak/forgotten; data-dependent on seed content

# Tap the subject shelf header — pushes /shelf/[subjectId] (no inline expansion).
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# Wait for the pushed shelf screen.
- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 15000

# On the shelf screen, books render as BookCard with testID book-card-${bookId}.
- assertVisible:
    id: "book-card-${BOOK_ID}"

- takeScreenshot: library-nav-03-shelf-screen

# Return to library index for the next part of the flow.
- tapOn:
    id: "shelf-back"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Part 2: Navigate back to Home, start a session, check summary link ──

- tapOn:
    id: "tab-home"

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 10000

# Start a freeform session via the coaching band continue button.
- tapOn:
    id: "home-coach-band-continue"

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 15000

- takeScreenshot: library-nav-04-session-started

# Exchange 1: establishes exchangeCount > 0 so end-session-button appears.
- tapOn:
    id: "chat-input"
- inputText: "Explain the concept to me"
# BUG-35: keyboard covers send button on Android — use Enter key.
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# Exchange 2: follow-up for richer session content.
- tapOn:
    id: "chat-input"
- inputText: "Can you give me an example?"
- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 60000

# BUG-37: end-session-button appears after LLM response increments exchangeCount.
- extendedWaitUntil:
    visible:
      id: "end-session-button"
    timeout: 30000

- tapOn:
    id: "end-session-button"

# Confirm the end-session alert.
- tapOn:
    text: "End Session"

- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 20000

- takeScreenshot: library-nav-05-session-summary

- assertVisible:
    id: "session-takeaways"

- scrollUntilVisible:
    element:
      id: "go-to-library"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "go-to-library"

- takeScreenshot: library-nav-06-library-link-on-summary

# ── Part 3: Navigate to Library from summary ────────────────────────────

- tapOn:
    id: "go-to-library"

# handleGoToLibrary navigates to topic detail when topicId + subjectId are
# present, otherwise to the library index. We accept either destination and
# assert shelves-list only when on the library index.
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000
    optional: true  # justified: handleGoToLibrary may navigate to topic detail (not library index) when topicId+subjectId present; shelves-list absent in that case

- takeScreenshot: library-nav-07-library-arrived
