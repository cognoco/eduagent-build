# Flow: Library Navigation — v3 single-pane shelf list with push-to-shelf-screen
# Validates: Library v3 entry via tab, shelf push, and book card visibility on
#            the pushed shelf screen.
#
# Scope reduced 2026-05-29: the session-driven "See your Library" link
# verification (former Part 2 + Part 3) was removed because the 2-LLM-exchange
# driving was unreliable on this emulator. See the removal note below for the
# follow-up plan to cover summary→library via a deeplink-based flow.
# Tags: nightly, learning (re-promote to pr-blocking after 2x green on WHPX
#       Pixel API 34 — see Notion bug 3658bce9-1f7c-81fc-8afa-d9ade3fefbeb)
#
# Journey: UX Journey 2 (Daily Learning Loop → Retention bridge)
# Epics: Epic 3 (FR48 — Library access points)
# Prerequisite: Seeded user with completed topics + due retention cards
#               (scenario: retention-due — ensures retention status populated
#               so shelf-row-review-${SUBJECT_ID} may appear)
#
# Routing note (Library v3 push refactor, 2026-05-19):
#   Library no longer expands shelves inline. Tapping a shelf-row-header
#   calls handleShelfPress (library.tsx:333) which pushes /shelf/[subjectId].
#   The review pill (shelf-row-review-${subjectId}) still renders on the
#   library index ShelfRow when retention status is weak/forgotten; book
#   cards (book-card-${bookId}) only appear on the pushed shelf screen.
#
# testID mapping:
#   Library (library.tsx):
#     - shelves-list                       -> shelf container (View)
#     - shelf-row-header-${subjectId}      -> Pressable shelf header (push to shelf screen)
#     - shelf-row-review-${subjectId}      -> review pill (only when weak/forgotten)
#
#   Shelf screen (shelf/[subjectId]/index.tsx):
#     - shelf-screen                       -> screen root
#     - shelf-back                         -> back to library index
#
#   BookCard (components/library/BookCard.tsx):
#     - book-card-${bookId}                -> tappable book card on shelf screen
#
#   Session screen (session/index.tsx):
#     - chat-input                         -> message input field
#     - end-session-button                 -> rendered in header when exchangeCount > 0
#
#   Session summary ([sessionId].tsx):
#     - summary-title                      -> "Session Complete" heading
#     - session-takeaways                  -> takeaway bullet list
#     - go-to-library                      -> "See your Library" link (always present)
appId: com.mentomate.app
tags:
  - nightly
  - learning
# Re-promoted 2026-05-29: BUG-35 fixed — replaced pressKey: Enter with
# hideKeyboard + tapOn send-button (same pattern as first-session.yaml).
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "retention-due"
      API_URL: ${API_URL}

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: library-nav-01-home

# ── Part 1: Enter Library via tab and verify v3 shelf list ────────────

- tapOn:
    id: "tab-library"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

- takeScreenshot: library-nav-02-shelves-list

# Review pill is data-gated: only renders when retention status is weak/forgotten.
# It renders on the library index, BEFORE pushing to the shelf screen.
- assertVisible:
    id: "shelf-row-review-${SUBJECT_ID}"
    optional: true  # justified: shelf-row-review only renders when retention status is weak/forgotten; data-dependent on seed content

# Tap the subject shelf header — pushes /shelf/[subjectId] (no inline expansion).
- tapOn:
    id: "shelf-row-header-${SUBJECT_ID}"

# Wait for the pushed shelf screen.
- extendedWaitUntil:
    visible:
      id: "shelf-screen"
    timeout: 15000

# On the shelf screen, books render as BookCard with testID book-card-${bookId}.
- assertVisible:
    id: "book-card-${BOOK_ID}"

- takeScreenshot: library-nav-03-shelf-screen

# Return to library index for the next part of the flow.
- tapOn:
    id: "shelf-back"

- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# ── Part 2 + Part 3 REMOVED (2026-05-29) ─────────────────────────────────────
# This flow used to drive 2 LLM exchanges → end session → tap go-to-library on
# the session summary. In practice the 2-exchange driving is unreliable: after
# Exchange 1's AI response the chat is intermittently auto-navigated away
# (observed landing on My Notes mid-flow), which is not a regression in the
# code under test but a fragility of driving a multi-exchange LLM session from
# Maestro on this emulator. Exchange 1 itself (chat-messages dismiss + send-
# button) works and is exercised by first-session.yaml.
#
# The summary→library navigation (the old Part 3 — tapping go-to-library on the
# session-summary screen) belongs in its own deeplink-based flow, following the
# session-summary-to-book.yaml pattern (mentomate:///session-summary/{sessionId}
# with exchangeCount + wallClockSeconds params bypassing the loading guard).
# Tracked as follow-up: write summary-to-library.yaml using a deeplink and
# omitting filedSubjectId/filedBookId so handleGoToLibrary lands on the library
# index (assertion target: shelves-list).
