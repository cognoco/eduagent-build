# Flow N9: Profile Switching — Profile Switcher Modal + Guardian Tab-Shape Assertion
# Validates: user can open profile switcher, see list of profiles with
# active indicator, switch to a different profile, and return to home.
# Also asserts: after closing the modal, the guardian/owner re-lands on
# parent-home-screen with the V1 guardian tab shape (home, recaps, progress,
# more) — confirming resolveNavigationContract() emitted the guardian shape.
# Tags: nightly, account
#
# NAV FLAG NOTE:
#   Tab-shape assertions in this flow assume MODE_NAV_V1_ENABLED=true (the V1
#   guardian shape: tab-home, tab-recaps, tab-progress, tab-more).
#   If MODE_NAV_V1_ENABLED=false the seed scenario still lands on parent-home-
#   screen but the tab bar shows the V0 5-tab set (tab-home, tab-my-learning,
#   tab-library, tab-progress, tab-more). The tab-recaps assertion at step 18b
#   uses optional:true so it will not hard-fail V0 runs; a screenshot at step
#   18c captures the actual tab bar for visual audit.
#   See: apps/mobile/src/app/(app)/_layout.tsx:663-728 for tabBarButtonTestID values.
#        apps/mobile/src/lib/navigation-contract.ts FAMILY_TABS / LEGACY_GUARDIAN_TABS.
#        AGENTS.md "Hard Constraint" section.
#
# PROXY-MODE / CHILD-STATE NOTE [ACCOUNT-04]:
#   After the BUG-774 fix (apps/mobile/src/app/profiles.tsx:185-202), tapping a
#   child profile from the owner account routes to the child-detail screen, NOT
#   into proxy/impersonation mode. Proxy mode (isParentProxy=true) is no longer
#   reachable from the product UI. Consequently this flow CANNOT exercise the
#   child-active tab shape (learner: home, library, progress, more) or assert
#   that owner-only More rows are hidden while a child is active.
#   Those assertions await ACCOUNT-04 (redesigned proxy-mode entry).
#   When ACCOUNT-04 ships, mirror the assertion list from more-impersonated-child.yaml.
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded parent user with linked children
#               (scenario: parent-with-children — creates multiple profiles)
appId: com.mentomate.app
tags:
  - nightly
  - account
---
# 1. Seed & sign in with parent-with-children scenario (multiple profiles)
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for home screen — parent-with-children lands on parent-home-screen (BUG-566).
#    ParentHomeScreen (testID: parent-home-screen) renders inside home.tsx when
#    navigationContract.home.screen === 'FamilyHome' (owner has linked children).
#    Source: apps/mobile/src/components/home/ParentHomeScreen.tsx:1021
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 10000
    optional: true  # justified: post-auth landing varies; parent-with-children usually lands on parent-home-screen but learner-screen is also accepted

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More index screen to load (more-row-learning-preferences is the
#    stable anchor on more/index.tsx — same as nav-to-more.yaml)
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 5. Tap the Account row to open the Account sub-screen.
#    more-row-profile lives in more/account.tsx (sub-screen), NOT more/index.tsx.
#    more/index.tsx has more-row-account which navigates to more/account.tsx.
#    Source: apps/mobile/src/app/(app)/more/index.tsx:151 (more-row-account)
#            apps/mobile/src/app/(app)/more/account.tsx:74 (more-row-profile)
- tapOn:
    id: "more-row-account"

# 5a. Wait for Account sub-screen to load
- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 5b. Scroll to find and tap Profile row to open profile switcher
- scrollUntilVisible:
    element:
      id: "more-row-profile"
    direction: DOWN
    timeout: 20000
    speed: 70
    visibilityPercentage: 50

- tapOn:
    id: "more-row-profile"

# 6. Wait for profiles screen to appear
- extendedWaitUntil:
    visible:
      id: "profiles-screen"
    timeout: 10000

# 7. Verify the "Profiles" title is shown
- assertVisible:
    text: "Profiles"

# 8. Verify the active profile checkmark is visible
- extendedWaitUntil:
    visible:
      id: "profile-active-check"
    timeout: 10000
    optional: true  # justified: active-check indicator only renders when a profile has focus; may not appear on first load

# 9. Verify the "Done" close button is present
- assertVisible:
    id: "profiles-close"

# 10. Verify the "Add profile" button is present
- assertVisible:
    id: "profiles-add-button"

# 11. Screenshot of profile switcher modal
- takeScreenshot: profile-switcher-open

# 12. Look for a child profile name to switch to (seeded as "Test Teen")
- extendedWaitUntil:
    visible:
      text: "Test Teen"
    timeout: 10000
    optional: true  # justified: child profile presence depends on seed state; "Test Teen" may not exist in all runs

# 13. Tap on the child profile to switch (if visible)
- tapOn:
    text: "Test Teen"
    optional: true  # justified: conditional tap — only fires if step 12 found the child profile

# 14. After tapping "Test Teen", profiles.tsx:198-201 routes to child-detail-scroll
#     (BUG-774 fix — owner-taps-child no longer activates proxy mode).
#     Wait for child-detail-scroll instead of learner-screen.
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 15000
    optional: true  # justified: only fires when step 13 found and tapped Test Teen; no-child-profile path falls through to step 15

# 15. Fallback: if no child profile was available, close the modal manually
- tapOn:
    id: "profiles-close"
    optional: true  # justified: fallback close path when no child profile was present to switch to

# 16. Navigate back to home from child-detail-scroll (if step 14 succeeded)
- tapOn:
    id: "back-button"
    optional: true  # justified: back-button only present when child-detail-scroll was reached in step 14

# 17. Wait for parent home to re-appear after dismiss/back
#     The guardian owner returns to parent-home-screen (resolveNavigationContract
#     emits guardian shape for owner-with-children).
#     Source: apps/mobile/src/components/home/ParentHomeScreen.tsx:1021
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 15000
    optional: true  # justified: step 14/15 paths converge here; if neither child-switch nor modal-close was reached, a bare wait is safest

# ── TAB-SHAPE ASSERTIONS: V1 guardian (owner active, has linked children) ──────
# After closing/back from the profiles flow, the active profile is still the
# guardian owner. resolveNavigationContract() must emit FAMILY_TABS (V1):
#   tab-home, tab-recaps, tab-progress, tab-more
# (tab-my-learning and tab-library are hidden in V1 guardian shape)
#
# testID source: apps/mobile/src/app/(app)/_layout.tsx:663,706,717,728
# tab-shape logic: apps/mobile/src/lib/navigation-contract.ts FAMILY_TABS
#
# Step 18a: tab-home — always present in both V0 and V1 guardian shapes
- assertVisible:
    id: "tab-home"

# Step 18b: parent-home-screen — confirms guardian home-screen branch rendered
#           Source: apps/mobile/src/components/home/ParentHomeScreen.tsx:1021
- assertVisible:
    id: "parent-home-screen"
    optional: true  # justified: assertVisible-optional captures partial V0/V1 ambiguity; screenshot 18e is the definitive visual audit

# Step 18c: tab-recaps — V1 guardian shape only (FAMILY_TABS).
#           If MODE_NAV_V1_ENABLED=false this element is absent; optional so V0
#           runs surface failure via screenshot rather than hard-blocking CI.
#           Source: apps/mobile/src/app/(app)/_layout.tsx:706
- assertVisible:
    id: "tab-recaps"
    optional: true  # justified: requires MODE_NAV_V1_ENABLED=true; V0 runs skip this assert — see NAV FLAG NOTE in header

# Step 18d: tab-progress and tab-more — present in both V0 and V1 guardian shapes
#           Sources: apps/mobile/src/app/(app)/_layout.tsx:717,728
- assertVisible:
    id: "tab-progress"
- assertVisible:
    id: "tab-more"

# 19. Final screenshot — captures actual tab bar for V0/V1 visual audit
- takeScreenshot: profile-switching-complete
