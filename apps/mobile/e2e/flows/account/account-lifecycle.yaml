# Flow N7: Account Lifecycle — Profile and Account Settings
# Validates: user can navigate to settings, view profile information,
# and access account management options.
# Tags: nightly, account
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
appId: com.mentomate.app
tags:
  - nightly
  - account
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Home screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab (BUG-15: use text, not testID)
- tapOn:
    text: "More"

# 4. Wait for More tab index — first settings row is always above the fold
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

# 5. Navigate to Account sub-screen — more-row-profile has moved there
- tapOn:
    id: "more-row-account"

- extendedWaitUntil:
    visible:
      id: "more-account-scroll"
    timeout: 10000

# 6. Look for profile section inside Account sub-screen
- scrollUntilVisible:
    element:
      id: "more-row-profile"
    direction: DOWN
    timeout: 20000
    speed: 70
    visibilityPercentage: 50

# 6. Tap on profile/account settings
- tapOn:
    id: "more-row-profile"

# 8. Wait for profile detail screen
- extendedWaitUntil:
    visible:
      text: "Display name"
    timeout: 10000

# 9. Verify profile info is displayed
- assertVisible:
    text: "Display name"

# 10. Screenshot
- takeScreenshot: account-lifecycle-complete
