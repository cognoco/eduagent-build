# Flow N10: More Tab Navigation — Verify All Destinations
# Validates: every link on the More screen navigates to the correct
# destination and renders expected content. Sign-out is tested last
# to confirm auth gate reappears.
# Tags: nightly, account, navigation
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
#
# Navigation return strategy:
#   - Profile modal → close button returns to More (same screen)
#   - Subscription (/(learner)/subscription) → tap "More" tab (in-tab route)
#   - Privacy/Terms/Delete (/privacy, /terms, /delete-account) → press Back
#     (standalone routes pushed from More, Back pops them)
appId: com.mentomate.app
tags:
  - nightly
  - account
  - navigation
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More screen to load — section header confirms screen is rendered
- extendedWaitUntil:
    visible:
      id: "learning-mode-section-header"
    timeout: 30000

# ── Visual integrity: all section headings scrollable ──────────────────
# More screen sections: Learning Mode, Learning Accommodation, Celebrations,
# Notifications, Account, Other. Each must be reachable by scrolling.
- assertVisible:
    id: "learning-mode-section-header"

- scrollUntilVisible:
    element:
      text: "Celebrations"
    direction: DOWN
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Notifications"
    direction: DOWN
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Account"
    direction: DOWN
    timeout: 10000

# Scroll back to top for screenshot
- scrollUntilVisible:
    element:
      id: "learning-mode-section-header"
    direction: UP
    timeout: 30000

- takeScreenshot: more-tab-loaded

# ── Destination 1: Profile (modal — close returns to More) ──

- scrollUntilVisible:
    element:
      text: "Profile"
    direction: DOWN
    timeout: 10000

- tapOn:
    text: "Profile"

- extendedWaitUntil:
    visible:
      id: "profiles-screen"
    timeout: 10000

- takeScreenshot: nav-profile

- tapOn:
    id: "profiles-close"

# After modal close, we're still on More screen (scrolled to Account section)

# ── Destination 2: Subscription (in-tab route — return via More tab) ──

- scrollUntilVisible:
    element:
      text: "Subscription"
    direction: DOWN
    timeout: 10000

- tapOn:
    text: "Subscription"

- extendedWaitUntil:
    visible:
      id: "subscription-screen"
    timeout: 10000
    optional: true

- takeScreenshot: nav-subscription

# Return via More tab (in-tab route, Back goes to home)
- tapOn:
    text: "More"

# ── Destination 3: Privacy Policy (standalone route — Back returns to More) ──

- scrollUntilVisible:
    element:
      text: "Privacy Policy"
    direction: DOWN
    timeout: 15000

- tapOn:
    text: "Privacy Policy"

- extendedWaitUntil:
    visible:
      text: "Privacy Policy"
    timeout: 10000

- assertVisible:
    text: "Who We Are"
    optional: true

- takeScreenshot: nav-privacy-policy

# Return via Back (standalone route pushed from More)
- back

# Verify we're back on More
- extendedWaitUntil:
    visible:
      text: "Account"
    timeout: 10000

# ── Destination 4: Terms of Service (standalone route — Back returns to More) ──

- scrollUntilVisible:
    element:
      text: "Terms of Service"
    direction: DOWN
    timeout: 15000

- tapOn:
    text: "Terms of Service"

- extendedWaitUntil:
    visible:
      text: "Terms of Service"
    timeout: 10000

- assertVisible:
    text: "Acceptance of Terms"
    optional: true

- takeScreenshot: nav-terms-of-service

# Return via Back
- back

- extendedWaitUntil:
    visible:
      text: "Account"
    timeout: 10000

# ── Destination 5: Export my data (alert — stays on More screen) ──

- scrollUntilVisible:
    element:
      text: "Export my data"
    direction: DOWN
    timeout: 15000

- tapOn:
    text: "Export my data"

- tapOn:
    text: "OK"
    optional: true

- takeScreenshot: nav-export-data

# ── Destination 6: Delete account (standalone route — Back returns to More) ──

- scrollUntilVisible:
    element:
      text: "Delete account"
    direction: DOWN
    timeout: 15000

- tapOn:
    text: "Delete account"

- extendedWaitUntil:
    visible:
      text: "Delete account"
    timeout: 10000

- assertVisible:
    id: "delete-account-confirm"

- assertVisible:
    id: "delete-account-cancel"

- takeScreenshot: nav-delete-account

- tapOn:
    id: "delete-account-cancel"

# Cancel navigates back to More (scroll position is at bottom — scroll up to find section header)
- scrollUntilVisible:
    element:
      text: "Account"
    direction: UP
    timeout: 10000

# ── Destination 7: Sign Out (LAST) ──

- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 15000

- tapOn:
    id: "sign-out-button"

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 15000

- takeScreenshot: nav-signed-out
