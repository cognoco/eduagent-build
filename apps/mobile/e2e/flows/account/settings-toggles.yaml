# Flow N11: Settings Toggles — Notifications
# Validates: inline settings controls on the More screen respond to taps.
# Tests notification toggles with screenshots.
# Note: Theme/Accent/Persona sections were removed (persona system cleanup).
# Tags: nightly, account, settings
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
appId: com.mentomate.app
tags:
  - nightly
  - account
  - settings
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More screen to load
- extendedWaitUntil:
    visible:
      id: "learning-accommodation-section-header"
    timeout: 10000

- takeScreenshot: settings-initial

# ── Notifications section ──

# 5. Scroll through an intermediate section first. Direct fast flings can
# overshoot Notifications and land at the bottom of the long More screen.
- scrollUntilVisible:
    element:
      id: "celebrations-section-header"
    direction: DOWN
    timeout: 15000
    speed: 30
    visibilityPercentage: 30
    centerElement: true

# 5a. Scroll to Notifications section header
- scrollUntilVisible:
    element:
      id: "notifications-section-header"
    direction: DOWN
    timeout: 20000
    speed: 30
    visibilityPercentage: 30
    centerElement: true

# 5b. Ensure Push notifications row itself is in view before tapping
# (small phones can leave the toggle just below the section header).
- scrollUntilVisible:
    element:
      id: "push-notifications-toggle"
    direction: DOWN
    timeout: 10000
    speed: 30
    visibilityPercentage: 30
    centerElement: true

# 6. Tap "Push notifications" toggle (toggle on)
- tapOn:
    id: "push-notifications-toggle"

- takeScreenshot: settings-push-toggled

# 7. Tap "Push notifications" toggle again (toggle off)
- tapOn:
    id: "push-notifications-toggle"

# 8. Scroll Weekly digest into view, then tap (toggle on)
- scrollUntilVisible:
    element:
      id: "weekly-digest-toggle"
    direction: DOWN
    timeout: 10000
    speed: 30
    visibilityPercentage: 30
    centerElement: true

- tapOn:
    id: "weekly-digest-toggle"

- takeScreenshot: settings-digest-toggled

# 9. Tap "Weekly progress digest" toggle again (toggle off)
- tapOn:
    id: "weekly-digest-toggle"

- takeScreenshot: settings-notifications-reset

# 10. Final screenshot — notification settings exercised
- takeScreenshot: settings-toggles-complete
