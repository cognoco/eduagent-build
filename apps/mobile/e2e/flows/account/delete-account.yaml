# Flow N8: Delete Account — Deletion UI + typed-confirmation stage + Cancellation
# Validates: initial warning screen, typed-confirmation stage (wrong phrase stays,
# correct phrase accepted), and cancel via back-to-warning. Does NOT schedule deletion.
# Tags: pr-blocking, account, gdpr
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
appId: com.mentomate.app
tags:
  - pr-blocking
  - account
  - gdpr
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More screen to load
- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 10000

# 5. Scroll down to find Delete account row (More tab has many sections now)
- scrollUntilVisible:
    element:
      id: "more-row-delete-account"
    direction: DOWN
    timeout: 20000
    speed: 70
    visibilityPercentage: 50

# 6. Tap Delete account
- tapOn:
    id: "more-row-delete-account"

# 7. Wait for delete account screen to appear
- extendedWaitUntil:
    visible:
      text: "Delete account"
    timeout: 10000

# 8. Verify informational text about permanent deletion
- assertVisible:
    text: "permanently delete your account"
    optional: true

# 9. Verify 7-day grace period notice
- assertVisible:
    text: "7-day grace period"
    optional: true

# 10. Verify the confirm button is present (red danger button)
- assertVisible:
    id: "delete-account-confirm"

# 11. Verify the cancel button is present
- assertVisible:
    id: "delete-account-cancel"

# 12. Verify the close button is present
- assertVisible:
    id: "delete-account-close"

# 13. Screenshot of the initial warning screen
- takeScreenshot: delete-account-initial

# 14. Tap the initial confirm to advance to the typed-confirmation stage
- tapOn:
    id: "delete-account-confirm"

# 15. Confirming stage assertions
- extendedWaitUntil:
    visible:
      id: "delete-account-confirming"
    timeout: 10000
- assertVisible:
    id: "delete-account-confirm-input"
- assertVisible:
    id: "delete-account-confirm-final"

# 16. Type the wrong phrase — confirm-final button must remain disabled (no advance)
- tapOn:
    id: "delete-account-confirm-input"
- inputText: "delete"
- assertVisible:
    id: "delete-account-confirm-final"
- takeScreenshot: delete-account-typed-wrong

# 17. Clear and type the correct phrase — button becomes enabled
- eraseText: 6
- inputText: "DELETE"
- takeScreenshot: delete-account-typed-correct

# 18. Cancel out via back-to-warning so we don't actually schedule deletion
- tapOn:
    id: "delete-account-back-to-warning"

# 19. Verify we're back on the initial warning screen
- extendedWaitUntil:
    visible:
      id: "delete-account-confirm"
    timeout: 10000
- assertVisible:
    id: "delete-account-cancel"

# 20. Cancel to return to More
- tapOn:
    id: "delete-account-cancel"

# 21. Verify we're back on the More screen — sign-out button confirms intact account
- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 15000
    speed: 70
    visibilityPercentage: 50

# 22. Final screenshot — back to normal state
- takeScreenshot: delete-account-cancelled
