# Flow N8: Delete Account — Deletion UI + typed-confirmation stage + Cancellation
# Validates: initial warning screen, typed-confirmation stage (wrong phrase stays,
# correct phrase accepted), and cancel via back-to-warning. Does NOT schedule deletion.
# Tags: pr-blocking, account, gdpr
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Seeded user with onboarding complete (scenario: onboarding-complete)
#
# Routing note (M1-A refactor): delete-account is reached via More → Privacy →
# Delete account row. delete-account-cancel calls goBackOrReplace which pops
# the stack — that lands on Privacy, not the More tab root.
appId: com.mentomate.app
tags:
  - nightly
  - account
  - gdpr
# DEMOTED 2026-05-19: flow updated to navigate More → Privacy and uses new
# testIDs on the warning paragraphs, but the typed-confirmation stage needs
# additional scroll-recovery work and validation. Re-promote after the
# confirming-stage scroll fix proves stable across runs.
---
# 1. Seed & sign in
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# 2. Verify home screen loaded
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More screen to load
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 10000

# 5. Tap Privacy (delete-account moved under More → Privacy after the M1-A refactor)
- tapOn:
    id: "more-row-privacy"

# 6. Wait for Privacy screen, then scroll to and tap Delete account
- extendedWaitUntil:
    visible:
      id: "more-privacy-scroll"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "more-row-delete-account"
    direction: DOWN
    timeout: 20000
    speed: 70
    visibilityPercentage: 50

- tapOn:
    id: "more-row-delete-account"

# 7. Wait for delete account screen to appear
- extendedWaitUntil:
    visible:
      text: "Delete account"
    timeout: 10000

# 8. Verify warning paragraphs via testID — uiautomator dump on RN Text
# wrapped paragraphs is flaky on WHPX; testID is the reliable anchor.
- assertVisible:
    id: "delete-account-warning-body-1"

# 9. Verify second warning paragraph (7-day grace period)
- assertVisible:
    id: "delete-account-warning-body-2"

# 10. Verify the confirm button is present (red danger button)
- assertVisible:
    id: "delete-account-confirm"

# 11. Verify the cancel button is present
- assertVisible:
    id: "delete-account-cancel"

# 12. Verify the close button is present
- assertVisible:
    id: "delete-account-close"

# 13. Screenshot of the initial warning screen
- takeScreenshot: delete-account-initial

# 14. Tap the initial confirm to advance to the typed-confirmation stage
- tapOn:
    id: "delete-account-confirm"

# 15. Confirming stage assertions. TextInput autoFocus opens the keyboard on
# arrival — hide it first so scrollUntilVisible has the full viewport to work
# with (the keyboard otherwise overlays the bottom half of the ScrollView and
# prevents the confirm-final button from becoming visible).
- extendedWaitUntil:
    visible:
      id: "delete-account-confirming"
    timeout: 10000
- hideKeyboard
- assertVisible:
    id: "delete-account-confirm-input"

# The confirm-final button is below the fold once the family/subscription
# warnings and the input field have rendered. Scroll to make it visible.
- scrollUntilVisible:
    element:
      id: "delete-account-confirm-final"
    direction: DOWN
    timeout: 10000
    speed: 70
    visibilityPercentage: 30
- assertVisible:
    id: "delete-account-confirm-final"

# 16. Type the wrong phrase — confirm-final button must remain disabled (no advance).
# Tapping the input re-opens the keyboard; hide it again before scrolling.
- tapOn:
    id: "delete-account-confirm-input"
- inputText: "delete"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "delete-account-confirm-final"
    direction: DOWN
    timeout: 10000
    speed: 70
    visibilityPercentage: 30
- assertVisible:
    id: "delete-account-confirm-final"
- takeScreenshot: delete-account-typed-wrong

# 17. Clear and type the correct phrase — button becomes enabled
- tapOn:
    id: "delete-account-confirm-input"
- eraseText: 6
- inputText: "DELETE"
- hideKeyboard
- takeScreenshot: delete-account-typed-correct

# 18. Cancel out via back-to-warning so we don't actually schedule deletion
- scrollUntilVisible:
    element:
      id: "delete-account-back-to-warning"
    direction: DOWN
    timeout: 10000
    speed: 70
    visibilityPercentage: 50
- tapOn:
    id: "delete-account-back-to-warning"

# 19. Verify we're back on the initial warning screen
- extendedWaitUntil:
    visible:
      id: "delete-account-confirm"
    timeout: 10000
- assertVisible:
    id: "delete-account-cancel"

# 20. Cancel to return to Privacy
- tapOn:
    id: "delete-account-cancel"

# 21. Verify we're back on the Privacy sub-screen — delete-account-cancel calls
# goBackOrReplace which pops the stack: delete-account → Privacy, not More tab.
- extendedWaitUntil:
    visible:
      id: "more-privacy-scroll"
    timeout: 10000

# 22. Final screenshot — back to normal state
- takeScreenshot: delete-account-cancelled
