# Flow ACCOUNT-10: Export My Data (full flow)
#
# Validates: More → "Export my data" tap → API call completes → Android native
# Share sheet appears with the JSON export payload.
#
# Step 0 — Handler shape (apps/api/src/routes/account.ts line 75-80):
#   GET /account/export
#   → c.json(dataExportSchema.parse(data))
#   Response shape (packages/schemas/src/account.ts lines 32-65):
#     {
#       account: { email: string, createdAt: ISO8601 },
#       profiles: ProfileSchema[],
#       consentStates: DataExportConsentSchema[],
#       subjects?: Record<string, unknown>[],
#       ... (15+ optional arrays of raw records)
#       exportedAt: ISO8601
#     }
#   The JSON is stringified by the mobile handler and passed to Share.share()
#   with title "MentoMate account data export" (i18n key more.export.shareTitle).
#
# Mobile handler (apps/mobile/src/app/(app)/more.tsx lines 352-394):
#   - Calls exportData.mutateAsync() → GET /account/export
#   - JSON.stringify(data, null, 2)
#   - Share.share({ title: t('more.export.shareTitle'), message: jsonString })
#   - On dismissedAction: no-op
#   - On error: platformAlert with t('more.export.errorTitle')
#   There is NO success testID — success is the native Share sheet opening.
#
# Assertion strategy:
#   The Android Share sheet is a system-level overlay. Maestro can detect it
#   via text (e.g., "MentoMate account data export" which is the share title
#   injected via Share.share title param). If the share sheet title is not
#   visible as a text node, we fall back to asserting that `more-row-export`
#   is no longer showing a loading state (export.isPending → undefined onPress)
#   and no error platformAlert appeared. Both are optional because the share
#   sheet title rendering varies by Android version.
#
# testIDs verified against source:
#   more-row-export  apps/mobile/src/app/(app)/more.tsx line 879
#
# Run command:
#   ./e2e/scripts/seed-and-run.sh onboarding-complete e2e/flows/account/export-data.yaml
#
# Tags: nightly, account
appId: com.mentomate.app
tags:
  - nightly
  - account
---
# ── Step 1: Seed & sign in ──
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# ── Step 2: Confirm home screen ──
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: export-01-home

# ── Step 3: Navigate to More tab ──
- tapOn:
    text: "More"

- extendedWaitUntil:
    visible:
      id: "learning-accommodation-section-header"
    timeout: 30000

- takeScreenshot: export-02-more-loaded

# ── Step 4: Scroll to "Export my data" row and tap it ──
- scrollUntilVisible:
    element:
      id: "more-row-export"
    direction: DOWN
    timeout: 15000

- assertVisible:
    id: "more-row-export"

- takeScreenshot: export-03-export-row-visible

- tapOn:
    id: "more-row-export"

# ── Step 5: Wait for the Android native Share sheet ──
# The export handler makes a GET /account/export API call (network round-trip),
# serialises the JSON, then calls Share.share(). Allow up to 15s for the API
# call + share sheet to appear.
#
# Android's Share sheet surfaces the share title as accessible text.
# "MentoMate account data export" is the value of more.export.shareTitle
# (apps/mobile/src/i18n/locales/en.json line 218).
- extendedWaitUntil:
    visible:
      text: "MentoMate account data export"
    timeout: 15000
    optional: true

- takeScreenshot: export-04-share-sheet

# ── Step 6: Assert no error alert appeared ──
# If the API call failed, platformAlert shows t('more.export.errorTitle').
# We assert that error title text is NOT visible — if the share sheet appeared
# (Step 5 optional), the export succeeded. If NEITHER the share sheet NOR the
# error text is visible at this point, the test screenshot will show the actual
# state for diagnosis.
- assertNotVisible:
    text: "Export failed"

# ── Step 7: Dismiss Share sheet and confirm we are still on More screen ──
# Press Back to dismiss the share sheet (works on all Android versions).
# The app should remain on the More screen with more-row-export visible.
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "more-row-export"
    timeout: 10000

- takeScreenshot: export-05-back-on-more
