# Flow N8b: Delete Account — Scheduled Stage Smoke
# Validates: scheduled-deletion stage UI: keep-account CTA, sign-out CTA, recovery flow.
# Taps keep-account and verifies return to Privacy (mutation succeeded, navigation popped).
# Tags: pr-blocking, account
#
# Journey: UX Journey 5 (Account Management)
# Epics: Epic 5 (FR101-FR105)
# Prerequisite: Account with deletionScheduledAt set (scenario: account-deletion-scheduled)
#
# Routing note (M1-A refactor): delete-account is reached via More → Privacy →
# Delete account row. onCancelDeletion (Keep account) calls handleClose →
# goBackOrReplace which pops the stack — that lands on Privacy, not More tab.
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/more/privacy.tsx (more-row-delete-account)
#   - apps/mobile/src/app/delete-account.tsx (delete-account-scheduled,
#     delete-account-keep, delete-account-sign-out)
appId: com.mentomate.app
tags:
  - pr-blocking
  - account
---
# 1. Seed & sign in with deletion-scheduled account
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "account-deletion-scheduled"
      API_URL: ${API_URL}

# 2. Verify home screen loaded (deletion-scheduled account still has access during grace period)
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Navigate to More tab
- tapOn:
    text: "More"

# 4. Wait for More screen to load
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 10000

# 5. Tap Privacy (delete-account moved under More → Privacy after the M1-A refactor)
- tapOn:
    id: "more-row-privacy"

# 6. Wait for Privacy screen, then scroll to and tap Delete account
- extendedWaitUntil:
    visible:
      id: "more-privacy-scroll"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "more-row-delete-account"
    direction: DOWN
    timeout: 15000
    speed: 70
    visibilityPercentage: 50

- tapOn:
    id: "more-row-delete-account"

# 7. Wait for delete account screen to open
- extendedWaitUntil:
    visible:
      text: "Delete account"
    timeout: 10000

# 8. The account-deletion-scheduled seed pre-sets deletionScheduledAt, so the screen
#    boots directly into the 'scheduled' stage (no button-tap needed to advance).
- extendedWaitUntil:
    visible:
      id: "delete-account-scheduled"
    timeout: 10000

# 9. Verify keep-account CTA is visible
- assertVisible:
    id: "delete-account-keep"

# 10. Verify sign-out CTA is visible
- assertVisible:
    id: "delete-account-sign-out"

# 11. Screenshot: scheduled stage with both CTAs
- takeScreenshot: delete-account-scheduled-stage

# 12. Tap keep-account to cancel the scheduled deletion and return to Privacy
- tapOn:
    id: "delete-account-keep"

# 13. Verify we returned to the Privacy sub-screen — onCancelDeletion calls
# handleClose → goBackOrReplace which pops the stack: delete-account → Privacy,
# not More tab root. The mutation succeeded if we land here without an error toast.
- extendedWaitUntil:
    visible:
      id: "more-privacy-scroll"
    timeout: 15000

# 14. Final screenshot — Privacy screen with intact account
- takeScreenshot: delete-account-scheduled-kept
