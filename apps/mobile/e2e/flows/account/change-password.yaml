# Flow ACCOUNT-09: Change Password
#
# Validates: More → Account section → Change Password row expands the inline
# form; entering current + new + confirm passwords and submitting shows
# "Password updated" confirmation text.
#
# The Clerk `user.updatePassword()` call requires a correctly-supplied current
# password. Seeded users have a known password (${PASSWORD} from seed-and-run.sh
# via DEFAULT_SEED_PASSWORD in test-seed.ts). The new password is set to a
# different value and then changed back so the account stays usable across runs.
#
# CLERK_TESTING_TOKEN caveat: The seeder creates real Clerk users with a known
# password, so sign-in works. Clerk may rate-limit password update calls on
# test accounts; if this flow fails intermittently with a Clerk error, wire
# CLERK_TESTING_TOKEN in Doppler.
#
# testIDs verified against source:
#   change-password-row    apps/mobile/src/components/account-security.tsx line 54
#   current-password       apps/mobile/src/components/change-password.tsx line 72
#   new-password           apps/mobile/src/components/change-password.tsx line 89
#   confirm-password       apps/mobile/src/components/change-password.tsx line 95
#   update-password-button apps/mobile/src/components/change-password.tsx line 118
#   password-error         apps/mobile/src/components/change-password.tsx line 103
#   (success text "Password updated" — plain Text, no testID — line 109)
#
# AccountSecurity component is only rendered when activeProfile?.isOwner is
# true (apps/mobile/src/app/(app)/more.tsx line 727), which is satisfied by
# the onboarding-complete scenario (account owner).
#
# Run command:
#   ./e2e/scripts/seed-and-run.sh onboarding-complete e2e/flows/account/change-password.yaml
#
# Tags: nightly, account
appId: com.mentomate.app
tags:
  - nightly
  - account
---
# ── Step 1: Seed & sign in ──
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "onboarding-complete"
      API_URL: ${API_URL}

# ── Step 2: Confirm home screen ──
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- takeScreenshot: change-pw-01-home

# ── Step 3: Navigate to More tab ──
- tapOn:
    text: "More"

- extendedWaitUntil:
    visible:
      id: "learning-mode-section-header"
    timeout: 30000

- takeScreenshot: change-pw-02-more-loaded

# ── Step 4: Scroll to Account section and find Change Password row ──
# AccountSecurity renders the Change Password row only when the user has
# password auth enabled (passwordEnabled = true), which is always the case
# for seed-created users (they sign in with email + password).
- scrollUntilVisible:
    element:
      id: "change-password-row"
    direction: DOWN
    timeout: 15000

- assertVisible:
    id: "change-password-row"

- takeScreenshot: change-pw-03-change-password-row-visible

# ── Step 5: Tap Change Password row to expand inline form ──
- tapOn:
    id: "change-password-row"

- extendedWaitUntil:
    visible:
      id: "current-password"
    timeout: 5000

- takeScreenshot: change-pw-04-form-expanded

# ── Step 6: Enter current password ──
- tapOn:
    id: "current-password"
- inputText: ${PASSWORD}
- pressKey: back

# ── Step 7: Enter new password (must be >= 8 chars, different from current) ──
- tapOn:
    id: "new-password"
- inputText: "Mentomate2026xK-changed"
- pressKey: back

# ── Step 8: Confirm new password ──
- tapOn:
    id: "confirm-password"
- inputText: "Mentomate2026xK-changed"
- pressKey: back

- takeScreenshot: change-pw-05-form-filled

# ── Step 9: Submit ──
- scrollUntilVisible:
    element:
      id: "update-password-button"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "update-password-button"

# ── Step 10: Assert success ──
# ChangePassword sets success=true and renders "Password updated" (plain Text,
# no testID). Wait for it — Clerk round-trip takes ~2s on staging.
- extendedWaitUntil:
    visible:
      text: "Password updated"
    timeout: 15000

- assertVisible:
    text: "Password updated"

- takeScreenshot: change-pw-06-success

# ── Step 11: Verify no error message is shown ──
- assertNotVisible:
    id: "password-error"

# ── Step 12: Change password back to original so account is reusable ──
# Clear fields (they were cleared on success by ChangePassword component)
# and re-submit with original password.
- tapOn:
    id: "current-password"
- inputText: "Mentomate2026xK-changed"
- pressKey: back

- tapOn:
    id: "new-password"
- inputText: ${PASSWORD}
- pressKey: back

- tapOn:
    id: "confirm-password"
- inputText: ${PASSWORD}
- pressKey: back

- scrollUntilVisible:
    element:
      id: "update-password-button"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "update-password-button"

- extendedWaitUntil:
    visible:
      text: "Password updated"
    timeout: 15000

- takeScreenshot: change-pw-07-password-restored
