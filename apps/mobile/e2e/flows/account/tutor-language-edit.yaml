# Flow ACCOUNT-29: Tutor Language Edit from More
# Validates: More -> Mentor language -> language picker -> save -> return to More
# Covers ACCOUNT-29 (tutor/mentor language). ACCOUNT-28 (app UI locale) is a separate test.
# Tags: nightly, account
# Seed: language-subject-active
# Usage: ./scripts/seed-and-run.sh language-subject-active flows/account/tutor-language-edit.yaml
appId: com.mentomate.app
tags:
  - nightly
  - account
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn: "More Tab"

- extendedWaitUntil:
    visible:
      id: "sign-out-button"
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Mentor language"
    direction: DOWN
    timeout: 10000

- tapOn: "Mentor language"

- extendedWaitUntil:
    visible:
      id: "language-picker-continue"
    timeout: 10000

- assertVisible:
    id: "language-picker-cancel"

- assertVisible:
    id: "language-option-other"

- takeScreenshot: 01-settings-language-picker

- tapOn:
    id: "language-option-es"

- tapOn:
    id: "language-picker-continue"

- extendedWaitUntil:
    visible:
      id: "sign-out-button"
    timeout: 10000

- takeScreenshot: 02-back-to-more
