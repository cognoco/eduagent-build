# Learner mentor memory - populated with seeded memory data
# Tags: nightly, account
# Seed: mentor-memory-populated
# Covers: switch to child profile and verify populated learner memory sections
# Usage: ./scripts/seed-and-run.sh mentor-memory-populated flows/account/learner-mentor-memory-populated.yaml
appId: com.mentomate.app
tags:
  - nightly
  - account
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: "family-scroll"
    timeout: 15000

- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Test Teen"

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn: "More Tab"

# Use the always-above-fold section header as the screen-loaded signal —
# sign-out-button lives at the bottom of the scroll and isn't visible on load.
- extendedWaitUntil:
    visible:
      id: "learning-mode-section-header"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "mentor-memory-link"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "mentor-memory-link"

- extendedWaitUntil:
    visible:
      id: "memory-status-text"
    timeout: 10000

- assertNotVisible:
    id: "mentor-memory-all-empty"

- takeScreenshot: 01-learner-memory-populated

- scrollUntilVisible:
    element:
      text: "Interests"
    direction: DOWN
    timeout: 10000

- assertVisible:
    text: "Soccer"

- takeScreenshot: 02-learner-memory-interests

- scrollUntilVisible:
    element:
      text: "Strengths"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 03-learner-memory-strengths

- pressKey: back

- extendedWaitUntil:
    visible:
      id: "learning-mode-section-header"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 10000
