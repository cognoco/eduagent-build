# PARKED (originally 2026-05-29; re-audited 2026-05-29): No UI entry point
# currently reaches parent-proxy mode. Per [ACCOUNT-04] the user-facing "tap
# child → impersonate" entry was removed; tapping a child profile from the
# owner account routes to child-settings instead (see profiles.tsx:185-202).
# Proxy returns later with a redesigned entry ("used differently"). The proxy
# LOGIC is intact and covered by unit tests (profile.test.tsx ACCOUNT-04 BREAK,
# use-parent-proxy.test.ts). This flow stays here, OUT of the run manifest,
# until the new proxy entry ships — then re-point the switch-to-child setup
# at it.
#
# ACCOUNT-04 STATUS (audited 2026-05-29): Still open as P1 in Notion (see
# docs/flows/master-directory/account/ACCOUNT-04.md "Known Bugs And Drift").
# No commits since the original parking have restored a user-facing proxy
# entry. profiles.tsx:185-202 still routes owner→child taps to child-settings,
# not impersonation.
#
# UNBLOCK CONDITION — re-enable this flow when ALL of the following hold:
#   1. A user-facing path activates proxy mode (sets `isParentProxy=true` via
#      `switchProfile(id, { proxyMode: true })` or its successor). Watch for:
#        - a new testID like `mode-switcher-impersonate` or
#          `proxy-confirm-modal` (the historical ACCOUNT-04 modal name) in
#          `apps/mobile/src/app/profiles.tsx`,
#          `apps/mobile/src/components/chrome/ModeSwitcher.tsx`, or wherever
#          the redesigned entry lands.
#        - removal of the "child-detail-scroll" route used by
#          ../_setup/switch-to-child.yaml as the post-tap destination, OR
#          a new opt-in branch alongside it.
#   2. The closing note on ACCOUNT-04 in docs/flows/master-directory/account/
#      ACCOUNT-04.md flips from "Current P1 bug" to resolved.
#   3. ../_setup/switch-to-child.yaml is updated (or a sibling helper is
#      added) so the post-switch destination is the learner home rendered in
#      proxy mode — NOT child-detail-scroll.
# When unblocked: move the `nightly` tag back into the run manifest and verify
# the More index short-circuit (see Gating Predicate below) still hides every
# owner-only row.
#
# ACCOUNT-30: Impersonated-child More guard [BUG-915]
#
# Signs in as a parent, switches to a child profile via the Profiles screen,
# then navigates to the More tab and asserts that account-level destructive
# actions are hidden while the child is active:
#   - sign-out-button         → hidden (would sign out the parent's whole session)
#   - more-row-delete-account → hidden (operates on parent's account)
#   - more-row-export         → hidden (operates on parent's account)
#   - more-row-subscription   → hidden (billing is the parent's, not the child's)
#
# Seed: parent-with-children — parent "Test Parent" + child "Test Teen".
#   CHILD_PROFILE_ID and CHILD_NAME ("Test Teen") are exported by the seed.
#
# testIDs verified against current source (audited 2026-05-29):
#   - apps/mobile/src/app/(app)/more/index.tsx
#       sign-out-button (line 276)
#       Gating predicate: `isImpersonating = navigationContract.isParentProxy`
#       (line 41). When true the index short-circuits at line 83 to a
#       "more-proxy-preview-locked" view — NONE of the rows below render,
#       so all four assertNotVisible checks pass by construction.
#   - apps/mobile/src/app/(app)/more/account.tsx
#       more-row-subscription (line 104). Gated by
#       `navigationContract.gates.showBilling` (= `ownerRole && !isParentProxy`
#       — navigation-contract.ts:367). Note: the More index short-circuit
#       above means this sub-screen is unreachable in proxy mode anyway.
#   - apps/mobile/src/app/(app)/more/privacy.tsx
#       more-row-export (line 146), more-row-delete-account (line 153). Both
#       gated by `showOwnerPrivacyGates = navigationContract.gates.showExportDelete`
#       (= `ownerRole && !isParentProxy` — navigation-contract.ts:369).
#   - apps/mobile/src/components/home/LearnerScreen.tsx:497 (learner-screen)
#   - apps/mobile/src/app/profiles.tsx:228 (profiles-screen)
#   - apps/mobile/src/app/(app)/more/index.tsx
#       more-row-learning-preferences (line 133), more-row-account (line 151),
#       more-row-help (line 224) — used by the flow's wait/scroll steps.
#
# DRIFT SINCE PARKING:
#   - The single `more.tsx` was split into `more/index.tsx` + sub-screens
#     (account.tsx, privacy.tsx). Subscription, export, and delete rows now
#     live inside their sub-screens — the flow's top-level assertNotVisible
#     checks still pass because the index short-circuits in proxy mode.
#   - The predicate name in the index is `isImpersonating` but its value is
#     `navigationContract.isParentProxy` (the canonical contract field). The
#     ACCOUNT-04 unblock condition above tracks `isParentProxy`.
#
# Usage: ./e2e/scripts/seed-and-run.sh parent-with-children e2e/flows/account/more-impersonated-child.yaml
appId: com.mentomate.app
tags:
  - nightly
  - account
  - blocked
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for learner screen
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

# 3. Switch to child profile ("Test Teen")
- runFlow:
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Test Teen"

# 4. Now on learner home as impersonated child — navigate to More tab
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn:
    text: "More"

# 5. Wait for More tab index to load
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

- takeScreenshot: 01-more-as-impersonated-child

# 6. Scroll through all sections confirming the guard items are absent

# Sign-out button must not be visible at any scroll position
- assertNotVisible:
    id: "sign-out-button"

# Subscription row must not be visible
- assertNotVisible:
    id: "more-row-subscription"

# Export and Delete rows live in the Privacy sub-screen — scroll to bottom of
# More index to confirm they aren't exposed at the top level either.
- scrollUntilVisible:
    element:
      id: "more-row-help"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 02-more-other-section-impersonated

# Export and Delete rows must not be rendered
- assertNotVisible:
    id: "more-row-export"

- assertNotVisible:
    id: "more-row-delete-account"

# Sign-out must still not be visible after scrolling to the bottom
- assertNotVisible:
    id: "sign-out-button"

- takeScreenshot: 03-account-actions-hidden
