# Learner mentor memory - empty state and controls
# Tags: nightly, account
# Seed: language-subject-active
# Covers: More -> learner mentor memory empty state
# Usage: ./scripts/seed-and-run.sh language-subject-active flows/account/learner-mentor-memory.yaml
appId: com.mentomate.app
tags:
  - nightly
  - account
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000

- tapOn: "More"

# Wait for the More tab index to render — the first settings row is always
# above the fold; sign-out-button lives at the bottom of the scroll,
# so use it as the screen-loaded signal instead.
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "more-row-mentor-memory"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "more-row-mentor-memory"

# memory-status-text is always above the fold (status card renders unconditionally).
# Wait for it first as the screen-loaded signal before scrolling to the empty-state
# marker below.
# Source: apps/mobile/src/app/(app)/mentor-memory.tsx:389
- extendedWaitUntil:
    visible:
      id: "memory-status-text"
    timeout: 10000

# mentor-memory-all-empty renders below TellMentorInput (below the fold on 5.8"
# screens); scroll to it rather than waiting with extendedWaitUntil.
# Source: apps/mobile/src/app/(app)/mentor-memory.tsx:525
- scrollUntilVisible:
    element:
      id: "mentor-memory-all-empty"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 01-learner-memory-empty

- tapOn:
    id: "mentor-memory-back"

# Back returns to More — confirm the screen by its first settings row, then verify
# sign-out-button is reachable by scrolling to it.
- extendedWaitUntil:
    visible:
      id: "more-row-learning-preferences"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 02-back-to-more
