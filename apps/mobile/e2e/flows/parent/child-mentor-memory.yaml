# Parent child mentor memory - empty state and correction controls
# Tags: nightly, parent
# Seed: parent-multi-child
# Covers: dashboard -> child detail -> mentor memory empty state
# Usage: ./scripts/seed-and-run.sh parent-multi-child flows/parent/child-mentor-memory.yaml
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

- runFlow:
    file: ../_setup/open-family-dashboard.yaml

- tapOn:
    id: "dashboard-child-${CHILD1_PROFILE_ID}-primary"

- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "mentor-memory-link"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "mentor-memory-link"

- extendedWaitUntil:
    visible:
      text: "No learning observations yet."
    timeout: 10000

- takeScreenshot: 01-parent-memory-empty

- scrollUntilVisible:
    element:
      id: "something-wrong-button"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 02-parent-memory-controls

- tapOn:
    id: "something-wrong-button"

- extendedWaitUntil:
    visible:
      id: "correction-input"
    timeout: 5000

- takeScreenshot: 03-correction-open

- pressKey: back

- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

- takeScreenshot: 04-back-to-child
