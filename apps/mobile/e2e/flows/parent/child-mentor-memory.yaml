# Parent child mentor memory - empty state and correction controls
# Tags: nightly, parent
# Seed: parent-multi-child
# Covers: dashboard -> child settings -> mentor memory empty state
# Usage: ./scripts/seed-and-run.sh parent-multi-child flows/parent/child-mentor-memory.yaml
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# open-family-dashboard.yaml navigates to child detail via CHILD_PROFILE_ID which is
# not set by the parent-multi-child seed (it provides CHILD1/2/3_PROFILE_ID). Using
# it here would cause double-navigation (dashboard -> child detail, then this flow
# taps again). Wait for parent Home, then open CHILD1's settings-mode detail.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- tapOn:
    id: 'parent-home-child-profile-${CHILD1_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

- scrollUntilVisible:
    element:
      id: 'mentor-memory-link'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'mentor-memory-link'

- extendedWaitUntil:
    visible:
      text: 'No learning observations yet.'
    timeout: 10000

- takeScreenshot: 01-parent-memory-empty

- scrollUntilVisible:
    element:
      id: 'something-wrong-button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 90
    centerElement: true
    optional: false

- takeScreenshot: 02-parent-memory-controls

- tapOn:
    id: 'something-wrong-button'

- extendedWaitUntil:
    visible:
      id: 'correction-input'
    timeout: 5000

- takeScreenshot: 03-correction-open

- pressKey: back

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

- takeScreenshot: 04-back-to-child
