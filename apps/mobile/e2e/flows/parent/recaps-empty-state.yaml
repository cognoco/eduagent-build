# Flow: V1 Guardian Recaps Tab — Empty State
# Validates the recaps-empty branch of the Recaps tab:
#   - Guardian owner with a linked child but ZERO learningSessions
#   - tab-recaps is visible (V1 shape sanity)
#   - recaps-empty container renders (not recaps-loading / recaps-error)
#   - recaps-empty-start-session CTA routes to /(app)/home
#
# Tags: nightly, parent, navigation
# Seed: parent-with-children-no-sessions (parent + child + consent + subject,
#       NO learningSessions rows → listRecapsForParent returns [])
# Usage: ./e2e/scripts/seed-and-run.sh parent-with-children-no-sessions \
#          e2e/flows/parent/recaps-empty-state.yaml
#
# Prereq flag: requires MODE_NAV_V1_ENABLED=true so the Recaps tab is in the
# guardian tab shape. Until V1 is the production default, this flow is gated
# behind the V1 client build.
#
# testIDs referenced (verified in source):
#   - apps/mobile/src/app/(app)/_layout.tsx → tab-recaps (706), tab-home (663)
#   - apps/mobile/src/app/(app)/home.tsx → parent-home-screen
#   - apps/mobile/src/app/(app)/recaps/index.tsx
#       recaps-screen (30), recaps-empty (81),
#       recaps-empty-start-session (92), recaps-loading (44),
#       recaps-error (75)
appId: com.mentomate.app
tags:
  - nightly
  - parent
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children-no-sessions'
      API_URL: ${API_URL}

# Wait for parent-home-screen — the family navigation contract must resolve
# (defaultAppContext='family' seed) before the V1 guardian tab bar with
# tab-recaps is rendered.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- extendedWaitUntil:
    visible:
      id: 'tab-recaps'
    timeout: 15000

- tapOn:
    id: 'tab-recaps'

- extendedWaitUntil:
    visible:
      id: 'recaps-screen'
    timeout: 15000

- takeScreenshot: recaps-empty-01-recaps-screen

# Positive: empty branch rendered with its CTA.
- assertVisible:
    id: 'recaps-empty'
- assertVisible:
    id: 'recaps-empty-start-session'

# Negative: the loading / error / list-row branches must NOT be visible. Without
# these, a regression that left the spinner mounted (network stuck) or the
# error fallback (5xx) would silently pass the recaps-empty assertion since
# the test framework only checks "at least one match exists".
- assertNotVisible:
    id: 'recaps-loading'
- assertNotVisible:
    id: 'recaps-error'
- assertNotVisible:
    id: 'recap-row-.*'

- takeScreenshot: recaps-empty-02-empty-state

# CTA must route to home (the only sensible recovery — start a session and
# come back). The handler is `router.push('/(app)/home')` which lands on
# parent-home-screen for this guardian.
- tapOn:
    id: 'recaps-empty-start-session'

- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

- takeScreenshot: recaps-empty-03-cta-routed-home
