# Flow P3: Parent Consent Management — Withdraw and Restore
# Validates: parent can withdraw consent (GDPR), sees the current withdrawn
# empty-state gate from the child detail screen, and can restore consent.
# Tags: nightly, parent, consent, gdpr
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (GDPR consent revocation, COPPA)
# Prerequisite: Seeded parent user with linked children who have consent
#               (scenario: parent-with-children)
#
# Key testIDs (from child/[profileId]/index.tsx):
#   consent-section            — consent management section container
#   withdraw-consent-button    — triggers Alert.alert confirmation dialog
#   consent-withdrawn-empty-state — screen-level withdrawn gate after revoke
#   consent-withdrawn-request-cta — restores consent from the withdrawn gate
#
# NOTE: Consent withdrawal triggers an Inngest 7-day grace period job. The child
# detail screen now short-circuits to a screen-level withdrawn gate; the
# grace-period-banner remains a lower-level component state covered by unit tests.
#
# Session 25 (2026-03-25): PASS — all assertions verified.
#   Fixes applied: BUG-70 (inngest.send try-catch), double-tap removed,
#   assertions strengthened from optional to mandatory.
appId: com.mentomate.app
tags:
  - nightly
  - parent
  - consent
  - gdpr
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# 2. Parent owners land on parent-home-screen once the family navigation
#    contract resolves (defaultAppContext='family' seed). Wait for it before
#    tapping the child card.
#    open-family-dashboard.yaml is NOT used here because it navigates all the
#    way to child detail (tapOn child card + wait for "Sessions"); this flow
#    drives that navigation itself in step 3 — using it would double-navigate
#    past child detail (double router.push bug).
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# 3. Tap child card to navigate to child detail.
#    NOTE: Do NOT double-tap — double router.push navigates past child detail
#    to session transcript.
#    parent-home-child-profile-${CHILD_PROFILE_ID} opens settings mode, where
#    consent management is rendered.
- tapOn:
    id: 'parent-home-child-profile-${CHILD_PROFILE_ID}'

# 4. Wait for child detail screen
- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

# 5. Scroll the actual action fully above the viewport edge.
- scrollUntilVisible:
    element:
      id: 'withdraw-consent-button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
    centerElement: true
    waitToSettleTimeoutMs: 1000

# 6. Screenshot: consent section visible with "Withdraw Consent" button
- takeScreenshot: consent-mgmt-01-consent-section

# 7. Verify withdraw consent button is visible
- assertVisible:
    id: 'withdraw-consent-button'

# 8. Tap withdraw consent button — this triggers a native Alert dialog
- tapOn:
    id: 'withdraw-consent-button'

# 9. Wait for the native alert confirmation dialog
#    Alert title is "Withdraw consent for {childName}?" — Maestro cannot
#    substring-match "Withdraw consent" from the full title (BUG-49 pattern).
- extendedWaitUntil:
    visible:
      text: 'Withdraw consent'
    timeout: 5000
    optional: true # justified: native Alert.alert title text matching is unreliable on Android; full title includes child name which varies

# 10. Screenshot: confirmation dialog
- takeScreenshot: consent-mgmt-02-confirm-dialog

# 11. Tap the current native confirmation action.
- tapOn:
    text: '(?i)confirm.*withdraw consent'

# 12. Wait for screen-level withdrawn gate to appear (consent is now WITHDRAWN)
- extendedWaitUntil:
    visible:
      id: 'consent-withdrawn-empty-state'
    timeout: 10000

# 13. Verify restore CTA is present
- assertVisible:
    id: 'consent-withdrawn-request-cta'

# 14. Screenshot: withdrawn gate with restore option
- takeScreenshot: consent-mgmt-03-withdrawn-empty-state

# 15. Tap restore CTA to restore consent
- tapOn:
    id: 'consent-withdrawn-request-cta'

# 16. Wait for consent to be restored and child detail to render again
- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

# 17. Scroll back to consent section and verify withdraw button is available again
- scrollUntilVisible:
    element:
      id: 'withdraw-consent-button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
    centerElement: true
    waitToSettleTimeoutMs: 1000

# 18. Screenshot: consent restored, withdraw button visible again
- takeScreenshot: consent-mgmt-04-consent-restored

# 19. Navigate back to dashboard
- tapOn:
    id: 'back-button'

# 20. Final screenshot
- takeScreenshot: consent-mgmt-05-complete
