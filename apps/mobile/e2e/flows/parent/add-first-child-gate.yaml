# Flow: Add-First-Child Gate — Family owner with no children can add a child
# Validates: a returning adult owner with no children does NOT land on the
#            family hub (Option B, decided 2026-05-29). They land on their own
#            "my learning" home (learner-screen) with a VISIBLE family-setup
#            invitation. Tapping it routes to More, where the Add-child entry
#            takes them to create-profile?for=child. The family hub + the
#            Study/Family mode switch only light up once the first child is
#            linked (both gate on hasFamilyLinks via familyCapable).
# Tags: weekly, parent
#
# Journey: UX Journey 4 (Parent Oversight — onboarding entry)
# Epics: Epic 5 (FR85 family linking)
# Prerequisite: Parent owner account with no child profiles, family-tier subscription
#               (scenario: parent-solo)
#
# Why this is NOT the old parent-home zero-state path:
#   A childless owner is not familyCapable (navigation-contract.ts:208-211 →
#   requires hasFamilyLinks === true), so showFamilyHome is false and home.tsx
#   renders LearnerScreen, not ParentHomeScreen. The add-first-child zero-state
#   inside ParentHomeScreen is only reachable once a child exists.
#
# testID mapping:
#   LearnerScreen.tsx:
#     - learner-screen                 -> the "my learning" home container
#     - home-family-setup-cta-button   -> the visible "set up family" invitation
#                                         (renders when gates.showAddChild and
#                                          !hasLinkedChildren); routes to /(app)/more
#   more/index.tsx:
#     - add-child-link                 -> Add-child row (renders when showAddChild)
#   create-profile.tsx:
#     - create-profile-name            -> child name input (confirms navigation)
appId: com.mentomate.app
tags:
  - weekly
  - parent
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-solo'
      API_URL: ${API_URL}

# Option B: childless family owner lands on their own "my learning" home,
# NOT the family hub.
- extendedWaitUntil:
    visible:
      id: 'learner-screen'
    timeout: 15000

- takeScreenshot: add-first-child-01-my-learning-home

# The add-a-child invitation must be visible and present on the home.
- extendedWaitUntil:
    visible:
      id: 'home-family-setup-cta-button'
    timeout: 10000

- assertVisible:
    id: 'home-family-setup-cta-button'

- takeScreenshot: add-first-child-02-invitation-visible

# ── Tap the invitation → More tab ────────────────────────────────────────
- tapOn:
    id: 'home-family-setup-cta-button'

# The invitation routes to More so the Add-child gating lives in one place.
- extendedWaitUntil:
    visible:
      id: 'add-child-link'
    timeout: 10000

- assertVisible:
    id: 'add-child-link'

- takeScreenshot: add-first-child-03-more-add-child

# ── Add child → create-profile ───────────────────────────────────────────
# handleAddChild() checks tier (family/pro allowed) then pushes
# /create-profile?for=child. parent-solo has a family-tier active subscription
# so no gate alert fires.
- tapOn:
    id: 'add-child-link'

- extendedWaitUntil:
    visible:
      id: 'create-profile-name'
    timeout: 10000

- assertVisible:
    id: 'create-profile-name'

- takeScreenshot: add-first-child-04-create-profile-reached
