# Flow: Add-First-Child Gate — Parent owner with no children can add a child
# Validates: solo parent (owner, no children) lands on parent Home's
#            add-first-child state, taps the CTA, and lands on the
#            create-profile screen.
# Tags: weekly, parent
#
# Journey: UX Journey 4 (Parent Oversight — onboarding entry)
# Epics: Epic 5 (FR85 family linking)
# Prerequisite: Parent owner account with no child profiles, family-tier subscription
#               (scenario: parent-solo)
#
# Seed analysis (test-seed.ts):
#   parent-solo: isOwner=true, no children, family-tier subscription →
#   home renders ParentHomeScreen with a zero-state family dashboard.
#
# testID mapping:
#   ParentHomeScreen.tsx:
#     - add-first-child-screen          -> zero-state family dashboard card
#     - add-first-child-cta             -> primary "Add your first child" CTA
#   create-profile.tsx:
#     - create-profile-name             -> child name input (confirms navigation)
appId: com.mentomate.app
tags:
  - weekly
  - parent
---
# ── Setup ──────────────────────────────────────────────────────────────
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-solo'
      API_URL: ${API_URL}

# parent-solo has no children → renders parent Home zero state
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- takeScreenshot: add-first-child-01-home

- extendedWaitUntil:
    visible:
      id: 'add-first-child-screen'
    timeout: 10000

- assertVisible:
    id: 'add-first-child-cta'

- takeScreenshot: add-first-child-02-zero-state

# ── Part 1: Tap add-first-child CTA → create-profile ──────────────────
- tapOn:
    id: 'add-first-child-cta'

# handleAddChild() checks tier (family/pro allowed) then pushes /create-profile?for=child.
# parent-solo has a family-tier active subscription so no gate alert fires.
- extendedWaitUntil:
    visible:
      id: 'create-profile-name'
    timeout: 10000

- assertVisible:
    id: 'create-profile-name'

- takeScreenshot: add-first-child-03-create-profile-reached
