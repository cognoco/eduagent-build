# Parent child reports - empty state
# Tags: nightly, parent
# Seed: parent-multi-child
# Covers: dashboard -> child detail -> reports empty state
# Usage: ./scripts/seed-and-run.sh parent-multi-child flows/parent/child-reports-empty.yaml
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# open-family-dashboard.yaml navigates to child detail via CHILD_PROFILE_ID which is
# not set by the parent-multi-child seed (it provides CHILD1/2/3_PROFILE_ID). Using
# it here would cause double-navigation (dashboard -> child detail, then this flow
# taps again). Replace with a bare wait for parent-home-screen, then tap CHILD1.
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 15000

- takeScreenshot: 01-parent-dashboard

- tapOn:
    id: "parent-home-check-child-${CHILD1_PROFILE_ID}"

- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

- takeScreenshot: 02-child-detail

- scrollUntilVisible:
    element:
      id: "child-reports-link"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "child-reports-link"

- extendedWaitUntil:
    visible:
      id: "child-reports-back"
    timeout: 10000

- assertVisible:
    id: "child-reports-empty"

- assertVisible:
    id: "child-reports-empty-time-context"

- assertVisible:
    id: "child-reports-empty-progress"

- takeScreenshot: 03-reports-empty

- tapOn:
    id: "child-reports-back"

- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

- takeScreenshot: 04-back-to-child-detail
