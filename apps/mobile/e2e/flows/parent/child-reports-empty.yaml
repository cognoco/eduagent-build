# Parent child reports - empty state
# Tags: nightly, parent
# Seed: parent-multi-child
# Covers: dashboard -> child detail -> reports empty state
# Usage: ./scripts/seed-and-run.sh parent-multi-child flows/parent/child-reports-empty.yaml
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# open-family-dashboard.yaml navigates to child detail via CHILD_PROFILE_ID which is
# not set by the parent-multi-child seed (it provides CHILD1/2/3_PROFILE_ID). Use
# a bare wait for parent-home-screen, then tap CHILD1's Reports action directly.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- takeScreenshot: 01-parent-dashboard

- scrollUntilVisible:
    element:
      id: 'parent-home-weekly-report-${CHILD1_PROFILE_ID}'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 100
    centerElement: true

- tapOn:
    id: 'parent-home-weekly-report-${CHILD1_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      id: 'child-reports-back'
    timeout: 10000

- assertVisible:
    id: 'child-reports-empty'

- assertVisible:
    id: 'child-reports-empty-time-context'

- assertVisible:
    id: 'child-reports-empty-progress'

- takeScreenshot: 03-reports-empty
