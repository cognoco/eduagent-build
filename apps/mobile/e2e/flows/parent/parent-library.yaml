# Flow: Parent Library Tab — Navigate to Library and view topics
# Validates: parent user can tap Library tab, see subject filter tabs,
# and view topic list (or empty state if no topics for parent's children).
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight — Library)
# Epics: Epic 5
# Prerequisite: Seeded parent with linked children who have subjects
#               (scenario: parent-with-children — child has "Mathematics" subject)
#
# testIDs verified against:
#   - apps/mobile/src/app/(parent)/_layout.tsx (tab-library, tab-home)
#   - apps/mobile/src/app/(parent)/dashboard.tsx (dashboard-scroll)
#   - apps/mobile/src/app/(parent)/library.tsx (re-exports learner library)
#   - apps/mobile/src/app/(learner)/library/index.tsx (subject-filter-tabs,
#     library-loading, library-empty, topic-row-*)
#
# NOTE: The parent's Library tab re-exports the learner library component.
# It will show topics for the parent's own profile (which has none), or the
# child's profile depending on which profile is active. The subject-filter-tabs
# testID only appears when there are 2+ subjects. With 1 or 0 subjects, the
# filter tabs are hidden and we fall back to checking for "Library" heading.
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent dashboard
# BUG-33 fix: parent-with-children creates a PARENT owner profile. After sign-in,
# the app routes directly to (parent)/dashboard — no switch-to-parent needed.
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 15000

# 3. Verify we're on the parent dashboard
- assertVisible:
    text: "Home"

# 4. Screenshot: parent dashboard before navigating
- takeScreenshot: parent-library-01-dashboard

# 5. Tap Library tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library heading to render
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 7. Check if subject filter tabs are visible (only when 2+ subjects)
- assertVisible:
    id: "subject-filter-tabs"
    optional: true

# 8. Check for loading state (may have already resolved)
- assertVisible:
    id: "library-loading"
    optional: true

# 9. Wait for either topics or empty state to appear
- extendedWaitUntil:
    visible:
      text: "topics"
    timeout: 10000
    optional: true

# 10. Check for empty state if no topics loaded
- assertVisible:
    id: "library-empty"
    optional: true

# 11. Screenshot: Library content
- takeScreenshot: parent-library-02-content

# 12. Navigate back to Home tab (use accessibility label to avoid matching heading)
- tapOn: "Home Tab"

# 13. Verify dashboard is visible again
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 10000

# 14. Final screenshot
- takeScreenshot: parent-library-03-back-to-home
