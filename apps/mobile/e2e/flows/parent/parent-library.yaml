# Flow: Parent Library Tab — Navigate to Library and view shelves/books
# Validates: parent user can tap Library tab, see the Shelves/Books tabs,
# and the shelves list renders (or loading state if no subjects).
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight — Library)
# Epics: Epic 5
# Prerequisite: Seeded parent with linked children who have subjects
#               (scenario: parent-with-children — child has "Mathematics" subject)
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/_layout.tsx (tab-library, tab-home)
#   - apps/mobile/src/components/home/ParentHomeScreen.tsx (parent-home-screen)
#   - apps/mobile/src/app/(app)/library.tsx (3-tab Library)
#   - apps/mobile/src/components/library/LibraryTabs.tsx (library-tab-shelves, library-tab-books)
#   - apps/mobile/src/components/library/ShelvesTab.tsx (shelves-list)
#
# NOTE: Library is now a 2-tab layout (Shelves / Books). subject-filter-tabs
# is gone. The Shelves tab is the default; shelves-list renders subject cards.
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Parent owners land on parent Home.
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 15000

# 3. Verify we're on parent Home
- assertVisible:
    id: "parent-home-screen"

# 4. Screenshot: parent Home before navigating
- takeScreenshot: parent-library-01-home

# 5. Tap Library tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library heading to render
- extendedWaitUntil:
    visible:
      text: "Library"
    timeout: 10000

# 7. Check if shelves list is visible (Library v3: library-tab-shelves removed in PR #144)
- assertVisible:
    id: "shelves-list"
    optional: true  # justified: early check — shelves-list may already be visible before loading completes; non-blocking pre-check

# 8. Check for loading state (may have already resolved)
- assertVisible:
    id: "library-loading"
    optional: true  # justified: library-loading is transient; it may have already dismissed by the time this step runs

# 9. Wait for shelves list to render — mandatory: this is the core assertion for the Library tab
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000

# 10. Screenshot: Library content (Shelves tab — subject cards)
- takeScreenshot: parent-library-02-content

# 12. Navigate back to Home tab (use accessibility label to avoid matching heading)
- tapOn: "Home Tab"

# 13. Verify parent Home is visible again
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 10000

# 14. Final screenshot
- takeScreenshot: parent-library-03-back-to-home
