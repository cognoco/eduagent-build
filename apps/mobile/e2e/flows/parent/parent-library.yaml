# Flow: Parent Recaps Tab — Navigate to Recaps and verify screen renders
# Validates: V1 guardian user can tap Recaps tab (replaced Library in FAMILY_TABS)
# and the recaps screen renders (empty state or recap list).
# Tags: nightly, parent
#
# NAV RESTRUCTURE (2026-05-29): V1 guardian FAMILY_TABS removed the library tab.
# Old guardian tabs (V0): home, own-learning, library, progress, more (LEGACY_GUARDIAN_TABS)
# New guardian tabs (V1): home, recaps, progress, more (FAMILY_TABS)
# tab-library no longer exists for parent-with-children scenario.
# This flow now validates the recaps tab which replaced library.
# Source: apps/mobile/src/lib/navigation-contract.ts:152-157 (FAMILY_TABS)
#
# Journey: UX Journey 4 (Parent Oversight — Recaps)
# Prerequisite: Seeded parent with linked children
#               (scenario: parent-with-children)
#
# testIDs verified against:
#   - apps/mobile/src/app/(app)/_layout.tsx:692 (tab-recaps tabBarButtonTestID)
#   - apps/mobile/src/app/(app)/recaps/index.tsx:31 (recaps-screen testID)
#   - apps/mobile/src/app/(app)/recaps/index.tsx:82 (recaps-empty testID)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Parent owners land on parent Home.
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 15000

# 3. Verify we're on parent Home
- assertVisible:
    id: "parent-home-screen"

# 4. Screenshot: parent Home before navigating
- takeScreenshot: parent-library-01-home

# 5. Tap Recaps tab (replaces Library for V1 guardians; testID tab-recaps)
#    apps/mobile/src/app/(app)/_layout.tsx:692
- tapOn:
    id: "tab-recaps"

# 6. Wait for Recaps screen to render
- extendedWaitUntil:
    visible:
      id: "recaps-screen"
    timeout: 10000

# 7. Check for loading state (may have already resolved)
- assertVisible:
    id: "recaps-loading"
    optional: true  # justified: recaps-loading is transient; may have dismissed by the time this step runs

# 8. Wait for recaps screen content — either empty state or recap list
#    apps/mobile/src/app/(app)/recaps/index.tsx:77-115
- extendedWaitUntil:
    visible:
      id: "recaps-screen"
    timeout: 10000

# 9. Screenshot: Recaps tab content
- takeScreenshot: parent-library-02-content

# 10. Navigate back to Home tab (use testID — avoids matching the "Home" heading)
- tapOn:
    id: "tab-home"

# 11. Verify parent Home is visible again
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 10000

# 12. Final screenshot
- takeScreenshot: parent-library-03-back-to-home
