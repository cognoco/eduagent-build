# Flow P4: Parent Tab Navigation — Dashboard, Library, More
# Validates: parent can navigate between the three bottom tabs and each
# screen renders its expected content.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Tab bar:
#   "Home"          → ParentGateway    (testID: parent-gateway)
#   "Family"        → family.tsx       (testID: dashboard-scroll)
#   "Library"       → library.tsx      (testID: shelves-list)
#   "More"          → more.tsx         (testID: sign-out-button)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent Home gateway
- extendedWaitUntil:
    visible:
      id: "parent-gateway"
    timeout: 15000

# 3. Verify Home gateway content
- assertVisible:
    id: "gateway-check-progress"

# 4. Screenshot: Home tab (gateway)
- takeScreenshot: parent-tabs-01-home

# ---------- Family tab ----------

- tapOn: "Family Tab"

- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 15000

- assertVisible:
    text: "Family"

- takeScreenshot: parent-tabs-02-family

# ---------- Library tab ----------

# 5. Tap "Library" tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library to render — Library v3 single-pane; library-tab-shelves removed in PR #144.
- extendedWaitUntil:
    visible:
      id: "shelves-list"
    timeout: 10000
    optional: true

# 7. Screenshot: Library tab
- takeScreenshot: parent-tabs-03-library

# ---------- More tab ----------

# 8. Tap "More" tab (use accessibility label to avoid matching heading)
- tapOn: "More Tab"

# 9. Wait for More screen heading
- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 30000

# 10. Scroll to sign-out button (may be below the fold)
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 10000

# 11. Verify learning mode section (first section in More screen)
- assertVisible:
    id: "learning-accommodation-section-header"
    optional: true

# 12. Verify notifications section
- assertVisible:
    text: "Notifications"
    optional: true

# 13. Verify account section
- assertVisible:
    text: "Account"
    optional: true

# 14. Screenshot: More tab (settings)
- takeScreenshot: parent-tabs-04-more

# ---------- Back to Home tab ----------

# 15. Tap "Home" tab to return to dashboard
#     Use accessibility label (not text) to avoid matching "Home" heading
- tapOn: "Home Tab"

# 16. Verify Home gateway is visible again
- extendedWaitUntil:
    visible:
      id: "parent-gateway"
    timeout: 10000

# 17. Final screenshot: back on Home tab
- takeScreenshot: parent-tabs-05-back-to-home
