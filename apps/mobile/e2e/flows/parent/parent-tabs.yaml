# Flow P4: Parent Tab Navigation - Home, Recaps, Progress, More
# Validates: parent can navigate between the four bottom tabs and each
# screen renders its expected content.
# Tags: nightly, parent
#
# NAV RESTRUCTURE (2026-05-29): V1 guardian FAMILY_TABS removed library tab.
# Old: home, own-learning, library, progress, more (LEGACY_GUARDIAN_TABS)
# New: home, recaps, progress, more (FAMILY_TABS)
# Source: apps/mobile/src/lib/navigation-contract.ts:152-157
#
# Journey: UX Journey 4 (Parent Oversight)
# Tab bar:
#   "Home"          -> ParentHomeScreen  (testID: parent-home-screen)
#   "Recaps"        -> recaps/index.tsx  (testID: recaps-screen)
#   "Progress"      -> progress/index   (testID: progress-screen)
#   "More"          -> more.tsx         (testID: sign-out-button)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent Home
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 15000

# 3. Verify Home content
- assertVisible:
    id: "parent-home-check-child-${CHILD_PROFILE_ID}"

# 4. Screenshot: Home tab
- takeScreenshot: parent-tabs-01-home

# ---------- Recaps tab (replaces Library for V1 guardians) ----------

# 5. Tap "Recaps" tab (use testID — survives i18n + copy edits)
#    tabBarButtonTestID: 'tab-recaps' — apps/mobile/src/app/(app)/_layout.tsx:692
- tapOn:
    id: "tab-recaps"

# 6. Wait for Recaps screen to render
#    testID: 'recaps-screen' — apps/mobile/src/app/(app)/recaps/index.tsx:31
- extendedWaitUntil:
    visible:
      id: "recaps-screen"
    timeout: 10000

# 7. Screenshot: Recaps tab
- takeScreenshot: parent-tabs-02-recaps

# ---------- Progress tab ----------

- tapOn:
    id: "tab-progress"

- extendedWaitUntil:
    visible:
      id: "progress-screen"
    timeout: 15000

- takeScreenshot: parent-tabs-03-progress

# ---------- More tab ----------

# 8. Tap "More" tab (use accessibility label to avoid matching heading)
- tapOn: "More"

# 9. Wait for More screen heading
- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 30000

# 10. Scroll to sign-out button (may be below the fold)
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 10000

# 11. Verify first settings row is always above the fold
- assertVisible:
    id: "more-row-learning-preferences"

# 12. Verify notifications section
- assertVisible:
    text: "Notifications"

# 13. Verify account section
- assertVisible:
    text: "Account"

# 14. Screenshot: More tab (settings)
- takeScreenshot: parent-tabs-04-more

# ---------- Back to Home tab ----------

# 15. Tap "Home" tab to return to parent Home (use testID — avoids matching heading)
- tapOn:
    id: "tab-home"

# 16. Verify parent Home is visible again
- extendedWaitUntil:
    visible:
      id: "parent-home-screen"
    timeout: 10000

# 17. Final screenshot: back on Home tab
- takeScreenshot: parent-tabs-05-back-to-home
