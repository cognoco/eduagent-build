# Flow P4: Parent Tab Navigation — Dashboard, Library, More
# Validates: parent can navigate between the three bottom tabs and each
# screen renders its expected content.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Tab bar (from (parent)/_layout.tsx):
#   "Home"          → dashboard.tsx    (testID: dashboard-scroll)
#   "Library"       → library.tsx      (3-tab: Shelves/Books; testID: library-tab-shelves)
#   "More"          → more.tsx         (testID: sign-out-button)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent dashboard
# BUG-33 fix: parent-with-children creates a PARENT owner profile. After sign-in,
# the app routes directly to (parent)/dashboard — no switch-to-parent needed.
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 15000

# 3. Verify "Home" heading on dashboard
- assertVisible:
    text: "Home"

# 4. Screenshot: Home tab (dashboard)
- takeScreenshot: parent-tabs-01-home

# ---------- Library tab ----------

# 5. Tap "Library" tab (BUG-10: use accessibility label, not truncated text)
- tapOn: "Library Tab"

# 6. Wait for Library to render — Shelves tab is the default view.
#    Library is now a 2-tab layout (Shelves / Books); subject-filter-tabs is gone.
- extendedWaitUntil:
    visible:
      id: "library-tab-shelves"
    timeout: 10000
    optional: true

# 7. Screenshot: Library tab
- takeScreenshot: parent-tabs-02-library

# ---------- More tab ----------

# 8. Tap "More" tab (use accessibility label to avoid matching heading)
- tapOn: "More Tab"

# 9. Wait for More screen heading
- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 30000

# 10. Scroll to sign-out button (may be below the fold)
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN
    timeout: 10000

# 11. Verify learning mode section (first section in More screen)
- assertVisible:
    id: "learning-mode-section-header"
    optional: true

# 12. Verify notifications section
- assertVisible:
    text: "Notifications"
    optional: true

# 13. Verify account section
- assertVisible:
    text: "Account"
    optional: true

# 14. Screenshot: More tab (settings)
- takeScreenshot: parent-tabs-03-more

# ---------- Back to Home tab ----------

# 15. Tap "Home" tab to return to dashboard
#     Use accessibility label (not text) to avoid matching "Home" heading
- tapOn: "Home Tab"

# 16. Verify dashboard is visible again
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 10000

# 17. Final screenshot: back on Home tab
- takeScreenshot: parent-tabs-04-back-to-home
