# Flow: Story 10.13 — "Guided" Label Tooltip in Parent Transcript
# Validates: parent session transcript shows "Guided" badge with info icon,
# and tapping the icon shows an explanatory Alert dialog.
# Tags: nightly, parent, epic-10
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 10 (Story 10.13)
#
# Prerequisite: Seeded parent user with linked child who has sessions
#               containing AI responses with escalationRung >= 3.
#               Scenario: parent-with-children
#
# Usage: ./scripts/seed-and-run.sh parent-with-children flows/parent/guided-label-tooltip.yaml
#
# NOTE: The "Guided" badge only appears on exchanges where escalationRung >= 3.
# The seed must include session events with escalationRung >= 3 in their metadata
# for the badge and info icon to render. If the seed doesn't include such events,
# Guided-specific assertions are optional.
appId: com.mentomate.app
tags:
  - nightly
  - parent
  - epic-10
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Parent owners land on LearnerScreen; enter the Family dashboard.
- runFlow:
    file: ../_setup/open-family-dashboard.yaml

# 3. Tap "View details" on child card (single tap — double-tap causes double navigation)
#    dashboard-child-${CHILD_PROFILE_ID}-primary is the primary action button
#    on ParentDashboardSummary (BaseCoachingCard testID-primary pattern).
- tapOn:
    id: "dashboard-child-${CHILD_PROFILE_ID}-primary"

# 4. Wait for child detail screen
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

# 5. Scroll down to Recent Sessions and tap on a session
- scrollUntilVisible:
    element:
      text: "Recent Sessions"
    direction: DOWN
    timeout: 10000
    optional: true

# 6. Tap on a session card to navigate to session detail screen.
#     The session detail screen (child/[profileId]/session/[sessionId].tsx) replaced
#     the old transcript-scroll view. guided-info-{index} is no longer present —
#     the "Guided" badge was specific to the old transcript rendering.
- tapOn:
    id: "session-card-${SESSION_ID}"
    optional: true

# 7. Wait for session detail screen (testID: session-metadata)
- extendedWaitUntil:
    visible:
      id: "session-metadata"
    timeout: 10000
    optional: true

# 8. Screenshot: session detail screen
- takeScreenshot: guided-tooltip-01-session-detail

# 9. Navigate back to child detail
- tapOn:
    id: "session-detail-back-to-child"
    optional: true
- tapOn:
    id: "back-button"
    optional: true

# 10. Navigate back to dashboard
- tapOn:
    id: "back-button"
    optional: true

# 11. Final screenshot
- takeScreenshot: guided-tooltip-04-complete
