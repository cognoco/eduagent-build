# Flow: Parent Family Bridge Clone
# Validates: parent opens a child topic, adds it to their own learning, opens
#             the cloned relearn surface with child provenance, then starts a
#             parent-owned session.
# Tags: nightly, parent
# Seed: parent-with-children
# Usage: ./e2e/scripts/seed-and-run.sh parent-with-children e2e/flows/parent/family-bridge-clone.yaml
#
# testIDs verified against:
#   - ParentHomeScreen: parent-home-check-child-${CHILD_PROFILE_ID}
#   - child/[profileId]/index.tsx: child-detail-scroll, subject-card-${SUBJECT_ID}
#   - child/[profileId]/subjects/[subjectId].tsx: subject-topics-scroll, topic-card-${TOPIC_ID}
#   - child/[profileId]/topic/[topicId].tsx: topic-detail-screen
#   - AddToMyLearningButton: add-to-my-learning-button, add-to-my-learning-toast, clone-toast-open
#   - topic/relearn.tsx: relearn-parent-bridge-header, relearn-method-visual_diagrams
#   - session/index.tsx: session-screen
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

- runFlow:
    file: ../_setup/open-family-dashboard.yaml

- tapOn:
    id: 'parent-home-check-child-${CHILD_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

- tapOn:
    id: 'subject-card-${SUBJECT_ID}'

- extendedWaitUntil:
    visible:
      id: 'subject-topics-scroll'
    timeout: 10000

- scrollUntilVisible:
    element:
      id: 'topic-card-${TOPIC_ID}'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'topic-card-${TOPIC_ID}'

- extendedWaitUntil:
    visible:
      id: 'topic-detail-screen'
    timeout: 10000

- scrollUntilVisible:
    element:
      id: 'add-to-my-learning-button'
    direction: DOWN
    timeout: 10000

- takeScreenshot: family-bridge-01-topic-detail

- tapOn:
    id: 'add-to-my-learning-button'

- extendedWaitUntil:
    visible:
      id: 'add-to-my-learning-toast'
    timeout: 15000

- assertVisible:
    id: 'clone-toast-open'

- takeScreenshot: family-bridge-02-clone-toast

- tapOn:
    id: 'clone-toast-open'

- extendedWaitUntil:
    visible:
      id: 'relearn-parent-bridge-header'
    timeout: 10000

- assertVisible:
    text: "Added from Test Teen's learning."

- takeScreenshot: family-bridge-03-relearn-provenance

- tapOn:
    id: 'relearn-method-visual_diagrams'

- extendedWaitUntil:
    visible:
      id: 'session-screen'
    timeout: 20000

- takeScreenshot: family-bridge-04-session-started
