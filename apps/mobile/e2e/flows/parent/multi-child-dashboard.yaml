# Flow: Parent Multi-Child Dashboard — View and Navigate Multiple Children
# Validates: parent with 3 children sees all children listed, can tap into each,
# and verify per-child data (subjects, sessions). Tests scroll behavior when
# children list extends beyond the fold.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with 3 linked children
#               (scenario: parent-multi-child — creates Emma, Lucas, Sofia)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-multi-child'
      API_URL: ${API_URL}

# 2. Parent owners with defaultAppContext='family' land directly on parent-home-screen.
#    open-family-dashboard.yaml is NOT used here because it navigates to a child detail
#    screen via CHILD_PROFILE_ID (not set by parent-multi-child seed), causing
#    double-navigation when this flow then asserts and taps child cards on the home screen.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# ── Visual integrity: parent home screen ───────────────────────────────
- assertVisible:
    id: 'parent-home-screen'

- assertVisible:
    text: 'Children'

- takeScreenshot: multi-child-01-dashboard

# ── Verify all 3 children are listed ──────────────────────────────────
# Child 1: Emma (teen, Mathematics, 10 exchanges completed)
- extendedWaitUntil:
    visible:
      id: 'parent-home-check-child-${CHILD1_PROFILE_ID}'
    timeout: 10000

# Child 2: Lucas (learner, Science, 5 exchanges completed)
- scrollUntilVisible:
    element:
      id: 'parent-home-check-child-${CHILD2_PROFILE_ID}'
    direction: DOWN
    timeout: 10000

# Child 3: Sofia (teen, History, no sessions yet)
- scrollUntilVisible:
    element:
      id: 'parent-home-check-child-${CHILD3_PROFILE_ID}'
    direction: DOWN
    timeout: 10000

# Multi-child parent home renders the family summary panel after all child
# cards, so prove it only after scrolling through the full family list.
- scrollUntilVisible:
    element:
      id: 'parent-home-family-summary'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
    centerElement: true

- assertVisible:
    id: 'parent-home-family-summary'

- takeScreenshot: multi-child-02-family-summary-visible

# ── Drill into Child 1 (Emma) ─────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: 'parent-home-check-child-${CHILD1_PROFILE_ID}'
    direction: UP
    timeout: 10000

- tapOn:
    id: 'parent-home-check-child-${CHILD1_PROFILE_ID}'

# Wait for child detail screen
- extendedWaitUntil:
    visible:
      text: 'Emma'
    timeout: 10000

# Verify subject info — Mathematics is seeded for Emma
- assertVisible:
    text: 'Mathematics'

- takeScreenshot: multi-child-03-emma-detail

# Navigate back to parent home through the screen-owned, history-independent route.
- tapOn:
    id: 'back-button'

# Wait for parent home to reload
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

# ── Drill into Child 2 (Lucas) ────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: 'parent-home-check-child-${CHILD2_PROFILE_ID}'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'parent-home-check-child-${CHILD2_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      text: 'Lucas'
    timeout: 10000

# Verify subject info — Science is seeded for Lucas
- assertVisible:
    text: 'Science'

- takeScreenshot: multi-child-04-lucas-detail

# Navigate back through the screen-owned route.
- tapOn:
    id: 'back-button'

- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

# ── Drill into Child 3 (Sofia — no sessions) ─────────────────────────
- scrollUntilVisible:
    element:
      id: 'parent-home-check-child-${CHILD3_PROFILE_ID}'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'parent-home-check-child-${CHILD3_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      text: 'Sofia'
    timeout: 10000

# Verify subject info — History is seeded for Sofia
- assertVisible:
    text: 'History'

- takeScreenshot: multi-child-05-sofia-detail

# Navigate back through the screen-owned route.
- tapOn:
    id: 'back-button'

- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

- takeScreenshot: multi-child-06-complete
