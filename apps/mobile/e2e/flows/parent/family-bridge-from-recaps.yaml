# Flow: Parent Family Bridge — Clone from Recaps Detail
# Validates the spec-required Recaps entry surface:
#   Recaps tab -> Recaps detail -> Add to my learning -> Open -> relearn
#   -> start session -> device back returns to RECAPS DETAIL (not Home, not Recaps list).
#
# Companion to family-bridge-clone.yaml (which covers the child-curriculum
# entry surface). The two surfaces share the bridge mutation but exercise
# different returnTo tokens (FAMILY_RECAPS_RETURN_TO vs FAMILY_CHILDREN_RETURN_TO).
#
# Spec: docs/specs/2026-05-23-learn-this-too-bridge.md
#   §Implementation Sequence -> Step 8 — E2E:
#   "Maestro flow: parent opens Recaps -> taps "Add to my learning" -> confirms
#    via toast -> taps Open -> lands on relearn fresh-topic mode -> picks
#    method -> starts session -> device back returns to Recaps detail (not Home)."
#
# Tags: nightly, parent
# Seed: parent-with-children
# Usage: ./e2e/scripts/seed-and-run.sh parent-with-children e2e/flows/parent/family-bridge-from-recaps.yaml
#
# Prereq flag: requires MODE_NAV_V1_ENABLED=true so the Recaps tab is in the
# guardian tab shape. Until V1 is the production default, this flow is gated
# behind the V1 client build.
#
# testIDs referenced (verified in source):
#   - tab bar:                tab-recaps  (resolveNavigationContract gate)
#   - recaps/index.tsx:       recaps-screen, recap-row-<recapId>
#   - recaps/[recapId].tsx:   recap-detail-screen, recap-detail-back
#   - AddToMyLearningButton:  add-to-my-learning-button, add-to-my-learning-toast, clone-toast-open
#   - topic/relearn.tsx:      relearn-parent-bridge-header, relearn-method-visual_diagrams
#   - session/index.tsx:      session-screen
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# Wait for parent-home-screen first — the family navigation contract must
# resolve (defaultAppContext='family' seed) before the V1 guardian tab bar
# (with tab-recaps) is rendered. Without this wait, tab-recaps is not in the
# hierarchy yet because the app is still on learner-screen.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# Recaps tab is now in the V1 guardian shape. If MODE_NAV_V1_ENABLED is off
# this fails loudly — which is the intended signal that V0 mode does not
# expose this entry surface.
- extendedWaitUntil:
    visible:
      id: 'tab-recaps'
    timeout: 15000

- tapOn:
    id: 'tab-recaps'

- extendedWaitUntil:
    visible:
      id: 'recaps-screen'
    timeout: 10000

# Tap the first recap row by regex — the seed creates a session summary for
# the linked child so at least one row exists. We do not bind to a specific
# recapId because the seed does not surface it as an env var today.
- tapOn:
    id: 'recap-row-.*'

- extendedWaitUntil:
    visible:
      id: 'recap-detail-screen'
    timeout: 10000

- takeScreenshot: family-bridge-recaps-01-detail

- scrollUntilVisible:
    element:
      id: 'add-to-my-learning-button'
    direction: DOWN
    timeout: 10000

# Dismiss the first-render onboarding tip if AsyncStorage has no record of
# it being seen (fresh install / fresh seed). Optional so re-runs against a
# device that already dismissed the tip don't fail. Capture a screenshot
# first so a future testID typo (silent skip) produces a visible artifact.
- takeScreenshot: family-bridge-recaps-01b-before-tip-dismiss
- tapOn:
    id: 'add-to-my-learning-tip-dismiss'
    optional: true

- tapOn:
    id: 'add-to-my-learning-button'

- extendedWaitUntil:
    visible:
      id: 'add-to-my-learning-toast'
    timeout: 15000

- assertVisible:
    id: 'clone-toast-open'

- takeScreenshot: family-bridge-recaps-02-toast

- tapOn:
    id: 'clone-toast-open'

# The relearn screen renders the parent-bridge provenance header when the
# `source=parent_bridge` URL param is present.
- extendedWaitUntil:
    visible:
      id: 'relearn-parent-bridge-header'
    timeout: 10000

- takeScreenshot: family-bridge-recaps-03-relearn

- tapOn:
    id: 'relearn-method-visual_diagrams'

- extendedWaitUntil:
    visible:
      id: 'session-screen'
    timeout: 20000

- takeScreenshot: family-bridge-recaps-04-session

# Critical assertion: the route-aware session back control must return the
# parent to the Recaps detail they started from, NOT to Home and NOT to the
# Recaps list. Raw Android back presses bypass the session's returnTo mapping
# and can exhaust the release APK's native activity history.
- assertVisible:
    id: 'chat-shell-back'

- tapOn:
    id: 'chat-shell-back'

- extendedWaitUntil:
    visible:
      id: 'recap-detail-screen'
    timeout: 10000

# Negative assertions: confirm we did NOT land on Home or the Recaps list.
# The journey must return to Recaps detail (not Home, not Recaps list) —
# without these, a regression that lands on home-screen but where
# recap-detail-screen is still mounted under it would pass silently.
- assertNotVisible:
    id: 'home-screen'
- assertNotVisible:
    id: 'recaps-screen'

- takeScreenshot: family-bridge-recaps-05-back-to-detail
