# Flow: V1 Guardian Recaps Tab — Shape & List
# Validates the V1 guardian (family) tab shape and the populated recaps list.
#
# Shape invariant (AGENTS.md, navigation-contract.ts):
#   V0 guardian (5 tabs): home, my-learning, library, progress, more
#   V1 guardian (4 tabs): home, RECAPS, progress, more  ← my-learning + library replaced by recaps
# This flow asserts the V1 surface: tab-recaps visible; tab-my-learning and
# tab-library absent. If MODE_NAV_V1_ENABLED is off, this flow fails loudly
# at the `tab-recaps` wait — which is the intended signal that V0 mode does
# not expose this entry surface.
#
# Companion to family-bridge-from-recaps.yaml (deep bridge journey). That flow
# verifies the bridge mutation; this flow verifies the tab itself.
#
# Tags: nightly, parent, navigation
# Seed: parent-with-children (parent owner + linked child + ≥1 session summary)
# Usage: ./e2e/scripts/seed-and-run.sh parent-with-children e2e/flows/parent/recaps-tab-list.yaml
#
# Prereq flag: requires MODE_NAV_V1_ENABLED=true so the Recaps tab is in the
# guardian tab shape. Until V1 is the production default, this flow is gated
# behind the V1 client build.
#
# testIDs referenced (verified in source):
#   - apps/mobile/src/app/(app)/_layout.tsx
#       tab-home (line 663), tab-my-learning (684, V0 only), tab-library (695, V0 only),
#       tab-recaps (706, V1 guardian), tab-progress (717), tab-more (728)
#   - apps/mobile/src/app/(app)/home.tsx → parent-home-screen (rendered via LearnerScreen branch)
#   - apps/mobile/src/app/(app)/recaps/index.tsx
#       recaps-screen (line 30), recap-row-${recap.recapId} (line 115)
appId: com.mentomate.app
tags:
  - nightly
  - parent
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# Wait for parent-home-screen — the family navigation contract must resolve
# (defaultAppContext='family' seed) before the V1 guardian tab bar (with
# tab-recaps) is rendered. Without this wait, tab-recaps is not in the
# hierarchy yet because the app is still on learner-screen.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- takeScreenshot: recaps-tab-01-parent-home

# ── V1 guardian shape assertions ──
# Required tabs (4): home, recaps, progress, more
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-recaps'
- assertVisible:
    id: 'tab-progress'
- assertVisible:
    id: 'tab-more'

# Forbidden tabs in V1 guardian shape: my-learning + library are replaced by
# recaps. If either is visible we are on V0 (5-tab) or the contract broke.
- assertNotVisible:
    id: 'tab-my-learning'
- assertNotVisible:
    id: 'tab-library'

- takeScreenshot: recaps-tab-02-shape-asserted

# ── Open the Recaps tab and verify the list ──
- tapOn:
    id: 'tab-recaps'

- extendedWaitUntil:
    visible:
      id: 'recaps-screen'
    timeout: 15000

- takeScreenshot: recaps-tab-03-recaps-screen

# The parent-with-children seed surfaces at least one recap-eligible session
# for the linked child. Assert by id regex (recap-row-<recapId>) — we don't
# bind to a specific recapId because the seed does not surface it as an env
# var today. If the seed ever stops producing rows, this fails fast.
- assertVisible:
    id: 'recap-row-.*'

- takeScreenshot: recaps-tab-04-row-visible

# ── Navigate home and re-assert shape (no accidental redirect) ──
- tapOn:
    id: 'tab-home'

- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

- assertVisible:
    id: 'tab-recaps'
- assertNotVisible:
    id: 'tab-my-learning'
- assertNotVisible:
    id: 'tab-library'

- takeScreenshot: recaps-tab-05-back-on-home
