# Parent child mentor memory - populated categories and controls
# Tags: nightly, parent
# Seed: mentor-memory-populated
# Covers: populated parent view of mentor memory
# Usage: ./scripts/seed-and-run.sh mentor-memory-populated flows/parent/child-mentor-memory-populated.yaml
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml

# Wait for family navigation to settle before opening child detail. Do not use
# open-family-dashboard here: it already taps this child card, so the explicit
# tap below would navigate twice.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 20000

- tapOn:
    id: 'parent-home-child-profile-${CHILD_PROFILE_ID}'

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

- scrollUntilVisible:
    element:
      id: 'mentor-memory-link'
    direction: DOWN
    timeout: 10000

- tapOn:
    id: 'mentor-memory-link'

- extendedWaitUntil:
    visible:
      id: 'child-mentor-memory-screen'
    timeout: 10000

- scrollUntilVisible:
    element:
      id: 'child-mentor-memory-populated-category'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 100
    centerElement: true

- assertVisible:
    id: 'child-mentor-memory-populated-category'

- assertNotVisible:
    id: 'child-mentor-memory-empty-state'

- scrollUntilVisible:
    element:
      id: 'interest-context-Soccer-both'
    direction: UP
    timeout: 10000
    visibilityPercentage: 100
    centerElement: true

- takeScreenshot: 01-parent-memory-populated

- scrollUntilVisible:
    element:
      id: 'something-wrong-button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 90
    centerElement: true
    optional: false

- takeScreenshot: 02-parent-memory-controls

- pressKey: back

- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000
