# Flow: V1 Guardian Recap Detail — Open / Body / Back
# Validates the Recaps tab → Recap detail surface end-to-end:
#   - taps a recap row, lands on recap-detail-screen
#   - asserts the "what happened" body block renders
#   - asserts the "Open child session" link is visible (does NOT tap; the
#     deep child-session journey is covered by parent/child-session-recap.yaml)
#   - presses recap-detail-back, lands back on the recaps list
#
# Pairs with:
#   - recaps-tab-list.yaml          (tab shape + list rendering)
#   - family-bridge-from-recaps.yaml (deep bridge journey through "Add to my learning")
#
# Tags: nightly, parent, navigation
# Seed: parent-session-with-recap (parent + child + 1 session with fully populated
#       recap: narrative + highlight + conversationPrompt + engagement signal)
# Usage: ./e2e/scripts/seed-and-run.sh parent-session-with-recap \
#          e2e/flows/parent/recap-detail-navigation.yaml
#
# Prereq flag: requires MODE_NAV_V1_ENABLED=true so the Recaps tab is in the
# guardian tab shape. Until V1 is the production default, this flow is gated
# behind the V1 client build.
#
# testIDs referenced (verified in source):
#   - apps/mobile/src/app/(app)/_layout.tsx → tab-recaps (706), tab-home (663)
#   - apps/mobile/src/app/(app)/home.tsx → parent-home-screen (via LearnerScreen branch)
#   - apps/mobile/src/app/(app)/recaps/index.tsx
#       recaps-screen (30), recap-row-${recap.recapId} (115)
#   - apps/mobile/src/app/(app)/recaps/[recapId].tsx
#       recap-detail-screen (60), recap-detail-back (72),
#       recap-detail-open-session (189)
appId: com.mentomate.app
tags:
  - nightly
  - parent
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-session-with-recap'
      API_URL: ${API_URL}

# Wait for parent-home-screen — the family navigation contract must resolve
# before the V1 guardian tab bar (with tab-recaps) is rendered.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# V1 sanity: tab-recaps must be present. If MODE_NAV_V1_ENABLED is off this
# fails loudly here — the intended signal that V0 mode does not expose
# this surface.
- extendedWaitUntil:
    visible:
      id: 'tab-recaps'
    timeout: 15000

- tapOn:
    id: 'tab-recaps'

- extendedWaitUntil:
    visible:
      id: 'recaps-screen'
    timeout: 10000

- takeScreenshot: recap-detail-01-recaps-screen

# Tap the first recap row. We use id regex because the seed does not surface
# the recap id as an env var today.
- tapOn:
    id: 'recap-row-.*'

- extendedWaitUntil:
    visible:
      id: 'recap-detail-screen'
    timeout: 15000

- takeScreenshot: recap-detail-02-detail-loaded

# ── Body assertions ──
# The "Open child session" pressable always renders when recapQuery has data
# (no conditional gate on availability). Asserting it confirms the populated
# branch rendered rather than the loading/error/notFound branches — those
# branches mount recap-detail-loading / recap-detail-error / recap-detail-not-found
# instead and do NOT mount recap-detail-open-session.
- scrollUntilVisible:
    element:
      id: 'recap-detail-open-session'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 100
    centerElement: true

- assertVisible:
    id: 'recap-detail-open-session'

# Negative-asserts for the alternate render branches. If any of these is
# visible we are NOT on the populated branch and the next assertions would
# be meaningless.
- assertNotVisible:
    id: 'recap-detail-loading'
- assertNotVisible:
    id: 'recap-detail-error'
- assertNotVisible:
    id: 'recap-detail-not-found'

- takeScreenshot: recap-detail-03-populated-body

# ── Back navigation ──
# recap-detail-back invokes goBackOrReplace(router, FAMILY_RECAPS_HREF), so on
# a deep-link entry the fallback is /(app)/recaps. Here we arrived from the
# Recaps tab, so router.back() restores recaps-screen.
- scrollUntilVisible:
    element:
      id: 'recap-detail-back'
    direction: UP
    timeout: 10000
    visibilityPercentage: 100
    centerElement: false

- tapOn:
    id: 'recap-detail-back'

- extendedWaitUntil:
    visible:
      id: 'recaps-screen'
    timeout: 10000

# Confirm we did NOT fall through to parent-home-screen (a regression in
# recap-detail-back fallback would land here).
- assertNotVisible:
    id: 'parent-home-screen'

- takeScreenshot: recap-detail-04-back-to-list
