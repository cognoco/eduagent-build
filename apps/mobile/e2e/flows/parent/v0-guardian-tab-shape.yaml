# Flow: V0 Guardian Tab Shape (5 tabs) — Hard-Constraint Regression
# Verifies that today's production V0 guardian tab shape renders intact when
# MODE_NAV_V1_ENABLED=false. Companion to recaps-tab-list.yaml (V1 shape).
#
# Shape invariant (AGENTS.md → "Profile Shapes", navigation-contract.ts):
#   V0 guardian (5 tabs): home, MY-LEARNING, LIBRARY, progress, more   ← production today
#   V1 guardian (4 tabs): home, RECAPS, progress, more                  ← future default
# This flow asserts the V0 surface: tab-my-learning + tab-library visible,
# tab-recaps absent. It is the E2E counterpart to the unit-level
# navigation-contract.snapshot.test.ts hard-constraint guard.
#
# ─────────────────────────────────────────────────────────────────────────────
# WHY `manual` (not `nightly`)
# ─────────────────────────────────────────────────────────────────────────────
# Feature-flag wiring (verified):
#   - apps/mobile/src/lib/feature-flags.ts:30-31
#       MODE_NAV_V0_ENABLED = process.env.EXPO_PUBLIC_ENABLE_MODE_NAV === 'true'
#       MODE_NAV_V1_ENABLED = process.env.EXPO_PUBLIC_ENABLE_MODE_NAV_V1 === 'true'
#     Both are read from EXPO_PUBLIC_* env vars, baked into the JS bundle at
#     build time. No runtime override (no AsyncStorage, no dev-menu hook,
#     no deep link) exists — grep of feature-flags.ts confirms only env reads.
#   - apps/mobile/src/lib/app-context.tsx:61-79
#       Resolution order: V1 wins whenever it is true. So when both flags are
#       true, the guardian shape is V1 (4 tabs incl. recaps).
#
# Current dev-client build env (apps/mobile/eas.json:17-27):
#       "development": { "env": {
#         "EXPO_PUBLIC_ENABLE_MODE_NAV": "true",
#         "EXPO_PUBLIC_ENABLE_MODE_NAV_V1": "true",
#         ...
#       } }
# The "preview" channel (eas.json:28-43) matches: V0=true, V1=true.
# Therefore every dev-client / preview build today renders V1 (4-tab guardian).
# This flow CANNOT pass against today's dev-client; it would assert
# tab-my-learning visible and find tab-recaps instead.
#
# To run this flow you need a build flavor with MODE_NAV_V1_ENABLED=false —
# the "production" channel (eas.json:6-16) is that flavor today (it has only
# EXPO_PUBLIC_ENABLE_MODE_NAV=true; EXPO_PUBLIC_ENABLE_MODE_NAV_V1 is absent
# → MODE_NAV_V1_ENABLED resolves to false → V0 5-tab shape renders).
#
# Tag is `manual` per CONVENTIONS.md (requires special device setup — a build
# with V1 explicitly disabled). When V1 becomes the production default and the
# dev-client flips V1 off as a regression-only "old shape" build, this flow's
# tag should be revisited (it may move to `nightly` against that old-shape
# build, or to `regression`).
#
# ─────────────────────────────────────────────────────────────────────────────
# FINDING surfaced by this work
# ─────────────────────────────────────────────────────────────────────────────
# The existing V1 recaps flows (recaps-tab-list.yaml, recap-detail-navigation
# .yaml, recaps-empty-state.yaml, family-bridge-from-recaps.yaml) ARE
# functional in today's dev-client build because V1=true there. The fragility
# is in the opposite direction: the production build (V1 absent → off) cannot
# exercise those V1 flows. That asymmetry is captured here for awareness.
#
# ─────────────────────────────────────────────────────────────────────────────
# Tags: manual, parent, navigation
# Seed: parent-with-children (parent owner + linked child + ≥1 session summary)
# Usage (requires MODE_NAV_V1_ENABLED=false build):
#   ./e2e/scripts/seed-and-run.sh parent-with-children \
#     e2e/flows/parent/v0-guardian-tab-shape.yaml
#
# testIDs referenced (verified in source):
#   - apps/mobile/src/app/(app)/_layout.tsx
#       tab-home          (line 663)
#       tab-my-learning   (line 684) ← V0 only
#       tab-library       (line 695) ← V0 only
#       tab-recaps        (line 706) ← V1 only (must be absent here)
#       tab-progress      (line 717)
#       tab-more          (line 728)
#   - apps/mobile/src/components/home/ParentHomeScreen.tsx
#       parent-home-screen (line 1021)
appId: com.mentomate.app
tags:
  - manual
  - parent
  - navigation
---
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# Wait for parent-home-screen — the family navigation contract must resolve
# (defaultAppContext='family' on the parent-with-children seed) before the
# guardian tab bar is rendered. Without this wait, none of the tab-* IDs are
# in the hierarchy yet because the app is still on the learner-screen branch
# of LearnerScreen.tsx.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

- takeScreenshot: v0-guardian-01-parent-home

# ── V0 guardian shape assertions ──
# Required tabs (5): home, my-learning, library, progress, more
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-my-learning'
- assertVisible:
    id: 'tab-library'
- assertVisible:
    id: 'tab-progress'
- assertVisible:
    id: 'tab-more'

# Forbidden tab in V0 guardian shape: recaps is the V1-only replacement
# for my-learning + library. If visible we are on V1 (or the contract
# regressed and V1 leaked into a V0 build).
- assertNotVisible:
    id: 'tab-recaps'

- takeScreenshot: v0-guardian-02-shape-asserted

# ── Sanity: tap each V0-only tab and return to home ──
# Confirms my-learning and library are not just rendered-but-broken stubs.
- tapOn:
    id: 'tab-my-learning'
- extendedWaitUntil:
    visible:
      id: 'tab-my-learning'
    timeout: 10000
- takeScreenshot: v0-guardian-03-my-learning

- tapOn:
    id: 'tab-library'
- extendedWaitUntil:
    visible:
      id: 'tab-library'
    timeout: 10000
- takeScreenshot: v0-guardian-04-library

- tapOn:
    id: 'tab-home'
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 10000

# ── Re-assert shape after navigation (no accidental flag flip / redirect) ──
- assertVisible:
    id: 'tab-my-learning'
- assertVisible:
    id: 'tab-library'
- assertNotVisible:
    id: 'tab-recaps'

- takeScreenshot: v0-guardian-05-back-on-home
