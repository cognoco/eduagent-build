# Flow: Parent Learning Book Tab — Navigate to Learning Book and view topics
# Validates: parent user can tap Learning Book tab, see subject filter tabs,
# and view topic list (or empty state if no topics for parent's children).
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight — Learning Book)
# Epics: Epic 5
# Prerequisite: Seeded parent with linked children who have subjects
#               (scenario: parent-with-children — child has "Mathematics" subject)
#
# testIDs verified against:
#   - apps/mobile/src/app/(parent)/_layout.tsx (tab-book, tab-home)
#   - apps/mobile/src/app/(parent)/dashboard.tsx (dashboard-scroll)
#   - apps/mobile/src/app/(parent)/book.tsx (re-exports learner book)
#   - apps/mobile/src/app/(learner)/book/index.tsx (subject-filter-tabs,
#     learning-book-loading, learning-book-empty, topic-row-*)
#
# NOTE: The parent's Learning Book tab re-exports the learner book component.
# It will show topics for the parent's own profile (which has none), or the
# child's profile depending on which profile is active. The subject-filter-tabs
# testID only appears when there are 2+ subjects. With 1 or 0 subjects, the
# filter tabs are hidden and we fall back to checking for "Learning Book" heading.
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent dashboard (default tab: Home)
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 15000

# 3. Verify we're on the parent dashboard
- assertVisible:
    text: "Home"

# 4. Screenshot: parent dashboard before navigating
- takeScreenshot: parent-learning-book-01-dashboard

# 5. Tap Learning Book tab (BUG-15: use text, not testID)
- tapOn:
    text: "Learning Book"

# 6. Wait for Learning Book heading to render
- extendedWaitUntil:
    visible:
      text: "Learning Book"
    timeout: 10000

# 7. Check if subject filter tabs are visible (only when 2+ subjects)
- assertVisible:
    id: "subject-filter-tabs"
    optional: true

# 8. Check for loading state (may have already resolved)
- assertVisible:
    id: "learning-book-loading"
    optional: true

# 9. Wait for either topics or empty state to appear
- extendedWaitUntil:
    visible:
      text: "topics"
    timeout: 10000
    optional: true

# 10. Check for empty state if no topics loaded
- assertVisible:
    id: "learning-book-empty"
    optional: true

# 11. Screenshot: Learning Book content
- takeScreenshot: parent-learning-book-02-content

# 12. Navigate back to Home tab (BUG-15: use text, not testID)
- tapOn:
    text: "Home"

# 13. Verify dashboard is visible again
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 10000

# 14. Final screenshot
- takeScreenshot: parent-learning-book-03-back-to-home
