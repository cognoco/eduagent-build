# Flow P2: Parent Child Drill-Down — Full Navigation Hierarchy
# Validates: parent drills from dashboard → child detail → subjects → topics → session detail
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with linked children who have sessions
#               (scenario: parent-with-children)
#
# Screen chain:
#   dashboard.tsx  →  child/[profileId]/index.tsx  →  child/[profileId]/subjects/[subjectId].tsx
#                 →  child/[profileId]/topic/[topicId].tsx  →  child/[profileId]/session/[sessionId].tsx
#
# testIDs verified against:
#   - apps/mobile/src/components/coaching/ParentDashboardSummary.tsx (dashboard-child-${profileId})
#   - apps/mobile/src/components/coaching/BaseCoachingCard.tsx (${testID}-primary)
#   - apps/mobile/src/app/(app)/child/[profileId]/index.tsx (child-detail-scroll, session-card-*)
#   - apps/mobile/src/app/(app)/child/[profileId]/session/[sessionId].tsx (session-metadata)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent dashboard
# BUG-33 fix: parent-with-children creates a PARENT owner profile. After sign-in,
# the app routes directly to (parent)/dashboard — no switch-to-parent needed.
- extendedWaitUntil:
    visible:
      id: "family-scroll"
    timeout: 15000

# 3. Verify a child summary card rendered.
#    dashboard-child-${CHILD_PROFILE_ID} is the testID pattern from ParentDashboardSummary.
#    CHILD_PROFILE_ID is injected by the seed-and-sign-in helper.
- extendedWaitUntil:
    visible:
      id: "dashboard-child-${CHILD_PROFILE_ID}"
    timeout: 10000
    optional: true

# 4. Screenshot: parent dashboard with child cards
- takeScreenshot: parent-drill-down-01-dashboard

# 5. Tap "View details" on the child card to drill into child detail.
#    -primary suffix comes from BaseCoachingCard: testID={`${testID}-primary`}.
#    NOTE: Do NOT also tap the card body — double-tap causes double
#    router.push, navigating past child detail (BUG-70 consent-management fix).
- tapOn:
    id: "dashboard-child-${CHILD_PROFILE_ID}-primary"

# 6. Wait for child detail screen
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

# 7. Verify "Subjects" heading is present
- extendedWaitUntil:
    visible:
      text: "Subjects"
    timeout: 5000
    optional: true

# 8. Verify "Recent Sessions" heading is present
- assertVisible:
    text: "Recent Sessions"
    optional: true

# 9. Screenshot: child detail with subjects and sessions
- takeScreenshot: parent-drill-down-02-child-detail

# 10. Tap the seeded subject card.
# parent-with-children seeds a single subject named "Mathematics".
- tapOn:
    id: "subject-card-Mathematics"

# 11. Wait for subject topics screen
- extendedWaitUntil:
    visible:
      id: "subject-topics-scroll"
    timeout: 10000

# 12. Screenshot: subject topics list
- takeScreenshot: parent-drill-down-03-subject-topics

# 13. Tap the first topic card in the seeded topic list.
- tapOn:
    id: "subject-topics-scroll"
    point: "50%,30%"

# 14. Wait for topic detail screen
- extendedWaitUntil:
    visible:
      id: "topic-detail-screen"
    timeout: 10000

# 15. Verify topic understanding card is present (renamed from topic-status-card in current source)
- assertVisible:
    id: "topic-understanding-card"

# 15a. Verify topic retention card when data is present
- assertVisible:
    id: "topic-retention-card"
    optional: true   # only rendered when retention data exists — permitted use of optional

# 16. Verify session history heading
- assertVisible:
    text: "Session History"

# 17. Screenshot: topic detail with status, mastery, retention
- takeScreenshot: parent-drill-down-04-topic-detail

# 18. Navigate back to child detail
- tapOn:
    id: "back-button"

# 19. Navigate back to child detail (from subject topics)
- tapOn:
    id: "back-button"
    optional: true

# 20. Wait for child detail to reappear
- extendedWaitUntil:
    visible:
      id: "child-detail-scroll"
    timeout: 10000

# 21. Tap the first recent session card to view session detail.
#     session-card-${session.sessionId} is the per-card testID in child/[profileId]/index.tsx.
#     Navigate to the first visible session card via dynamic testID env var.
#     If SESSION_ID is not set by the seed, fall back to tapping by index via point.
- tapOn:
    id: "session-card-${SESSION_ID}"
    optional: true

# 21b. Fallback: tap the first session card by coordinate if SESSION_ID is not set
- tapOn:
    id: "child-detail-scroll"
    point: "50%,78%"
    optional: true

# 22. Wait for session detail screen (child/[profileId]/session/[sessionId].tsx)
- extendedWaitUntil:
    visible:
      id: "session-metadata"
    timeout: 10000

# 23. Screenshot: session detail screen
- takeScreenshot: parent-drill-down-05-session-detail

# 24. Navigate back to child detail
- tapOn:
    id: "session-detail-back-to-child"
    optional: true
- tapOn:
    id: "back-button"
    optional: true

# 25. Navigate back to dashboard
- tapOn:
    id: "back-button"
    optional: true

# 26. Final screenshot: back on dashboard
- takeScreenshot: parent-drill-down-06-back-to-dashboard

# ── Proxy-mode transcript gate (parent-proxy scenario) ────────────────────────
# When seeded with parent-proxy, verify that a parent viewing a child's session
# summary in proxy mode cannot see the transcript CTA.
#
# [CR-PR129-M5] view-transcript-cta is hidden behind !isParentProxy in
# session-summary/[sessionId].tsx (line 922). This block exercises that gate.
#
# testIDs verified against:
#   - apps/mobile/src/app/session-summary/[sessionId].tsx (summary-title, view-transcript-cta)
#
# Required seed env vars (populated by parent-proxy seed): SESSION_ID, CHILD_PROFILE_ID

# 27. Switch from parent to child profile (activates proxy mode: isParentProxy = true).
#     Switch-to-child navigates More → Profile → taps child by name.
#     parent-proxy seed creates child with displayName "Proxy Child".
- runFlow:
    when:
      visible:
        id: "family-scroll"
    file: ../_setup/switch-to-child.yaml
    env:
      CHILD_NAME: "Proxy Child"

# 28. Wait for learner home in child (proxy) context
- extendedWaitUntil:
    visible:
      id: "learner-screen"
    timeout: 15000
    optional: true

# 29. Navigate to the child's completed session summary via the Library tab.
#     The parent-proxy seed creates a completed session (SESSION_ID) for the child.
#     Navigate to it via History tab or direct session card.
- tapOn:
    text: "More"

- extendedWaitUntil:
    visible:
      text: "More"
    timeout: 10000

# 30. Scroll to and tap "History" (recent sessions row in More)
- scrollUntilVisible:
    element:
      text: "History"
    direction: DOWN
    timeout: 10000
    optional: true

- tapOn:
    text: "History"
    optional: true

# 31. If History is not available, fall back to tapping the session card on learner home
- tapOn:
    id: "learner-screen"
    optional: true

# 32. Attempt to tap the seeded session card directly from learner home
- tapOn:
    id: "session-card-${SESSION_ID}"
    optional: true

# 33. Wait for session summary to load (summary-title is the stable landing anchor)
- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 15000
    optional: true

# 34. Core assertion: transcript CTA must NOT be visible in proxy mode.
#     [CR-PR129-M5] view-transcript-cta is conditionally rendered only when
#     !isParentProxy. In proxy mode (active profile = child, owner = parent)
#     the element must be absent from the view hierarchy entirely.
- assertNotVisible:
    id: "view-transcript-cta"

# 35. Screenshot: session summary in proxy mode (no transcript link)
- takeScreenshot: parent-drill-down-07-proxy-no-transcript
