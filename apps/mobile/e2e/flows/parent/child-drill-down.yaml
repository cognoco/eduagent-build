# Flow P2: Parent Child Drill-Down — Full Navigation Hierarchy
# Validates: parent drills from dashboard → child detail → subjects → topics → session detail
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with linked children who have sessions
#               (scenario: parent-with-children)
#
# Screen chain:
#   ParentHomeScreen  →  child/[profileId]/index.tsx  →  child/[profileId]/subjects/[subjectId].tsx
#                     →  child/[profileId]/topic/[topicId].tsx  →  child/[profileId]/session/[sessionId].tsx
#
# testIDs verified against:
#   - apps/mobile/src/components/home/ParentHomeScreen.tsx (parent-home-check-child-${profileId})
#   - apps/mobile/src/app/(app)/child/[profileId]/index.tsx (child-detail-scroll, session-card-*)
#   - apps/mobile/src/app/(app)/child/[profileId]/session/[sessionId].tsx (session-metadata)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# 2. Parent owners with defaultAppContext='family' land directly on
#    parent-home-screen after sign-in (seed sets defaultAppContext='family').
#    open-family-dashboard.yaml is NOT used here because it navigates all the
#    way to child detail; this flow drives that navigation itself at step 5.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# 3. Verify a child summary card rendered.
#    parent-home-check-child-${CHILD_PROFILE_ID} is the IntentCard testID on ParentHomeScreen.
#    CHILD_PROFILE_ID is injected by the seed-and-sign-in helper.
- extendedWaitUntil:
    visible:
      id: 'parent-home-check-child-${CHILD_PROFILE_ID}'
    timeout: 10000
    optional: true # justified: dynamic testID constructed from CHILD_PROFILE_ID env var; if env var is not populated by seed helper the ID cannot be matched

# 4. Screenshot: parent home with child cards
- takeScreenshot: parent-drill-down-01-dashboard

# 5. Tap the child check card to drill into child detail.
#    parent-home-check-child-${CHILD_PROFILE_ID} is the IntentCard on ParentHomeScreen.
#    NOTE: Do NOT double-tap — double router.push navigates past child detail
#    (BUG-70 consent-management fix).
- tapOn:
    id: 'parent-home-check-child-${CHILD_PROFILE_ID}'

# 6. Wait for child detail screen
- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

# 7. Verify "Subjects" heading is present
- extendedWaitUntil:
    visible:
      text: 'Subjects'
    timeout: 5000

# 8. Verify "Recent Sessions" heading is present
- assertVisible:
    text: 'Recent Sessions'

# 9. Screenshot: child detail with subjects and sessions
- takeScreenshot: parent-drill-down-02-child-detail

# 10. Tap the seeded subject card.
# seed-and-run.sh exports SUBJECT_ID for the seeded Mathematics subject.
- tapOn:
    id: 'subject-card-${SUBJECT_ID}'

# 11. Wait for subject topics screen
- extendedWaitUntil:
    visible:
      id: 'subject-topics-scroll'
    timeout: 10000

# 12. Screenshot: subject topics list
- takeScreenshot: parent-drill-down-03-subject-topics

# 13. Tap the exact seeded topic card.
- tapOn:
    id: 'topic-card-${TOPIC_ID}'

# 14. Wait for topic detail screen
- extendedWaitUntil:
    visible:
      id: 'topic-detail-screen'
    timeout: 10000

# 15. Verify topic understanding card is present (renamed from topic-status-card in current source)
- assertVisible:
    id: 'topic-understanding-card'

# 15a. Verify topic retention card when data is present
- assertVisible:
    id: 'topic-retention-card'
    optional: true # justified: only rendered when retention data exists — permitted use of optional

# 16. Verify session history heading
- assertVisible:
    text: 'Session History'

# 17. Screenshot: topic detail with status, mastery, retention
- takeScreenshot: parent-drill-down-04-topic-detail

# 18. Navigate back to child detail
- tapOn:
    id: 'back-button'

# 19. Navigate back to child detail (from subject topics)
- tapOn:
    id: 'back-button'
    optional: true # justified: back-button may already be handled by hardware back or navigation state changes between topic → subject-topics

# 20. Wait for child detail to reappear
- extendedWaitUntil:
    visible:
      id: 'child-detail-scroll'
    timeout: 10000

# 21. Tap the first recent session card to view session detail.
#     session-card-${session.sessionId} is the per-card testID in child/[profileId]/index.tsx.
#     Navigate to the first visible session card via dynamic testID env var.
#     If SESSION_ID is not set by the seed, fall back to tapping by index via point.
- tapOn:
    id: 'session-card-${SESSION_ID}'
    optional: true # justified: dynamic testID from SESSION_ID env var; if not set by seed, this ID won't resolve and fallback (step 21b) takes over

# 21b. Fallback: tap the first session card by coordinate if SESSION_ID is not set
- tapOn:
    id: 'child-detail-scroll'
    point: '50%,78%'
    optional: true # justified: coordinate fallback for when SESSION_ID env var is absent; one of step 21 or 21b will succeed

# 22. Wait for session detail screen (child/[profileId]/session/[sessionId].tsx)
- extendedWaitUntil:
    visible:
      id: 'session-metadata'
    timeout: 10000

# 23. Screenshot: session detail screen
- takeScreenshot: parent-drill-down-05-session-detail

# 24. Navigate back to child detail
- tapOn:
    id: 'session-detail-back-to-child'
    optional: true # justified: session-detail-back-to-child is a specific back button that may not exist on all nav configurations; hardware back is the real fallback
- tapOn:
    id: 'back-button'
    optional: true # justified: generic back-button fallback if session-detail-back-to-child was not present

# 25. Navigate back to dashboard
- tapOn:
    id: 'back-button'
    optional: true # justified: cleanup back navigation; navigation state may already be at dashboard if earlier back steps handled it

# 26. Final screenshot: back on dashboard
- takeScreenshot: parent-drill-down-06-back-to-dashboard
