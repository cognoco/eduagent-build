# Flow N4: Parent Dashboard — View Children and Session Data
# Validates: parent user sees children list, can tap into child detail,
# and view session information.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with linked children who have sessions
#               (scenario: parent-with-children)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: 'parent-with-children'
      API_URL: ${API_URL}

# 2. Parent owners land on parent Home.
- extendedWaitUntil:
    visible:
      id: 'parent-home-screen'
    timeout: 15000

# ── Visual integrity: parent tab bar (V1 guardian FAMILY_TABS) ─────────
# V1 guardian tabs = home, recaps, progress, more
# (apps/mobile/src/lib/navigation-contract.ts:152-157 FAMILY_TABS)
# own-learning and library are removed; tab-recaps replaces them.
# tabBarButtonTestID values from apps/mobile/src/app/(app)/_layout.tsx:663,692,718,726
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-recaps'
- assertVisible:
    id: 'tab-progress'
- assertVisible:
    id: 'tab-more'

# ── Visual integrity: parent Home current card structure ───────────────
- assertVisible:
    id: 'parent-home-screen'
- assertVisible:
    id: 'parent-home-child-starter-${CHILD_PROFILE_ID}'
- assertVisible:
    text: 'Children'

# 3. Verify child intent card is visible — wait for API data to load
- extendedWaitUntil:
    visible:
      text: 'Test Teen'
    timeout: 10000

# 4. Look for child card element via per-child parent Home testID
# CHILD_PROFILE_ID is injected by the seed-and-sign-in helper
- assertVisible:
    id: 'parent-home-check-child-${CHILD_PROFILE_ID}'

# 5. Tap on child card to view detail
- tapOn:
    id: 'parent-home-check-child-${CHILD_PROFILE_ID}'

# 6. Fallback: tap on child name text
- tapOn:
    text: 'Test Teen'
    optional: true # justified: text fallback fires only when testID-based tap in step 5 did not trigger navigation; Maestro has no if-else

# 7. Wait for child detail view
- extendedWaitUntil:
    visible:
      id: 'recent-sessions-list'
    timeout: 10000

# 8. Prove the seeded session loaded (the section also renders for loading,
#    error, and empty states, so its container alone is not a receipt).
- extendedWaitUntil:
    visible:
      id: 'session-card-${SESSION_ID}'
    timeout: 15000

# 9. Navigate back to parent Home
- tapOn:
    id: 'back-button'
    optional: true # justified: back-button only present when navigation into child detail succeeded; if fallback tap also missed, no back needed

# 10. Screenshot
- takeScreenshot: parent-dashboard-complete
