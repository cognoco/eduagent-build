# Flow N4: Parent Dashboard — View Children and Session Data
# Validates: parent user sees children list, can tap into child detail,
# and view session information.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with linked children who have sessions
#               (scenario: parent-with-children)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Wait for parent dashboard
# BUG-33 fix: parent persona routes to (parent)/dashboard with id: dashboard-scroll,
# NOT (learner)/home with id: learner-screen.
- extendedWaitUntil:
    visible:
      id: "dashboard-scroll"
    timeout: 15000

# ── Visual integrity: parent tab bar ───────────────────────────────────
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-library"
- assertVisible:
    id: "tab-more"

# ── Visual integrity: dashboard heading ────────────────────────────────
# Parent dashboard shows "Home" heading + "How your children are doing" subtitle.
- assertVisible:
    text: "Home"
- assertVisible:
    text: "How your children are doing"

# 3. Verify children list is visible — look for child display name
# optional: seed data may not yet be fetched from API when assertion runs
- extendedWaitUntil:
    visible:
      text: "Test Teen"
    timeout: 10000
    optional: true

# 4. Look for child card element
# optional: child-card testID only renders after familyLinks API returns data
- assertVisible:
    id: "child-card"
    optional: true

# 5. Tap on child card to view detail
# optional: depends on child-card rendering (step 4); if absent, step 6 is the fallback
- tapOn:
    id: "child-card"
    optional: true

# 6. Fallback: tap on child name text
# optional: fallback for step 5 — one of the two tap targets should succeed
- tapOn:
    text: "Test Teen"
    optional: true

# 7. Wait for child detail view
# optional: only reachable if step 5 or 6 succeeded (tap landed on a child card)
- extendedWaitUntil:
    visible:
      text: "Sessions"
    timeout: 10000
    optional: true

# 8. Verify session count or time information is visible
# optional: only reachable if child detail screen loaded (step 7)
- assertVisible:
    text: "sessions"
    optional: true

# 9. Navigate back to dashboard
# optional: back button only present if we navigated into child detail (step 7)
- tapOn:
    id: "back-button"
    optional: true

# 10. Screenshot
- takeScreenshot: parent-dashboard-complete
