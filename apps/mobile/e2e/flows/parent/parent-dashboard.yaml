# Flow N4: Parent Dashboard — View Children and Session Data
# Validates: parent user sees children list, can tap into child detail,
# and view session information.
# Tags: nightly, parent
#
# Journey: UX Journey 4 (Parent Oversight)
# Epics: Epic 5 (FR85-FR90)
# Prerequisite: Seeded parent user with linked children who have sessions
#               (scenario: parent-with-children)
appId: com.mentomate.app
tags:
  - nightly
  - parent
---
# 1. Seed & sign in as parent
- runFlow:
    file: ../_setup/seed-and-sign-in.yaml
    env:
      SEED_SCENARIO: "parent-with-children"
      API_URL: ${API_URL}

# 2. Parent owners land on ParentGateway; enter the Family dashboard.
- runFlow:
    file: ../_setup/open-family-dashboard.yaml

# ── Visual integrity: parent tab bar ───────────────────────────────────
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-library"
- assertVisible:
    id: "tab-more"
- assertVisible:
    id: "tab-family"

# ── Visual integrity: dashboard heading ────────────────────────────────
# Family dashboard shows the Family heading + hub subtitle.
- assertVisible:
    text: "Family"
- assertVisible:
    text: "Everyone you're learning alongside."

# 3. Verify children list is visible — wait for API data to load
- extendedWaitUntil:
    visible:
      text: "Test Teen"
    timeout: 10000

# 4. Look for child card element via per-child testID (dashboard-child-${profileId})
# CHILD_PROFILE_ID is injected by the seed-and-sign-in helper
- assertVisible:
    id: "dashboard-child-${CHILD_PROFILE_ID}"

# 5. Tap on child card to view detail
- tapOn:
    id: "dashboard-child-${CHILD_PROFILE_ID}"

# 6. Fallback: tap on child name text
# optional: only fires if testID-based tap in step 5 did not navigate (e.g. testID not rendered)
- tapOn:
    text: "Test Teen"
    optional: true

# 7. Wait for child detail view
- extendedWaitUntil:
    visible:
      text: "Sessions"
    timeout: 10000

# 8. Verify session count or time information is visible
- assertVisible:
    text: "sessions"

# 9. Navigate back to dashboard
# optional: back button only present if we navigated into child detail (step 7)
- tapOn:
    id: "back-button"
    optional: true

# 10. Screenshot
- takeScreenshot: parent-dashboard-complete
