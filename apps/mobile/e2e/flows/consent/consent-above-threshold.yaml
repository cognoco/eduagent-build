# Flow: Above Consent Threshold — No Consent Required
# Validates: creating a profile for a 17-year-old does NOT trigger consent.
# GDPR-everywhere: age >= 16 means no consent required (no location selector).
# Profile creation goes straight to the home/subject-creation flow.
# Tags: nightly, consent
#
# Journey: UX Journey 1 (Onboarding) — happy path without consent
# Epics: Epic 0, Epic 5
#
# Prerequisite: Seeded user with pre-profile scenario (Clerk user + account, no profile).
# Usage: ./scripts/seed-and-run.sh pre-profile flows/consent/consent-above-threshold.yaml
#
# Date picker: Android DatePickerDialog opens with default 2010-01-01.
# Tap year header → tap 2009 (age = 17, above threshold) → OK.
appId: com.mentomate.app
tags:
  - nightly
  - consent
---
# ============================================================
# SIGN IN (pre-profile: Clerk user + account, no profile)
# ============================================================
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}
- hideKeyboard

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}
- hideKeyboard

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000
- tapOn:
    id: "sign-in-button"

# ============================================================
# NAVIGATE TO CREATE PROFILE (pre-profile gate → Create)
# ============================================================
- runFlow:
    file: ../_setup/open-create-profile-from-gate.yaml

# ============================================================
# PROFILE FORM — set age to 17 (born 2009), no location needed
# ============================================================
# Enter display name
- tapOn:
    id: "create-profile-name"
- inputText: "Above Threshold Teen"
- hideKeyboard

# Open date picker
- tapOn:
    id: "create-profile-birthdate"

# Wait for date picker dialog
- extendedWaitUntil:
    visible:
      text: "OK"
    timeout: 5000

# Tap the year header "2010" to switch to year selection mode
- tapOn:
    id: "android:id/date_picker_header_year"

# 2009 should be visible in the initial year list, scrollUntilVisible as safety
- scrollUntilVisible:
    element:
      text: "2009"
    direction: UP
    timeout: 5000

# Tap year 2009 (age = 17 in 2026 → above both COPPA 13 and GDPR 16)
- tapOn:
    text: "2009"

# Confirm date selection
- tapOn:
    text: "OK"

# Verify date was set
- assertVisible:
    text: "January 1, 2009"

- takeScreenshot: above-threshold-01-date-set

# Persona auto-detection hint removed from UI (persona refactor) — date set above confirms age.

# Submit profile creation (GDPR-everywhere: age 17 >= 16 → no consent)
- tapOn:
    id: "create-profile-submit"

# ============================================================
# VERIFY: NO CONSENT SCREEN — lands on create-subject
# ============================================================
# After profile creation for age 17+ (no consent), the app creates the
# profile and redirects to create-subject (0 subjects). The profiles
# screen may flash briefly or be skipped entirely — timing varies.
# The key proof: landing on create-subject (not consent) confirms success.

- extendedWaitUntil:
    visible:
      id: "create-subject-name"
    timeout: 30000

# MANDATORY: Consent screen must NOT have appeared
- assertNotVisible:
    id: "consent-child-view"

- assertNotVisible:
    text: "One more step!"

- assertNotVisible:
    text: "Hang tight!"

- takeScreenshot: above-threshold-02-no-consent-create-subject
