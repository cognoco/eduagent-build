# Flow: Under-13 Profile Safety Floor
# Validates: creating a profile for a 12-year-old is rejected before any
# consent route. The separate consent-gdpr-under16 flow covers the supported
# 13–15-year-old consent journey.
# Tags: nightly, consent, coppa
#
# Journey: UX Journey 1 (Onboarding) + Consent Lifecycle
# Epics: Epic 0, Epic 5, Epic 10 (Story 10.10)
#
# Prerequisite: Seeded user with pre-profile scenario (Clerk user + account, no profile).
# Usage: ./scripts/seed-and-run.sh pre-profile flows/consent/consent-coppa-under13.yaml
#
# Date picker technique: Android native DatePickerDialog opens with default 2010-01-01.
# Tap year header → switch to year list → scroll down → tap 2014 → OK.
# Result: age = 12 → below the supported profile floor and rejected.
appId: com.mentomate.app
tags:
  - nightly
  - consent
  - coppa
---
# ============================================================
# SIGN IN (pre-profile: Clerk user + account, no profile)
# ============================================================
# Post 2026-05-27 welcome refactor: pm clear wipes preAuthIntroSeen.v1 so the
# app always opens on welcome-chooser, not sign-in. Walk chooser → cards →
# bridge → sign-in before waiting for sign-in-button.
- runFlow:
    file: ../_setup/nav-welcome-to-sign-in.yaml

- extendedWaitUntil:
    visible:
      id: 'sign-in-button'
    timeout: 120000

- tapOn:
    id: 'sign-in-email'
- inputText: ${EMAIL}
- hideKeyboard

- tapOn:
    id: 'sign-in-password'
- inputText: ${PASSWORD}
- hideKeyboard

- extendedWaitUntil:
    visible:
      id: 'sign-in-button'
    timeout: 10000
- tapOn:
    id: 'sign-in-button'

# ============================================================
# NAVIGATE TO CREATE PROFILE (pre-profile gate → Create)
# ============================================================
- runFlow:
    file: ../_setup/open-create-profile-from-gate.yaml

# ============================================================
# PROFILE FORM — set age to 12 (born 2014), no location needed
# ============================================================
# Enter display name
- tapOn:
    id: 'create-profile-name'
- inputText: 'COPPA Test Child'
- hideKeyboard

# Open date picker
- tapOn:
    id: 'create-profile-birthdate'

# Wait for date picker dialog (shows January 2010 calendar)
- extendedWaitUntil:
    visible:
      text: 'OK'
    timeout: 5000

# Tap the year header "2010" to switch to year selection mode
- tapOn:
    id: 'android:id/date_picker_header_year'

# Scroll down until 2014 is visible (initial list shows 2008-2015, scroll may overshoot)
- scrollUntilVisible:
    element:
      text: '2014'
    direction: DOWN
    timeout: 5000

# Tap year 2014 (age = 12 in 2026 → triggers COPPA)
- tapOn:
    text: '2014'

# Confirm date selection
- tapOn:
    text: 'OK'

# Verify date was set
- assertVisible:
    text: 'January 1, 2014'

- takeScreenshot: coppa-under13-01-date-set

# Persona auto-detection hint removed from UI (persona refactor) — date set above confirms age.

# Submit profile creation. The form must stay put and explain the hard floor.
- tapOn:
    id: 'create-profile-submit'

# The error is the positive safety receipt; absence of the consent view proves
# an unsupported child profile was not persisted and routed onward.
- extendedWaitUntil:
    visible:
      text: 'Learners must be at least 13 years old. Please choose an earlier birth date.'
    timeout: 10000

- assertVisible:
    text: 'Learners must be at least 13 years old. Please choose an earlier birth date.'

- assertNotVisible:
    id: 'consent-child-view'

- takeScreenshot: coppa-under13-02-age-floor
