# Flow: Consent Withdrawn Gate — Blocking Gate on Consent Withdrawal
# Validates: when a parent has withdrawn consent, the child's app access is
# fully blocked with an "Account deletion pending" gate. Verifies the gate
# message, optional switch-profile button, and sign-out returns to auth.
# Tags: nightly, consent, gdpr
#
# Journey: Consent Lifecycle (withdrawal / GDPR deletion)
# Epics: Epic 5 (COPPA/GDPR consent gating), UX Persona Walkthrough
# Prerequisite: Seeded user with WITHDRAWN consent status (scenario: consent-withdrawn-solo)
#
# NOTE: This flow does NOT use runFlow seed-and-sign-in because that flow
# waits for home-scroll-view — but the consent-withdrawn gate appears
# BEFORE the tab navigator loads, blocking all app access.
#
# Seeding is handled by seed-and-run.sh BEFORE Maestro starts.
# Credentials arrive as ${EMAIL} and ${PASSWORD} env vars.
# Usage: ./scripts/seed-and-run.sh consent-withdrawn-solo flows/consent/consent-withdrawn-gate.yaml
appId: com.mentomate.app
tags:
  - nightly
  - consent
  - gdpr
---
# 1. Wait for sign-in screen.
#    seed-and-run.sh already handled: pm clear, app launch, dev-client
#    launcher, bundle loading, and "Continue" overlay dismissal.
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

# 2. Sign in with seeded credentials (from seed-and-run.sh env vars)
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# Dismiss keyboard (pressKey: back — keyboard is open after inputText)
- pressKey: back

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# Dismiss keyboard (pressKey: back — keyboard is open after inputText)
- pressKey: back

# Wait for sign-in button to be visible after keyboard dismissal
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# 5. Wait for consent-withdrawn gate (NOT home screen — gate blocks access).
#    After sign-in, the app fetches profiles from API, checks consentStatus,
#    and renders the gate. This requires network round-trips, so allow 30s
#    on WHPX emulators where API calls can be slow.
- extendedWaitUntil:
    visible:
      id: "consent-withdrawn-gate"
    timeout: 30000

# 6. Verify gate heading (child-friendly copy for LEARNER persona)
- assertVisible:
    text: "Your account is being closed"

# 7. Verify withdrawal explanation (child-friendly copy for LEARNER persona)
- assertVisible:
    text: "Your parent or guardian has decided to close your account."
    optional: true

# 8. Verify deletion timeline message (child-friendly copy for LEARNER persona)
- assertVisible:
    text: "Your learning data will be removed in 7 days."
    optional: true

# 9. Screenshot of consent-withdrawn gate
- takeScreenshot: consent-withdrawn-gate

# 10. Verify switch-profile button (optional — only shows with 2+ profiles)
- assertVisible:
    id: "withdrawn-switch-profile"
    optional: true

# 11. Verify sign-out button
- assertVisible:
    id: "withdrawn-sign-out"

# 12. Tap sign out
- tapOn:
    id: "withdrawn-sign-out"

# 13. Verify return to auth screen
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 15000

# 14. Final screenshot — back at auth after sign-out
- takeScreenshot: consent-withdrawn-gate-signed-out
