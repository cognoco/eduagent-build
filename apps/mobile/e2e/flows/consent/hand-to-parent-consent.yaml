# Flow: Story 10.10 — "Hand to Your Parent" Consent Interstitial
# Validates: consent screen two-phase flow (child hand-off → parent form → success)
# Tags: nightly, consent, epic-10
#
# Journey: UX Journey 1 (Onboarding) + Consent Lifecycle
# Epics: Epic 10 (Story 10.10)
#
# Prerequisite: Seeded user with pre-profile scenario (Clerk user + account, no profile).
# After profile creation triggers COPPA/GDPR, the consent screen appears with the
# new hand-to-parent interstitial instead of the old direct-email form.
#
# Usage: ./scripts/seed-and-run.sh pre-profile flows/consent/hand-to-parent-consent.yaml
#
# NOTE: This flow verifies the two-phase consent UI introduced in Story 10.10.
# Uses the Session 22 date picker technique to select birth year 2014 (~12 years old),
# which triggers COPPA consent. All consent assertions are mandatory.
appId: com.mentomate.app
tags:
  - nightly
  - consent
  - epic-10
---
# ============================================================
# SIGN IN with seeded pre-profile credentials
# ============================================================

# 1. Wait for sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 120000

# 2. Sign in with seeded credentials
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}
- pressKey: back

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# ============================================================
# NAVIGATE TO CREATE PROFILE
# ============================================================

# 3. Pre-profile accounts land on CreateProfileGate, not tabs.
- runFlow:
    file: ../_setup/open-create-profile-from-gate.yaml

# ============================================================
# PROFILE CREATION — trigger consent
# ============================================================

# 6. Enter display name
- tapOn:
    id: "create-profile-name"
- inputText: "Consent Test Child"
- pressKey: Back

# 7. Open date picker and select child birth year (2014 = ~12 years old → triggers COPPA)
#    Session 22 technique: year header → year list → scroll → select → OK
- tapOn:
    id: "create-profile-birthdate"

# 7a. Switch to year list mode
- tapOn:
    id: "android:id/date_picker_header_year"

# 7b. Scroll to year 2014 in the year list
- scrollUntilVisible:
    element:
      text: "2014"
    direction: DOWN
    timeout: 10000

# 7c. Select year 2014
- tapOn:
    text: "2014"

# 7d. Confirm date selection
- tapOn:
    text: "OK"

# 8. Submit profile creation
- tapOn:
    id: "create-profile-submit"

# ============================================================
# PHASE 1: CHILD VIEW — "Hand to your parent" interstitial
# ============================================================

# 10. Verify child-facing hand-off screen appears
- extendedWaitUntil:
    visible:
      id: "consent-child-view"
    timeout: 15000

# 11. Verify child-friendly title
- assertVisible:
    text: "One more step!"

# 12. Verify hand-off instruction
#     Full text: "We need a grown-up to say it's OK. Hand your phone to your parent or guardian."
#     Maestro cannot match ANY substring of long wrapping text on Android (Issue 21, Pattern B).
#     Screen identity already verified by consent-child-view testID + "One more step!" heading.

# 13. Screenshot: child hand-off view
- takeScreenshot: hand-to-parent-01-child-view

# 14. Verify "I'm the parent / guardian" button is present
- assertVisible:
    id: "consent-handoff-button"

# 15. Tap the hand-off button to transition to parent view
- tapOn:
    id: "consent-handoff-button"

# ============================================================
# PHASE 2: PARENT VIEW — email form
# ============================================================

# 16. Verify parent-facing form appears
- extendedWaitUntil:
    visible:
      id: "consent-parent-view"
    timeout: 10000

# 17. Verify parent-facing title (professional, not child-friendly)
- assertVisible:
    text: "Parental Consent Required"

# 18. Verify spam warning text is present
#     Full text: "We'll send a one-time consent link. Check your spam folder if you don't see it within a few minutes."
#     Long wrapping text — Maestro Pattern B. Screen verified by consent-parent-view + title.

# 19. Screenshot: parent form view
- takeScreenshot: hand-to-parent-02-parent-view

# 20. Enter parent email
- tapOn:
    id: "consent-email"
- inputText: "parent-e2e@example.com"
- pressKey: back

# 21. Submit consent request
- tapOn:
    id: "consent-submit"

# ============================================================
# PHASE 3: SUCCESS VIEW
# ============================================================

# 22. Verify success state
- extendedWaitUntil:
    visible:
      id: "consent-success"
    timeout: 15000

# 23. Verify success message
#     "Consent link sent!" wraps on small viewports — Pattern B.
#     Success screen verified by consent-success testID.

# 24. Verify spam hint on success screen
#     Full text: "Check your inbox (and spam folder). The link expires in 7 days."
#     Long wrapping text — Maestro Pattern B. Success verified by consent-success + title.

# 25. Verify resend button is available
- assertVisible:
    id: "consent-resend-email"

# 26. Verify "Hand back to your child" / Done button is available
- assertVisible:
    id: "consent-done"

# 27. Screenshot: success view
- takeScreenshot: hand-to-parent-03-success

# 28. Tap Done to return
- tapOn:
    id: "consent-done"

# 29. Final screenshot
- takeScreenshot: hand-to-parent-04-complete
