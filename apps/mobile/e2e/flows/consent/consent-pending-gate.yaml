# Flow N6: Consent Pending Gate — UI Interactions and Preview Mode
# Validates: the consent pending gate blocks app access, preview modes
# (Browse Subjects, Sample Coaching) work correctly, and sign-out is available.
# Tags: nightly, consent
#
# Journey: Consent Lifecycle
# Epics: Epic 5 (COPPA/GDPR consent gating), UX Persona Walkthrough gaps
#
# Prerequisite: Seeded user with pending consent state (scenario: consent-pending).
# The seed creates: Clerk user + account + TEEN profile with
# consentStatus = 'PARENTAL_CONSENT_REQUESTED'. The learner layout renders
# ConsentPendingGate instead of tabs.
#
# Usage: ./scripts/seed-and-run.sh consent-pending flows/consent/consent-pending-gate.yaml
#
# NOTE: This flow does NOT use runFlow seed-and-sign-in because that flow
# waits for home-scroll-view — but the consent-pending gate appears BEFORE
# the tab navigator loads, blocking all app access.
appId: com.mentomate.app
tags:
  - nightly
  - consent
---
# ============================================================
# SIGN IN with seeded consent-pending credentials
# ============================================================

# 1. Wait for sign-in screen (seed-and-run.sh handles app launch + dev-client)
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 120000

# 2. Sign in with seeded credentials (from seed-and-run.sh env vars)
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}

# BUG-20: tap heading to dismiss keyboard instead of hideKeyboard
- tapOn:
    text: "Welcome back"

- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}

# BUG-20: dismiss keyboard
- tapOn:
    text: "Welcome back"

# Wait for sign-in button to be visible after keyboard dismissal
- extendedWaitUntil:
    visible:
      id: "sign-in-button"
    timeout: 10000

- tapOn:
    id: "sign-in-button"

# ============================================================
# CONSENT PENDING GATE — Core UI Verification
# ============================================================

# 3. Wait for consent pending gate (NOT home screen — gate blocks access).
#    After sign-in, the app fetches profiles, checks consentStatus, and
#    renders the gate. Allow 30s for WHPX emulator API latency.
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 30000

# 4. Verify heading text
- assertVisible:
    text: "Waiting for approval"

# 5. Verify informational message
- assertVisible:
    text: "Once they approve, you'll have full access."

# 6. Verify "Check again" button
- assertVisible:
    id: "consent-check-again"

# 7. Tap "Check again" — should refresh profiles but stay on gate
#    (consent is still pending)
- tapOn:
    id: "consent-check-again"

# 8. Wait briefly and verify we're still on the gate
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 10000

# 9. Screenshot after check-again
- takeScreenshot: consent-pending-gate-after-check

# ============================================================
# PREVIEW MODE — Browse Subjects
# ============================================================

# 10. Verify "Browse subjects" preview button is visible
- assertVisible:
    id: "preview-browse-subjects"

# 11. Tap "Browse subjects" to enter preview mode
- tapOn:
    id: "preview-browse-subjects"

# 12. Wait for PreviewSubjectBrowser to render
- extendedWaitUntil:
    visible:
      id: "preview-subject-browser"
    timeout: 5000

# 13. Verify preview subjects are shown (static list)
- assertVisible:
    text: "Browse Subjects"

- assertVisible:
    text: "Mathematics"

- assertVisible:
    text: "Science"

# 14. Verify the preview disclaimer
- assertVisible:
    text: "Here's a preview of what you can learn."

# 15. Screenshot of subject browser preview
- takeScreenshot: consent-preview-subject-browser

# 16. Tap "Back" to return to the pending gate
- tapOn:
    text: "Back"

# 17. Verify we're back on the consent pending gate
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 5000

# ============================================================
# PREVIEW MODE — Sample Coaching
# ============================================================

# 18. Verify "Sample coaching" preview button is visible
- assertVisible:
    id: "preview-sample-coaching"

# 19. Tap "Sample coaching" to enter preview mode
- tapOn:
    id: "preview-sample-coaching"

# 20. Wait for PreviewSampleCoaching to render
- extendedWaitUntil:
    visible:
      id: "preview-sample-coaching"
    timeout: 5000

# 21. Verify coaching preview content
- assertVisible:
    text: "How It Works"

- assertVisible:
    text: "Ready for homework?"

- assertVisible:
    text: "How your coach helps"

# 22. Verify the preview footer disclaimer
- assertVisible:
    text: "This is a preview. Full access unlocks after parent approval."

# 23. Screenshot of coaching preview
- takeScreenshot: consent-preview-sample-coaching

# 24. Tap "Back" to return to the pending gate
- tapOn:
    text: "Back"

# 25. Verify we're back on the consent pending gate
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 5000

# ============================================================
# SIGN OUT from consent pending gate
# ============================================================

# 26. Verify sign-out button is present
- assertVisible:
    id: "consent-sign-out"

# 27. Tap sign out
- tapOn:
    id: "consent-sign-out"

# 28. Verify we return to the auth/sign-in screen
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 15000

# 29. Final screenshot — back at auth screen after sign-out
- takeScreenshot: consent-pending-gate-signed-out
