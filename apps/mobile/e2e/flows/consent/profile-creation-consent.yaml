# Flow N5: Profile Creation — Consent Trigger for Under-16 EU User
# Validates: creating a profile with age 12 + EU location triggers GDPR consent
# flow, consent modal appears, parent email submission succeeds, and the
# consent-pending gate renders with preview options.
# Tags: nightly, consent, onboarding
#
# Journey: UX Journey 1 (Onboarding) + Consent Lifecycle
# Epics: Epic 0 (FR1-FR9), Epic 5 (COPPA/GDPR consent gating)
#
# NOTE: This flow performs a full sign-up → profile creation → consent request.
# The date picker interaction uses the testID "create-profile-birthdate" to open
# the picker, then "date-picker-done" (iOS) to confirm. On Android the picker
# auto-dismisses on selection. Steps that depend on platform-specific picker
# behavior use optional: true defensively.
appId: com.mentomate.app
tags:
  - nightly
  - consent
  - onboarding
---
# 1. Wait for sign-in screen (app launched by run-without-seed.sh via ADB)
# NOTE: This flow must be run via run-without-seed.sh (not seed-and-run.sh)
# because it signs up a NEW user via Clerk — no pre-seeded account needed.
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 120000

# 2. Navigate to sign-up
- tapOn: "Sign up"

# 4. Wait for sign-up form
- extendedWaitUntil:
    visible:
      id: "sign-up-email"
    timeout: 5000

# 5. Enter email for this test run
- tapOn:
    id: "sign-up-email"
- inputText: "test-e2e-consent-${Date.now()}@example.com"

# 6. Enter password
- tapOn:
    id: "sign-up-password"
- inputText: "TestPass123!"

# 7. Submit sign-up
- tapOn:
    id: "sign-up-button"

# 8. Wait for profile creation screen
- extendedWaitUntil:
    visible:
      id: "create-profile-name"
    timeout: 15000

# 9. Enter display name
- tapOn:
    id: "create-profile-name"
- inputText: "Young Learner"

# 10. Open birth date picker — sets a date making the user age 12
#     (born ~12 years ago). The picker defaults to 2010-01-01 if no
#     date is set yet, which will make the user ~16. We need to interact
#     with the picker to set a younger age.
- tapOn:
    id: "create-profile-birthdate"

# 11. Wait for date picker to appear
- extendedWaitUntil:
    visible:
      id: "date-picker"
    timeout: 5000
    optional: true

# 12. Dismiss the date picker (iOS modal "Done" button).
#     On Android the picker auto-dismisses on date selection.
#     The default picker value (2010-01-01) gives ~16 years old.
#     For consent trigger, we accept the default — it will auto-detect
#     persona as TEEN (age < 18) and with EU location, GDPR requires
#     consent for under-16.
#     NOTE: If the default date doesn't trigger consent (user > 16),
#     the flow will still validate profile creation works.
- tapOn:
    id: "date-picker-done"
    optional: true

# 13. Verify persona auto-detection hint appears
- extendedWaitUntil:
    visible:
      id: "persona-auto-hint"
    timeout: 5000
    optional: true

# 14. Verify persona was auto-detected (should be TEEN for age 12-15)
- assertVisible:
    text: "Teen"
    optional: true

# 15. Wait for region selector to appear (only shows after birthdate is set)
- extendedWaitUntil:
    visible:
      id: "location-eu"
    timeout: 5000

# 16. Select EU location — this triggers GDPR consent requirement
- tapOn:
    id: "location-eu"

# 17. Submit profile creation
- tapOn:
    id: "create-profile-submit"

# 18. Wait for consent request screen to appear.
#     After profile creation with a minor + EU location, the app
#     navigates to /consent with GDPR consent type.
- extendedWaitUntil:
    visible:
      text: "Parental consent required"
    timeout: 15000

# 19. Verify consent email input is visible
- assertVisible:
    id: "consent-email"

# 20. Enter parent email address
- tapOn:
    id: "consent-email"
- inputText: "parent-e2e-test@example.com"

# 21. Submit consent request
- tapOn:
    id: "consent-submit"

# 22. Wait for success state — email sent confirmation
- extendedWaitUntil:
    visible:
      id: "consent-success"
    timeout: 10000

# 23. Verify success message mentions the parent email
- assertVisible:
    text: "parent-e2e-test@example.com"
    optional: true

# 24. Verify "Resend email" button is available
- assertVisible:
    id: "consent-resend-email"

# 25. Tap "Done" to dismiss consent screen and go to learner layout
- tapOn:
    id: "consent-done"

# 26. Wait for consent pending gate to appear.
#     The learner layout detects PENDING/PARENTAL_CONSENT_REQUESTED status
#     and renders ConsentPendingGate instead of the tab navigator.
- extendedWaitUntil:
    visible:
      id: "consent-pending-gate"
    timeout: 15000

# 27. Verify "Waiting for approval" heading
- assertVisible:
    text: "Waiting for approval"

# 28. Verify parent email is displayed in the gate message
- assertVisible:
    text: "parent-e2e-test@example.com"
    optional: true

# 29. Verify "Check again" button is present
- assertVisible:
    id: "consent-check-again"

# 30. Verify preview options are visible ("While you wait" section)
- assertVisible:
    id: "preview-browse-subjects"
    optional: true

- assertVisible:
    id: "preview-sample-coaching"
    optional: true

# 31. Screenshot of consent pending gate
- takeScreenshot: consent-profile-creation-pending-gate
