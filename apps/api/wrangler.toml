# =============================================================================
# MentoMate API — Cloudflare Workers Configuration
# =============================================================================
#
# Account: Zwizzly (shared team account)
# The account_id is bound to a `__CF_ACCOUNT_ID__` placeholder so the literal
# does not live in the committed file — the matched pair of (committed CF
# account_id + leaked CF API token) would otherwise hand a targeted attacker
# a complete deploy lane. The placeholder is substituted at deploy time by
# `scripts/render-wrangler-kv.mjs` using the `CF_ACCOUNT_ID` secret
# (Doppler-managed, exposed to GitHub Actions). Pinning the account_id is
# still the policy — it prevents deploys landing on the wrong account when
# developers have access to multiple Cloudflare accounts — the pin just
# moved out of plaintext. [FCR-2026-05-23-L14.F7 / BUG-721]
#
# Secrets: Managed in Doppler (project: mentomate, configs: prd/stg/dev)
#          Synced to GitHub Actions via Doppler-GitHub integration.
#          For local dev: run `pnpm env:sync` to pull secrets from Doppler.
#
# Free plan (100K req/day) is fine for launch. The 10ms CPU time limit is
# per-request CPU only — I/O waits (Gemini, Neon, Resend, Voyage) don't count.
# If LLM routes hit "Worker exceeded CPU time limit" errors under load,
# upgrade to Workers Standard ($5/month, 30s CPU) — instant, no migration.
#
# Rate Limiting: Configure per-user rate limiting (target: 100 req/min per
# authenticated user) via Cloudflare dashboard → WAF → Rate Limiting Rules.
# This is NOT configured in wrangler.toml — it is a dashboard-level WAF rule.
# =============================================================================

name = "mentomate-api-dev"
account_id = "__CF_ACCOUNT_ID__"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# These vars have defaults in config.ts but can be overridden per environment:
#   APP_URL       = "https://www.mentomate.com"
#   LOG_LEVEL     = "info"          (debug | info | warn | error)
#   EMAIL_FROM    = "noreply@mentomate.com"

# =============================================================================
# Secrets — managed in Doppler, synced via Doppler-GitHub integration
# Never commit secret values. See Doppler project "mentomate" for all configs.
# =============================================================================
#
# --- Core ---
#   DATABASE_URL              Neon PostgreSQL connection string
#
# --- Auth (Clerk) ---
#   CLERK_SECRET_KEY          Clerk backend secret key
#   CLERK_PUBLISHABLE_KEY     Clerk publishable key
#   CLERK_JWKS_URL            Clerk JWKS endpoint URL for JWT verification
#   CLERK_AUDIENCE            (Optional) Expected JWT audience claim
#
# --- LLM Providers ---
#   GEMINI_API_KEY            Google Gemini API key (primary LLM provider)
#   VOYAGE_API_KEY            Voyage AI API key (embedding provider)
#
# --- Background Jobs (Inngest) ---
#   INNGEST_SIGNING_KEY       Inngest webhook signature verification key
#   INNGEST_EVENT_KEY         Inngest event ingestion key
#
# --- Payments (Stripe) ---
#   STRIPE_SECRET_KEY         Stripe backend secret key
#   STRIPE_WEBHOOK_SECRET     Stripe webhook endpoint signing secret
#   STRIPE_PRICE_PLUS_MONTHLY       Stripe Price ID for Plus monthly
#   STRIPE_PRICE_PLUS_YEARLY        Stripe Price ID for Plus yearly
#   STRIPE_PRICE_FAMILY_MONTHLY     Stripe Price ID for Family monthly
#   STRIPE_PRICE_FAMILY_YEARLY      Stripe Price ID for Family yearly
#   STRIPE_PRICE_PRO_MONTHLY        Stripe Price ID for Pro monthly
#   STRIPE_PRICE_PRO_YEARLY         Stripe Price ID for Pro yearly
#   STRIPE_CUSTOMER_PORTAL_URL      Stripe Customer Portal URL
#
# --- Email (Resend) ---
#   RESEND_API_KEY            Resend transactional email API key
#   RESEND_WEBHOOK_SECRET     Resend webhook signing secret
#
# --- Testing ---
#   TEST_SEED_SECRET          Shared secret for /__test/* routes (dev/staging only)
#
# --- Observability ---
#   SENTRY_DSN                Sentry error tracking DSN
#
# --- Prelaunch overrides ---
#   ALLOW_MISSING_IDEMPOTENCY_KV
#     Set to "true" only if production must launch before IDEMPOTENCY_KV is
#     bound. Production otherwise refuses traffic when the binding is missing.

# =============================================================================
# KV Namespaces (Zwizzly account)
# These are edge caches for subscription and coaching data.
#
# [FCR-2026-05-23-L14.F8] KV namespace IDs are infrastructure identifiers that
# reveal production KV topology when committed in plaintext. They are NOT
# committed here. The placeholders below (e.g. __SUBSCRIPTION_KV_DEV__) are
# substituted at deploy time by `scripts/render-wrangler-kv.mjs` using values
# from these Doppler-managed GitHub Actions secrets:
#   CF_KV_SUBSCRIPTION_ID_DEV / _STG / _PRD
#   CF_KV_COACHING_ID_DEV    / _STG / _PRD
# For local `wrangler dev`, run `pnpm env:sync` then
# `node scripts/render-wrangler-kv.mjs` (Doppler `dev` exposes the *_DEV vars).
# CI guard: `node scripts/render-wrangler-kv.mjs --check` fails if a real
# 32-hex KV namespace ID slips back into the committed file.
# =============================================================================

[[kv_namespaces]]
binding = "SUBSCRIPTION_KV"
id = "__SUBSCRIPTION_KV_DEV__"
# TODO [CFG-4]: Create a dedicated dev-preview KV namespace in Cloudflare dashboard
# (Workers & Pages → KV → Create → "SUBSCRIPTION_KV_preview") and add:
#   preview_id = "<new-namespace-id>"
# Until then, use `wrangler dev --local` (default) — never `wrangler dev --remote`.

[[kv_namespaces]]
binding = "COACHING_KV"
id = "__COACHING_KV_DEV__"
# TODO [CFG-4]: Same — create "COACHING_KV_preview" namespace and add preview_id.

# TODO [BUG-12]: Create "IDEMPOTENCY_KV" namespace in the Zwizzly Cloudflare
# account (Workers & Pages → KV → Create) and uncomment the binding below for
# all three environments. apps/api/src/routes/resend-webhook.ts:322 reads
# c.env.IDEMPOTENCY_KV for svix-id replay deduplication. Production env
# validation refuses traffic without this binding unless Doppler prd explicitly
# sets ALLOW_MISSING_IDEMPOTENCY_KV="true" as a prelaunch override.
#
# [[kv_namespaces]]
# binding = "IDEMPOTENCY_KV"
# id = "<replace-after-namespace-creation>"

# =============================================================================
# Staging Environment
# =============================================================================
# Deploy with: wrangler deploy --env staging
# Custom domain: api-stg.mentomate.com

[env.staging]
name = "mentomate-api-stg"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
routes = [
  { pattern = "api-stg.mentomate.com/*", zone_name = "mentomate.com" },
]

[env.staging.vars]
ENVIRONMENT = "staging"
APP_URL = "https://www.mentomate.com"
API_ORIGIN = "https://api-stg.mentomate.com"
LOG_LEVEL = "warn"
EMAIL_FROM = "staging-noreply@mentomate.com"

[[env.staging.kv_namespaces]]
binding = "SUBSCRIPTION_KV"
id = "__SUBSCRIPTION_KV_STG__"

[[env.staging.kv_namespaces]]
binding = "COACHING_KV"
id = "__COACHING_KV_STG__"

# TODO [BUG-12]: Add IDEMPOTENCY_KV staging binding once the namespace is
# created. Pre-launch posture: dedup is OFF, the missing binding fires an
# observability Inngest event on every request to confirm the gap.
# [[env.staging.kv_namespaces]]
# binding = "IDEMPOTENCY_KV"
# id = "<replace-after-namespace-creation>"

# =============================================================================
# Production Environment
# =============================================================================
# Deploy with: wrangler deploy --env production
# Custom domain: api.mentomate.com

[env.production]
name = "mentomate-api-prd"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [
  { pattern = "api.mentomate.com/*", zone_name = "mentomate.com" },
]

[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://www.mentomate.com"
API_ORIGIN = "https://api.mentomate.com"
LOG_LEVEL = "info"
EMAIL_FROM = "noreply@mentomate.com"

[[env.production.kv_namespaces]]
binding = "SUBSCRIPTION_KV"
id = "__SUBSCRIPTION_KV_PRD__"

[[env.production.kv_namespaces]]
binding = "COACHING_KV"
id = "__COACHING_KV_PRD__"

# TODO [BUG-12]: Add IDEMPOTENCY_KV production binding before any traffic that
# would re-trigger billing/consent side-effects on replay. If production must
# launch before this namespace exists, set ALLOW_MISSING_IDEMPOTENCY_KV="true"
# in Doppler prd and treat the resulting env-validation warning as a temporary
# launch exception. Once enabled, the Inngest signal
# app/resend-webhook.dedup_kv_missing should stop firing.
# [[env.production.kv_namespaces]]
# binding = "IDEMPOTENCY_KV"
# id = "<replace-after-namespace-creation>"
