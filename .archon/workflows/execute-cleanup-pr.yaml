name: execute-cleanup-pr
description: |
  Execute a cleanup-plan.md work package by PR number.
  Usage: archon workflow run execute-cleanup-pr --branch cleanup-pr-XX "PR-16"
  Input: PR identifier (e.g. "PR-08", "PR-15", "08", "15")
  Output: GitHub PR ready for human review.

  Flow:
  1. Parse cleanup-plan.md → extract phases, files, verification commands
  2. Install dependencies in worktree
  3. Implement each phase (fresh context per iteration, commit after each)
  4. Run project validation suite
  5. Parallel review on the local worktree branch (no PR yet):
     code review + test coverage + Codex adversarial
  6. Synthesize findings → fix CRITICAL/HIGH locally → commit (no push, no GitHub post)
  7. Push branch (single push) + create PR
  8. Post consolidated review + fix report as PR comments (now that the PR exists)
  9. Final summary

  Reviews + auto-fixes run BEFORE the PR is created so CI runs only once on the
  PR's initial state. The review commands are project-local overrides that use
  `git diff origin/main...HEAD` instead of `gh pr diff`. See `.archon/spike-plan.md`
  for the design rationale and the discipline contract governing this workflow
  during the spike.

  NOT for: Non-cleanup work, feature development, or PRs not in cleanup-plan.md.

provider: claude
model: claude-opus-4-6[1m]

worktree:
  enabled: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 0: INIT TRACING — Generate run ID, write project-scope
  # settings.json into worktree so Claude Code calls are tagged
  # claude-code-archon. Outputs the resource-attributes string
  # (codex variant) for downstream Codex nodes to use in env:.
  # ═══════════════════════════════════════════════════════════════

  - id: init-tracing
    command: archon-init-tracing
    context: fresh
    model: haiku

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: EXTRACT — Parse cleanup-plan.md for this PR
  # ═══════════════════════════════════════════════════════════════

  - id: extract
    command: cleanup-extract-pr
    depends_on: [init-tracing]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1b: INSTALL — Dependencies in worktree
  # Worktrees are bare checkouts. Install before implement so
  # pre-commit hooks and validation commands work.
  # ═══════════════════════════════════════════════════════════════

  # Install via command node (not bash) — bash nodes run in WSL on Windows,
  # which breaks path resolution in git worktrees.
  - id: install
    command: cleanup-install
    depends_on: [extract]
    context: fresh
    model: haiku

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: IMPLEMENT — Phase-by-phase loop with fresh context
  # Each iteration implements one phase, validates, and commits.
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    depends_on: [install]
    context: fresh
    idle_timeout: 600000
    loop:
      prompt: |
        # Cleanup PR Implementation — Phase Loop

        You are an autonomous coding agent. Your job: read the work order from disk, implement ONE phase, validate, commit, exit.

        ## Step 1: Load Context

        Read these files (they were written by the extract step):

        1. `$ARTIFACTS_DIR/work-order.md` — the full work order for this PR
        2. `$ARTIFACTS_DIR/progress.md` — which phases are done (may not exist on first iteration)
        3. `CLAUDE.md` — project conventions (CRITICAL — follow all rules)

        From the work order, extract:
        - The list of phases with their descriptions
        - Files-claimed for each phase
        - Verification commands from the Notes column
        - Any resolved decisions referenced by ID (D-XXX)

        ## Step 2: Select Next Phase

        Cross-reference `work-order.md` phases against `progress.md`.
        Pick the FIRST phase not yet marked COMPLETED.

        **If ALL phases are complete** → skip to Step 6.

        ## Step 3: Implement the Phase

        Read EVERY file you plan to change before editing. Follow CLAUDE.md rules exactly:
        - `@eduagent/schemas` is the shared contract — do not redefine types locally
        - Business logic in `services/`, not route handlers
        - Use `createScopedRepository(profileId)` for reads
        - Default exports only for Expo Router page components
        - Tests co-located with source files, no `__tests__/` folders

        Make the changes described in the phase. Be precise — the cleanup plan specifies
        exact files, exact renames, exact deletions.

        ## Step 4: Validate

        Run the phase-specific verification command from the work order Notes column.
        If no phase-specific command, run:

        ```bash
        pnpm exec nx run-many -t typecheck 2>&1 | tail -30
        ```

        **If validation fails**: fix the issue, re-run (up to 3 attempts). Do NOT commit broken code.

        ## Step 5: Commit

        **IMPORTANT: Do NOT use --no-verify.** Dependencies are installed. Let pre-commit hooks run.

        Stage and commit the phase's changes:

        ```bash
        git add -A
        git diff --cached --stat
        ```

        Write a conventional commit message:
        ```bash
        git commit -m "$(cat <<'EOF'
        refactor(<scope>): <phase description>

        Cleanup PR-XX Phase N: <brief details>
        See docs/audit/cleanup-plan.md for full context.

        Co-Authored-By: Claude <noreply@anthropic.com>
        EOF
        )"
        ```

        If the pre-commit hook fails:
        1. Read the error output carefully
        2. Fix the issue (lint error, type error, test failure). Do not fix by changing tests.
        3. Re-stage and retry the commit
        4. Do NOT bypass with --no-verify

        Then update progress tracking:

        Write/append to `$ARTIFACTS_DIR/progress.md`:
        ```
        ## Phase <N>: <title> — COMPLETED
        Date: <ISO date>
        Files: <list>
        Commit: <short hash>
        ---
        ```

        ## Step 6: Check Completion

        If ALL phases from the work order are now in progress.md as COMPLETED:
        - Output: <promise>ALL_PHASES_COMPLETE</promise>

        If phases remain, report which phase you just completed and end normally.
        The loop engine will start a fresh iteration for the next phase.

      until: ALL_PHASES_COMPLETE
      max_iterations: 15
      fresh_context: true

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: VALIDATE — Full project validation suite
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    command: cleanup-validate
    depends_on: [implement]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: PARALLEL REVIEW (on local worktree branch — no PR yet)
  # The review commands are project-local overrides that use
  # `git diff origin/main...HEAD` instead of `gh pr diff`.
  # ═══════════════════════════════════════════════════════════════

  - id: review-scope
    command: cleanup-pr-review-scope
    depends_on: [validate]
    context: fresh
    model: sonnet

  - id: code-review
    command: cleanup-code-review-agent
    depends_on: [review-scope]
    context: fresh
    model: sonnet

  - id: test-coverage
    command: cleanup-test-coverage-agent
    depends_on: [review-scope]
    context: fresh
    model: sonnet

  # Adversarial review by a different LLM (Codex / GPT).
  # cleanup-adversarial-review already supports the local-diff fallback
  # (`gh pr diff ... 2>/dev/null || git diff origin/main...HEAD`).
  # If Codex CLI is not installed, change provider to 'claude'
  # and model to 'sonnet' for a same-LLM adversarial pass.
  - id: adversarial-review
    command: cleanup-adversarial-review
    depends_on: [review-scope, init-tracing]
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: high
    context: fresh
    env:
      OTEL_RESOURCE_ATTRIBUTES: $init-tracing.output

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: SYNTHESIZE + FIX LOCALLY
  # synthesize creates the artifact only (no GitHub post yet).
  # fix-locally applies CRITICAL/HIGH fixes and commits to the
  # worktree branch (no push yet — push happens in Phase 6).
  # ═══════════════════════════════════════════════════════════════

  - id: synthesize
    command: cleanup-synthesize-review
    depends_on: [code-review, test-coverage, adversarial-review]
    trigger_rule: one_success
    context: fresh

  - id: fix-locally
    command: cleanup-fix-locally
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: PUSH + CREATE PR
  # Single push covers both the implement-loop commits and the
  # fix-locally commit, so CI runs only once.
  # ═══════════════════════════════════════════════════════════════

  # Push via command node (not bash) — bash nodes run in WSL on Windows,
  # which breaks git worktree path resolution. Command nodes use PowerShell.
  - id: push
    command: cleanup-push
    depends_on: [fix-locally]
    context: fresh
    model: sonnet

  - id: create-pr
    command: cleanup-create-pr
    depends_on: [push]
    context: fresh
    model: sonnet

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: POST REVIEW COMMENTS (PR now exists)
  # Posts the consolidated review + fix report as PR comments,
  # using the PR number written by cleanup-create-pr.
  # ═══════════════════════════════════════════════════════════════

  - id: post-review-comments
    command: cleanup-post-review-comments
    depends_on: [create-pr]
    context: fresh
    model: sonnet

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY
  # ═══════════════════════════════════════════════════════════════

  - id: summary
    command: archon-workflow-summary
    depends_on: [post-review-comments]
    context: fresh
    model: sonnet
