name: test-telemetry
description: |
  Minimal smoke-test workflow for verifying that `archon-init-tracing`
  correctly tags Claude Code and Codex traces with archon-specific
  resource attributes.

  Four nodes:
    1. init-tracing       — writes worktree-local .claude/settings.json AND
                            worktree-local .codex/config.toml so subsequent
                            CC and Codex calls inherit archon-specific env.
    2. claude-ping        — Claude Code call (trace should have
                            env=archon-test-telemetry).
    3. codex-ping         — Codex call via .codex/config.toml only (trace
                            should have env=archon-test-telemetry).
    4. codex-envvar-probe — Codex call with OTEL_RESOURCE_ATTRIBUTES set in
                            the env: block, in addition to config.toml.
                            Tests whether Codex reads that env var, which
                            decides whether the env: block on
                            adversarial-review in execute-cleanup-pr.yaml
                            is doing anything.

  Verification (after running):
    1. Open Logfire (zpm project).
    2. Filter:  WHERE env = 'archon-test-telemetry'
       — should match traces from BOTH ping nodes (CC and Codex).
    3. Pivot:   GROUP BY service.name
       — should show two rows:
           service.name=claude-code-plugin  (from claude-ping)
           service.name=codex_cli_rs        (from codex-ping)
    4. CC trace should also carry these attributes (set via the worktree
       .claude/settings.json's OTEL_RESOURCE_ATTRIBUTES):
           archon.run_id    — UUID written by init-tracing
           archon.workflow  — "test-telemetry"
           archon.repo      — repo basename (e.g. "Mentomate")
       (Codex trace cannot carry these until openai/codex#7821 lands;
        only the `env` attribute differentiates Codex archon traces.)
    5. Both ping traces should be filterable as a single run by
       (service.name × env) pivot — for now use timestamp-proximity to
       group them, since archon.run_id is CC-only.

  Usage:
    archon workflow run test-telemetry

  Performs no app code changes and creates no PR. Writes two scratch
  config files into the worktree (.claude/settings.json and
  .codex/config.toml) which are discarded with the worktree on cleanup.
  Safe to run as often as needed.

provider: claude
model: claude-haiku-4-5-20251001

# Worktree must be enabled — init-tracing writes project-scope config
# files (.claude/settings.json, .codex/config.toml) into <cwd>. With
# worktree disabled, those writes would land in the actual repo root
# and pollute the project (and contradict the "no code changes" promise).
worktree:
  enabled: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 0: INIT TRACING. Writes worktree-local config:
  #   <cwd>/.claude/settings.json   (Claude Code project-scope override)
  #   <cwd>/.codex/config.toml      (Codex project-scope override)
  # Both files set the `env` resource attribute to
  # "archon-test-telemetry" so all subsequent CC + Codex traces in this
  # run are filterable by  WHERE env = 'archon-test-telemetry'.
  # ═══════════════════════════════════════════════════════════════

  - id: init-tracing
    command: archon-init-tracing
    context: fresh
    model: haiku

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: CLAUDE PING. Trivial Claude Code call. Trace inherits the
  # worktree-scope settings.json from init-tracing → lands in Logfire
  # with service.name=claude-code-plugin (default), env=archon-test-telemetry,
  # plus archon.run_id, archon.workflow, archon.repo as resource attributes.
  # ═══════════════════════════════════════════════════════════════

  - id: claude-ping
    command: telemetry-claude-ping
    depends_on: [init-tracing]
    context: fresh
    model: haiku

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: CODEX PING. Trivial Codex call. Trace inherits the
  # worktree-scope .codex/config.toml from init-tracing → lands in
  # Logfire with service.name=codex_cli_rs (default) and
  # env=archon-test-telemetry. Per openai/codex#7821, custom resource
  # attributes (archon.run_id etc.) cannot be set on Codex traces
  # today — only the `env` field differentiates archon vs native.
  #
  # Note: NO `env:` block is needed here. Earlier versions of this
  # workflow set `OTEL_RESOURCE_ATTRIBUTES: $init-tracing.output`, but
  # Codex does not read that env var. The override happens via the
  # worktree-local config.toml that init-tracing wrote.
  # ═══════════════════════════════════════════════════════════════

  - id: codex-ping
    command: telemetry-codex-ping
    depends_on: [init-tracing]
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: low
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: CODEX ENVVAR PROBE. Distinct from codex-ping in exactly
  # one way: this node ALSO sets `OTEL_RESOURCE_ATTRIBUTES` via the
  # `env:` block, with a unique marker that does NOT appear anywhere
  # in `.codex/config.toml`. Whether that marker shows up on the
  # resulting trace decides one open question:
  #
  #   Does the Codex CLI honor `OTEL_RESOURCE_ATTRIBUTES` from the
  #   process environment, or is `.codex/config.toml` the only
  #   effective override mechanism?
  #
  # The marker chosen — archon.test_marker=envvar_propagated — is
  # a literal string (NOT an interpolation of $init-tracing.output)
  # so we can be certain about what we expect to see on the trace.
  #
  # This probe was added because an earlier assertion that "Codex
  # doesn't read OTEL_RESOURCE_ATTRIBUTES" was carried in code
  # comments without empirical verification. The result of running
  # this workflow tells us whether the env: block on
  # adversarial-review in execute-cleanup-pr.yaml is doing
  # anything or is dead code.
  # ═══════════════════════════════════════════════════════════════

  - id: codex-envvar-probe
    command: telemetry-codex-envvar-probe
    depends_on: [init-tracing]
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: low
    context: fresh
    env:
      OTEL_RESOURCE_ATTRIBUTES: archon.test_marker=envvar_propagated
