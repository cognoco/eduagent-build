name: execute-cleanup-pr-codex
description: |
  Execute a cleanup-plan.md work package by PR number.
  Usage: archon workflow run execute-cleanup-pr --branch cleanup-pr-XX "PR-16"
  Input: PR identifier (e.g. "PR-08", "PR-15", "08", "15")
  Output: GitHub PR ready for human review.

  Flow:
  1. Parse cleanup-plan.md → deterministic extraction (shell) with LLM fallback
  2. Install dependencies in worktree
  3. Implement each phase (fresh context per iteration, commit after each)
  4. Scope guard + validation suite
  5. Parallel review on the local worktree branch (no PR yet):
     code review + test coverage + Claude adversarial
  6. Synthesize findings (jq) → fix CRITICAL/HIGH locally → scope guard + re-validate
  7. Push branch (single push) + create PR (template)
  8. Post consolidated review + fix report as PR comments (now that the PR exists)
  9. Final summary (template)

  Reviews + auto-fixes run BEFORE the PR is created so CI runs only once on the
  PR's initial state. The review commands are project-local overrides that use
  `git diff origin/main...HEAD` instead of `gh pr diff`. See `.archon/spike-plan.md`
  for the design rationale and the discipline contract governing this workflow
  during the spike.

  NOT for: Non-cleanup work, feature development, or PRs not in cleanup-plan.md.

provider: codex
model: gpt-5.5
modelReasoningEffort: high

worktree:
  enabled: true

nodes:
  # ── PHASE 0: INIT ────────────────────────────────────────────────────

  - id: init-tracing
    bash: ./.archon/scripts/init-tracing.sh --workflow execute-cleanup-pr-codex "$ARGUMENTS"

  # ── PHASE 1: EXTRACT ─────────────────────────────────────────────────

  - id: extract
    depends_on: [init-tracing]
    bash: ./.archon/scripts/cleanup-extract.sh "$ARGUMENTS" "$ARTIFACTS_DIR"

  # ── PHASE 1b: INSTALL ────────────────────────────────────────────────

  - id: install
    depends_on: [extract]
    bash: |
      ./.archon/scripts/install.sh
      git rev-parse HEAD > "$ARTIFACTS_DIR/.pre-implement-sha"
      echo "Saved pre-implement SHA: $(cat "$ARTIFACTS_DIR/.pre-implement-sha")"

  # ── PHASE 1c: PLAN-REVIEW (pre-implement gate) ──────────────────────
  # Reads work-order.md and verifies claimed files exist on origin/main
  # and phase descriptions match real code structure. BLOCK does NOT halt
  # the workflow — it forces all reviewers to run later via risk-class.

  - id: plan-review
    command: cleanup-plan-review
    depends_on: [install]
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: medium

  # ── PHASE 2: IMPLEMENT ───────────────────────────────────────────────

  - id: implement
    depends_on: [plan-review]
    context: fresh
    idle_timeout: 600000
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: high
    loop:
      prompt: |
        Read and execute the instructions in `.archon/commands/cleanup-implement-phase.md`.
        The artifacts directory is: $ARTIFACTS_DIR
      until: ALL_PHASES_COMPLETE
      until_bash: |
        work_order_phases=$(rg --no-filename -oP '^### Phase \K[A-Z0-9]+[a-z]*(?=:)' \
          "$ARTIFACTS_DIR/work-order.md" | sort -u)
        done_phases=$(
            rg --no-filename -oP '^## Phase \K[A-Z0-9]+[a-z]*(?=:)' \
              "$ARTIFACTS_DIR/progress.md" 2>/dev/null
            rg --no-filename -oP '^## BLOCKED:\K[A-Z0-9]+[a-z]*$' \
              "$ARTIFACTS_DIR/blocked.md" 2>/dev/null
        )
        done_phases=$(echo "$done_phases" | sort -u)
        remaining=$(comm -23 <(echo "$work_order_phases") <(echo "$done_phases"))
        [[ -z "$remaining" ]]
      max_iterations: 15
      fresh_context: true

  # ── PHASE 2.5: SCOPE GUARD (post-implement) ──────────────────────────

  - id: scope-guard-post-implement
    depends_on: [implement]
    bash: ./.archon/scripts/cleanup-scope-guard.sh "$ARTIFACTS_DIR"

  # ── PHASE 3: VALIDATE ────────────────────────────────────────────────

  - id: validate
    command: cleanup-validate
    depends_on: [scope-guard-post-implement]
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: low

  # ── PHASE 3.5: RISK CLASSIFICATION ───────────────────────────────────
  # Emits 'tiny' | 'normal' | 'risky' to stdout based on diff stats,
  # sensitive-path matches, and plan-review verdict. Tiny PRs skip
  # code-review + test-coverage. Risky PRs always run all reviewers.

  - id: risk-class
    depends_on: [validate]
    bash: ./.archon/scripts/cleanup-risk-class.sh "$ARTIFACTS_DIR"

  # ── PHASE 4: PARALLEL REVIEW ──────────────────────────────────────────

  - id: review-scope
    command: cleanup-pr-review-scope
    depends_on: [risk-class]
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: medium

  - id: code-review
    command: cleanup-code-review-agent
    depends_on: [review-scope]
    when: "$risk-class.output != 'tiny'"
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: medium

  - id: test-coverage
    command: cleanup-test-coverage-agent
    depends_on: [review-scope]
    when: "$risk-class.output != 'tiny'"
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: medium

  - id: adversarial-review
    command: cleanup-adversarial-review
    depends_on: [review-scope]
    provider: claude
    model: claude-opus-4-6
    modelReasoningEffort: high
    context: fresh

  # ── PHASE 5: SYNTHESIZE + FIX ─────────────────────────────────────────

  - id: synthesize
    depends_on: [code-review, test-coverage, adversarial-review]
    trigger_rule: one_success
    bash: ./.archon/scripts/cleanup-synthesize.sh "$ARTIFACTS_DIR"

  - id: fix-locally
    command: cleanup-fix-locally
    depends_on: [synthesize]
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: high

  # ── PHASE 5.5: SCOPE GUARD + RE-VALIDATE (post-fix) ──────────────────

  - id: scope-guard-post-fix
    depends_on: [fix-locally]
    bash: ./.archon/scripts/cleanup-scope-guard.sh "$ARTIFACTS_DIR"

  - id: re-validate
    command: cleanup-validate
    depends_on: [scope-guard-post-fix]
    context: fresh
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: low

  # ── PHASE 6: PUSH + CREATE PR ─────────────────────────────────────────

  - id: push
    depends_on: [re-validate]
    bash: ./.archon/scripts/push.sh

  - id: create-pr
    depends_on: [push]
    bash: |
      ./.archon/scripts/cleanup-create-pr-body.sh "$ARTIFACTS_DIR"
      TITLE=$(cat "$ARTIFACTS_DIR/.pr-title" 2>/dev/null || echo "refactor: Cleanup PR")
      ./.archon/scripts/create-pr.sh "$ARTIFACTS_DIR/.pr-body.md" "$TITLE"

  # ── PHASE 7: POST REVIEW COMMENTS ─────────────────────────────────────

  - id: post-review-comments
    depends_on: [create-pr]
    bash: ./.archon/scripts/post-review-comments.sh "$ARTIFACTS_DIR"

  # ── PHASE 7.5: CI WATCH & AUTO-FIX ────────────────────────────────────
  # Watches GitHub CI on the just-pushed PR. If checks fail, classifies
  # them (gc1-ratchet/lint/typecheck/test/build/flake/code-review),
  # applies a targeted fix locally, re-validates, pushes, repeats.
  # Hard caps: max_iterations=3, same-failure-twice early stop.
  # On giveup: posts PR comment + files Notion P1.

  - id: ci-watch-and-fix
    depends_on: [post-review-comments]
    context: fresh
    idle_timeout: 1800000
    provider: codex
    model: gpt-5.5
    modelReasoningEffort: medium
    loop:
      prompt: |
        Read and execute the instructions in `.archon/commands/cleanup-ci-watch-and-fix.md`.
        Artifacts directory: $ARTIFACTS_DIR
      until: ALL_CHECKS_GREEN_OR_GIVEUP
      max_iterations: 3
      fresh_context: true

  # ── PHASE 8: SUMMARY ──────────────────────────────────────────────────

  - id: summary
    depends_on: [ci-watch-and-fix]
    bash: ./.archon/scripts/cleanup-summary.sh "$ARTIFACTS_DIR"
