assistants:
  claude:
    model: sonnet  # or 'opus', 'haiku', 'claude-*', 'inherit'
    settingSources:
      - project
      - user
  codex:
    model: gpt-5.5
    modelReasoningEffort: high  # 'minimal' | 'low' | 'medium' | 'high' | 'xhigh'
    webSearchMode: live           # 'disabled' | 'cached' | 'live'
    additionalDirectories:

worktree:
  baseBranch: main
  copyFiles:
    - .dev.vars
    # The cleanup plan is the source of truth for cleanup-PR workflows. We
    # want local edits to propagate to worktree runs without a main-merge
    # roundtrip — during the spike, the plan is effectively configuration.
    - docs/audit/cleanup-plan.md

# PATH for non-interactive bash nodes is set defensively at script
# invocation time by `.archon/scripts/_env.sh`, which every script in
# .archon/scripts/ sources. We deliberately do NOT use the project-level
# `env:` block here because Archon does not expand $HOME / $VAR in YAML
# values, so anything we wrote here would be hardcoded to one developer's
# machine. If pnpm is installed somewhere unusual, set PNPM_HOME before
# launching Archon and `_env.sh` will honor it.
