# ZDX configuration for the eduagent-build (MentoMate) repo.
# See: zdx/standard/README.md § How a project consumes the standard

zdx:
  version: 0.3.0

  work-items:
    # The single master ZDX Work Items DB across the estate. Per the ZDX
    # standard there is one master DB; project work is sliced by the Project
    # relation, and MentoMate is a project within the estate (conformance.md
    # § satellite-tracker pattern names the "MentoMate Bug Tracker" as a
    # satellite feeding this master). Confirm against the chosen test item.
    database_id: "f170be9e04ae45d4961828f2438666bd"
    data_source_id: "36fd1119-9955-4684-8bfe-deb145e6a21f"

    token:
      # Notion integration token, resolved from the NOTION_TOKEN env var
      # (fleet-standard secret name). Inject via `doppler run` (the repo's
      # secret store) or export it in the shell that launches the Archon run.
      env_var: NOTION_TOKEN

  # Command run by execute-workitem's setup-worktree node, after the
  # worktree is created and before plan/implement. Archon only does
  # `git worktree add` — dependency install and repo-local env
  # generation must happen here. `pnpm env:sync` runs setup-env.js,
  # which pulls dev secrets from Doppler (needs DOPPLER_TOKEN in env).
  setup:
    command: "pnpm install --frozen-lockfile && pnpm env:sync"

  # Command run by execute-workitem's validate / re-validate steps.
  # check-change-class.sh is the repo's change-aware validator
  # ("you touched X, run Y") — see docs/change-classes.md.
  # `--fast` skips the slow tier (integration tests, live-LLM eval
  # gates) for early trial runs — drop it once the pipeline is proven.
  validate:
    command: "bash scripts/check-change-class.sh --run --fast"
    # Selector for `doppler run` wrap applied by zdx-validate.sh and zdx-push.sh
    # when DOPPLER_TOKEN is present in the daemon's env. Lets test/hook child
    # processes see DATABASE_URL etc. without committing secrets or modifying
    # the daemon's env per-project. If omitted (or DOPPLER_TOKEN missing), the
    # wrap is silently skipped and the command runs without injected secrets.
    doppler:
      project: mentomate
      config: dev

  planning:
    # Directory where implementation plan documents are written (consumed by
    # the writing-plans skill). Naming: YYYY-MM-DD-<short-kebab-slug>.md.
    # The skill defaults to docs/plans/ when this key is absent.
    plan_dir: docs/plans

  conformance:
    deviations: []
