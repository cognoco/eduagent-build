name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      api_environment:
        description: 'API deploy environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - skip
      mobile_profile:
        description: 'Mobile EAS build profile'
        required: false
        default: 'skip'
        type: choice
        options:
          - skip
          - preview
          - production
      mobile_platform:
        description: 'Mobile target platform'
        required: false
        default: 'all'
        type: choice
        options:
          - android
          - ios
          - all

# Least-privilege default for every job. issues:write is granted per-job only
# to the three jobs whose failure-notification step creates a GitHub issue
# (api-deploy, api-smoke-test, api-production-smoke-test).
permissions:
  actions: read
  contents: read

# Never deploy in parallel — one deployment at a time
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # API: Cloudflare Workers deployment
  # ---------------------------------------------------------------------------

  # Push-to-main: lightweight lint+typecheck (CI ran full suite on PR).
  # Dispatch: full quality gate with unit + integration tests.
  api-quality-gate:
    name: API Quality Gate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.api_environment != 'skip')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      CI: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          filter: tree:0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      # CFG-12: use migrate (not push) so committed migration SQL is validated in quality gate.
      - name: Apply database migrations
        working-directory: packages/database
        run: pnpm exec drizzle-kit migrate

      - name: Lint
        run: pnpm exec nx run api:lint

      - name: Typecheck
        run: pnpm exec nx run api:typecheck

      - name: Unit tests
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec nx run api:test

      - name: Integration tests
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec nx run api:test:integration

  api-confirm-production:
    name: Confirm Production Deploy
    needs: api-quality-gate
    if: |
      github.event_name == 'workflow_dispatch' && inputs.api_environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production deployment confirmed
        run: echo "Production deployment approved via GitHub Environment protection rules."

  api-deploy:
    name: Deploy API (${{ github.event_name == 'push' && 'staging' || inputs.api_environment }})
    needs: [api-quality-gate, api-confirm-production]
    # Always require quality gate to pass before deploying.
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.api-quality-gate.result == 'success' &&
      (github.event_name == 'push' ||
       (needs.api-confirm-production.result == 'success' || needs.api-confirm-production.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}
    # issues:write for the "Notify on deploy failure" step (creates an issue).
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm exec nx run schemas:build

      - name: Build API
        run: pnpm exec nx run api:build

      # CFG-2 / BUG-782: DATABASE_URL is selected by deploy environment via separately
      # named secrets (DATABASE_URL_STAGING / DATABASE_URL_PRODUCTION) rather than a flat
      # `secrets.DATABASE_URL`. The flat name silently shared one URL across staging and
      # production deploys, allowing a staging deploy to run migrations on prod (and vice
      # versa). Selecting by event/input makes the target unambiguous in the YAML itself
      # and removes the dependency on whoever last set the repo-level fallback secret.
      # [CR-PR129-HIGH / BUG-241] Fail fast when the STAGING secret is empty
      # during a staging deploy. GitHub Actions' `cond && A || B` ternary
      # evaluates as `(cond && A) || B`, so an empty
      # `secrets.DATABASE_URL_STAGING` would silently fall through to
      # `DATABASE_URL_PRODUCTION` — i.e. a staging deploy could run
      # migrations on the production database. The downstream ternaries at
      # the env: blocks of the verify / migrate steps below share the same
      # evaluation pattern, so this Assert step is the single chokepoint that
      # protects all of them. Verify the intended secret was actually set
      # before any URL assignment is used.
      - name: Assert correct DATABASE_URL secret is set for deploy target
        env:
          IS_STAGING: ${{ github.event_name == 'push' || inputs.api_environment == 'staging' }}
          IS_PRODUCTION: ${{ github.event_name == 'workflow_dispatch' && inputs.api_environment == 'production' }}
          STAGING_SECRET_SET: ${{ secrets.DATABASE_URL_STAGING != '' }}
          PRODUCTION_SECRET_SET: ${{ secrets.DATABASE_URL_PRODUCTION != '' }}
          API_ENVIRONMENT: ${{ inputs.api_environment }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # [CR-PR129-NEW-6] Defensive guard: if IS_STAGING and IS_PRODUCTION are
          # both false, the downstream DATABASE_URL ternary falls through to
          # secrets.DATABASE_URL_PRODUCTION. This can happen if api_environment
          # is dispatched with an unrecognized value (typo, empty string, or a
          # value added to the workflow choices but not handled below). Fail
          # fast here rather than running migrations on production by accident.
          if [ "$IS_STAGING" != "true" ] && [ "$IS_PRODUCTION" != "true" ]; then
            echo "✗ Deploy target is neither staging nor production."
            echo "  event_name='${EVENT_NAME}' api_environment='${API_ENVIRONMENT}'"
            echo "  IS_STAGING='${IS_STAGING}' IS_PRODUCTION='${IS_PRODUCTION}'"
            echo "  The DATABASE_URL ternary would silently fall through to"
            echo "  secrets.DATABASE_URL_PRODUCTION, mis-migrating production."
            echo "  Accepted api_environment values: 'staging' | 'production' | 'skip'."
            exit 1
          fi
          if [ "$IS_STAGING" = "true" ] && [ "$STAGING_SECRET_SET" != "true" ]; then
            echo "✗ Staging deploy but secrets.DATABASE_URL_STAGING is empty or unset."
            echo "  The DATABASE_URL ternary would silently fall through to"
            echo "  secrets.DATABASE_URL_PRODUCTION, mis-migrating the wrong DB."
            echo "  Add DATABASE_URL_STAGING to GitHub Actions secrets."
            exit 1
          fi
          if [ "$IS_PRODUCTION" = "true" ] && [ "$PRODUCTION_SECRET_SET" != "true" ]; then
            echo "✗ Production deploy but secrets.DATABASE_URL_PRODUCTION is empty or unset."
            exit 1
          fi
          echo "✓ Expected secret is set for deploy target."

      - name: Verify deploy target before migrations
        env:
          DEPLOY_ENV: ${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}
          DATABASE_URL: ${{ (github.event_name == 'push' || inputs.api_environment == 'staging') && secrets.DATABASE_URL_STAGING || secrets.DATABASE_URL_PRODUCTION }}
          DATABASE_URL_STAGING_HOST: ${{ secrets.DATABASE_URL_STAGING_HOST }}
          DATABASE_URL_PRODUCTION_HOST: ${{ secrets.DATABASE_URL_PRODUCTION_HOST }}
        run: node packages/database/scripts/verify-db-target.mjs

      - name: Render Cloudflare identifiers into wrangler.toml
        # [FCR-2026-05-23-L14.F7/F8] Neither the CF account_id nor KV namespace
        # IDs are committed in plaintext. render-wrangler-kv.mjs substitutes
        # __CF_ACCOUNT_ID__ + __<BINDING>_<ENV>__ placeholders in wrangler.toml
        # with values from these Doppler-managed GitHub Actions secrets. A
        # missing required env var hard-fails this step so a stale/empty deploy
        # cannot silently target the wrong account or bind the wrong KV.
        working-directory: apps/api
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_SUBSCRIPTION_ID_DEV: ${{ secrets.CF_KV_SUBSCRIPTION_ID_DEV }}
          CF_KV_SUBSCRIPTION_ID_STG: ${{ secrets.CF_KV_SUBSCRIPTION_ID_STG }}
          CF_KV_SUBSCRIPTION_ID_PRD: ${{ secrets.CF_KV_SUBSCRIPTION_ID_PRD }}
          CF_KV_COACHING_ID_DEV: ${{ secrets.CF_KV_COACHING_ID_DEV }}
          CF_KV_COACHING_ID_STG: ${{ secrets.CF_KV_COACHING_ID_STG }}
          CF_KV_COACHING_ID_PRD: ${{ secrets.CF_KV_COACHING_ID_PRD }}
          CF_KV_IDEMPOTENCY_ID_DEV: ${{ secrets.CF_KV_IDEMPOTENCY_ID_DEV }}
          CF_KV_IDEMPOTENCY_ID_STG: ${{ secrets.CF_KV_IDEMPOTENCY_ID_STG }}
          CF_KV_IDEMPOTENCY_ID_PRD: ${{ secrets.CF_KV_IDEMPOTENCY_ID_PRD }}
        run: node scripts/render-wrangler-kv.mjs wrangler.toml

      - name: Verify Cloudflare KV bindings before migrations
        working-directory: apps/api
        run: |
          DEPLOY_ENV="${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}"
          node scripts/verify-wrangler-kv-binding.mjs wrangler.toml "${DEPLOY_ENV}" IDEMPOTENCY_KV

      # [db-migration Critical #1] Refuse to migrate a live DB while a journaled
      # migration is marked REFERENCE ONLY / DO NOT APPLY (today: 0106, 0107).
      # drizzle-kit ignores the SQL comment and would apply them; this guard
      # turns that silent catastrophe into a loud, safe failure until the
      # baseline reset (MMT-ADR-0012) removes them from the chain.
      # [WI-586] The same guard also blocks journaled FREEZE-ONLY migrations
      # (`-- @freeze-only`, e.g. the M-REPOINT / M-DROP cutover pair) unless the
      # explicit freeze signal ALLOW_FREEZE_MIGRATIONS=true is set for the run,
      # so a re-journaled freeze migration cannot auto-drop live tables.
      - name: Guard against reference-only and freeze-only migrations
        working-directory: packages/database
        run: node scripts/check-reference-only-migrations.mjs

      - name: Run database migrations
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ (github.event_name == 'push' || inputs.api_environment == 'staging') && secrets.DATABASE_URL_STAGING || secrets.DATABASE_URL_PRODUCTION }}
        run: |
          DEPLOY_ENV="${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}"
          echo "Running migrations on ${DEPLOY_ENV} database..."
          pnpm exec drizzle-kit migrate
          echo "✓ Database migrations applied"

      - name: Deploy to Cloudflare Workers
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DEPLOY_ENV="${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}"
          echo "Deploying API to ${DEPLOY_ENV}"
          pnpm exec wrangler deploy --env "${DEPLOY_ENV}" --var "DEPLOY_SHA:${GITHUB_SHA:0:8}"

      # [BUG-238] When the Doppler token is missing the sync step previously
      # degraded to a GitHub Actions warning and exited 0, leaving Worker
      # secrets stale — any value set in Doppler since the gap opened never
      # reached production. Silent stale-secret deploys are how billing
      # webhooks start failing in production without anyone knowing.
      #
      # New posture: a missing per-env token is a hard fail. Add the repo
      # secrets `DOPPLER_TOKEN_STG` and `DOPPLER_TOKEN_PRD` (config-scoped
      # Doppler service tokens — Developer plan does not have project-scoped
      # service accounts), or explicitly opt out of sync for this run by
      # setting the workflow secret `SKIP_DOPPLER_SYNC=true` AND running
      # `pnpm secrets:sync stg|prd` locally before triggering the deploy.
      - name: Sync secrets from Doppler to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DOPPLER_TOKEN_STG: ${{ secrets.DOPPLER_TOKEN_STG }}
          DOPPLER_TOKEN_PRD: ${{ secrets.DOPPLER_TOKEN_PRD }}
          SKIP_DOPPLER_SYNC: ${{ secrets.SKIP_DOPPLER_SYNC }}
        run: |
          if [ "${SKIP_DOPPLER_SYNC:-false}" = "true" ]; then
            echo "::warning title=Doppler→Worker sync explicitly skipped::SKIP_DOPPLER_SYNC=true was set as a workflow secret. Worker secrets were NOT synced — operator must have run \`pnpm secrets:sync\` locally for this deploy."
            exit 0
          fi
          DEPLOY_ENV="${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}"
          # Map wrangler env names to Doppler config short names + pick the per-config token.
          # Doppler Developer plan uses config-scoped service tokens (not project-scoped service
          # accounts), so each env carries its own secret. Production deploys will hard-fail until
          # DOPPLER_TOKEN_PRD is added — leaving that explicit so the gap surfaces at deploy time.
          case "$DEPLOY_ENV" in
            staging)    SYNC_TARGET="stg"; DOPPLER_TOKEN="${DOPPLER_TOKEN_STG:-}" ;;
            production) SYNC_TARGET="prd"; DOPPLER_TOKEN="${DOPPLER_TOKEN_PRD:-}" ;;
            *)          SYNC_TARGET="dev"; DOPPLER_TOKEN="" ;;
          esac
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error title=Doppler→Worker sync FAILED::DOPPLER_TOKEN_$(echo $SYNC_TARGET | tr a-z A-Z) is not set as a GitHub Actions secret. Worker secrets cannot be synced from Doppler (${SYNC_TARGET}), so this deploy would ship with stale secrets. Add the per-env service token to repo secrets, or set SKIP_DOPPLER_SYNC=true workflow secret after running \`pnpm secrets:sync ${SYNC_TARGET}\` locally."
            exit 1
          fi
          export DOPPLER_TOKEN
          echo "Syncing Doppler secrets (${SYNC_TARGET}) → Worker (${DEPLOY_ENV})"
          DOPPLER_VERSION="3.76.0"
          DOPPLER_ARCHIVE="doppler_${DOPPLER_VERSION}_linux_amd64.tar.gz"
          DOPPLER_SHA256="04f1ff30ed162d7af1dba7f11ad6a37ef35099de86a7ec6e261b64b1b337a3f3"
          curl -fsSLO "https://github.com/DopplerHQ/cli/releases/download/${DOPPLER_VERSION}/${DOPPLER_ARCHIVE}"
          echo "${DOPPLER_SHA256}  ${DOPPLER_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${DOPPLER_ARCHIVE}" -C /usr/local/bin doppler
          doppler --version
          pnpm secrets:sync "$SYNC_TARGET"

      # [BUG-953] Notify on deploy failure — creates a GitHub issue so silent
      # failures (like run 25225160580 which went unnoticed for 24h) surface
      # immediately without requiring anyone to check the Actions tab.
      - name: Notify on deploy failure
        if: failure()
        env:
          DEPLOY_ENV: ${{ github.event_name == 'push' && 'staging' || inputs.api_environment }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const deployEnv = process.env.DEPLOY_ENV || 'unknown';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.slice(0, 8);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failure: API ${deployEnv} (${sha})`,
              body: [
                `## Deploy Failed`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Environment | \`${deployEnv}\` |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Run | [View run](${runUrl}) |`,
                `| Triggered by | @${context.actor} |`,
                ``,
                `**Action required:** Check the run log above for the failing step, fix the root cause, and re-trigger the deploy.`,
                ``,
                `_This issue was created automatically by the Deploy workflow. Close it once the deploy succeeds._`,
              ].join('\n'),
              labels: ['deploy-failure', 'automated'],
            });

  # ---------------------------------------------------------------------------
  # API: Post-deploy smoke tests (staging only)
  # [BUG-952] Regressions like streamExchange 500 and outbox-spillover 404 were
  # only caught by manual UI testing. These smoke tests verify the staging worker
  # is actually serving valid responses after every deploy-to-staging.
  # ---------------------------------------------------------------------------

  api-smoke-test:
    name: Smoke Test — Staging API
    needs: api-deploy
    # Only run after a staging deploy (push-to-main always deploys staging;
    # manual dispatch to staging also qualifies). Skip for production deploys.
    if: |
      needs.api-deploy.result == 'success' &&
      (github.event_name == 'push' || inputs.api_environment == 'staging')
    runs-on: ubuntu-latest
    # issues:write for the "Notify on smoke-test failure" step (creates an issue).
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Resolve staging API URL
        id: resolve-url
        run: |
          # [FCR-2026-05-23-L14.F13] STAGING_API_URL is an optional GitHub Actions
          # secret. If unset the step uses the default custom domain below. Set the
          # secret only when the staging deployment target differs from the default
          # (e.g. during a domain migration or blue/green rollout). Document it in
          # docs/deployment-and-secrets.md under "GitHub Actions secrets".
          # Use the STAGING_API_URL secret if configured; default to the custom
          # domain routed in apps/api/wrangler.toml.
          if [ -n "${{ secrets.STAGING_API_URL }}" ]; then
            RESOLVED_URL="${{ secrets.STAGING_API_URL }}"
          else
            RESOLVED_URL="https://api-stg.mentomate.com"
          fi
          echo "url=${RESOLVED_URL}" >> "$GITHUB_OUTPUT"
          echo "Staging API URL: ${RESOLVED_URL}"

      - name: Smoke — GET /v1/health (200, status ok)
        id: smoke-health
        env:
          STAGING_API_URL: ${{ steps.resolve-url.outputs.url }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}: hitting ${STAGING_API_URL}/v1/health"
            HTTP_CODE=$(curl -s --max-time 15 -o /tmp/health.json -w "%{http_code}" \
              "${STAGING_API_URL}/v1/health") || HTTP_CODE=000
            echo "HTTP status: ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "✗ /v1/health returned ${HTTP_CODE} after 5 attempts"
              cat /tmp/health.json || true
              exit 1
            fi
            sleep 5
          done
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/health.json')).get('status',''))")
          echo "status field: ${STATUS}"
          if [ "${STATUS}" != "ok" ]; then
            echo "✗ /v1/health body.status = '${STATUS}', expected 'ok'"
            cat /tmp/health.json
            exit 1
          fi
          echo "✓ /v1/health OK"

      - name: Smoke — public consent handler check (expect 400 — not 404/5xx)
        id: smoke-consent-page
        env:
          STAGING_API_URL: ${{ steps.resolve-url.outputs.url }}
        run: |
          echo "Hitting ${STAGING_API_URL}/v1/consent-page (expect 400 from mounted handler for missing token)"
          HTTP_CODE=$(curl -s --max-time 15 -o /tmp/consent-page.html -w "%{http_code}" \
            "${STAGING_API_URL}/v1/consent-page")
          echo "HTTP status: ${HTTP_CODE}"
          # /v1/consent-page is public and reaches its route handler without
          # global auth short-circuiting. Missing token returns 400; 404 means
          # the route is not mounted, 000 is network failure, and 5xx is a worker
          # crash — all should fail the smoke check.
          if [ "${HTTP_CODE}" != "400" ]; then
            echo "✗ /v1/consent-page returned ${HTTP_CODE} — expected 400"
            cat /tmp/consent-page.html || true
            exit 1
          fi
          echo "✓ /v1/consent-page reached the mounted handler"

      - name: Smoke — sessions auth gate check (expect 401 — not 5xx/200)
        id: smoke-sessions
        env:
          STAGING_API_URL: ${{ steps.resolve-url.outputs.url }}
        run: |
          echo "Hitting ${STAGING_API_URL}/v1/sessions/resume-nudge (expect 401 from auth middleware)"
          HTTP_CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            "${STAGING_API_URL}/v1/sessions/resume-nudge")
          echo "HTTP status: ${HTTP_CODE}"
          # This proves the staging worker's auth layer rejects protected API
          # access and catches worker crashes. Route mounting is covered by the
          # public handler probe above and the static deploy.yml route tests.
          if [ "${HTTP_CODE}" != "401" ]; then
            echo "✗ /v1/sessions/resume-nudge returned ${HTTP_CODE} — expected 401"
            exit 1
          fi
          echo "✓ /v1/sessions/resume-nudge rejected unauthenticated access"

      # [BUG-953] Re-use the same failure notification pattern for smoke failures.
      - name: Notify on smoke test failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.slice(0, 8);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Smoke test failure: staging API (${sha})`,
              body: [
                `## Post-Deploy Smoke Test Failed`,
                ``,
                `The staging API deployed successfully but failed smoke tests, indicating a live regression.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Environment | \`staging\` |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Run | [View run](${runUrl}) |`,
                `| Triggered by | @${context.actor} |`,
                ``,
                `**Action required:** Check the run log for which smoke check failed, investigate the regression, fix and redeploy.`,
                ``,
                `_This issue was created automatically by the Deploy workflow. Close it once staging is healthy._`,
              ].join('\n'),
              labels: ['deploy-failure', 'smoke-test', 'automated'],
            });

  api-production-smoke-test:
    name: Smoke Test — Production API
    needs: api-deploy
    # Only run after an approved production deploy. Keep this read-only:
    # /v1/health proves the custom domain is routed to the fresh Worker and
    # env validation passed without exercising user data.
    if: |
      needs.api-deploy.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.api_environment == 'production'
    runs-on: ubuntu-latest
    # issues:write for the "Notify on smoke-test failure" step (creates an issue).
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Resolve production API URL
        id: resolve-url
        run: |
          # [FCR-2026-05-23-L14.F13] PRODUCTION_API_URL is an optional GitHub Actions
          # secret. If unset the step uses the default custom domain below. Set the
          # secret only when the production deployment target differs from the default
          # (e.g. during a domain migration or blue/green rollout). Document it in
          # docs/deployment-and-secrets.md under "GitHub Actions secrets".
          if [ -n "${{ secrets.PRODUCTION_API_URL }}" ]; then
            RESOLVED_URL="${{ secrets.PRODUCTION_API_URL }}"
          else
            RESOLVED_URL="https://api.mentomate.com"
          fi
          echo "url=${RESOLVED_URL}" >> "$GITHUB_OUTPUT"
          echo "Production API URL: ${RESOLVED_URL}"

      - name: Smoke — GET /v1/health (200, status ok)
        env:
          PRODUCTION_API_URL: ${{ steps.resolve-url.outputs.url }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}: hitting ${PRODUCTION_API_URL}/v1/health"
            HTTP_CODE=$(curl -s --max-time 15 -o /tmp/health.json -w "%{http_code}" \
              "${PRODUCTION_API_URL}/v1/health") || HTTP_CODE=000
            echo "HTTP status: ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "✗ /v1/health returned ${HTTP_CODE} after 5 attempts"
              cat /tmp/health.json || true
              exit 1
            fi
            sleep 5
          done
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/health.json')).get('status',''))")
          echo "status field: ${STATUS}"
          if [ "${STATUS}" != "ok" ]; then
            echo "✗ /v1/health body.status = '${STATUS}', expected 'ok'"
            cat /tmp/health.json
            exit 1
          fi
          echo "✓ /v1/health OK"

      - name: Notify on production smoke test failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.slice(0, 8);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Smoke test failure: production API (${sha})`,
              body: [
                `## Production Smoke Test Failed`,
                ``,
                `The production API deployed successfully but failed the read-only health check.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Environment | \`production\` |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Run | [View run](${runUrl}) |`,
                `| Triggered by | @${context.actor} |`,
                ``,
                `**Action required:** Check the run log, verify the custom domain route, and confirm production env validation passed.`,
                ``,
                `_This issue was created automatically by the Deploy workflow. Close it once production is healthy._`,
              ].join('\n'),
              labels: ['deploy-failure', 'smoke-test', 'production', 'automated'],
            });

  # ---------------------------------------------------------------------------
  # Mobile: EAS Build deployment
  # ---------------------------------------------------------------------------

  mobile-confirm-production:
    name: Confirm Production Build
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.mobile_profile == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production build confirmed
        run: echo "Production mobile build approved via GitHub Environment protection rules."

  mobile-deploy:
    name: Build Mobile (${{ inputs.mobile_profile }})
    needs: mobile-confirm-production
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.mobile_profile != 'skip' &&
      (needs.mobile-confirm-production.result == 'success' || needs.mobile-confirm-production.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 18.x
          packager: pnpm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        working-directory: apps/mobile
        run: |
          echo "Building profile: ${{ inputs.mobile_profile }}, platform: ${{ inputs.mobile_platform }}"
          eas build \
            --profile ${{ inputs.mobile_profile }} \
            --platform ${{ inputs.mobile_platform }} \
            --non-interactive
