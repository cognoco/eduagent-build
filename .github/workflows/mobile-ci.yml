name: Mobile CI

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/schemas/**'
      - '.github/workflows/mobile-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/schemas/**'
      - '.github/workflows/mobile-ci.yml'
  # Manual trigger for testing builds before merge
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      skip_tests:
        description: 'Skip lint and test (use for quick build verification)'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  # Check if mobile is actually affected by the changes
  check-affected:
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    outputs:
      mobile-affected: ${{ steps.check.outputs.affected }}
      native-changed: ${{ steps.native-check.outputs.native_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for comparison
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check if mobile affected
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "affected=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — treating mobile as affected"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}...HEAD"
          else
            BASE="HEAD~1 HEAD"
          fi

          changed_files=$(git diff --name-only $BASE)
          echo "Changed files:"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(apps/mobile/|packages/schemas/|\.github/workflows/mobile-ci\.yml$)'; then
            echo "affected=true" >> $GITHUB_OUTPUT
            echo "Mobile is affected"
          else
            echo "affected=false" >> $GITHUB_OUTPUT
            echo "Mobile is NOT affected"
          fi

      - name: Check for native changes
        id: native-check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — treating as native change"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}...HEAD"
          else
            BASE="HEAD~1 HEAD"
          fi

          changed_files=$(git diff --name-only $BASE)
          native_patterns="apps/mobile/app.json apps/mobile/package.json apps/mobile/eas.json"

          native_changed=false
          for pattern in $native_patterns; do
            if echo "$changed_files" | grep -q "^${pattern}$"; then
              native_changed=true
              echo "Native change detected: $pattern"
            fi
          done

          if echo "$changed_files" | grep -Eq '^apps/mobile/(plugins|android|ios)/'; then
            native_changed=true
            echo "Native change detected in plugins/android/ios directory"
          fi

          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"

  # Lint mobile code
  lint:
    needs: check-affected
    if: |
      (github.event_name != 'workflow_dispatch' && needs.check-affected.outputs.mobile-affected == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests != true)
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run mobile lint
        run: pnpm exec eslint -c apps/mobile/eslint.config.mjs apps/mobile

  # Test mobile code
  test:
    needs: check-affected
    if: |
      (github.event_name != 'workflow_dispatch' && needs.check-affected.outputs.mobile-affected == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests != true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run mobile tests
        run: pnpm test:mobile:unit

  # Build preview APK on merge to main — only when native files changed.
  # JS-only changes are delivered via OTA update (ci.yml ota-update job).
  build-preview:
    needs: [check-affected, lint, test]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-affected.outputs.mobile-affected == 'true' &&
      needs.check-affected.outputs.native-changed == 'true'
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.x
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android preview APK
        working-directory: apps/mobile
        run: eas build --profile preview --platform android --non-interactive

  # Manual build - triggered via workflow_dispatch
  build-manual:
    needs: [check-affected, lint, test]
    # Run on manual trigger; always() ensures we evaluate even if lint/test were skipped
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.skip_tests == true || (needs.lint.result == 'success' && needs.test.result == 'success'))
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.x
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        working-directory: apps/mobile
        run: |
          echo "Building with profile: ${{ inputs.profile }}, platform: ${{ inputs.platform }}"
          eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive
