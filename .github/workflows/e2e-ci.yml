name: E2E Tests

on:
  # Gate behind CI: only run E2E after lint/test/typecheck pass.
  # Saves CI minutes by skipping expensive E2E when basic checks fail.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    # Nightly run — smoke + nightly flows at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

# Cancel in-progress E2E runs when a new commit is pushed to the same PR.
# Prevents wasting CI minutes on outdated commits.
concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  # ─── Gate: classify changed files and decide which E2E suites to run ───
  #
  # workflow_run fires for every CI completion (no path filter available).
  # This job does fine-grained analysis: test files, docs, configs, and
  # test-only packages are ignored. Only runtime source changes trigger E2E.
  check-changes:
    name: Determine E2E scope
    # Skip if CI failed (workflow_run trigger only)
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      run-api-e2e: ${{ steps.analyze.outputs.run-api-e2e }}
      run-mobile-e2e: ${{ steps.analyze.outputs.run-mobile-e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Analyze changed file types
        id: analyze
        run: |
          # Schedule and manual dispatch always run everything
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run-api-e2e=true" >> "$GITHUB_OUTPUT"
            echo "run-mobile-e2e=true" >> "$GITHUB_OUTPUT"
            echo "Trigger: ${{ github.event_name }} — running all E2E suites"
            exit 0
          fi

          # workflow_run: diff against PR base or previous commit
          if [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            PR_BASE="${{ github.event.workflow_run.pull_requests[0].base.ref }}"
            if [ -n "$PR_BASE" ]; then
              git fetch origin "$PR_BASE"
              BASE="origin/$PR_BASE"
            else
              BASE="HEAD~1"
            fi
          else
            BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" HEAD)

          echo "=== Changed files ==="
          echo "$FILES"
          echo ""

          RUN_API=false
          RUN_MOBILE=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            # ── Skip: files that never affect runtime behavior ──
            case "$f" in *.test.ts|*.test.tsx|*.spec.ts|*.spec.tsx) continue ;; esac
            case "$f" in *.md|docs/*) continue ;; esac
            case "$f" in
              tsconfig*.json|.eslintrc*|.prettierrc*|.lintstagedrc*) continue ;;
              jest.config.*|babel.config.*|metro.config.*) continue ;;
              scripts/*|.vscode/*|.idea/*|.claude/*) continue ;;
            esac
            case "$f" in packages/factory/*|packages/test-utils/*) continue ;; esac
            case "$f" in tests/integration/*) continue ;; esac

            # ── Classify runtime source by domain ──
            case "$f" in
              apps/api/src/*|packages/database/src/*)
                RUN_API=true ;;
              apps/mobile/src/*|apps/mobile/app.json|apps/mobile/e2e/*)
                RUN_MOBILE=true ;;
              packages/schemas/src/*|packages/retention/src/*)
                RUN_API=true; RUN_MOBILE=true ;;
              pnpm-lock.yaml|apps/mobile/package.json|apps/api/package.json)
                RUN_API=true; RUN_MOBILE=true ;;
              .github/workflows/e2e-ci.yml)
                RUN_API=true; RUN_MOBILE=true ;;
            esac
          done <<< "$FILES"

          echo "run-api-e2e=$RUN_API" >> "$GITHUB_OUTPUT"
          echo "run-mobile-e2e=$RUN_MOBILE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Decision: API=$RUN_API  Mobile=$RUN_MOBILE ==="

  api-integration:
    name: API Integration Tests
    needs: check-changes
    # Only run on schedule/dispatch — ci.yml already covers integration tests on PR/push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Advisory — does not block PR merge
    continue-on-error: true
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd "pg_isready -U eduagent -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      # CFG-12: Intentionally using db:push here (not migrate). Reason: this is the
      # scheduled/manual E2E suite; migration validation is covered by ci.yml on every PR.
      # db:push is also required here because pnpm strict isolation prevents drizzle-kit
      # from finding @neondatabase/serverless — falling back to its built-in pg driver via push.
      - name: Apply database schema
        run: pnpm --filter @eduagent/database db:push

      - name: Run API integration tests
        run: pnpm exec jest --config tests/integration/jest.config.cjs --maxWorkers=2

  mobile-maestro:
    name: Mobile Maestro E2E Tests
    needs: check-changes
    if: needs.check-changes.outputs.run-mobile-e2e == 'true'
    runs-on: ubuntu-latest
    # Advisory — does not block merge
    continue-on-error: true
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd "pg_isready -U eduagent -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      MAESTRO_CLI_NO_ANALYTICS: 1
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      NODE_ENV: test
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
      # Expo inlines EXPO_PUBLIC_* vars at JS bundle time.
      # Clerk publishable key is needed for auth screens to render.
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filter: tree:0

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── APK cache: skip the ~20 min native build when native config is unchanged ──
      # Key covers ONLY native-affecting files (not JS source). On cache hit,
      # we re-bundle fresh JS and inject it into the cached APK, saving ~15 min.
      - name: Cache debug APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-debug-${{ hashFiles('apps/mobile/app.json', 'apps/mobile/package.json', 'apps/mobile/plugins/**', 'apps/mobile/assets/**', 'pnpm-lock.yaml') }}

      # --- Phase 1: strict pnpm install + schema push ---
      # db:push MUST run before shamefully-hoist. In strict mode, pnpm
      # isolates drizzle-kit so it can't find @neondatabase/serverless
      # (which only supports Neon's WebSocket protocol, not plain PostgreSQL).
      # This lets drizzle-kit fall back to its built-in pg driver.
      - run: pnpm install

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Apply database schema
        run: pnpm --filter @eduagent/database db:push

      # --- Phase 2: hoisted install for React Native native builds ---
      # Gradle runs `node` scripts that expect flat node_modules.
      # pnpm's default isolated layout breaks this. Hoist only in CI.
      - name: Configure pnpm for native builds
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: echo "shamefully-hoist=true" > .npmrc

      - name: Install (hoisted for native build)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: pnpm install

      # Build workspace deps that the mobile app imports at prebuild time
      - name: Build schemas package
        run: pnpm exec tsc --build packages/schemas/tsconfig.lib.json

      # Write .dev.vars so wrangler dev can pass secrets into the Workers runtime.
      # wrangler dev runs in an isolated V8 sandbox — it does NOT inherit shell
      # env vars. It reads non-secret bindings from wrangler.toml [vars] and
      # secret bindings from .dev.vars in the project directory.
      - name: Write wrangler .dev.vars for API
        run: |
          printf "DATABASE_URL=%s\nNODE_ENV=test\nTEST_SEED_SECRET=%s\n" "$DATABASE_URL" "$TEST_SEED_SECRET" > apps/api/.dev.vars
        env:
          TEST_SEED_SECRET: ${{ secrets.TEST_SEED_SECRET }}

      # Start API server in background (NODE_ENV=test enables __test/* routes)
      - name: Start API server (background)
        run: |
          pnpm --dir apps/api exec wrangler dev &
          echo "Waiting for API server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/v1/health > /dev/null 2>&1; then
              echo "API server ready"
              break
            fi
            sleep 1
          done

      # ── Native build steps — SKIPPED when APK is cached ──

      # Generate native Android project from Expo config
      - name: Expo prebuild (Android)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      # Cache Gradle build outputs to avoid 25-minute native recompilation.
      # Key includes gradle files + native dependency versions so cache
      # invalidates when native deps change.
      - name: Cache Gradle build
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json', 'apps/mobile/android/build.gradle', 'apps/mobile/android/app/build.gradle', 'apps/mobile/android/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # expo-router's _ctx*.js files use require.context(process.env.EXPO_ROUTER_APP_ROOT).
      # require.context is evaluated at COMPILE TIME by Metro's static analysis —
      # it rejects dynamic expressions like process.env.*. The full Expo CLI
      # pipeline has a Babel plugin that replaces these with string literals,
      # but export:embed skips that step. We must inline them ourselves.
      - name: Patch expo-router context files for offline bundling
        run: |
          # require.context resolves paths relative to the FILE that contains
          # the call, not relative to projectRoot. In the pnpm store, _ctx.android.js
          # lives deep in node_modules/.pnpm/expo-router@.../node_modules/expo-router/,
          # so a relative "./src/app" would resolve to a non-existent directory there.
          # Use an absolute path instead — require.context is compile-time only,
          # so the absolute CI path is resolved by Metro during bundling and never
          # evaluated on the device at runtime.
          APP_ROOT="$(cd apps/mobile && pwd)/src/app"
          echo "Patching EXPO_ROUTER_APP_ROOT → $APP_ROOT"
          find node_modules/.pnpm -path "*/expo-router/_ctx*.js" -exec \
            sed -i "s|process\.env\.EXPO_ROUTER_APP_ROOT|\"$APP_ROOT\"|g" {} +
          find node_modules/.pnpm -path "*/expo-router/_ctx*.js" -exec \
            sed -i 's|process\.env\.EXPO_ROUTER_IMPORT_MODE|"lazy"|g' {} +
          # Verify the patch worked
          echo "--- Patched _ctx.android.js (first match) ---"
          find node_modules/.pnpm -path "*/expo-router/_ctx.android.js" -exec head -3 {} \; -quit

      # Bundle JS into the APK so the app works without a Metro dev server.
      # Debug builds normally fetch JS from Metro at runtime, but in CI
      # there is no Metro server. Pre-bundling embeds the JS in the APK.
      #
      # Key decisions:
      # - Direct node path (not npx expo): npx resolves to the hoisted
      #   binary at workspace root, making Metro use the wrong project root.
      #   The direct path + working-directory keeps cwd = apps/mobile.
      # - --dev false: dev mode tries to open DevTools WebSocket connections
      #   which crash in embedded (offline) APKs.
      - name: Bundle JS for offline APK
        working-directory: apps/mobile
        run: |
          mkdir -p android/app/src/main/assets

          node ../../node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --dev false \
            --entry-file "$(pwd)/index.js" \
            --bundle-output "$(pwd)/android/app/src/main/assets/index.android.bundle" \
            --assets-dest "$(pwd)/android/app/src/main/res"

      # ── On cache HIT: swap fresh JS into the cached APK ──
      # The cached APK has stale JS. Replace the bundle inside the ZIP
      # and re-sign with a debug key so Android accepts it.
      - name: Inject fresh JS into cached APK
        if: steps.apk-cache.outputs.cache-hit == 'true'
        run: |
          APK="$(pwd)/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          BUNDLE="$(pwd)/apps/mobile/android/app/src/main/assets/index.android.bundle"

          echo "APK size before: $(stat -c%s "$APK") bytes"

          # Replace JS bundle inside the APK (it's a ZIP archive).
          # Use WORK_DIR (not TMPDIR) to avoid shadowing the POSIX temp
          # directory variable used by keytool/apksigner (#10).
          WORK_DIR=$(mktemp -d)
          mkdir -p "$WORK_DIR/assets"
          cp "$BUNDLE" "$WORK_DIR/assets/index.android.bundle"
          (cd "$WORK_DIR" && zip "$APK" assets/index.android.bundle)
          rm -rf "$WORK_DIR"

          # zipalign MUST run BEFORE apksigner — signing invalidates
          # alignment and alignment invalidates signatures. On API 30+
          # misalignment causes INSTALL_FAILED_INVALID_APK (#9).
          ZIPALIGN=$(find "$ANDROID_SDK_ROOT/build-tools" -name "zipalign" -type f | sort -V | tail -1)
          echo "Using zipalign: $ZIPALIGN"
          "$ZIPALIGN" -f -v 4 "$APK" "${APK}.aligned"
          mv "${APK}.aligned" "$APK"

          # Re-sign with debug key (apksigner handles v1+v2+v3 schemes)
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" sign --ks ~/.android/debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android "$APK"

          echo "APK size after: $(stat -c%s "$APK") bytes"

      # ── On cache MISS: full native build ──
      # Compile debug APK via Gradle (includes the pre-bundled JS)
      - name: Build debug APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Test execution — always runs ──

      - name: Cache Maestro CLI
        id: maestro-cache
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Enable KVM for hardware-accelerated Android emulator (10x faster boot)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            adb install apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

            # Wait for app to be fully launchable, then take a diagnostic screenshot
            sleep 5
            adb shell am start -n com.mentomate.app/.MainActivity
            sleep 15
            mkdir -p maestro-screenshots
            adb exec-out screencap -p > maestro-screenshots/pre-test-app-state.png || true

            maestro test apps/mobile/e2e/flows/ --include-tags=${{ github.event_name == 'schedule' && 'smoke,nightly' || github.event_name == 'workflow_dispatch' && 'smoke,nightly' || 'smoke' }} --output maestro-screenshots/ || MAESTRO_EXIT=$?

            # Capture final screen state and logcat on failure.
            # android-emulator-runner splits script lines into separate shell
            # invocations, so if/fi blocks don't work. Use inline conditionals.
            test "${MAESTRO_EXIT:-0}" -ne 0 && adb exec-out screencap -p > maestro-screenshots/failure-final-state.png || true
            test "${MAESTRO_EXIT:-0}" -ne 0 && adb logcat -d -t 500 > maestro-screenshots/logcat.txt || true
            exit ${MAESTRO_EXIT:-0}
        env:
          API_URL: http://10.0.2.2:8787

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: maestro-screenshots/
          retention-days: 7
