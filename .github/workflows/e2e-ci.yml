name: E2E Tests

on:
  # Gate behind CI: only run E2E after lint/test/typecheck pass.
  # Saves CI minutes by skipping expensive E2E when basic checks fail.
  workflow_run:
    workflows: ['CI']
    types: [completed]
  schedule:
    # Nightly run — smoke + nightly flows at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      maestro_suite:
        description: Maestro suite to execute
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - pr
          - v2

# Cancel in-progress E2E runs when a new commit is pushed to the same PR.
# Prevents wasting CI minutes on outdated commits.
concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  # ─── Gate: classify changed files and decide which E2E suites to run ───
  #
  # workflow_run fires for every CI completion (no path filter available).
  # This job does fine-grained analysis: test files, docs, configs, and
  # test-only packages are ignored. Only runtime source changes trigger E2E.
  check-changes:
    name: Determine E2E scope
    # Skip if CI failed (workflow_run trigger only)
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      run-api-e2e: ${{ steps.analyze.outputs.run-api-e2e }}
      run-mobile-e2e: ${{ steps.analyze.outputs.run-mobile-e2e }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Analyze changed file types
        id: analyze
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            echo "run-api-e2e=false" >> "$GITHUB_OUTPUT"
            echo "run-mobile-e2e=false" >> "$GITHUB_OUTPUT"
            echo "Skipping secret-backed E2E for pull_request workflow_run; use workflow_dispatch after review."
            exit 0
          fi

          # Schedule and manual dispatch always run everything
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run-api-e2e=true" >> "$GITHUB_OUTPUT"
            echo "run-mobile-e2e=true" >> "$GITHUB_OUTPUT"
            echo "Trigger: ${{ github.event_name }} — running all E2E suites"
            exit 0
          fi

          # workflow_run (non-pull_request): diff against previous commit
          # C1: no base.ref interpolation here — BASE is HEAD~1 (safe)
          BASE="HEAD~1"
          FILES=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" HEAD)

          echo "=== Changed files ==="
          echo "$FILES"
          echo ""

          RUN_API=false
          RUN_MOBILE=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            # ── Skip: files that never affect runtime behavior ──
            case "$f" in *.test.ts|*.test.tsx|*.spec.ts|*.spec.tsx) continue ;; esac
            case "$f" in *.md|docs/*) continue ;; esac
            case "$f" in
              tsconfig*.json|.eslintrc*|.prettierrc*|.lintstagedrc*) continue ;;
              jest.config.*|babel.config.*|metro.config.*) continue ;;
              scripts/*|.vscode/*|.idea/*|.claude/*) continue ;;
            esac
            case "$f" in packages/factory/*|packages/test-utils/*) continue ;; esac
            case "$f" in tests/integration/*) continue ;; esac

            # ── Classify runtime source by domain ──
            case "$f" in
              apps/api/src/*|packages/database/src/*)
                RUN_API=true ;;
              apps/mobile/src/*|apps/mobile/app.json|apps/mobile/e2e/*)
                RUN_MOBILE=true ;;
              packages/schemas/src/*|packages/retention/src/*)
                RUN_API=true; RUN_MOBILE=true ;;
              pnpm-lock.yaml|apps/mobile/package.json|apps/api/package.json)
                RUN_API=true; RUN_MOBILE=true ;;
              .github/workflows/e2e-ci.yml)
                RUN_API=true; RUN_MOBILE=true ;;
            esac
          done <<< "$FILES"

          echo "run-api-e2e=$RUN_API" >> "$GITHUB_OUTPUT"
          echo "run-mobile-e2e=$RUN_MOBILE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Decision: API=$RUN_API  Mobile=$RUN_MOBILE ==="

  api-integration:
    name: API Integration Tests
    needs: check-changes
    # Only run on schedule/dispatch — ci.yml already covers integration tests on PR/push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd "pg_isready -U eduagent -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          standalone: true

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      # [BUG-243] Use drizzle-kit migrate (not db:push) so committed migration
      # SQL is the source of truth for the E2E DB schema — same posture as
      # ci.yml and the deploy.yml staging/production deploys. AGENTS.md
      # "Staging and production must use committed migration SQL plus
      # drizzle-kit migrate" — the divergence here used to let push silently
      # accept schema that the migration SQL would have rejected, hiding
      # migration-SQL breakage from E2E. Running from `working-directory:
      # packages/database` (not via pnpm --filter) sidesteps the pnpm strict
      # isolation issue that previously forced db:push.
      - name: Apply database migrations
        working-directory: packages/database
        run: pnpm exec drizzle-kit migrate

      - name: Run API integration tests
        run: pnpm exec jest --config tests/integration/jest.config.cjs

  mobile-maestro:
    name: Mobile Maestro E2E Tests
    needs: check-changes
    # This job is secret-bearing and checks out + executes PR head code, so it
    # carries its OWN fork-exclusion guard in addition to the check-changes
    # output gate — it never relies solely on an upstream job's output. Even if
    # check-changes wrongly emitted run-mobile-e2e=true for a fork PR, this
    # guard refuses to run the secret-backed job for any workflow_run originating
    # from a pull_request or a fork repository.
    if: >-
      needs.check-changes.outputs.run-mobile-e2e == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.event != 'pull_request' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON((github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.maestro_suite == 'nightly')) && '[1,2,3,4,5,6,7,8]' || (github.event_name == 'workflow_dispatch' && inputs.maestro_suite == 'v2') && '[1]' || '[1,2,3,4]') }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd "pg_isready -U eduagent -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      MAESTRO_CLI_NO_ANALYTICS: 1
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      NODE_ENV: test
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
      EXPO_PUBLIC_E2E: 'true'
      # V2 is a build-time flag. Keep the existing PR/nightly APKs on their
      # established V0/V1 posture; only the explicit publish-readiness suite
      # bakes the Mentor/Subjects/Journal shell into the JS bundle.
      EXPO_PUBLIC_ENABLE_MODE_NAV_V2: ${{ github.event_name == 'workflow_dispatch' && inputs.maestro_suite == 'v2' && 'true' || 'false' }}
      EXPO_PUBLIC_API_URL: http://10.0.2.2:8787
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
      # Expo inlines EXPO_PUBLIC_* vars at JS bundle time.
      # Clerk publishable key is needed for auth screens to render.
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PREVIEW }}
      # Public custom-provider slug used by the strict Android SSO render flow.
      EXPO_PUBLIC_CLERK_OPENAI_SSO_SLUG: openai
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filter: tree:0
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          standalone: true

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          package-manager-cache: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── APK cache: skip the ~20 min native build when native config is unchanged ──
      # Key covers ONLY native-affecting files (not JS source). On cache hit,
      # we re-bundle fresh JS and inject it into the cached APK, saving ~15 min.
      # This must be a release-variant APK: debug variants include Expo's
      # development-client launcher and boot into its server picker instead of
      # the embedded MentoMate bundle (caught by the exact-main WI-1652 run).
      - name: Cache E2E release APK
        id: apk-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          key: apk-e2e-release-${{ hashFiles('apps/mobile/app.json', 'apps/mobile/package.json', 'apps/mobile/plugins/**', 'apps/mobile/assets/**', 'pnpm-lock.yaml') }}

      # --- Phase 1: strict pnpm install + schema migrate ---
      # [BUG-243] Use drizzle-kit migrate (not push) for the Maestro DB —
      # same posture as ci.yml + deploy.yml. Run from the package directory
      # so drizzle-kit resolves @neondatabase/serverless via the package's
      # own node_modules (pnpm strict isolation otherwise hides it).
      - run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Apply database migrations
        working-directory: packages/database
        run: pnpm exec drizzle-kit migrate

      # --- Phase 2: hoisted install for React Native native builds ---
      # Gradle runs `node` scripts that expect flat node_modules.
      # pnpm's default isolated layout breaks this. Hoist only in CI.
      - name: Configure pnpm for native builds
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: echo "shamefully-hoist=true" > .npmrc

      - name: Install (hoisted for native build)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # Build workspace deps that the mobile app imports at prebuild time
      - name: Build schemas package
        run: pnpm exec tsc --build packages/schemas/tsconfig.lib.json

      # The seed service must create real users in the same Clerk instance as
      # the preview publishable key embedded in the APK. Read all seed secrets
      # from Doppler staging, matching the trusted Playwright workflow, so the
      # local API never falls back to database-only fake Clerk identities.
      - name: Install Doppler CLI
        run: |
          DOPPLER_VERSION="3.76.0"
          DOPPLER_ARCHIVE="doppler_${DOPPLER_VERSION}_linux_amd64.tar.gz"
          DOPPLER_SHA256="04f1ff30ed162d7af1dba7f11ad6a37ef35099de86a7ec6e261b64b1b337a3f3"
          curl -fsSLO "https://github.com/DopplerHQ/cli/releases/download/${DOPPLER_VERSION}/${DOPPLER_ARCHIVE}"
          echo "${DOPPLER_SHA256}  ${DOPPLER_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${DOPPLER_ARCHIVE}" -C /usr/local/bin doppler
          doppler --version

      # Write .dev.vars so wrangler dev can pass secrets into the Workers runtime.
      # wrangler dev runs in an isolated V8 sandbox — it does NOT inherit shell
      # env vars. It reads non-secret bindings from wrangler.toml [vars] and
      # secret bindings from .dev.vars in the project directory.
      - name: Write wrangler .dev.vars for API
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error title=Doppler token missing::DOPPLER_TOKEN_STG is required to create real Clerk seed users."
            exit 1
          fi
          doppler run -p mentomate -c stg --command "
            umask 077
            # The hosted worker pre-registers its deterministic provider before
            # the first request. Keep provider keys absent: llmMiddleware accepts
            # that registry, while any key here would overwrite the fixture.
            # Session close/summary paths use a CORE Inngest dispatch. Give the
            # local Worker the staging outbound key so those user actions keep
            # their production fail-closed contract during native E2E.
            printf 'DATABASE_URL=%s\nNODE_ENV=test\nTEST_SEED_SECRET=%s\nCLERK_SECRET_KEY=%s\nCLERK_JWKS_URL=%s\nCLERK_AUDIENCE=%s\nSEED_PASSWORD=%s\nINNGEST_EVENT_KEY=%s\n' \
              \"\$DATABASE_URL\" \"\$TEST_SEED_SECRET\" \"\$CLERK_SECRET_KEY\" \
              \"\$CLERK_JWKS_URL\" \"\$CLERK_AUDIENCE\" \"\$SEED_PASSWORD\" \
              \"\$INNGEST_EVENT_KEY\" \
              > apps/api/.dev.vars
          "
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}

      # Start API server in background (NODE_ENV=test enables __test/* routes)
      - name: Start API server (background)
        run: |
          pnpm --dir apps/api exec wrangler dev src/test-utils/maestro-e2e-worker.ts &
          echo "Waiting for API server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/v1/health > /dev/null 2>&1; then
              echo "API server ready"
              break
            fi
            sleep 1
          done

      # ── Native build steps — SKIPPED when APK is cached ──

      # Generate native Android project from Expo config
      - name: Expo prebuild (Android)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      # Gradle auto-installs this NDK when absent, but a transient corrupt
      # archive then fails the whole shard without retry. Install it explicitly
      # so the network boundary is bounded and retried before the native build.
      - name: Install Android NDK with retry
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            if "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.1.12297006" "ndk;27.0.12077973"; then
              exit 0
            fi
            echo "::warning::NDK install attempt ${attempt}/3 failed"
            if [ "$attempt" -lt 3 ]; then
              sleep "$((attempt * 5))"
            fi
          done
          exit 1

      # Cache Gradle build outputs to avoid 25-minute native recompilation.
      # Key includes gradle files + native dependency versions so cache
      # invalidates when native deps change.
      - name: Cache Gradle build
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json', 'apps/mobile/android/build.gradle', 'apps/mobile/android/app/build.gradle', 'apps/mobile/android/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # On a cache hit, produce the fresh JS bundle that will replace the stale
      # one in the cached release APK. On a cache miss, Gradle's release bundle
      # task performs this work as part of assembleRelease instead.
      #
      # Key decisions:
      # - Direct node path (not npx expo): npx resolves to the hoisted
      #   binary at workspace root, making Metro use the wrong project root.
      #   The direct path + working-directory keeps cwd = apps/mobile.
      # - --dev false: dev mode tries to open DevTools WebSocket connections
      #   which crash in embedded (offline) APKs.
      - name: Bundle JS for cached APK
        if: steps.apk-cache.outputs.cache-hit == 'true'
        working-directory: apps/mobile
        env:
          # NODE_ENV=test makes babel-preset-expo deliberately skip the
          # EXPO_ROUTER_APP_ROOT transform, yielding an empty route context.
          # Build the device bundle like EAS while EXPO_PUBLIC_E2E keeps the
          # deterministic test hooks enabled.
          NODE_ENV: production
        run: |
          mkdir -p android/app/src/main/assets

          node ../../node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --dev false \
            --entry-file "$(pwd)/index.js" \
            --bundle-output "$(pwd)/android/app/src/main/assets/index.android.bundle" \
            --assets-dest "$(pwd)/android/app/src/main/res"

      # ── On cache HIT: swap fresh JS into the cached APK ──
      # The cached APK has stale JS. Replace the bundle inside the ZIP
      # and re-sign with a debug key so Android accepts it.
      - name: Inject fresh JS into cached APK
        if: steps.apk-cache.outputs.cache-hit == 'true'
        run: |
          APK="$(pwd)/apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          BUNDLE="$(pwd)/apps/mobile/android/app/src/main/assets/index.android.bundle"

          echo "APK size before: $(stat -c%s "$APK") bytes"

          # Replace JS bundle inside the APK (it's a ZIP archive).
          # Use WORK_DIR (not TMPDIR) to avoid shadowing the POSIX temp
          # directory variable used by keytool/apksigner (#10).
          WORK_DIR=$(mktemp -d)
          mkdir -p "$WORK_DIR/assets"
          cp "$BUNDLE" "$WORK_DIR/assets/index.android.bundle"
          (cd "$WORK_DIR" && zip "$APK" assets/index.android.bundle)
          rm -rf "$WORK_DIR"

          # zipalign MUST run BEFORE apksigner — signing invalidates
          # alignment and alignment invalidates signatures. On API 30+
          # misalignment causes INSTALL_FAILED_INVALID_APK (#9).
          ZIPALIGN=$(find "$ANDROID_SDK_ROOT/build-tools" -name "zipalign" -type f | sort -V | tail -1)
          echo "Using zipalign: $ZIPALIGN"
          "$ZIPALIGN" -f -v 4 "$APK" "${APK}.aligned"
          mv "${APK}.aligned" "$APK"

          # Re-sign with debug key (apksigner handles v1+v2+v3 schemes)
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" sign --ks ~/.android/debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android "$APK"

          echo "APK size after: $(stat -c%s "$APK") bytes"

      # ── On cache MISS: full native build ──
      # Compile a release-variant APK so Expo's debug-only development launcher
      # is absent and MainActivity boots the embedded bundle directly. Gradle's
      # release bundle task inherits NODE_ENV=test + EXPO_PUBLIC_E2E=true from
      # the job; it must remain in the task graph because Android resource
      # packaging consumes its generated providers.
      - name: Build E2E release APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile/android
        env:
          NODE_ENV: production
        run: ./gradlew -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m" assembleRelease --no-daemon --max-workers=2 --stacktrace

      # ── Test execution — always runs ──

      - name: Cache Maestro CLI
        id: maestro-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-cli-2.5.1

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          MAESTRO_VERSION="cli-2.5.1"
          MAESTRO_SHA256="2d924bfd37cccabca438a727213648cbfe4f8bb711559ec8e9d199dc09a5ce52"
          curl -fsSLO "https://github.com/mobile-dev-inc/Maestro/releases/download/${MAESTRO_VERSION}/maestro.zip"
          echo "${MAESTRO_SHA256}  maestro.zip" | sha256sum -c -
          rm -rf "$HOME/.maestro"
          unzip -q maestro.zip -d "$RUNNER_TEMP/maestro-install"
          mv "$RUNNER_TEMP/maestro-install/maestro" "$HOME/.maestro"

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Enable KVM for hardware-accelerated Android emulator (10x faster boot)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          # The action runs every input line in a separate sh -c process. Keep
          # exit capture and failure artifacts inside one durable script.
          script: bash apps/mobile/e2e/scripts/run-ci-maestro.sh
        env:
          API_URL: http://10.0.2.2:8787
          CI_SEED_API_URL: http://localhost:8787
          TEST_SEED_SECRET: ${{ secrets.TEST_SEED_SECRET }}
          MAESTRO_CI_SUITE: ${{ github.event_name == 'schedule' && 'nightly' || (github.event_name == 'workflow_dispatch' && inputs.maestro_suite) || 'pr' }}
          MAESTRO_CI_SHARD: ${{ matrix.shard }}
          E2E_SEED_SLOT: native-0${{ matrix.shard }}

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: maestro-results-${{ matrix.shard }}
          path: maestro-screenshots/
          retention-days: 7
