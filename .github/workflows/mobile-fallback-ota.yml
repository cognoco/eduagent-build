name: Mobile Fallback OTA (Config F)

# WI-1307 (M4/C7): manual-only publish of a JS-only OTA update to the
# `fallback` EAS Update channel — the Config F (V1-on/V2-off) rollback bundle
# for the V2 shell ship (docs/specs/2026-06-09-mentor-is-the-app-shell-redesign.md).
# This workflow only defines the machinery; it never fires automatically and
# must be dispatched by an operator. Per project memory
# (feedback_no_ota_unless_asked.md) an agent never runs `eas update` without
# explicit operator instruction — the `confirm` input plus the `production`
# environment approval gate are both required before anything publishes.
#
# KNOWN GAP (flagged, not fixed here): the
# EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PRODUCTION GitHub Actions secret referenced
# below does not exist yet — only the `_PREVIEW` variant is wired into CI today
# (see ci.yml's ota-update job, mobile-ci.yml). It must be added (sourced from
# the production Clerk key already provisioned via
# `eas env:create --environment production`, per docs/deployment-and-secrets.md)
# before this workflow can successfully publish. The preflight step below
# fails loudly instead of publishing a bundle with an empty key.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm — this OTA-publishes the Config F (V1-on/V2-off) rollback bundle to the fallback channel'
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: mobile-fallback-ota
  cancel-in-progress: false

jobs:
  publish-fallback-ota:
    name: Publish OTA update to fallback channel
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 18.x
          packager: pnpm
          token: ${{ secrets.EXPO_TOKEN }}

      # WI-1307: RevenueCat public SDK keys have never existed (the RevenueCat
      # project has only a Test Store app — no iOS/Android store apps, so no
      # appl_/goog_ keys exist anywhere). The current production binary itself
      # ships with EMPTY RevenueCat keys (purchases disabled by design, see
      # apps/mobile/src/lib/revenuecat.ts) — so a hard preflight fail on those
      # keys is stricter than the binary it protects. This relaxation is
      # TEMPORARY, tracked by WI-1328 — RevenueCat production monetization
      # setup (MVP), WS-35, which provisions real iOS/Android store apps and
      # keys; its phase 5 re-hardens REVENUECAT_API_KEY_IOS/ANDROID back to
      # hard-required once that lands.
      - name: Verify required production publish secrets
        run: |
          required_env=(
            EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY
            EXPO_PUBLIC_SENTRY_DSN
          )
          warn_env=(
            EXPO_PUBLIC_REVENUECAT_API_KEY_IOS
            EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID
          )
          missing=()
          for key in "${required_env[@]}"; do
            value="${!key-}"
            if [ -z "$value" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'ERROR: required production publish env is empty: %s\n' "${missing[*]}" >&2
            printf 'Add the missing GitHub Actions secret(s) before dispatching this workflow.\n' >&2
            exit 1
          fi
          for key in "${warn_env[@]}"; do
            value="${!key-}"
            if [ -z "$value" ]; then
              echo "::warning::${key} is empty — publishing the fallback bundle with RevenueCat disabled (parity with the current production binary, where purchases are off by design). TEMPORARY relaxation, tracked by WI-1328 — RevenueCat production monetization setup (MVP), WS-35; its phase 5 re-hardens this preflight to hard-required once real store apps/keys exist."
            fi
          done
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_REVENUECAT_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_IOS }}
          EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID }}

      - name: Publish OTA update to fallback channel
        working-directory: apps/mobile
        env:
          # Must match eas.json build.fallback.env — eas update does NOT read
          # the build profile env block, so we duplicate them here (same
          # constraint documented on the preview OTA job, ci.yml ota-update).
          EXPO_PUBLIC_API_URL: 'https://api.mentomate.com'
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_GIT_SHA: ${{ github.sha }}
          EXPO_PUBLIC_ENABLE_MODE_NAV: 'false'
          EXPO_PUBLIC_ENABLE_MODE_NAV_V1: 'true'
          EXPO_PUBLIC_ENABLE_MODE_NAV_V2: 'false'
          EXPO_PUBLIC_REVENUECAT_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_IOS }}
          EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID }}
        run: |
          COMMIT_MSG="WI-1307 Config F rollback publish (manual, operator-authorized)"
          printf 'Publishing OTA update: %s\n' "$COMMIT_MSG"
          eas update --branch fallback --message "$COMMIT_MSG" --non-interactive
