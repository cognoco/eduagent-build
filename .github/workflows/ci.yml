name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.idea/**'
      - '.claude/**'
  # No paths-ignore on PRs (intentional): docs/.claude-only PRs must still run the
  # doc-validating checks (skills-sync, ADR-link, workflow-security) AND report the
  # required `main` check — otherwise the required context never reports and the PR
  # is stuck BLOCKED. Heavy code work is already affected-only, so a docs-only PR
  # pays only the fixed job overhead, not the test suite. (push keeps paths-ignore.)
  pull_request:

permissions:
  actions: read
  contents: read

# [BUG-787 / CFG-7] Cancel duplicate runs on rapid pushes to the same ref.
# PRs use the PR number to ensure each push to the PR cancels the prior run;
# pushes to main fall through to the ref so concurrent merges queue but do
# not cancel each other (we still want every main commit's CI to run).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  main:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Ensure base branch is available for git diff in validation scripts
      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      # Detect which areas of the codebase changed (used to skip integration tests
      # when only mobile/non-API files changed)
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/database/**'
              - 'packages/schemas/**'
              - 'packages/retention/**'
              - 'pnpm-lock.yaml'

      # Setup pnpm (version read from packageManager field in package.json)
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      # Cache node_modules
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Restore the Nx local computation cache across CI runs. Replaces the
      # Nx Cloud remote cache (disconnected in IID-792) so unchanged projects
      # still skip lint/test/typecheck/build. `nx affected` and the task graph
      # work without the cloud — only the shared cache needed replacing.
      - name: Cache Nx local cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-

      # Enable pgvector extension before schema push (embeddings table uses vector type)
      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      # Run migration SQL against CI postgres — this validates committed SQL files end-to-end.
      # CFG-12: replaced db:push with db:migrate so that broken migration SQL is caught in CI,
      # not silently skipped. db:push only diffs schema; migrate runs the actual SQL files.
      - name: Apply database migrations
        working-directory: packages/database
        run: pnpm exec drizzle-kit migrate

      # Clean stale build artifacts — composite mode (tsconfig.base.json) uses dist/*.d.ts
      # to verify source-output consistency. Nx remote cache can restore stale dist/ and
      # .tsbuildinfo from a previous build, causing TS6305 false positives when source files
      # change. Removing these forces tsc --build to regenerate declarations from scratch.
      #
      # WI-451 (D5): the typecheck cache now excludes .tsbuildinfo from cached outputs
      # (nx.json targetDefaults.typecheck.outputs + apps/mobile/project.json), so the remote
      # cache can no longer restore incremental TS state — the TS6305 root cause is fixed at
      # the cache level. This step is now redundant belt-and-suspenders. RETIRE it (and the
      # local `nx reset` dance) only after several real CI builds confirm zero TS6305 with the
      # nets removed — never delete a net before the fix is proven (D5 sequencing). Tracked by
      # the harness-hygiene activity; first proof rides WI-388's real-PR adoption.
      - name: Clean stale TypeScript build artifacts
        run: |
          find . -name '*.tsbuildinfo' -not -path '*/node_modules/*' -delete
          rm -rf apps/mobile/dist apps/api/dist

      # ---- Fast-fail checks (run before the multi-minute nx run-many) ------
      # These are seconds-fast structural guards — keep them before the big
      # build so a missing i18n key, marker-token regression, or broken
      # script-level test fails the run early instead of after lint+test+
      # typecheck+build has already burned several minutes.

      # Dependency vulnerability scan — surfaces High/Critical CVEs in the
      # dependency tree so they are visible on every CI run rather than only
      # discovered by manual audit.
      #
      # ADVISORY (continue-on-error) for now, deliberately: the tree currently
      # carries a backlog of pre-existing High/Critical advisories (chiefly the
      # @clerk/* authorization-bypass set, fixed only by the breaking Clerk
      # Core-3 upgrade, plus Expo transitives) that a hard gate would fail every
      # PR on. Flipping this to a blocking gate is tracked behind that vuln
      # burndown; until then the step reports so newly-introduced CVEs are
      # noticed in the log without blocking unrelated work.
      - name: pnpm audit (High+, advisory)
        continue-on-error: true
        run: pnpm audit --audit-level=high

      # [Low / deps-supply-chain] Verify no installed dependency's postinstall
      # script can silently read secrets from the CI environment. Catches
      # supply-chain attacks via malicious postinstall hooks before they ship.
      - name: Verify postinstall safety
        run: pnpm run verify:postinstall-safety

      # Forbid mobile-only deps in root package.json. Root + apps/mobile both
      # declaring the same RN/Expo/NativeWind package creates parallel pnpm
      # peer-dep contexts that silently break NativeWind className styling on
      # native bundles. See .claude/memory/feedback_nativewind_root_pkg_split.md.
      - name: Root package.json — no mobile-only deps
        run: pnpm run check:root-deps

      # Fail fast on missing/typo'd t('key') calls — i18next renders unknown
      # keys as the literal key string at runtime, which typecheck and most
      # tests don't catch.
      - name: i18n orphan-key check
        run: pnpm exec tsx scripts/check-i18n-orphan-keys.ts

      # Phase 3 ratchet: block NEW hardcoded English in JSX (`<Text>Add
      # child</Text>`, `<Text>{'Continue'}</Text>`) that bypasses t() and
      # renders English to every locale. The orphan-key check above only sees
      # strings already inside t(); this is the complementary read-side guard.
      # Existing literals are grandfathered in scripts/i18n-jsx-literals-baseline.json.
      - name: i18n hardcoded-JSX-literal check
        run: pnpm exec tsx scripts/check-i18n-jsx-literals.ts

      # Liveness guard for scripts/i18n-keep.ts: every KEEP_PATTERNS reason
      # must cite a real file:line so stale allow-list entries are caught.
      - name: i18n keep-list rot check
        run: pnpm exec tsx scripts/check-i18n-keep-rot.ts

      # Fail fast on stale translation files — Husky only runs check:i18n when
      # en.json is staged in the same commit, so a PR that touches en.json
      # across multiple commits (or omits it from staging) can let locale
      # drift land. CI is the backstop.
      - name: i18n staleness check
        run: pnpm run check:i18n

      # Forbid [MARKER] tokens in LLM prompt builders. State-machine signals
      # must use the structured `signals` envelope (services/llm/envelope.ts),
      # not free-text marker tokens. See AGENTS.md → "LLM Response Envelope".
      - name: Prompt marker-token check
        run: bash scripts/check-prompt-markers.sh

      # [G11 / WI-452] No-clinical-copy ratchet previously ran ONLY in the
      # pre-commit hook — bypassable via --no-verify and invisible to any
      # committer that skips Husky. CI is the backstop. Baseline ratchet:
      # existing offenses are grandfathered, only NEW ones fail.
      - name: No-clinical-copy ratchet (G11)
        run: pnpm run check:no-clinical-copy

      # [G11 / WI-452] Test-only-exports ratchet (D-TTL-6: *ForTesting/__test*
      # symbols must not be imported from production code). It already ran
      # inside the bundled "scripts/* tests" step below, but invisibly — a
      # violation surfaced as an anonymous bundle failure. Discrete step makes
      # the red check name the violation class. (The bundle still includes it;
      # the ~seconds of overlap buys a legible failure surface.)
      - name: Test-only-exports ratchet (G11)
        run: pnpm exec jest --config scripts/jest.config.cjs scripts/check-test-only-exports.test.ts --no-coverage

      # GC1 ratchet (Tier 1): block PRs that add NEW relative-path jest.mock()
      # calls in test files unless the factory uses Pattern A (spreads
      # jest.requireActual of the same specifier) or the line carries a
      # `// gc1-allow: <reason>` sticker. Same TypeScript detector the
      # pre-commit hook in `.husky/pre-commit` uses, so rules can't drift.
      # See AGENTS.md → "Code Quality Guards" → "No new internal jest.mock()".
      - name: GC1 — no new internal jest.mock
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: pnpm exec tsx scripts/check-gc1-pattern-a.ts

      - name: GitHub workflow supply-chain check
        run: pnpm run check:github-workflow-security

      # Structural-regression guards under scripts/ (BUG-979 / BUG-974). Nx
      # does not pick these up — they live outside any project — so we run
      # them directly through ts-jest via scripts/jest.config.cjs.
      - name: scripts/* tests
        run: pnpm exec jest --config scripts/jest.config.cjs --no-coverage

      # Optional advisory: detect .claude/skills/ entries whose .agents/skills/
      # master was removed but the generated copy was left behind. continue-on-error
      # keeps this non-blocking — the step surfaces orphans visibly in CI without
      # gating unrelated PRs. Promote to required once the path has proven stable.
      - name: sync-skills orphan check (advisory)
        continue-on-error: true
        run: node scripts/sync-skills.mjs --report-orphans

      # WI-694: regression guard for the deploy-time KV-binding verifier
      # (apps/api/scripts/verify-wrangler-kv-binding.mjs). Its block-capture
      # regex used a bare `$` under the `m` flag, capturing an empty body and
      # false-failing EVERY binding — reding all main deploys at the "Verify
      # Cloudflare KV bindings before migrations" step. These node:test cases
      # lock the concrete-vs-placeholder behaviour. Lives under apps/api/scripts/,
      # so the scripts/ jest config above does not see it.
      - name: apps/api/scripts node:test guards (KV-binding verifier)
        run: node --test apps/api/scripts/verify-wrangler-kv-binding.test.mjs

      # WI-795: regression guard for the db:push stg/prod guard
      # (packages/database/scripts/check-db-push-target.mjs). These node:test
      # cases lock: guard blocks stg/prd/unknown configs, guard blocks absent
      # DOPPLER_CONFIG without DB_PUSH_LOCAL_DEV, guard allows dev config and
      # the DB_PUSH_LOCAL_DEV opt-in, credential redaction in error output, and
      # the wiring of predb:push + -c dev in package.json scripts.
      # Lives under packages/database/scripts/ so Jest's testMatch doesn't see it.
      - name: packages/database/scripts node:test guards (db:push guard)
        run: node --test packages/database/scripts/check-db-push-target.test.mjs

      # WI-536: validate the flaky-test quarantine registry. Deterministic, so
      # it gates — fails if any entry is missing an owner or a Cosmo WI-NN, or
      # if a quarantined path no longer exists (a stale entry that would rot
      # silently). The quarantined tests themselves run in the non-gating
      # quarantine-report.yml lane, never here.
      - name: Quarantine registry valid (WI-536)
        run: node tools/quarantine/validate.cjs

      # [BUG-246 → WI-452] Change-class ROUTER: walks the PR diff, prints the
      # "you touched X, run Y" matrix from docs/change-classes.md (the
      # human-readable surface for reviewers), AND emits machine-readable
      # routing flags (--github-output) that gate the slow suites below —
      # the matrix is the single source of truth for slow-suite routing, not
      # a parallel paths-filter that can drift from it. No continue-on-error:
      # the router is deterministic, and a router failure must be loud (a
      # broken router silently skipping integration tests is the worst
      # failure mode). Fail-open: if the script cannot resolve a diff base it
      # emits integration=true/eval=true rather than skipping suites.
      - name: Change-class router (WI-452)
        id: change-class
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "Routing slow suites by change class vs origin/${BASE_REF}..."
          bash scripts/check-change-class.sh --branch --github-output

      # PR builds: only lint/test/typecheck/build projects affected by the diff.
      # Push to main: full validation across all projects.
      # Mobile build excluded in both — requires EAS CLI, handled by mobile-ci.yml.
      - name: Lint, test, typecheck, build (PR — affected only)
        if: github.event_name == 'pull_request'
        env:
          NX_BASE: origin/${{ github.base_ref }}
        run: |
          pnpm exec nx affected -t lint test typecheck --base=$NX_BASE --head=HEAD
          pnpm exec nx affected -t build --base=$NX_BASE --head=HEAD --exclude=@eduagent/mobile

      - name: Lint, test, typecheck, build (push — all)
        if: github.event_name == 'push'
        run: |
          pnpm exec nx run-many -t lint test typecheck
          pnpm exec nx run-many -t build --exclude=@eduagent/mobile

      # Run API integration tests against real PostgreSQL.
      # PRs: routed by the change-class router (WI-452) — runs whenever the
      # matrix maps any touched class to integration tests (db-schema,
      # db-migrations, inngest, api-routes, api-middleware, shared-schemas,
      # shared-database, security-sensitive, test-infra, dependencies).
      # Push to main: keeps the original dorny paths-filter gate unchanged.
      - name: API integration tests
        if: >-
          (github.event_name == 'push' && steps.changes.outputs.api == 'true') ||
          (github.event_name == 'pull_request' && steps.change-class.outputs.integration == 'true')
        run: pnpm exec nx run api:test:integration

      # Advisory check: flag stale counts in AGENTS.md (does not block PRs)
      - name: Validate AGENTS.md counts
        if: always()
        continue-on-error: true
        run: bash scripts/validate-doc-versions.sh

  # ---------------------------------------------------------------------------
  # Flag-ON integration lane (WI-789 — ic-orch-020 SEQUENCING INVARIANT)
  #
  # Runs the full integration suite with IDENTITY_V2_ENABLED=true against a
  # FRESH committed-migration DB (drizzle-kit migrate, NOT push). This gives
  # the identity-v2 HTTP-route surface — which buildIntegrationEnv() never
  # sets — its first flag-on committed-migration coverage.
  #
  # NON-BLOCKING by operator ruling (2026-06-20). This lane must keep running
  # with IDENTITY_V2_ENABLED=true, but it is diagnostic signal and must not
  # block unrelated PRs unless the required-check flip is explicitly re-approved.
  #
  # MAKE-REQUIRED PROCEDURE (mirrors the i18n-ratchet "advisory → required" flip):
  #   Step 1 — Confirm defects green on this job.
  #   Step 2 — Remove `continue-on-error: true` from this job.
  #   Step 3 — Add "Flag-ON integration (IDENTITY_V2_ENABLED)"
  #             to the branch-protection required-status-checks list in GitHub
  #             Settings → Branches → main → Edit → "Require status checks to
  #             pass" → search for the job name (it reports separately from
  #             `main` because it's a separate job) and add it.
  #   Step 4 — This job then becomes the WP-FLAG close gate.
  #
  # The job name intentionally ends with a parenthetical so it is distinct
  # from the `main` job in the required-check picker.
  # ---------------------------------------------------------------------------
  integration-flag-on:
    name: Flag-ON integration (IDENTITY_V2_ENABLED)
    runs-on: ubuntu-latest
    # NON-BLOCKING: this is a flag-on diagnostic lane, not a merge gate.
    # Remove this only after an explicit operator-approved required-check flip.
    continue-on-error: true
    # WATCH (WI-789 / repoint-journaling): this lane runs the PRE-repoint
    # committed-migration schema; when the repoint migrations later journal,
    # they should keep this lane green (repoint-sensitive tests).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests_v2
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5433/tests_v2
      IDENTITY_V2_ENABLED: 'true'
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Enable pgvector extension before migration
      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      # Fresh committed-migration DB — validates that all migration SQL applies
      # cleanly to a zero-state schema and that the v2 surface works against it.
      # drizzle-kit migrate (NOT push) is deliberate: push diffs schema and can
      # silently skip broken SQL; migrate runs every committed SQL file in order.
      - name: Apply database migrations (drizzle-kit migrate)
        working-directory: packages/database
        run: pnpm exec drizzle-kit migrate

      # Run the full integration suite with the flag on.
      # Reds here are expected (D1-D4/FG1/:709 defects) and are the diagnostic
      # signal this lane exists to surface. They do NOT fail the `main` job.
      - name: API integration tests (flag-ON)
        run: pnpm exec nx run api:test:integration

      # WI-808: the apps/api co-located integration tests
      # (apps/api/src/**/*.integration.test.ts — incl the H8 RLS-coverage suite
      # and the WI-794 GUC drift-guard) are globbed ONLY by the dash target's
      # config (apps/api/jest.integration.config.cjs). The colon target above
      # globs only tests/integration/**, so before this step those suites ran in
      # NO CI lane (ic-orch-124). This lane's DB is built via drizzle-kit migrate,
      # so RLS policies (0066+0117) exist and the H8/WI-794 catalog guards are
      # non-vacuous here. if: always() so it runs even though the colon step
      # above is expected-red; allowed-red with the rest of this job.
      - name: API co-located integration tests (flag-ON, apps/api/src)
        if: always()
        run: pnpm exec nx run api:test-integration

  # ---------------------------------------------------------------------------
  # OTA Update: publish JS bundle to EAS Update (preview channel)
  # Runs after the main job passes, only on push to main, only when mobile
  # files changed. Takes ~3 min instead of a full native build (~30 min).
  # ---------------------------------------------------------------------------
  ota-update:
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Check if mobile files changed
        id: mobile-check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"

          if echo "$changed" | grep -Eq '^apps/mobile/|^packages/schemas/'; then
            echo "mobile_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "mobile_changed=false" >> "$GITHUB_OUTPUT"
            echo "No mobile changes — skipping OTA update"
          fi

      - name: Check for native changes
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        id: native-check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          native_patterns="apps/mobile/app.json apps/mobile/package.json apps/mobile/eas.json"

          native_changed=false
          for pattern in $native_patterns; do
            if echo "$changed" | grep -q "^${pattern}$"; then
              native_changed=true
              echo "Native change detected: $pattern"
            fi
          done

          if echo "$changed" | grep -Eq '^apps/mobile/(plugins|android|ios)/'; then
            native_changed=true
            echo "Native change detected in plugins/android/ios directory"
          fi

          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        if: steps.mobile-check.outputs.mobile_changed == 'true'

      - name: Setup Expo
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 18.x
          packager: pnpm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to preview channel
        if: steps.mobile-check.outputs.mobile_changed == 'true' && steps.native-check.outputs.native_changed != 'true'
        working-directory: apps/mobile
        env:
          # Must match eas.json build.preview.env — eas update does NOT read
          # the build profile env block, so we duplicate them here.
          EXPO_PUBLIC_API_URL: 'https://api-stg.mentomate.com'
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PREVIEW }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          # [FCR-2026-05-23-L14.F12] Wire the commit SHA so contract-drift-check.ts
          # can compare the mobile bundle's origin against the deployed API SHA.
          # Without this, checkContractDrift() always exits early at the
          # "Set EXPO_PUBLIC_GIT_SHA in your env" branch and drift goes undetected.
          EXPO_PUBLIC_GIT_SHA: ${{ github.sha }}
          EXPO_PUBLIC_ENABLE_MODE_NAV: 'true'
          EXPO_PUBLIC_ENABLE_MODE_NAV_V1: 'true'
          EXPO_PUBLIC_ENABLE_MODE_NAV_V2: 'true'
          # [M4 / config-secrets] RevenueCat public keys — excluded from eas.json
          # via EAS_JSON_DENYLIST but must be baked into every OTA bundle so
          # Purchases.configure() receives non-empty strings. Missing → silent
          # IAP disable for all users on the OTA channel.
          EXPO_PUBLIC_REVENUECAT_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_IOS }}
          EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_ANDROID }}
          # [M2 / config-secrets] Analytics HMAC key — excluded from eas.json via
          # EAS_JSON_DENYLIST. Without this the analytics helper falls back to
          # 'unkeyed_' prefix, breaking cross-event profile correlation and
          # silently removing the HMAC privacy boundary.
          EXPO_PUBLIC_ANALYTICS_HASH_KEY_V1: ${{ secrets.EXPO_PUBLIC_ANALYTICS_HASH_KEY_V1 }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1 | tr -cd '[:print:]' | cut -c1-200)
          printf 'Publishing OTA update: %s\n' "$COMMIT_MSG"
          eas update --branch preview --message "$COMMIT_MSG" --non-interactive

      - name: Report native change (full build needed)
        if: steps.native-check.outputs.native_changed == 'true'
        run: |
          echo "::warning::Native files changed — a full EAS build is also needed. Trigger via Mobile CI workflow_dispatch or wait for the automated build-preview job."
