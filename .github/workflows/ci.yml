name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  # Paths that indicate a native change requiring a full EAS build.
  # Used by the ota-update job to decide whether to publish an OTA update.
  NATIVE_CHANGE_PATHS: >-
    apps/mobile/app.json
    apps/mobile/package.json
    apps/mobile/eas.json
    apps/mobile/plugins/
    apps/mobile/android/
    apps/mobile/ios/

jobs:
  main:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eduagent
          POSTGRES_PASSWORD: eduagent
          POSTGRES_DB: tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://eduagent:eduagent@localhost:5432/tests
      CI: true
      NX_DAEMON: false
      NX_ISOLATE_PLUGINS: false
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Ensure base branch is available for git diff in validation scripts
      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: pnpm exec nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      # Setup pnpm (version read from packageManager field in package.json)
      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install

      # Push database schema to test postgres (Drizzle push for CI)
      - name: Apply database schema
        run: pnpm --filter @eduagent/database db:push

      # Clean stale build artifacts — composite mode (tsconfig.base.json) uses dist/*.d.ts
      # to verify source-output consistency. Nx remote cache can restore stale dist/ and
      # .tsbuildinfo from a previous build, causing TS6305 false positives when source files
      # change. Removing these forces tsc --build to regenerate declarations from scratch.
      - name: Clean stale TypeScript build artifacts
        run: |
          find . -name '*.tsbuildinfo' -not -path '*/node_modules/*' -delete
          rm -rf apps/mobile/dist apps/api/dist

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx-cloud record -- echo Hello World
      # When you enable task distribution, run the e2e-ci task instead of e2e
      # Note: Mobile build excluded - mobile:build requires EAS CLI which is handled by mobile-ci.yml
      - run: pnpm exec nx run-many -t lint test typecheck && pnpm exec nx run-many -t build --exclude=@eduagent/mobile

      # Run API integration tests against real PostgreSQL
      - name: API integration tests
        run: pnpm exec nx run api:test:integration

      # Advisory check: flag stale counts in CLAUDE.md (does not block PRs)
      - name: Validate CLAUDE.md counts
        if: always()
        continue-on-error: true
        run: bash scripts/validate-doc-versions.sh

  # ---------------------------------------------------------------------------
  # OTA Update: publish JS bundle to EAS Update (preview channel)
  # Runs after the main job passes, only on push to main, only when mobile
  # files changed. Takes ~3 min instead of a full native build (~30 min).
  # ---------------------------------------------------------------------------
  ota-update:
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if mobile files changed
        id: mobile-check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"

          if echo "$changed" | grep -Eq '^apps/mobile/|^packages/schemas/'; then
            echo "mobile_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "mobile_changed=false" >> "$GITHUB_OUTPUT"
            echo "No mobile changes — skipping OTA update"
          fi

      - name: Check for native changes
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        id: native-check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          native_patterns="apps/mobile/app.json apps/mobile/package.json apps/mobile/eas.json"

          native_changed=false
          for pattern in $native_patterns; do
            if echo "$changed" | grep -q "^${pattern}"; then
              native_changed=true
              echo "Native change detected: $pattern"
            fi
          done

          if echo "$changed" | grep -Eq '^apps/mobile/(plugins|android|ios)/'; then
            native_changed=true
            echo "Native change detected in plugins/android/ios directory"
          fi

          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        with:
          standalone: true

      - uses: actions/setup-node@v4
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        if: steps.mobile-check.outputs.mobile_changed == 'true'

      - name: Setup Expo
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.x
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to preview channel
        if: steps.mobile-check.outputs.mobile_changed == 'true'
        working-directory: apps/mobile
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          echo "Publishing OTA update: $COMMIT_MSG"
          eas update --branch preview --message "$COMMIT_MSG" --non-interactive

      - name: Report native change (full build needed)
        if: steps.native-check.outputs.native_changed == 'true'
        run: |
          echo "::warning::Native files changed — a full EAS build is also needed. Trigger via Mobile CI workflow_dispatch or wait for the automated build-preview job."
