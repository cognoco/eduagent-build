name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.idea/**'
      - '.claude/**'

# [CR-794] Workflow-level least-privilege default. Without this, GitHub falls
# back to the repo default token permissions (often `write-all`) for any job
# that doesn't declare its own `permissions:` block. Each job below must
# still declare what it actually needs — the workflow-level setting just
# makes "forgot to declare" fail closed.
permissions: {}

# Cancel in-flight reviews when a new push arrives on the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review (token 1)
        id: review-1
        continue-on-error: true
        uses: ./.github/actions/claude-review
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # Fallback: token 1 hit its quota (429) or otherwise failed.
      # continue-on-error keeps the job green so we can check outcome directly.
      - name: Run Claude Code Review (token 2 — fallback)
        id: review-2
        if: steps.review-1.outcome == 'failure'
        continue-on-error: true
        uses: ./.github/actions/claude-review
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Run Claude Code Review (token 3 — fallback)
        id: review-3
        if: steps.review-1.outcome == 'failure' && steps.review-2.outcome == 'failure'
        continue-on-error: true
        uses: ./.github/actions/claude-review
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}

      - name: Verify review completed
        if: always()
        run: |
          if [[ "${{ steps.review-1.outcome }}" == "success" ]] || \
             [[ "${{ steps.review-2.outcome }}" == "success" ]] || \
             [[ "${{ steps.review-3.outcome }}" == "success" ]]; then
            echo "::notice::Review completed successfully"
          else
            echo "::warning::All review tokens exhausted — review skipped"
          fi
