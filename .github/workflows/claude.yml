
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
    # `assigned` is intentionally omitted: for that event the triggering actor
    # is github.event.sender (the assigner), not github.event.issue.author_association
    # (the issue creator). The job if: only checks the creator's association, so any
    # triage/write user who assigns a trusted-user's @claude issue would fire the
    # secret-backed agent unchecked. `opened` is the useful trigger and is safe
    # because the opener and the association-checked actor are the same person.
    # See: WI-736 / S1 (PRG-10 security review F-119).
  pull_request_review:
    types: [submitted]

# [CR-794 sweep] Workflow-level least-privilege default — see claude-code-review.yml.
# Each job below must still declare its own permissions block for what it needs.
permissions: {}

jobs:
  claude:
    # The secret-backed agent must only run for repo-trusted actors. Each
    # trigger clause requires both an @claude mention AND a trusted
    # author_association (OWNER / MEMBER / COLLABORATOR) on the event's actor.
    # author_association is set by GitHub on the payload and cannot be spoofed
    # by the comment/issue author, so a drive-by external account that mentions
    # @claude no longer invokes the secret-backed path.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 1

      - name: Prepare Claude Code install directory
        run: mkdir -p "$HOME/.local/bin"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@20c8abf165d5f85ab3fc970db9498436377dc9d1  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
