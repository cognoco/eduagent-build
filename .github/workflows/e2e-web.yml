name: E2E Web

# Secret-backed Playwright release coverage. The 'Playwright web smoke' job is
# the required branch-protection check and reports an HONEST result in every case:
#   - trusted same-repo PR that touches the web/mobile surface -> the isolated
#     v2-release project runs and the required check gates on its actual outcome;
#   - fork/untrusted PR (secrets unavailable) -> pass-through (cannot run a
#     secret-bearing gate; reviewers run it via workflow_dispatch after review);
#   - PR with no web/mobile surface changes -> pass-through report (~seconds);
#   - manual workflow_dispatch -> the V2 gate always runs.
# Legacy smoke runs afterward in the same prepared job as a visible advisory step.
on:
  pull_request:
    branches:
      - main
      - develop
      - improvements
      - language-add
  workflow_dispatch:

concurrency:
  group: e2e-web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  # Decide whether the real, secret-backed smoke suite should run.
  # run-real is true only when secrets are actually available (manual dispatch,
  # or a trusted same-repo PR) AND the change set touches the web/mobile surface.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-real: ${{ steps.check.outputs.run-real }}
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Decide whether to run the real smoke suite
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
          # Same-repo PRs are trusted (secrets are exposed to them); forks are not.
          IS_SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          # Manual dispatch always runs the V2 gate (secrets available).
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
            echo "run-real=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — running the V2 release gate"
            exit 0
          fi

          # Fork/untrusted PR: secrets are not available, so the real
          # secret-bearing smoke cannot run. The gate falls back to a
          # pass-through (reviewers validate via workflow_dispatch).
          if [[ "$IS_SAME_REPO" != "true" ]]; then
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "run-real=false" >> "$GITHUB_OUTPUT"
            echo "Fork/untrusted PR — secret-backed smoke cannot run; gate is pass-through. Use workflow_dispatch after review."
            exit 0
          fi

          # Trusted same-repo PR: run the real smoke iff the change set touches
          # the web/mobile surface, this workflow, or a smoke-gate controller.
          # workflow_dispatch remains available for explicit hard proof.
          FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          SURFACE_CHANGED=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              apps/*|packages/*|package.json|pnpm-lock.yaml|.github/workflows/e2e-web.yml|scripts/playwright-staging-gate*|scripts/playwright-edge-probe*)
                SURFACE_CHANGED=true
                break
                ;;
            esac
          done <<< "$FILES"

          echo "trusted=true" >> "$GITHUB_OUTPUT"
          echo "run-real=$SURFACE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Trusted PR — surface-changed=$SURFACE_CHANGED (changed files: $(echo "$FILES" | wc -l | tr -d ' '))"

  run-smoke:
    needs: changes
    if: needs.changes.outputs.run-real == 'true'
    runs-on: ubuntu-latest
    # Preserve the original 20-minute setup/V2 budget and reserve bounded
    # headroom for the advisory legacy step plus cleanup/artifact handling.
    timeout-minutes: 30
    env:
      CI: true
      PLAYWRIGHT_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      # [BUG-239] Non-secret config still surfaced via env: so workflow logs
      # can show what we're pointing at. The seed secret / Clerk secret are
      # injected via Doppler at runtime (see "Run V2 release Playwright gate"
      # below) instead of being read straight from GitHub Actions secrets —
      # the local-vs-CI parity rule in memory project_playwright_e2e_setup.md
      # is "always run with doppler -c stg so TEST_SEED_SECRET matches the
      # .dev.vars the wrangler dev server reads". If CI bypasses Doppler and
      # GitHub's repo-level TEST_SEED_SECRET drifts from Doppler stg, every
      # seed call returns 403 with no signal that the source of truth split.
      # Sourcing from Doppler stg in CI keeps the secret single-sourced.
      EXPO_PUBLIC_API_URL: ${{ vars.E2E_API_URL || 'https://api-stg.mentomate.com' }}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_PREVIEW }}
      # Release E2E posture: export the web bundle with the V2 shell enabled.
      # serve-exported-web.mjs writes these into .env.local/.env.development.local
      # before Expo export, because Expo public env resolution can prefer those
      # files over process.env.
      EXPO_PUBLIC_ENABLE_MODE_NAV: 'true'
      EXPO_PUBLIC_ENABLE_MODE_NAV_V1: 'true'
      EXPO_PUBLIC_ENABLE_MODE_NAV_V2: 'true'
      # Repository variable with a non-empty staging fallback; the canary and
      # exported app deliberately share this exact API target.
      PLAYWRIGHT_API_URL: ${{ vars.E2E_API_URL || 'https://api-stg.mentomate.com' }}
      PLAYWRIGHT_SKIP_LOCAL_API: '1'
      # [BUG-326] Worker-count discriminator. The Playwright config
      # (apps/mobile/playwright.config.ts) picks 1 vs 4 workers based on
      # E2E_ENV, NOT on substring-matching the API URL. The default
      # `api-stg.mentomate.com` is a custom-domain (non-rate-limited)
      # staging API → safe for 4 parallel workers.
      #
      # If you change `vars.E2E_API_URL` to a *.workers.dev hostname (the
      # shared Cloudflare-throttled tier), ALSO set `E2E_ENV: staging-cf`
      # here so the config drops back to 1 worker. Conversely, if you
      # repoint at a dedicated/local-cluster API that is NOT rate-limited,
      # leave `E2E_ENV: staging` (or unset and rely on the default 4
      # workers). See playwright.config.ts → `usesRateLimitedApi`.
      E2E_ENV: staging
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          standalone: true

      # Hard runtime contract for playwright-staging-gate.cjs native fetch;
      # keep this on Node 22 with the repository package-engine constraint.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build schemas package
        run: pnpm exec tsc --build packages/schemas/tsconfig.lib.json

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # [BUG-239] Install Doppler CLI so the smoke run reads its secrets from
      # Doppler stg (the single source of truth) instead of GitHub Actions
      # repo-level secrets, which silently drift. DOPPLER_TOKEN_STG must be
      # a Doppler service-account token scoped to the mentomate project's
      # stg config (read-only is sufficient).
      - name: Install Doppler CLI
        run: |
          DOPPLER_VERSION="3.76.0"
          DOPPLER_ARCHIVE="doppler_${DOPPLER_VERSION}_linux_amd64.tar.gz"
          DOPPLER_SHA256="04f1ff30ed162d7af1dba7f11ad6a37ef35099de86a7ec6e261b64b1b337a3f3"
          curl -fsSLO "https://github.com/DopplerHQ/cli/releases/download/${DOPPLER_VERSION}/${DOPPLER_ARCHIVE}"
          echo "${DOPPLER_SHA256}  ${DOPPLER_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${DOPPLER_ARCHIVE}" -C /usr/local/bin doppler
          doppler --version

      - name: Verify Playwright trace reader
        run: |
          # ubuntu-latest includes unzip; keep this explicit guard so a runner
          # image change fails with the exact missing dependency before Doppler.
          if ! command -v unzip >/dev/null 2>&1; then
            echo "::error title=Trace reader missing::unzip is required to classify Playwright trace archives."
            exit 1
          fi

      - name: Start runner-to-edge phase probe
        run: |
          PROBE_OUTPUT="${RUNNER_TEMP}/playwright-edge-probe.jsonl"
          PROBE_PID_FILE="${RUNNER_TEMP}/playwright-edge-probe.pid"
          PROBE_PROCESS_LOG="${RUNNER_TEMP}/playwright-edge-probe-process.log"
          nohup node scripts/playwright-edge-probe.cjs \
            --watch "${PLAYWRIGHT_API_URL}/v1/health" "${PROBE_OUTPUT}" \
            --interval-ms 5000 \
            >"${PROBE_PROCESS_LOG}" 2>&1 &
          PROBE_PID=$!
          echo "${PROBE_PID}" >"${PROBE_PID_FILE}"
          for _attempt in $(seq 1 20); do
            if [ -s "${PROBE_OUTPUT}" ]; then
              exit 0
            fi
            if ! kill -0 "${PROBE_PID}" 2>/dev/null; then
              cat "${PROBE_PROCESS_LOG}"
              echo "::error title=Runner-to-edge probe failed::Probe exited before its first phase sample."
              exit 1
            fi
            sleep 0.25
          done
          echo "::error title=Runner-to-edge probe failed::No phase sample was recorded within 5 seconds."
          exit 1

      - name: Run V2 release Playwright gate
        # The classifier artifact root below mirrors `outputDir` in
        # apps/mobile/playwright.config.ts; update both locations together.
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error title=Doppler token missing::DOPPLER_TOKEN_STG is not set as a GitHub Actions secret. Playwright cannot be run with doppler -c stg, so TEST_SEED_SECRET may drift from .dev.vars and every /__test/seed call will 403. See memory project_playwright_e2e_setup.md."
            exit 1
          fi
          # Keep the canary, suite, and postflight in one Doppler boundary so
          # TEST_SEED_SECRET is exactly the value the staging API accepts.
          doppler run -p mentomate -c stg --command "\
            export PLAYWRIGHT_TEST_SEED_SECRET=\"\$TEST_SEED_SECRET\"; \
            export CLERK_SECRET_KEY=\"\$CLERK_SECRET_KEY\"; \
            export PLAYWRIGHT_API_URL=\"${PLAYWRIGHT_API_URL}\"; \
            set -eu; \
            CANARY_STATE_FILE=\"\${RUNNER_TEMP}/playwright-canary-pre.state\"; \
            node scripts/playwright-staging-gate.cjs --canary > \"\${CANARY_STATE_FILE}\"; \
            PRE_STATE=\$(cut -d= -f2 \"\${CANARY_STATE_FILE}\"); \
            SUITE_NOT_RUN='not-run'; \
            if [ \"\${PRE_STATE}\" != 'healthy' ]; then \
              node scripts/playwright-staging-gate.cjs --decide \"\${PRE_STATE}\" \"\${SUITE_NOT_RUN}\" \"\${SUITE_NOT_RUN}\" 1; \
              exit \$?; \
            fi; \
            set +e; \
            pnpm run test:e2e:web:v2 > \"\${RUNNER_TEMP}/playwright-result.log\" 2>&1; \
            SUITE_STATUS=\$?; \
            cat \"\${RUNNER_TEMP}/playwright-result.log\"; \
            set -e; \
            POST_STATE_FILE=\"\${RUNNER_TEMP}/playwright-canary-post.state\"; \
            node scripts/playwright-staging-gate.cjs --canary > \"\${POST_STATE_FILE}\"; \
            POST_STATE=\$(cut -d= -f2 \"\${POST_STATE_FILE}\"); \
            CLASSIFY_STATE_FILE=\"\${RUNNER_TEMP}/playwright-classification.state\"; \
            node scripts/playwright-staging-gate.cjs --classify apps/mobile/e2e-web/test-results \"\${SUITE_STATUS}\" \"\${RUNNER_TEMP}/playwright-result.log\" \"\${PLAYWRIGHT_API_URL}\" > \"\${CLASSIFY_STATE_FILE}\"; \
            cat \"\${CLASSIFY_STATE_FILE}\"; \
            FAILURE_CLASS=\$(cut -d= -f2 \"\${CLASSIFY_STATE_FILE}\"); \
            node scripts/playwright-staging-gate.cjs --decide \"\${PRE_STATE}\" \"\${POST_STATE}\" \"\${FAILURE_CLASS}\" \"\${SUITE_STATUS}\""

      - name: Upload V2 Playwright artifacts
        if: always()
        continue-on-error: true
        timeout-minutes: 2
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-web-v2-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/mobile/e2e-web/playwright-report
            apps/mobile/e2e-web/test-results
          retention-days: 14

      - name: Run legacy Playwright smoke (advisory)
        id: legacy-smoke
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        timeout-minutes: 5
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error title=Doppler token missing::DOPPLER_TOKEN_STG is not set; legacy Playwright smoke cannot use the staging seed contract."
            exit 1
          fi
          doppler run -p mentomate -c stg --command "\
            export PLAYWRIGHT_TEST_SEED_SECRET=\"\$TEST_SEED_SECRET\"; \
            export CLERK_SECRET_KEY=\"\$CLERK_SECRET_KEY\"; \
            export PLAYWRIGHT_API_URL=\"${PLAYWRIGHT_API_URL}\"; \
            export PLAYWRIGHT_ARTIFACT_LANE=legacy; \
            pnpm run test:e2e:web:smoke"

      - name: Stop and summarize runner-to-edge phase probe
        if: always()
        run: |
          PROBE_OUTPUT="${RUNNER_TEMP}/playwright-edge-probe.jsonl"
          PROBE_PID_FILE="${RUNNER_TEMP}/playwright-edge-probe.pid"
          if [ -s "${PROBE_PID_FILE}" ]; then
            PROBE_PID=$(cat "${PROBE_PID_FILE}")
            kill -INT "${PROBE_PID}" 2>/dev/null || true
            for _attempt in $(seq 1 20); do
              if ! kill -0 "${PROBE_PID}" 2>/dev/null; then
                break
              fi
              sleep 0.25
            done
            kill -TERM "${PROBE_PID}" 2>/dev/null || true
          fi
          node scripts/playwright-edge-probe.cjs --summarize "${PROBE_OUTPUT}"

      # [BUG-979 / CCR-PR123-M-3] Reset seeded staging accounts independently
      # of Playwright's globalTeardown. Reason: this workflow uses
      # cancel-in-progress (line 13), and a pushed update may cancel a
      # currently-running run before Playwright reaches its teardown — leaving
      # seeded accounts in the staging DB. This step uses if: always() so it
      # runs after success, failure, AND graceful cancellation. The PLAYWRIGHT_*
      # vars resolve to the same prefix the suite uses to seed, so the reset is
      # narrowly scoped to *this* run's accounts and cannot collide with a
      # parallel job's data.
      #
      # Caveat: a hard SIGKILL (rare; only after the runner's grace window
      # elapses) may still skip this step. The scheduled nightly cleanup
      # workflow (e2e-web-cleanup.yml) is the safety net for that case.
      - name: Reset seeded staging accounts (always)
        if: always()
        env:
          PLAYWRIGHT_API_URL: ${{ vars.E2E_API_URL || 'https://api-stg.mentomate.com' }}
          PLAYWRIGHT_TEST_SEED_SECRET: ${{ secrets.TEST_SEED_SECRET }}
          PLAYWRIGHT_RUN_ID: ${{ env.PLAYWRIGHT_RUN_ID }}
        run: |
          # Derive the seed prefix the same way runtime.ts does so the reset
          # call hits exactly this run's seeded rows.
          if [ -n "${PLAYWRIGHT_EMAIL_PREFIX:-}" ]; then
            PREFIX="${PLAYWRIGHT_EMAIL_PREFIX}"
          else
            if [ -z "${PLAYWRIGHT_RUN_ID:-}" ]; then
              echo "::error::PLAYWRIGHT_RUN_ID is not set; cannot derive the Playwright seed cleanup prefix"
              exit 1
            fi
            PREFIX="pw-${PLAYWRIGHT_RUN_ID}-"
          fi
          echo "Resetting seeded accounts with prefix: ${PREFIX}"
          # --fail-with-body so a non-2xx surfaces in logs without breaking
          # if the endpoint is unreachable mid-incident; the nightly cleanup
          # job will catch anything missed here.
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "X-Test-Secret: ${PLAYWRIGHT_TEST_SEED_SECRET}" \
            "${PLAYWRIGHT_API_URL}/v1/__test/reset?prefix=${PREFIX}" \
            || echo "::warning::seed reset returned non-2xx; nightly cleanup will sweep"

      - name: Upload legacy Playwright artifacts
        if: ${{ always() && (steps.legacy-smoke.outcome == 'success' || steps.legacy-smoke.outcome == 'failure') }}
        continue-on-error: true
        timeout-minutes: 2
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-web-legacy-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/mobile/e2e-web/playwright-report-legacy
            apps/mobile/e2e-web/test-results-legacy
          retention-days: 14

  # Required branch-protection check. Trusted surface changes and manual
  # dispatches hard-gate on the isolated v2-release result. Fork/untrusted PRs
  # and trusted PRs with no web/mobile surface remain explicit pass-throughs.
  # Legacy smoke is advisory inside run-smoke and cannot alter its job result.
  smoke:
    name: Playwright web smoke
    if: always()
    needs: [changes, run-smoke]
    runs-on: ubuntu-latest
    steps:
      # Route job results/outputs through env (GitHub substitutes expressions
      # before the shell runs; env keeps the values out of the script text).
      - env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          SMOKE_RESULT: ${{ needs.run-smoke.result }}
          RUN_REAL: ${{ needs.changes.outputs.run-real }}
          TRUSTED: ${{ needs.changes.outputs.trusted }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::E2E change detection did not succeed (result: $CHANGES_RESULT)."
            exit 1
          fi

          if [[ "$RUN_REAL" == "true" ]]; then
            if [[ "$SMOKE_RESULT" != "success" ]]; then
              echo "::error::V2 release Playwright gate did not succeed (result: $SMOKE_RESULT)."
              exit 1
            fi
            echo "V2 release Playwright gate succeeded. Required check passes."
            exit 0
          fi

          if [[ "$TRUSTED" == "false" ]]; then
            echo "Fork/untrusted PR — secret-backed V2 gate cannot run; validate via workflow_dispatch after review. Required check passes."
            exit 0
          fi

          if [[ "$RUN_REAL" == "false" && "$TRUSTED" == "true" ]]; then
            echo "No web/mobile surface changes — V2 gate not run. Required check passes."
            exit 0
          fi

          echo "::error::Invalid E2E gate outputs: run-real=$RUN_REAL trusted=$TRUSTED"
          exit 1
