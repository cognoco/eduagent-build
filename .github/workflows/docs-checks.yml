name: Docs Checks

# Lightweight checks that run on plan/spec doc changes. Separate from ci.yml
# because ci.yml has `paths-ignore: docs/**` (we don't want full lint/test/
# typecheck on doc-only changes), so doc-only PRs would otherwise skip
# enforcement entirely.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/plans/**.md'
      - 'docs/specs/**.md'
      - 'docs/adr/**.md'
      - 'scripts/check-adr-provenance.ts'
      - 'scripts/check-adr-provenance.test.ts'
      - 'scripts/adr-provenance-baseline.json'
      - 'scripts/check-decision-adr-link.ts'
      - 'scripts/decision-adr-link-baseline.json'
      - 'apps/api/drizzle/**'
      - 'scripts/check-migration-rollback.sh'
      - 'packages/database/scripts/check-reference-only-migrations.mjs'
      - 'packages/database/scripts/check-reference-only-migrations.test.mjs'
      - '.github/workflows/docs-checks.yml'
      - 'apps/mobile/e2e/flows/**/*.yaml'
      - 'apps/mobile/e2e/flows/**/*.yml'
      - 'apps/mobile/e2e/*.txt'
      - 'apps/mobile/e2e/CONVENTIONS.md'
      - 'apps/mobile/e2e/ci-maestro-manifest.json'
      - 'apps/mobile/e2e/scripts/ci-maestro-plan.mjs'
      - 'scripts/validate-maestro-flows.sh'
      - 'scripts/validate-maestro-flows/**'
      - 'docs/flows/mobile-app-flow-inventory.md'
      - 'scripts/check-flow-inventory-cite-rot.ts'
      - 'scripts/check-flow-inventory-cite-rot.test.ts'
  pull_request:
    paths:
      - 'docs/plans/**.md'
      - 'docs/specs/**.md'
      - 'docs/adr/**.md'
      - 'scripts/check-adr-provenance.ts'
      - 'scripts/check-adr-provenance.test.ts'
      - 'scripts/adr-provenance-baseline.json'
      - 'scripts/check-decision-adr-link.ts'
      - 'scripts/decision-adr-link-baseline.json'
      - 'apps/api/drizzle/**'
      - 'scripts/check-migration-rollback.sh'
      - 'packages/database/scripts/check-reference-only-migrations.mjs'
      - 'packages/database/scripts/check-reference-only-migrations.test.mjs'
      - '.github/workflows/docs-checks.yml'
      - 'apps/mobile/e2e/flows/**/*.yaml'
      - 'apps/mobile/e2e/flows/**/*.yml'
      - 'apps/mobile/e2e/*.txt'
      - 'apps/mobile/e2e/CONVENTIONS.md'
      - 'apps/mobile/e2e/ci-maestro-manifest.json'
      - 'apps/mobile/e2e/scripts/ci-maestro-plan.mjs'
      - 'scripts/validate-maestro-flows.sh'
      - 'scripts/validate-maestro-flows/**'
      - 'docs/flows/mobile-app-flow-inventory.md'
      - 'scripts/check-flow-inventory-cite-rot.ts'
      - 'scripts/check-flow-inventory-cite-rot.test.ts'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rollback-section:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      # Per AGENTS.md → "Schema And Deploy Safety": destructive migration plans
      # (DROP COLUMN/TABLE/TYPE in fenced SQL) must include a '## Rollback'
      # section. The script also scans apps/api/drizzle/*.sql for destructive
      # statements and verifies each ships with a <name>.rollback.md, so a
      # migration-only PR without a plan doc is no longer unenforced — the
      # apps/api/drizzle/** path filter above triggers the workflow on
      # SQL-only changes.
      - name: Migration rollback-section check
        run: bash scripts/check-migration-rollback.sh

  decision-adr-link:
    if: github.event_name != 'workflow_dispatch'
    # MMT-ADR-0000 §II.5 — forward-only ratchet. A new ADR-class decision block in
    # docs/specs|plans without a linked MMT-ADR fails the check. Today's blocks
    # are grandfathered in scripts/decision-adr-link-baseline.json (the backfill
    # is deferred). See docs/adr/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies (root only)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Decision→ADR link check
        run: pnpm run check:decision-adr-link

  adr-provenance:
    if: github.event_name != 'workflow_dispatch'
    # MMT-ADR-0000 section II.6 - forward-only provenance ratchet. Newly added
    # ADRs must not be born in feat(...) commits, and Accepted ADRs must carry
    # human Architecture sign-off.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies (root only)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: ADR provenance unit tests
        run: pnpm exec jest --config scripts/jest.config.cjs scripts/check-adr-provenance.test.ts --runInBand --no-coverage

      - name: ADR provenance check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm run check:adr-provenance -- --base "origin/${{ github.base_ref }}" --head HEAD
          else
            pnpm run check:adr-provenance -- --base "${{ github.event.before }}" --head HEAD
          fi

  maestro-validator:
    # Static integrity checker for Maestro flow YAML. See
    # docs/audit/e2e/validator-spec.md and docs/audit/e2e/m1b-execution-brief.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies (root only)
        # The validator only needs tsx + ts-jest from the root workspace —
        # we don't need to build every app. `--ignore-scripts` skips heavy
        # postinstall hooks (Prisma, Sentry CLI download, etc.).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validator unit tests
        run: pnpm exec jest --config scripts/jest.config.cjs scripts/validate-maestro-flows/

      - name: Validate Maestro flow integrity
        run: bash scripts/validate-maestro-flows.sh

      - name: Build hard V2 Maestro plan
        run: node apps/mobile/e2e/scripts/ci-maestro-plan.mjs --suite v2 --all --format json

  flow-inventory-cite-rot:
    if: github.event_name != 'workflow_dispatch'
    # WI-2198 AC-7 — forward-only cite-rot guard over
    # docs/flows/mobile-app-flow-inventory.md. Every backtick-quoted
    # source/test/manifest citation in the doc must still resolve to a real
    # file (and, when a line number is given, a file with at least that many
    # lines). See scripts/check-flow-inventory-cite-rot.ts for the resolution
    # model.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies (root only)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cite-rot guard unit tests
        run: pnpm exec jest --config scripts/jest.config.cjs scripts/check-flow-inventory-cite-rot.test.ts --runInBand --no-coverage

      - name: Flow-inventory cite-rot check
        run: pnpm run check:flow-inventory-cite-rot

  reference-only-gate:
    if: github.event_name != 'workflow_dispatch'
    # WI-675: verify the deploy-gate unit tests pass against the real migration
    # journal. Runs on any change to migrations or to the gate script/tests, so
    # a PR that adds a new migration or changes the gate is always checked.
    # Does NOT need pnpm install — the script and test use only Node built-ins.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Reference-only gate unit tests
        run: node --test packages/database/scripts/check-reference-only-migrations.test.mjs
