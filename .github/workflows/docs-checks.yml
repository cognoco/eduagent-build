name: Docs Checks

# Lightweight checks that run on plan/spec doc changes. Separate from ci.yml
# because ci.yml has `paths-ignore: docs/**` (we don't want full lint/test/
# typecheck on doc-only changes), so doc-only PRs would otherwise skip
# enforcement entirely.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/plans/**.md'
      - 'docs/specs/**.md'
      - 'scripts/check-decision-adr-link.ts'
      - 'scripts/decision-adr-link-baseline.json'
      - 'apps/api/drizzle/**'
      - 'scripts/check-migration-rollback.sh'
      - 'packages/database/scripts/check-reference-only-migrations.mjs'
      - 'packages/database/scripts/check-reference-only-migrations.test.mjs'
      - '.github/workflows/docs-checks.yml'
      - 'apps/mobile/e2e/flows/**/*.yaml'
      - 'apps/mobile/e2e/flows/**/*.yml'
      - 'apps/mobile/e2e/*.txt'
      - 'apps/mobile/e2e/CONVENTIONS.md'
      - 'scripts/validate-maestro-flows.sh'
      - 'scripts/validate-maestro-flows/**'
  pull_request:
    paths:
      - 'docs/plans/**.md'
      - 'docs/specs/**.md'
      - 'scripts/check-decision-adr-link.ts'
      - 'scripts/decision-adr-link-baseline.json'
      - 'apps/api/drizzle/**'
      - 'scripts/check-migration-rollback.sh'
      - 'packages/database/scripts/check-reference-only-migrations.mjs'
      - 'packages/database/scripts/check-reference-only-migrations.test.mjs'
      - '.github/workflows/docs-checks.yml'
      - 'apps/mobile/e2e/flows/**/*.yaml'
      - 'apps/mobile/e2e/flows/**/*.yml'
      - 'apps/mobile/e2e/*.txt'
      - 'apps/mobile/e2e/CONVENTIONS.md'
      - 'scripts/validate-maestro-flows.sh'
      - 'scripts/validate-maestro-flows/**'

permissions:
  contents: read

concurrency:
  group: docs-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rollback-section:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Per AGENTS.md → "Schema And Deploy Safety": destructive migration plans
      # (DROP COLUMN/TABLE/TYPE in fenced SQL) must include a '## Rollback'
      # section. The script also scans apps/api/drizzle/*.sql for destructive
      # statements and verifies each ships with a <name>.rollback.md, so a
      # migration-only PR without a plan doc is no longer unenforced — the
      # apps/api/drizzle/** path filter above triggers the workflow on
      # SQL-only changes.
      - name: Migration rollback-section check
        run: bash scripts/check-migration-rollback.sh

  decision-adr-link:
    # MMT-ADR-0000 §II.5 — forward-only ratchet. A new ADR-class decision block in
    # docs/specs|plans without a linked MMT-ADR fails the check. Today's blocks
    # are grandfathered in scripts/decision-adr-link-baseline.json (the backfill
    # is deferred). See docs/adr/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (root only)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Decision→ADR link check
        run: pnpm run check:decision-adr-link

  maestro-validator:
    # Static integrity checker for Maestro flow YAML. See
    # docs/audit/e2e/validator-spec.md and docs/audit/e2e/m1b-execution-brief.md.
    # Advisory while the suite settles — promote to required after M1-B
    # stabilises and the inventory close-out is complete.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (root only)
        # The validator only needs tsx + ts-jest from the root workspace —
        # we don't need to build every app. `--ignore-scripts` skips heavy
        # postinstall hooks (Prisma, Sentry CLI download, etc.).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validator unit tests
        run: pnpm exec jest --config scripts/jest.config.cjs scripts/validate-maestro-flows/

      - name: Validate Maestro flow integrity
        run: bash scripts/validate-maestro-flows.sh

  reference-only-gate:
    # WI-675: verify the deploy-gate unit tests pass against the real migration
    # journal. Runs on any change to migrations or to the gate script/tests, so
    # a PR that adds a new migration or changes the gate is always checked.
    # Does NOT need pnpm install — the script and test use only Node built-ins.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Reference-only gate unit tests
        run: node --test packages/database/scripts/check-reference-only-migrations.test.mjs
