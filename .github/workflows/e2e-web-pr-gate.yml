name: E2E Web PR Gate

# Lightweight pass-through that satisfies the 'Playwright web smoke' required
# branch-protection check on pull_request. Secret-backed Playwright smoke does
# not run on PRs (secrets are not available to untrusted PR code); use
# workflow_dispatch via e2e-web.yml after review to run the real suite.
on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright web smoke
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "Playwright smoke skipped on pull_request — run e2e-web workflow_dispatch after review to validate."
