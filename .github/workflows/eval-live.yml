name: Live LLM Evals

# [WI-452 / gate-spec D3] Tier-2 live evals + Layer-1 signal-drift guard.
# These burn LLM credits and are non-deterministic, so they must NEVER be a
# required PR check (determinism precondition) — they run OFF the blocking
# path: scheduled against main, label-triggered on a PR when an author wants
# a live read, or manually via workflow_dispatch. Before this workflow they
# ran nowhere automated (Windows-pathed local invocations only).
#
# Required repo labels (create in GitHub settings if missing):
#   run-live-evals — PR label that triggers this workflow on a PR
#   ci             — applied to auto-filed failure issues; the de-dup query
#                    filters on it (an absent label silently breaks de-dup:
#                    GitHub drops unknown labels on create, so duplicates
#                    would be filed every week)

on:
  schedule:
    # Weekly, Monday 04:23 UTC — off-hour to avoid the nightly e2e (03:00)
    # and top-of-hour load. Cadence is a cost/latency trade-off; tighten to
    # nightly if drift bites between runs.
    - cron: '23 4 * * 1'
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: eval-live-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  live-evals:
    name: Tier-2 live evals + drift check
    # Label gate: on PRs, run only when the `run-live-evals` label is applied
    # (the `labeled` event fires for every label — filter to ours).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-live-evals'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          standalone: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Same pinned, checksum-verified Doppler CLI install as deploy.yml.
      # DOPPLER_TOKEN_STG is a config-scoped service token (stg) — live evals
      # read LLM provider keys from the staging config, never production.
      - name: Install Doppler CLI
        env:
          DOPPLER_TOKEN_STG: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: |
          if [ -z "${DOPPLER_TOKEN_STG:-}" ]; then
            echo "::error title=Live evals cannot run::DOPPLER_TOKEN_STG is not set as a GitHub Actions secret — no LLM provider keys available."
            exit 1
          fi
          DOPPLER_VERSION="3.76.0"
          DOPPLER_ARCHIVE="doppler_${DOPPLER_VERSION}_linux_amd64.tar.gz"
          DOPPLER_SHA256="04f1ff30ed162d7af1dba7f11ad6a37ef35099de86a7ec6e261b64b1b337a3f3"
          curl -fsSLO "https://github.com/DopplerHQ/cli/releases/download/${DOPPLER_VERSION}/${DOPPLER_ARCHIVE}"
          echo "${DOPPLER_SHA256}  ${DOPPLER_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${DOPPLER_ARCHIVE}" -C /usr/local/bin doppler
          doppler --version

      # Tier 2 + Layer-1 drift in ONE invocation: --check-baseline requires
      # --live and runs the full live harness (real LLM calls validated
      # against expectedResponseSchema), then compares the envelope-signal
      # distribution against the committed baseline
      # (apps/api/eval-llm/baseline.json); exits 1 on either a schema failure
      # or drift beyond tolerance (default 5pp). Deliberately a single step —
      # a separate plain `--live` step would re-run the whole credit-burning
      # suite for no extra signal; failure attribution comes from the harness
      # output, not a step split. Flows without runLive degrade to Tier-1
      # behavior (see eval-llm/README). Non-deterministic by nature — that is
      # WHY it lives here and not in a required PR check.
      - name: Tier-2 live evals + signal-drift check
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: doppler run -- pnpm eval:llm -- --live --check-baseline

      # Alert on drift/break: scheduled runs have no PR surface to go red on,
      # so a silent failure would defeat the point (same rationale as the
      # BUG-953 deploy-failure issue). Only file from scheduled runs — label
      # and manual runs have a human watching.
      - name: Notify on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // De-dup: a standing failure (e.g. known quality issues pending a
            // re-baseline) must not file a new issue every week.
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci',
              per_page: 100,
            });
            const existing = open.find((i) => i.title === 'Live LLM evals failed (scheduled run)');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing — latest run: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Live LLM evals failed (scheduled run)`,
              body: [
                `## Scheduled live-eval failure`,
                ``,
                `The weekly Tier-2 live evals / signal-drift check failed on \`main\`.`,
                `Either a live response no longer matches its expectedResponseSchema,`,
                `or the envelope-signal distribution drifted beyond tolerance vs`,
                `\`apps/api/eval-llm/baseline.json\`.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `Triage: re-run to rule out provider flakiness; if drift is real and`,
                `intentional, re-baseline with`,
                `\`doppler run -- pnpm eval:llm -- --live --update-baseline\` and commit.`,
              ].join('\n'),
              labels: ['ci'],
            });
