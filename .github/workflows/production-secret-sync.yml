name: Production Worker Secret Sync

on:
  schedule:
    # Every 30 minutes, offset from top-of-hour Actions load.
    - cron: '17,47 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Match deploy.yml's production group across every dispatch ref.
  group: deploy-production
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Doppler prd to production Worker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Assert production sync credentials
        env:
          DOPPLER_TOKEN_PRD: ${{ secrets.DOPPLER_TOKEN_PRD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          missing=()
          for name in DOPPLER_TOKEN_PRD CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required production secret-sync credentials: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          standalone: true

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install sync dependencies
        run: pnpm install --frozen-lockfile --filter @eduagent/api...

      - name: Install checksum-verified Doppler CLI
        run: |
          DOPPLER_VERSION="3.76.0"
          DOPPLER_ARCHIVE="doppler_${DOPPLER_VERSION}_linux_amd64.tar.gz"
          DOPPLER_SHA256="04f1ff30ed162d7af1dba7f11ad6a37ef35099de86a7ec6e261b64b1b337a3f3"
          curl -fsSLO "https://github.com/DopplerHQ/cli/releases/download/${DOPPLER_VERSION}/${DOPPLER_ARCHIVE}"
          echo "${DOPPLER_SHA256}  ${DOPPLER_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${DOPPLER_ARCHIVE}" -C /usr/local/bin doppler
          doppler --version

      - name: Sync Doppler prd to production Worker
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_SYNC_CONFIG: ${{ runner.temp }}/wrangler-secret-sync.jsonc
        run: |
          printf '{"name":"mentomate-api-prd"}\n' > "$WRANGLER_SYNC_CONFIG"
          pnpm secrets:sync prd

      - name: Verify production environment health
        run: |
          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sS --max-time 15 -o /tmp/health.json -w "%{http_code}" \
              "https://api.mentomate.com/v1/health") || HTTP_CODE=000
            STATUS=$(node -e "try { const body=require('/tmp/health.json'); process.stdout.write(String(body.status || body.code || '')); } catch { process.stdout.write('invalid-json'); }")
            if [ "$HTTP_CODE" = "200" ] && [ "$STATUS" = "ok" ]; then
              echo "Production environment health is green after secret sync."
              exit 0
            fi
            if grep -q 'ENV_VALIDATION_ERROR' /tmp/health.json 2>/dev/null; then
              echo "Production still reports ENV_VALIDATION_ERROR after secret sync." >&2
            fi
            echo "Health attempt ${attempt}/5 failed: HTTP ${HTTP_CODE}, status ${STATUS}." >&2
            sleep 5
          done
          cat /tmp/health.json >&2 || true
          exit 1

      - name: Notify on sync or health failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = 'Production worker secret sync failed';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 100,
            });
            const existing = open.find((issue) => issue.title === title);
            if (existing) {
              const sixHours = 6 * 60 * 60 * 1000;
              if (Date.now() - Date.parse(existing.updated_at) < sixHours) return;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing - latest run: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The scheduled Doppler prd to Cloudflare Worker sync or its post-sync health check failed.',
                '',
                `Run: ${runUrl}`,
                '',
                'Production secret drift may be active. Follow docs/runbooks/production-worker-secret-sync.md.',
              ].join('\n'),
              labels: ['deploy-failure', 'automated'],
            });
